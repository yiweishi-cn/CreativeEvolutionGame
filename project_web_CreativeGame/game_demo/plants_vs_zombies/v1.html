<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Neon Monkey Guard</title>
<style>
body { margin: 0; background: #050816; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
canvas { width: 800px; height: 500px; display: block; background: #08111f; box-shadow: 0 0 20px #00f0ff44; }
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 500;

  var keys = {};
  var mouse = { x: 0, y: 0, clicked: false };
  var state, score, player, selectedType;
  var path, enemies, towers, bullets, particles;
  var monkeyBase, money, lives, wave, waveTimer, spawnQueue;
  var gridSize = 40;
  var towerTypes, hoveredCell, buildMessage, buildMessageTimer;

  function resetGame(){
    state = 'menu';
    score = 0;
    selectedType = 'dart';
    player = { x: 120, y: 250, r: 16, speed: 4, color: '#00f0ff' };
    monkeyBase = { x: 700, y: 220, w: 60, h: 60, hp: 20, maxHp: 20 };
    money = 160;
    lives = 20;
    wave = 0;
    waveTimer = 120;
    spawnQueue = [];
    enemies = [];
    towers = [];
    bullets = [];
    particles = [];
    hoveredCell = null;
    buildMessage = '';
    buildMessageTimer = 0;
    towerTypes = {
      dart: { cost: 50, range: 120, fireRate: 28, bulletSpeed: 7, damage: 1, color: '#9dfcff', size: 14 },
      glue: { cost: 70, range: 95, fireRate: 45, bulletSpeed: 5, damage: 1, color: '#ffe66d', size: 16, slow: 0.45, slowTime: 90 },
      laser: { cost: 110, range: 150, fireRate: 18, bulletSpeed: 9, damage: 2, color: '#ff2bd6', size: 15 }
    };
    path = [
      { x: -20, y: 80 },
      { x: 160, y: 80 },
      { x: 160, y: 360 },
      { x: 360, y: 360 },
      { x: 360, y: 140 },
      { x: 560, y: 140 },
      { x: 560, y: 250 },
      { x: 730, y: 250 }
    ];
  }

  function pointInRect(px, py, rx, ry, rw, rh){
    return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
  }

  function dist(ax, ay, bx, by){
    var dx = bx - ax;
    var dy = by - ay;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function distanceToSegment(px, py, ax, ay, bx, by){
    var dx = bx - ax;
    var dy = by - ay;
    if (dx === 0 && dy === 0) return dist(px, py, ax, ay);
    var t = ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy);
    t = Math.max(0, Math.min(1, t));
    var sx = ax + t * dx;
    var sy = ay + t * dy;
    return dist(px, py, sx, sy);
  }

  function isCellOnPath(cx, cy){
    for (var i = 0; i < path.length - 1; i++) {
      if (distanceToSegment(cx, cy, path[i].x, path[i].y, path[i + 1].x, path[i + 1].y) < 34) {
        return true;
      }
    }
    return pointInRect(cx, cy, monkeyBase.x - 20, monkeyBase.y - 20, monkeyBase.w + 40, monkeyBase.h + 40);
  }

  function getCellFromMouse(){
    var gx = Math.floor(mouse.x / gridSize) * gridSize;
    var gy = Math.floor(mouse.y / gridSize) * gridSize;
    if (gx < 0 || gy < 0 || gx >= canvas.width || gy >= canvas.height) return null;
    return { x: gx, y: gy, cx: gx + gridSize / 2, cy: gy + gridSize / 2 };
  }

  function towerAtCell(gx, gy){
    for (var i = 0; i < towers.length; i++) {
      if (towers[i].gx === gx && towers[i].gy === gy) return towers[i];
    }
    return null;
  }

  function showMessage(text){
    buildMessage = text;
    buildMessageTimer = 90;
  }

  function tryPlaceTower(){
    var cell = getCellFromMouse();
    if (!cell) return;
    hoveredCell = cell;
    var type = towerTypes[selectedType];
    if (!type) return;
    if (cell.x < 40) {
      showMessage('Too close to edge');
      return;
    }
    if (towerAtCell(cell.x, cell.y)) {
      showMessage('Cell occupied');
      return;
    }
    if (isCellOnPath(cell.cx, cell.cy)) {
      showMessage('Cannot build on path');
      return;
    }
    if (dist(cell.cx, cell.cy, player.x, player.y) < 28) {
      showMessage('Move monkey first');
      return;
    }
    if (money < type.cost) {
      showMessage('Not enough bananas');
      return;
    }
    money -= type.cost;
    towers.push({
      gx: cell.x,
      gy: cell.y,
      x: cell.cx,
      y: cell.cy,
      type: selectedType,
      cooldown: 0,
      range: type.range,
      fireRate: type.fireRate,
      damage: type.damage,
      bulletSpeed: type.bulletSpeed,
      color: type.color,
      size: type.size,
      slow: type.slow || 0,
      slowTime: type.slowTime || 0
    });
    showMessage(selectedType + ' tower built');
  }

  function spawnWave(){
    wave += 1;
    var count = 5 + wave * 2;
    for (var i = 0; i < count; i++) {
      var kind = 'red';
      if (wave >= 2 && i % 4 === 0) kind = 'blue';
      if (wave >= 4 && i % 6 === 0) kind = 'gold';
      if (wave >= 6 && i % 7 === 0) kind = 'tank';
      spawnQueue.push({ delay: i * 28, kind: kind });
    }
  }

  function makeEnemy(kind){
    var config = {
      red: { hp: 2 + wave * 0.35, speed: 1.1 + wave * 0.03, reward: 8, color: '#ff5c8a', r: 12 },
      blue: { hp: 4 + wave * 0.5, speed: 1.5 + wave * 0.04, reward: 12, color: '#57c7ff', r: 11 },
      gold: { hp: 7 + wave * 0.7, speed: 1.25 + wave * 0.05, reward: 18, color: '#ffe66d', r: 13 },
      tank: { hp: 16 + wave * 1.2, speed: 0.8 + wave * 0.03, reward: 26, color: '#b48cff', r: 16 }
    }[kind];
    return {
      kind: kind,
      x: path[0].x,
      y: path[0].y,
      r: config.r,
      hp: config.hp,
      maxHp: config.hp,
      speed: config.speed,
      baseSpeed: config.speed,
      reward: config.reward,
      color: config.color,
      pathIndex: 0,
      slowFactor: 1,
      slowTimer: 0,
      reached: false
    };
  }

  document.addEventListener('keydown', function(e){
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'r') resetGame();
    if (state === 'menu' && e.key === 'Enter') state = 'playing';
    if (state === 'game_over' && e.key === 'Enter') state = 'menu';
    if (e.key === '1') selectedType = 'dart';
    if (e.key === '2') selectedType = 'glue';
    if (e.key === '3') selectedType = 'laser';
    if (state === 'playing' && e.key.toLowerCase() === ' ') spawnWave();
  });

  document.addEventListener('keyup', function(e){
    keys[e.key.toLowerCase()] = false;
  });

  canvas.addEventListener('mousemove', function(e){
    var rect = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
    hoveredCell = getCellFromMouse();
  });

  canvas.addEventListener('mousedown', function(){
    mouse.clicked = true;
    if (state === 'menu') {
      state = 'playing';
      return;
    }
    if (state === 'playing') {
      if (mouse.y >= 430) {
        if (pointInRect(mouse.x, mouse.y, 260, 438, 120, 44)) selectedType = 'dart';
        if (pointInRect(mouse.x, mouse.y, 390, 438, 120, 44)) selectedType = 'glue';
        if (pointInRect(mouse.x, mouse.y, 520, 438, 120, 44)) selectedType = 'laser';
      } else {
        tryPlaceTower();
      }
    }
  });

  function updatePlayer(){
    if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
    if (keys['d'] || keys['arrowright']) player.x += player.speed;
    if (keys['w'] || keys['arrowup']) player.y -= player.speed;
    if (keys['s'] || keys['arrowdown']) player.y += player.speed;
    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(420 - player.r, player.y));
  }

  function updateSpawning(){
    if (spawnQueue.length === 0 && enemies.length === 0) {
      waveTimer -= 1;
      if (waveTimer <= 0) {
        spawnWave();
        waveTimer = 240;
      }
    }
    for (var i = spawnQueue.length - 1; i >= 0; i--) {
      spawnQueue[i].delay -= 1;
      if (spawnQueue[i].delay <= 0) {
        enemies.push(makeEnemy(spawnQueue[i].kind));
        spawnQueue.splice(i, 1);
      }
    }
  }

  function updateEnemies(){
    for (var i = enemies.length - 1; i >= 0; i--) {
      var enemy = enemies[i];
      if (enemy.slowTimer > 0) {
        enemy.slowTimer -= 1;
      } else {
        enemy.slowFactor = 1;
      }
      var target = path[enemy.pathIndex + 1];
      if (!target) {
        enemies.splice(i, 1);
        lives -= 1;
        monkeyBase.hp = Math.max(0, monkeyBase.hp - 1);
        if (lives <= 0 || monkeyBase.hp <= 0) state = 'game_over';
        continue;
      }
      var dx = target.x - enemy.x;
      var dy = target.y - enemy.y;
      var d = Math.sqrt(dx * dx + dy * dy);
      var step = enemy.speed * enemy.slowFactor;
      if (d <= step) {
        enemy.x = target.x;
        enemy.y = target.y;
        enemy.pathIndex += 1;
      } else {
        enemy.x += dx / d * step;
        enemy.y += dy / d * step;
      }
      if (dist(enemy.x, enemy.y, player.x, player.y) < enemy.r + player.r) {
        player.x -= dx / (d || 1) * 2;
        player.y -= dy / (d || 1) * 2;
      }
    }
  }

  function chooseTarget(tower){
    var best = null;
    var bestProgress = -1;
    for (var i = 0; i < enemies.length; i++) {
      var enemy = enemies[i];
      var d = dist(tower.x, tower.y, enemy.x, enemy.y);
      if (d <= tower.range + enemy.r) {
        var progress = enemy.pathIndex * 1000 + enemy.x;
        if (progress > bestProgress) {
          bestProgress = progress;
          best = enemy;
        }
      }
    }
    return best;
  }

  function updateTowers(){
    for (var i = 0; i < towers.length; i++) {
      var tower = towers[i];
      if (tower.cooldown > 0) tower.cooldown -= 1;
      var target = chooseTarget(tower);
      if (target && tower.cooldown <= 0) {
        var angle = Math.atan2(target.y - tower.y, target.x - tower.x);
        bullets.push({
          x: tower.x,
          y: tower.y,
          vx: Math.cos(angle) * tower.bulletSpeed,
          vy: Math.sin(angle) * tower.bulletSpeed,
          damage: tower.damage,
          color: tower.color,
          r: tower.type === 'laser' ? 4 : 5,
          life: 90,
          slow: tower.slow,
          slowTime: tower.slowTime
        });
        tower.cooldown = tower.fireRate;
      }
    }
  }

  function burst(x, y, color, count){
    for (var i = 0; i < count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        life: 20 + Math.random() * 18,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function updateBullets(){
    for (var i = bullets.length - 1; i >= 0; i--) {
      var b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life -= 1;
      var hit = false;
      for (var j = enemies.length - 1; j >= 0; j--) {
        var enemy = enemies[j];
        if (dist(b.x, b.y, enemy.x, enemy.y) <= b.r + enemy.r) {
          enemy.hp -= b.damage;
          if (b.slow > 0) {
            enemy.slowFactor = Math.min(enemy.slowFactor, b.slow);
            enemy.slowTimer = Math.max(enemy.slowTimer, b.slowTime);
          }
          burst(b.x, b.y, b.color, 4);
          hit = true;
          if (enemy.hp <= 0) {
            score += 10;
            money += enemy.reward;
            burst(enemy.x, enemy.y, enemy.color, 10);
            enemies.splice(j, 1);
          }
          break;
        }
      }
      if (hit || b.life <= 0 || b.x < 0 || b.y < 0 || b.x > canvas.width || b.y > canvas.height) {
        bullets.splice(i, 1);
      }
    }
  }

  function updateParticles(){
    for (var i = particles.length - 1; i >= 0; i--) {
      particles[i].x += particles[i].vx;
      particles[i].y += particles[i].vy;
      particles[i].life -= 1;
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
  }

  function update(){
    if (state !== 'playing') return;
    updatePlayer();
    updateSpawning();
    updateEnemies();
    updateTowers();
    updateBullets();
    updateParticles();
    score += 0.05;
    if (buildMessageTimer > 0) buildMessageTimer -= 1;
  }

  function drawPath(){
    ctx.lineWidth = 26;
    ctx.strokeStyle = '#1f3a5a';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (var i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.lineWidth = 10;
    ctx.strokeStyle = '#2f6fa1';
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (var j = 1; j < path.length; j++) ctx.lineTo(path[j].x, path[j].y);
    ctx.stroke();
  }

  function drawBase(){
    ctx.fillStyle = '#2a1f3f';
    ctx.fillRect(monkeyBase.x, monkeyBase.y, monkeyBase.w, monkeyBase.h);
    ctx.strokeStyle = '#ff2bd6';
    ctx.lineWidth = 3;
    ctx.strokeRect(monkeyBase.x, monkeyBase.y, monkeyBase.w, monkeyBase.h);
    ctx.fillStyle = '#00f0ff';
    ctx.beginPath();
    ctx.arc(monkeyBase.x + 30, monkeyBase.y + 30, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.fillRect(monkeyBase.x + 20, monkeyBase.y + 25, 20, 6);
    ctx.fillStyle = '#ff5c8a';
    ctx.fillRect(monkeyBase.x, monkeyBase.y - 12, monkeyBase.w, 8);
    ctx.fillStyle = '#65ff8f';
    ctx.fillRect(monkeyBase.x, monkeyBase.y - 12, monkeyBase.w * (monkeyBase.hp / monkeyBase.maxHp), 8);
  }

  function drawTowers(){
    for (var i = 0; i < towers.length; i++) {
      var t = towers[i];
      ctx.fillStyle = t.color;
      ctx.shadowColor = t.color;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0b1320';
      ctx.fillRect(t.x - 4, t.y - 12, 8, 24);
    }
  }

  function drawEnemies(){
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
      ctx.fill();
      if (e.slowFactor < 1) {
        ctx.strokeStyle = '#9dfcff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r + 3, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.fillStyle = '#330b16';
      ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2, 4);
      ctx.fillStyle = '#65ff8f';
      ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2 * (e.hp / e.maxHp), 4);
    }
  }

  function drawBullets(){
    for (var i = 0; i < bullets.length; i++) {
      var b = bullets[i];
      ctx.fillStyle = b.color;
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function drawParticles(){
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life / 30);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer(){
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fillStyle = player.color;
    ctx.shadowColor = player.color;
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff2bd6';
    ctx.fillRect(player.x + 10, player.y - 3, 14, 6);
  }

  function drawPlacementPreview(){
    if (state !== 'playing' || !hoveredCell || mouse.y >= 430) return;
    var valid = true;
    if (towerAtCell(hoveredCell.x, hoveredCell.y)) valid = false;
    if (isCellOnPath(hoveredCell.cx, hoveredCell.cy)) valid = false;
    if (dist(hoveredCell.cx, hoveredCell.cy, player.x, player.y) < 28) valid = false;
    var type = towerTypes[selectedType];
    ctx.strokeStyle = valid ? '#65ff8f' : '#ff4d6d';
    ctx.lineWidth = 2;
    ctx.strokeRect(hoveredCell.x + 1, hoveredCell.y + 1, gridSize - 2, gridSize - 2);
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = type.color;
    ctx.beginPath();
    ctx.arc(hoveredCell.cx, hoveredCell.cy, type.range, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawBottomBar(){
    ctx.fillStyle = '#09101c';
    ctx.fillRect(0, 430, canvas.width, 70);
    ctx.strokeStyle = '#1c3652';
    ctx.strokeRect(0, 430, canvas.width, 70);
    var buttons = [
      { key: '1', type: 'dart', x: 260 },
      { key: '2', type: 'glue', x: 390 },
      { key: '3', type: 'laser', x: 520 }
    ];
    for (var i = 0; i < buttons.length; i++) {
      var b = buttons[i];
      var active = selectedType === b.type;
      ctx.fillStyle = active ? '#16324f' : '#0d1a2d';
      ctx.fillRect(b.x, 438, 120, 44);
      ctx.strokeStyle = active ? '#00f0ff' : '#345';
      ctx.strokeRect(b.x, 438, 120, 44);
      ctx.fillStyle = towerTypes[b.type].color;
      ctx.font = '18px Arial';
      ctx.fillText(b.key + ' ' + b.type, b.x + 10, 458);
      ctx.fillStyle = '#ffffff';
      ctx.font = '14px Arial';
      ctx.fillText('$' + towerTypes[b.type].cost, b.x + 10, 475);
    }
  }

  function drawUI(){
    ctx.fillStyle = '#9dfcff';
    ctx.font = '20px Arial';
    ctx.fillText('Score: ' + Math.floor(score), 20, 30);
    ctx.fillText('Type: ' + selectedType, 20, 55);
    ctx.fillText('Bananas: ' + money, 20, 80);
    ctx.fillText('Lives: ' + lives, 20, 105);
    ctx.fillText('Wave: ' + wave, 20, 130);
    ctx.fillStyle = '#ffe66d';
    if (state === 'menu') {
      ctx.font = '34px Arial';
      ctx.fillText('Neon Monkey Guard', 265, 180);
      ctx.font = '20px Arial';
      ctx.fillText('Click or press Enter to start', 280, 230);
      ctx.fillText('Move: WASD / Arrows   Restart: R', 250, 265);
      ctx.fillText('Click grid to build towers, 1/2/3 select types', 220, 300);
      ctx.fillText('Protect the monkey core from neon bloons', 245, 335);
    }
    if (state === 'game_over') {
      ctx.font = '36px Arial';
      ctx.fillStyle = '#ff4d6d';
      ctx.fillText('Game Over', 320, 210);
      ctx.font = '20px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Final Score: ' + Math.floor(score), 325, 240);
      ctx.fillText('Press R to reset all state', 300, 270);
      ctx.fillText('Press Enter for menu', 315, 300);
    }
    if (buildMessageTimer > 0 && state === 'playing') {
      ctx.fillStyle = '#ffffff';
      ctx.font = '18px Arial';
      ctx.fillText(buildMessage, 320, 30);
    }
    if (state === 'playing' && spawnQueue.length === 0 && enemies.length === 0) {
      ctx.fillStyle = '#ffe66d';
      ctx.font = '16px Arial';
      ctx.fillText('Next wave in: ' + Math.ceil(waveTimer / 60), 640, 30);
      ctx.fillText('Press Space to start early', 575, 52);
    }
  }

  function drawBackground(){
    ctx.fillStyle = '#08111f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#16324f';
    for (var i = 0; i < canvas.width; i += 40) {
      ctx.beginPath();
      ctx.moveTo(i, 0);
      ctx.lineTo(i, canvas.height);
      ctx.stroke();
    }
    for (var j = 0; j < canvas.height; j += 40) {
      ctx.beginPath();
      ctx.moveTo(0, j);
      ctx.lineTo(canvas.width, j);
      ctx.stroke();
    }
  }

  function render(){
    drawBackground();
    drawPath();
    drawBase();
    drawPlacementPreview();
    drawTowers();
    drawBullets();
    drawEnemies();
    drawParticles();
    if (state === 'playing' || state === 'game_over') drawPlayer();
    drawBottomBar();
    drawUI();
    mouse.clicked = false;
  }

  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }

  resetGame();
  loop();
};
</script>
</body>
</html>
