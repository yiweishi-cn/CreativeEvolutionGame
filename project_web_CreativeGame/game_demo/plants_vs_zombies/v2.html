<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Fold Stitch Defense</title>
<style>
body { margin: 0; background: #05070d; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
canvas { width: 800px; height: 500px; display: block; background: #0a0f1f; box-shadow: 0 0 20px #0ff3; }
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
  canvas.width = 800; canvas.height = 500;

  var state, score, money, lives, wave, selectedType, player, keys, mouse, foldDrag;
  var towers, enemies, projectiles, effects, folds, waveInProgress, spawnTimer, spawnIndex, waveData, buildSpots;
  var hoveredSpot, lastLeftDown, nextEnemyId, finalWin;

  function resetGame(){
    state = 'menu';
    score = 0;
    money = 120;
    lives = 20;
    wave = 1;
    selectedType = 1;
    player = { x: 120, y: 250, w: 26, h: 26, speed: 4, color: '#00f0ff' };
    keys = {};
    mouse = { x: 0, y: 0, left: false, right: false };
    foldDrag = null;
    towers = [];
    enemies = [];
    projectiles = [];
    effects = [];
    folds = [];
    waveInProgress = false;
    spawnTimer = 0;
    spawnIndex = 0;
    waveData = [];
    hoveredSpot = null;
    lastLeftDown = false;
    nextEnemyId = 1;
    finalWin = false;
    buildSpots = [
      { x: 145, y: 185, r: 22 },
      { x: 145, y: 315, r: 22 },
      { x: 250, y: 65, r: 22 },
      { x: 380, y: 175, r: 22 },
      { x: 520, y: 55, r: 22 },
      { x: 450, y: 360, r: 22 },
      { x: 590, y: 250, r: 22 },
      { x: 690, y: 300, r: 22 }
    ];
  }

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function dist(ax, ay, bx, by){ var dx = bx - ax, dy = by - ay; return Math.sqrt(dx * dx + dy * dy); }
  function lerp(a, b, t){ return a + (b - a) * t; }

  var pathPoints = [
    { x: 60, y: 250 },
    { x: 250, y: 250 },
    { x: 250, y: 120 },
    { x: 520, y: 120 },
    { x: 520, y: 360 },
    { x: 740, y: 360 }
  ];

  function getPathPosition(t){
    t = clamp(t, 0, 1);
    var segments = [];
    var total = 0;
    var i, len;
    for (i = 0; i < pathPoints.length - 1; i++) {
      len = dist(pathPoints[i].x, pathPoints[i].y, pathPoints[i + 1].x, pathPoints[i + 1].y);
      segments.push(len);
      total += len;
    }
    var target = total * t;
    var acc = 0;
    for (i = 0; i < segments.length; i++) {
      if (target <= acc + segments[i]) {
        var local = (target - acc) / segments[i];
        return {
          x: lerp(pathPoints[i].x, pathPoints[i + 1].x, local),
          y: lerp(pathPoints[i].y, pathPoints[i + 1].y, local)
        };
      }
      acc += segments[i];
    }
    return { x: pathPoints[pathPoints.length - 1].x, y: pathPoints[pathPoints.length - 1].y };
  }

  function pointToSegmentDistance(px, py, ax, ay, bx, by){
    var dx = bx - ax, dy = by - ay;
    var len2 = dx * dx + dy * dy;
    if (len2 === 0) return dist(px, py, ax, ay);
    var t = ((px - ax) * dx + (py - ay) * dy) / len2;
    t = clamp(t, 0, 1);
    var sx = ax + dx * t, sy = ay + dy * t;
    return dist(px, py, sx, sy);
  }

  function isNearPath(x, y, margin){
    for (var i = 0; i < pathPoints.length - 1; i++) {
      if (pointToSegmentDistance(x, y, pathPoints[i].x, pathPoints[i].y, pathPoints[i + 1].x, pathPoints[i + 1].y) <= margin) return true;
    }
    return false;
  }

  function getTowerStats(type){
    if (type === 1) return { cost: 40, range: 105, fireRate: 28, color: '#00f0ff', damage: 9, projectileSpeed: 6, slow: 0, splash: 0, name: 'Needle' };
    if (type === 2) return { cost: 65, range: 90, fireRate: 16, color: '#ff4fd8', damage: 4, projectileSpeed: 7, slow: 0.25, slowTime: 45, splash: 0, name: 'Thread' };
    return { cost: 90, range: 125, fireRate: 45, color: '#ffd166', damage: 16, projectileSpeed: 5, slow: 0, splash: 34, name: 'Patch' };
  }

  function getEnemyStats(kind){
    if (kind === 'swift') return { speed: 0.0022, hp: 22 + wave * 5, maxHp: 22 + wave * 5, reward: 9, color: '#39ff88', radius: 10 };
    if (kind === 'tank') return { speed: 0.0010, hp: 60 + wave * 12, maxHp: 60 + wave * 12, reward: 16, color: '#ff8c42', radius: 14 };
    return { speed: 0.0015, hp: 34 + wave * 8, maxHp: 34 + wave * 8, reward: 11, color: '#ff3355', radius: 11 };
  }

  function startWave(){
    if (waveInProgress || state !== 'playing') return;
    waveInProgress = true;
    spawnTimer = 0;
    spawnIndex = 0;
    waveData = [];
    var basicCount = 5 + wave * 2;
    var swiftCount = wave >= 2 ? 2 + Math.floor(wave * 1.5) : 0;
    var tankCount = wave >= 3 ? 1 + Math.floor(wave / 2) : 0;
    var i;
    for (i = 0; i < basicCount; i++) waveData.push('basic');
    for (i = 0; i < swiftCount; i++) waveData.push('swift');
    for (i = 0; i < tankCount; i++) waveData.push('tank');
    waveData.sort(function(a, b){
      var ra = Math.random() - 0.5;
      return ra;
    });
  }

  function spawnEnemy(kind){
    var s = getEnemyStats(kind);
    enemies.push({
      id: nextEnemyId++,
      kind: kind,
      t: 0,
      speed: s.speed,
      hp: s.hp,
      maxHp: s.maxHp,
      reward: s.reward,
      color: s.color,
      radius: s.radius,
      slowTimer: 0,
      slowFactor: 1,
      x: pathPoints[0].x,
      y: pathPoints[0].y
    });
  }

  function getHoveredSpot(){
    for (var i = 0; i < buildSpots.length; i++) {
      if (dist(mouse.x, mouse.y, buildSpots[i].x, buildSpots[i].y) <= buildSpots[i].r + 5) return buildSpots[i];
    }
    return null;
  }

  function spotOccupied(spot){
    for (var i = 0; i < towers.length; i++) {
      if (towers[i].spot === spot) return true;
    }
    return false;
  }

  function placeTower(spot, type){
    var stats = getTowerStats(type);
    if (money < stats.cost) return false;
    if (spotOccupied(spot)) return false;
    towers.push({
      x: spot.x,
      y: spot.y,
      type: type,
      spot: spot,
      cooldown: 0,
      level: 1,
      range: stats.range,
      fireRate: stats.fireRate,
      damage: stats.damage,
      projectileSpeed: stats.projectileSpeed,
      color: stats.color,
      slow: stats.slow,
      slowTime: stats.slowTime || 0,
      splash: stats.splash,
      cost: stats.cost,
      name: stats.name
    });
    money -= stats.cost;
    effects.push({ x: spot.x, y: spot.y, life: 18, maxLife: 18, color: stats.color, type: 'burst' });
    return true;
  }

  function createFold(x1, y1, x2, y2){
    var length = dist(x1, y1, x2, y2);
    if (length < 45) return false;
    if (money < 30) return false;
    if (isNearPath(x1, y1, 18) || isNearPath(x2, y2, 18)) return false;
    folds.push({ x1: x1, y1: y1, x2: x2, y2: y2, life: 540, maxLife: 540, pulse: 0 });
    money -= 30;
    effects.push({ x: (x1 + x2) / 2, y: (y1 + y2) / 2, life: 22, maxLife: 22, color: '#8a2eff', type: 'burst' });
    return true;
  }

  function lineCircleHit(x1, y1, x2, y2, cx, cy, r){
    return pointToSegmentDistance(cx, cy, x1, y1, x2, y2) <= r;
  }

  window.addEventListener('keydown', function(e){
    keys[e.key.toLowerCase()] = true;
    if (e.key === '1' || e.key === '2' || e.key === '3') selectedType = parseInt(e.key);
    if (e.key.toLowerCase() === 'r') resetGame();
    if (state === 'menu' && e.key === 'Enter') state = 'playing';
    if (state === 'game_over' && e.key === 'Enter') resetGame(), state = 'playing';
    if (state === 'playing' && e.key === ' ') startWave();
  });

  window.addEventListener('keyup', function(e){ keys[e.key.toLowerCase()] = false; });
  canvas.addEventListener('mousemove', function(e){
    var r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
    mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
  });
  canvas.addEventListener('mousedown', function(e){
    if (e.button === 0) {
      mouse.left = true;
      if (state === 'menu') state = 'playing';
      else if (state === 'game_over') resetGame(), state = 'playing';
    }
    if (e.button === 2) { mouse.right = true; foldDrag = { x1: mouse.x, y1: mouse.y, x2: mouse.x, y2: mouse.y }; }
  });
  canvas.addEventListener('mouseup', function(e){
    if (e.button === 0) mouse.left = false;
    if (e.button === 2) {
      mouse.right = false;
      if (foldDrag && state === 'playing') {
        foldDrag.x2 = mouse.x;
        foldDrag.y2 = mouse.y;
        createFold(foldDrag.x1, foldDrag.y1, foldDrag.x2, foldDrag.y2);
      }
      foldDrag = null;
    }
  });
  canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  function updatePlayer(){
    if (keys['w'] || keys['arrowup']) player.y -= player.speed;
    if (keys['s'] || keys['arrowdown']) player.y += player.speed;
    if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
    if (keys['d'] || keys['arrowright']) player.x += player.speed;
    player.x = clamp(player.x, 0, canvas.width - player.w);
    player.y = clamp(player.y, 0, canvas.height - player.h);
  }

  function updateWave(){
    if (!waveInProgress) return;
    spawnTimer--;
    if (spawnIndex < waveData.length && spawnTimer <= 0) {
      spawnEnemy(waveData[spawnIndex]);
      spawnIndex++;
      spawnTimer = 32;
    }
    if (spawnIndex >= waveData.length && enemies.length === 0) {
      waveInProgress = false;
      score += 20;
      money += 25;
      if (wave >= 8) {
        finalWin = true;
        state = 'game_over';
      } else {
        wave++;
      }
    }
  }

  function updateEnemies(){
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      if (e.slowTimer > 0) {
        e.slowTimer--;
      } else {
        e.slowFactor = 1;
      }
      e.t += e.speed * e.slowFactor;
      var pos = getPathPosition(e.t);
      e.x = pos.x;
      e.y = pos.y;

      for (var f = 0; f < folds.length; f++) {
        if (lineCircleHit(folds[f].x1, folds[f].y1, folds[f].x2, folds[f].y2, e.x, e.y, e.radius + 2)) {
          e.t = Math.max(0, e.t - 0.012);
          e.hp -= 0.18;
          folds[f].pulse = 4;
          effects.push({ x: e.x, y: e.y, life: 8, maxLife: 8, color: '#b56cff', type: 'spark' });
        }
      }

      var px = player.x + player.w / 2;
      var py = player.y + player.h / 2;
      if (dist(px, py, e.x, e.y) < e.radius + 18) {
        e.hp -= 0.45;
        effects.push({ x: e.x, y: e.y, life: 6, maxLife: 6, color: player.color, type: 'spark' });
      }

      if (e.hp <= 0) {
        money += e.reward;
        score += e.reward * 2;
        effects.push({ x: e.x, y: e.y, life: 18, maxLife: 18, color: e.color, type: 'burst' });
        enemies.splice(i, 1);
        continue;
      }
      if (e.t >= 1) {
        lives--;
        effects.push({ x: e.x, y: e.y, life: 20, maxLife: 20, color: '#ff3355', type: 'burst' });
        enemies.splice(i, 1);
        if (lives <= 0) {
          finalWin = false;
          state = 'game_over';
        }
      }
    }
  }

  function findTarget(tower){
    var best = null;
    var bestT = -1;
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      var d = dist(tower.x, tower.y, e.x, e.y);
      if (d <= tower.range && e.t > bestT) {
        bestT = e.t;
        best = e;
      }
    }
    return best;
  }

  function updateTowers(){
    for (var i = 0; i < towers.length; i++) {
      var t = towers[i];
      if (t.cooldown > 0) t.cooldown--;
      var target = findTarget(t);
      if (target && t.cooldown <= 0) {
        projectiles.push({
          x: t.x,
          y: t.y,
          targetId: target.id,
          speed: t.projectileSpeed,
          damage: t.damage,
          color: t.color,
          slow: t.slow,
          slowTime: t.slowTime,
          splash: t.splash,
          radius: t.type === 3 ? 5 : 3
        });
        t.cooldown = t.fireRate;
        effects.push({ x: t.x, y: t.y, life: 8, maxLife: 8, color: t.color, type: 'spark' });
      }
    }
  }

  function getEnemyById(id){
    for (var i = 0; i < enemies.length; i++) if (enemies[i].id === id) return enemies[i];
    return null;
  }

  function explodeAt(x, y, splash, damage, color, slow, slowTime){
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      var d = dist(x, y, e.x, e.y);
      if (d <= splash) {
        var scale = 1 - d / splash;
        e.hp -= damage * Math.max(0.35, scale);
        if (slow > 0) {
          e.slowFactor = Math.max(0.45, 1 - slow);
          e.slowTimer = slowTime;
        }
      }
    }
    effects.push({ x: x, y: y, life: 16, maxLife: 16, color: color, type: 'burst' });
  }

  function updateProjectiles(){
    for (var i = projectiles.length - 1; i >= 0; i--) {
      var p = projectiles[i];
      var target = getEnemyById(p.targetId);
      if (!target) {
        projectiles.splice(i, 1);
        continue;
      }
      var dx = target.x - p.x;
      var dy = target.y - p.y;
      var d = Math.sqrt(dx * dx + dy * dy) || 1;
      p.x += dx / d * p.speed;
      p.y += dy / d * p.speed;
      if (dist(p.x, p.y, target.x, target.y) <= target.radius + p.radius) {
        if (p.splash > 0) {
          explodeAt(target.x, target.y, p.splash, p.damage, p.color, p.slow, p.slowTime);
        } else {
          target.hp -= p.damage;
          if (p.slow > 0) {
            target.slowFactor = Math.max(0.45, 1 - p.slow);
            target.slowTimer = p.slowTime;
          }
          effects.push({ x: target.x, y: target.y, life: 10, maxLife: 10, color: p.color, type: 'spark' });
        }
        projectiles.splice(i, 1);
      }
    }
  }

  function updateEffects(){
    for (var i = effects.length - 1; i >= 0; i--) {
      effects[i].life--;
      if (effects[i].life <= 0) effects.splice(i, 1);
    }
    for (var j = folds.length - 1; j >= 0; j--) {
      folds[j].life--;
      if (folds[j].pulse > 0) folds[j].pulse--;
      if (folds[j].life <= 0) folds.splice(j, 1);
    }
  }

  function handleMouseActions(){
    hoveredSpot = getHoveredSpot();
    if (mouse.right && foldDrag) { foldDrag.x2 = mouse.x; foldDrag.y2 = mouse.y; }
    if (mouse.left && !lastLeftDown && state === 'playing') {
      if (hoveredSpot) placeTower(hoveredSpot, selectedType);
      else score += 0;
    }
    lastLeftDown = mouse.left;
  }

  function update(){
    if (state !== 'playing') return;
    updatePlayer();
    handleMouseActions();
    updateWave();
    updateTowers();
    updateProjectiles();
    updateEnemies();
    updateEffects();
    score += 0.01;
  }

  function drawPath(){
    ctx.strokeStyle = '#ffb703'; ctx.lineWidth = 28; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(60, 250); ctx.lineTo(250, 250); ctx.lineTo(250, 120); ctx.lineTo(520, 120); ctx.lineTo(520, 360); ctx.lineTo(740, 360); ctx.stroke();
    ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 4; ctx.setLineDash([10, 10]);
    ctx.beginPath(); ctx.moveTo(60, 250); ctx.lineTo(250, 250); ctx.lineTo(250, 120); ctx.lineTo(520, 120); ctx.lineTo(520, 360); ctx.lineTo(740, 360); ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawBuildSpots(){
    for (var i = 0; i < buildSpots.length; i++) {
      var s = buildSpots[i];
      var occupied = spotOccupied(s);
      ctx.beginPath();
      ctx.fillStyle = occupied ? '#2b355a' : (hoveredSpot === s ? '#1a7f8f' : '#13203d');
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = occupied ? '#6c7aa8' : '#00f0ff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  function drawTowers(){
    for (var i = 0; i < towers.length; i++) {
      var t = towers[i];
      ctx.strokeStyle = t.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 14, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = t.color;
      if (t.type === 1) {
        ctx.fillRect(t.x - 4, t.y - 12, 8, 24);
      } else if (t.type === 2) {
        ctx.beginPath();
        ctx.arc(t.x, t.y, 8, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(t.x - 10, t.y - 10, 20, 20);
      }
    }

    if (hoveredSpot && !spotOccupied(hoveredSpot) && state === 'playing') {
      var stats = getTowerStats(selectedType);
      ctx.strokeStyle = '#ffffff33';
      ctx.beginPath();
      ctx.arc(hoveredSpot.x, hoveredSpot.y, stats.range, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawEnemies(){
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.fillRect(e.x - 14, e.y - e.radius - 10, 28, 4);
      ctx.fillStyle = '#39ff88';
      ctx.fillRect(e.x - 14, e.y - e.radius - 10, 28 * Math.max(0, e.hp / e.maxHp), 4);
      if (e.slowTimer > 0) {
        ctx.strokeStyle = '#7fdcff';
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius + 4, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  function drawProjectiles(){
    for (var i = 0; i < projectiles.length; i++) {
      var p = projectiles[i];
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawFolds(){
    for (var i = 0; i < folds.length; i++) {
      var f = folds[i];
      var alpha = 0.4 + 0.4 * (f.life / f.maxLife);
      ctx.strokeStyle = 'rgba(138,46,255,' + alpha + ')';
      ctx.lineWidth = 3 + f.pulse;
      ctx.beginPath();
      ctx.moveTo(f.x1, f.y1);
      ctx.lineTo(f.x2, f.y2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(181,108,255,' + alpha + ')';
      ctx.beginPath(); ctx.arc(f.x1, f.y1, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(f.x2, f.y2, 5, 0, Math.PI * 2); ctx.fill();
    }
    if (foldDrag) {
      ctx.strokeStyle = '#8a2eff'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(foldDrag.x1, foldDrag.y1); ctx.lineTo(foldDrag.x2, foldDrag.y2); ctx.stroke();
      ctx.fillStyle = '#8a2eff';
      ctx.beginPath(); ctx.arc(foldDrag.x1, foldDrag.y1, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(foldDrag.x2, foldDrag.y2, 6, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawEffects(){
    for (var i = 0; i < effects.length; i++) {
      var e = effects[i];
      var p = e.life / e.maxLife;
      if (e.type === 'burst') {
        ctx.strokeStyle = e.color;
        ctx.globalAlpha = p;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 24 * (1 - p) + 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = e.color;
        ctx.globalAlpha = p;
        ctx.fillRect(e.x - 2, e.y - 2, 4, 4);
        ctx.globalAlpha = 1;
      }
    }
  }

  function drawPlayer(){
    ctx.fillStyle = player.color;
    ctx.shadowColor = player.color;
    ctx.shadowBlur = 14;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffffff66';
    ctx.strokeRect(player.x, player.y, player.w, player.h);
  }

  function drawTopBar(){
    for (var i = 0; i < 3; i++) {
      var type = i + 1;
      var stats = getTowerStats(type);
      ctx.fillStyle = type === selectedType ? '#ff00aa' : '#1a2340';
      ctx.fillRect(40 + i * 50, 20, 36, 36);
      ctx.strokeStyle = stats.color;
      ctx.strokeRect(40 + i * 50, 20, 36, 36);
      ctx.fillStyle = stats.color;
      ctx.font = '12px Arial';
      ctx.fillText('' + type, 53 + i * 50, 43);
    }
    ctx.fillStyle = '#00f0ff';
    ctx.font = '16px Arial';
    ctx.fillText('Score: ' + Math.floor(score), 600, 30);
    ctx.fillText('Money: ' + money, 600, 52);
    ctx.fillText('Lives: ' + lives, 600, 74);
    ctx.fillText('Wave: ' + wave + '/8', 600, 96);
    ctx.fillText('Tower: ' + getTowerStats(selectedType).name, 600, 118);
    ctx.fillText('Space: Start Wave', 600, 140);
    ctx.fillText('Fold Cost: 30', 600, 162);
    if (waveInProgress) ctx.fillText('Wave Active', 600, 184);
    else ctx.fillText('Build Phase', 600, 184);
  }

  function render(){
    ctx.fillStyle = '#05070d'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawPath();
    drawBuildSpots();
    drawFolds();
    drawTowers();
    drawProjectiles();
    drawEnemies();
    drawEffects();
    drawPlayer();
    drawTopBar();

    if (state === 'menu') {
      ctx.fillStyle = '#000a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff00aa'; ctx.font = '34px Arial'; ctx.fillText('Fold Stitch Defense', 250, 160);
      ctx.fillStyle = '#00f0ff'; ctx.font = '18px Arial';
      ctx.fillText('Left click or Enter to start', 290, 210);
      ctx.fillText('Place towers on glowing nodes with left click', 220, 240);
      ctx.fillText('Press 1, 2, 3 to switch tower types', 245, 270);
      ctx.fillText('Right drag to create a fold beam trap', 245, 300);
      ctx.fillText('Move the neon blocker with WASD or arrows', 225, 330);
      ctx.fillText('Press Space to launch each wave', 270, 360);
    }
    if (state === 'game_over') {
      ctx.fillStyle = '#000b'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = finalWin ? '#39ff88' : '#ff3355'; ctx.font = '34px Arial';
      ctx.fillText(finalWin ? 'Victory' : 'Game Over', 315, 190);
      ctx.fillStyle = '#00f0ff'; ctx.font = '20px Arial';
      ctx.fillText('Final Score: ' + Math.floor(score), 315, 230);
      ctx.fillText('Waves Cleared: ' + (finalWin ? 8 : Math.max(1, wave - (waveInProgress ? 1 : 0))), 315, 260);
      ctx.fillText('Press R or Enter to restart', 275, 295);
    }
  }

  function loop(){ update(); render(); requestAnimationFrame(loop); }
  resetGame(); loop();
};
</script>
</body>
</html>
