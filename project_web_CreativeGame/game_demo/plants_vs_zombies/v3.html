<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Neon Seam Guard</title>
<style>
body { margin: 0; background: #050816; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
canvas { width: 800px; height: 500px; display: block; background: #08111f; box-shadow: 0 0 20px #00f0ff44; }
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 500;

  var keys = {};
  var mouse = { x: 0, y: 0, down: false };
  var state, score, player, towers, enemies, projectiles, effects, folds, stitches;
  var money, lives, wave, selectedType, seamEnergy, mapStress, phaseGoals;
  var waveInProgress, spawnTimer, spawnIndex, waveData, buildSpots, finalWin;
  var pathPoints, hoveredSpot, infoText, messageTimer, baseX, maxWaves;

  function resetGame(){
    state = 'menu';
    score = 0;
    money = 100;
    lives = 10;
    wave = 1;
    selectedType = 'needle';
    player = { x: 80, y: 250, r: 12, speed: 3, color: '#00f0ff', repairCooldown: 0 };
    towers = [];
    enemies = [];
    projectiles = [];
    effects = [];
    folds = [];
    stitches = [];
    seamEnergy = 100;
    mapStress = 0;
    phaseGoals = { seams: 1 };
    waveInProgress = false;
    spawnTimer = 0;
    spawnIndex = 0;
    waveData = [
      { count: 6, speed: 1.2, hp: 20, typeMix: ['fray'] },
      { count: 8, speed: 1.45, hp: 28, typeMix: ['fray', 'snag'] },
      { count: 10, speed: 1.65, hp: 38, typeMix: ['fray', 'snag', 'fray'] },
      { count: 12, speed: 1.9, hp: 52, typeMix: ['fray', 'snag', 'shear', 'fray'] }
    ];
    maxWaves = waveData.length;
    buildSpots = [
      { x: 170, y: 145 }, { x: 250, y: 330 }, { x: 335, y: 115 }, { x: 410, y: 360 },
      { x: 500, y: 175 }, { x: 585, y: 315 }, { x: 670, y: 150 }, { x: 710, y: 350 }
    ];
    finalWin = false;
    hoveredSpot = -1;
    infoText = 'Click to start. Build towers on glowing nodes. Keys 1-3 change tower type.';
    messageTimer = 0;
    baseX = 760;
    createPath();
  }

  function createPath(){
    pathPoints = [];
    for (var x = 40; x <= 760; x += 8) {
      var t = (x - 40) / 720;
      var y = 250 + Math.sin(t * 6) * 80 + Math.sin(t * 16) * 12;
      pathPoints.push({ x: x, y: y });
    }
  }

  function startGame(){
    state = 'playing';
    waveInProgress = true;
    spawnIndex = 0;
    spawnTimer = 0;
    infoText = 'Defend the seam. Press space near tears to repair stress.';
    messageTimer = 240;
  }

  function getWaveConfig(){
    return waveData[Math.min(wave - 1, waveData.length - 1)];
  }

  function getPathPos(t){
    if (t <= 0) return { x: pathPoints[0].x, y: pathPoints[0].y };
    if (t >= 1) return { x: pathPoints[pathPoints.length - 1].x, y: pathPoints[pathPoints.length - 1].y };
    var scaled = t * (pathPoints.length - 1);
    var i = Math.floor(scaled);
    var f = scaled - i;
    var a = pathPoints[i];
    var b = pathPoints[Math.min(i + 1, pathPoints.length - 1)];
    return { x: a.x + (b.x - a.x) * f, y: a.y + (b.y - a.y) * f };
  }

  function getEnemyType(index){
    var cfg = getWaveConfig();
    var typeName = cfg.typeMix[index % cfg.typeMix.length];
    if (typeName === 'snag') {
      return { name: 'snag', color: '#ffb347', hpMul: 0.85, speedMul: 1.35, stress: 8, reward: 6, r: 8 };
    }
    if (typeName === 'shear') {
      return { name: 'shear', color: '#ff4d6d', hpMul: 1.8, speedMul: 0.92, stress: 14, reward: 12, r: 13 };
    }
    return { name: 'fray', color: '#ff4fd8', hpMul: 1, speedMul: 1, stress: 6, reward: 8, r: 10 };
  }

  function spawnEnemy(){
    var w = getWaveConfig();
    var et = getEnemyType(spawnIndex);
    var start = getPathPos(0);
    enemies.push({
      x: start.x,
      y: start.y,
      r: et.r,
      speed: w.speed * et.speedMul,
      hp: Math.floor(w.hp * et.hpMul),
      maxHp: Math.floor(w.hp * et.hpMul),
      pathT: 0,
      color: et.color,
      type: et.name,
      stress: et.stress,
      reward: et.reward,
      slowTimer: 0,
      burnTimer: 0,
      burnDamage: 0,
      wiggle: Math.random() * Math.PI * 2
    });
  }

  function updatePlayer(){
    if (keys['w'] || keys['ArrowUp']) player.y -= player.speed;
    if (keys['s'] || keys['ArrowDown']) player.y += player.speed;
    if (keys['a'] || keys['ArrowLeft']) player.x -= player.speed;
    if (keys['d'] || keys['ArrowRight']) player.x += player.speed;
    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));
    if (player.repairCooldown > 0) player.repairCooldown--;
  }

  function updateEnemies(){
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      var moveSpeed = e.speed;
      if (e.slowTimer > 0) {
        moveSpeed *= 0.55;
        e.slowTimer--;
      }
      if (e.burnTimer > 0) {
        e.burnTimer--;
        if (e.burnTimer % 20 === 0) {
          e.hp -= e.burnDamage;
          effects.push({ x: e.x, y: e.y, life: 16, color: '#ff9f43', type: 'spark', size: 8 });
          if (e.hp <= 0) {
            destroyEnemy(i, true);
            continue;
          }
        }
      }
      e.pathT += moveSpeed * 0.0019;
      var pos = getPathPos(e.pathT);
      e.x = pos.x;
      e.y = pos.y + Math.sin(e.wiggle + e.pathT * 16) * (e.type === 'snag' ? 6 : 0);
      if (e.x > baseX) {
        effects.push({ x: 770, y: e.y, life: 26, color: '#ff4d6d', type: 'burst', size: 22 });
        enemies.splice(i, 1);
        lives--;
        mapStress += e.stress;
      }
    }
  }

  function getTowerStats(type){
    if (type === 'laser') {
      return { cost: 40, range: 140, cooldownMax: 18, damage: 7, color: '#39ff88', projSpeed: 8, size: 12, label: 'Laser' };
    }
    if (type === 'patch') {
      return { cost: 35, range: 120, cooldownMax: 42, damage: 4, color: '#ffe066', projSpeed: 5, size: 12, label: 'Patch' };
    }
    return { cost: 25, range: 115, cooldownMax: 30, damage: 10, color: '#9d4dff', projSpeed: 6, size: 12, label: 'Needle' };
  }

  function findTarget(t){
    var best = null;
    var bestT = -1;
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      var dx = e.x - t.x;
      var dy = e.y - t.y;
      var d2 = dx * dx + dy * dy;
      if (d2 <= t.range * t.range && e.pathT > bestT) {
        best = e;
        bestT = e.pathT;
      }
    }
    return best;
  }

  function updateTowers(){
    for (var i = 0; i < towers.length; i++) {
      var t = towers[i];
      if (t.cooldown > 0) t.cooldown--;
      var target = findTarget(t);
      t.targetX = target ? target.x : null;
      t.targetY = target ? target.y : null;
      if (t.cooldown <= 0 && target) {
        var dx = target.x - t.x;
        var dy = target.y - t.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        var vx = dx / dist;
        var vy = dy / dist;
        projectiles.push({
          x: t.x,
          y: t.y,
          vx: vx * t.projSpeed,
          vy: vy * t.projSpeed,
          life: 80,
          damage: t.damage,
          type: t.type,
          color: t.color,
          r: t.type === 'laser' ? 4 : 5,
          pierce: t.type === 'laser' ? 1 : 0
        });
        t.cooldown = t.cooldownMax;
        effects.push({ x: t.x, y: t.y, life: 10, color: t.color, type: 'muzzle', size: 10 });
      }
    }
  }

  function destroyEnemy(index, reward){
    var e = enemies[index];
    effects.push({ x: e.x, y: e.y, life: 20, color: e.color, type: 'burst', size: 18 });
    if (reward) {
      score += 10 + e.reward;
      money += e.reward;
      seamEnergy = Math.min(150, seamEnergy + 2);
    }
    enemies.splice(index, 1);
  }

  function updateProjectiles(){
    for (var i = projectiles.length - 1; i >= 0; i--) {
      var p = projectiles[i];
      p.life--;
      p.x += p.vx;
      p.y += p.vy;
      var removed = false;
      for (var j = enemies.length - 1; j >= 0; j--) {
        var e = enemies[j];
        var dx = p.x - e.x;
        var dy = p.y - e.y;
        var rr = p.r + e.r;
        if (dx * dx + dy * dy <= rr * rr) {
          e.hp -= p.damage;
          if (p.type === 'patch') {
            e.slowTimer = Math.max(e.slowTimer, 70);
            mapStress = Math.max(0, mapStress - 0.3);
            stitches.push({ x: e.x, y: e.y, life: 24 });
          }
          if (p.type === 'laser') {
            e.burnTimer = 60;
            e.burnDamage = 1;
          }
          effects.push({ x: p.x, y: p.y, life: 12, color: p.color, type: 'spark', size: 8 });
          if (e.hp <= 0) {
            destroyEnemy(j, true);
          }
          if (p.pierce > 0) {
            p.pierce--;
          } else {
            projectiles.splice(i, 1);
            removed = true;
          }
          break;
        }
      }
      if (!removed && (p.life <= 0 || p.x < -20 || p.x > 820 || p.y < -20 || p.y > 520)) {
        projectiles.splice(i, 1);
      }
    }
  }

  function updateEffects(){
    for (var i = effects.length - 1; i >= 0; i--) {
      effects[i].life--;
      if (effects[i].life <= 0) effects.splice(i, 1);
    }
    for (var j = stitches.length - 1; j >= 0; j--) {
      stitches[j].life--;
      if (stitches[j].life <= 0) stitches.splice(j, 1);
    }
    for (var k = folds.length - 1; k >= 0; k--) {
      folds[k].life--;
      if (folds[k].life <= 0) folds.splice(k, 1);
    }
    if (messageTimer > 0) messageTimer--;
  }

  function updateStressSystems(){
    mapStress += 0.012 * enemies.length;
    seamEnergy = Math.floor(Math.max(0, 100 - mapStress) + towers.length * 6 + lives * 2);
    if (Math.random() < mapStress * 0.0007) {
      folds.push({ x: 110 + Math.random() * 580, y: 80 + Math.random() * 340, life: 35 + Math.random() * 25 });
    }
  }

  function tryRepair(){
    if (state !== 'playing' || player.repairCooldown > 0) return;
    var repaired = false;
    for (var i = 0; i < folds.length; i++) {
      var f = folds[i];
      var dx = player.x - f.x;
      var dy = player.y - f.y;
      if (dx * dx + dy * dy < 42 * 42) {
        f.life = 0;
        mapStress = Math.max(0, mapStress - 8);
        seamEnergy = Math.min(150, seamEnergy + 10);
        score += 5;
        effects.push({ x: player.x, y: player.y, life: 24, color: '#00f0ff', type: 'burst', size: 20 });
        player.repairCooldown = 50;
        repaired = true;
        infoText = 'Manual repair stabilized the seam.';
        messageTimer = 90;
        break;
      }
    }
    if (!repaired) {
      for (var j = 0; j < enemies.length; j++) {
        var e = enemies[j];
        var ex = player.x - e.x;
        var ey = player.y - e.y;
        if (ex * ex + ey * ey < 34 * 34) {
          e.hp -= 6;
          mapStress = Math.max(0, mapStress - 1.5);
          effects.push({ x: e.x, y: e.y, life: 16, color: '#00f0ff', type: 'spark', size: 10 });
          player.repairCooldown = 35;
          break;
        }
      }
    }
  }

  function updateGame(){
    updatePlayer();
    if (waveInProgress) {
      spawnTimer--;
      if (spawnIndex < getWaveConfig().count && spawnTimer <= 0) {
        spawnEnemy();
        spawnIndex++;
        spawnTimer = Math.max(18, 42 - wave * 3);
      }
      if (spawnIndex >= getWaveConfig().count && enemies.length === 0) {
        waveInProgress = false;
        money += 20;
        score += 50;
        mapStress = Math.max(0, mapStress - 10);
        if (wave >= maxWaves) {
          finalWin = true;
          state = 'game_over';
        } else {
          wave++;
          spawnIndex = 0;
          spawnTimer = 100;
          waveInProgress = true;
          infoText = 'Wave ' + wave + ' incoming.';
          messageTimer = 120;
        }
      }
    }
    updateEnemies();
    updateTowers();
    updateProjectiles();
    updateEffects();
    updateStressSystems();
    if (lives <= 0 || mapStress >= 100) state = 'game_over';
  }

  function drawPath(){
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 4;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00f0ff';
    ctx.beginPath();
    for (var i = 0; i < pathPoints.length; i++) {
      var p = pathPoints[i];
      if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = '#00f0ff33';
    ctx.lineWidth = 14;
    ctx.beginPath();
    for (var j = 0; j < pathPoints.length; j++) {
      var q = pathPoints[j];
      if (j === 0) ctx.moveTo(q.x, q.y); else ctx.lineTo(q.x, q.y);
    }
    ctx.stroke();
  }

  function drawBuildSpots(){
    for (var i = 0; i < buildSpots.length; i++) {
      var b = buildSpots[i];
      var used = false;
      for (var j = 0; j < towers.length; j++) {
        if (towers[j].spotIndex === i) used = true;
      }
      ctx.strokeStyle = used ? '#666666' : (hoveredSpot === i ? '#ffffff' : '#ffe066');
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 16, 0, Math.PI * 2);
      ctx.stroke();
      if (!used) {
        ctx.fillStyle = '#ffe06622';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 12, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawTowers(){
    for (var i = 0; i < towers.length; i++) {
      var t = towers[i];
      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      if (t.targetX !== null) {
        ctx.moveTo(t.x, t.y);
        ctx.lineTo(t.targetX, t.targetY);
        ctx.strokeStyle = t.color + '55';
        ctx.stroke();
      }
      ctx.strokeStyle = '#08111f';
      if (t.type === 'needle') {
        ctx.beginPath();
        ctx.moveTo(t.x - 4, t.y + 5);
        ctx.lineTo(t.x + 5, t.y - 5);
        ctx.stroke();
      } else if (t.type === 'laser') {
        ctx.fillStyle = '#08111f';
        ctx.fillRect(t.x - 3, t.y - 3, 6, 6);
      } else {
        ctx.strokeStyle = '#08111f';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 5, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  function drawEnemies(){
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
      ctx.fill();
      if (e.type === 'shear') {
        ctx.strokeStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(e.x - 5, e.y - 5);
        ctx.lineTo(e.x + 5, e.y + 5);
        ctx.moveTo(e.x + 5, e.y - 5);
        ctx.lineTo(e.x - 5, e.y + 5);
        ctx.stroke();
      }
      if (e.type === 'snag') {
        ctx.fillStyle = '#08111f';
        ctx.fillRect(e.x - 2, e.y - 2, 4, 4);
      }
      ctx.fillStyle = '#00000088';
      ctx.fillRect(e.x - 14, e.y - e.r - 10, 28, 4);
      ctx.fillStyle = '#39ff88';
      ctx.fillRect(e.x - 14, e.y - e.r - 10, 28 * Math.max(0, e.hp / e.maxHp), 4);
    }
  }

  function drawProjectiles(){
    for (var i = 0; i < projectiles.length; i++) {
      var p = projectiles[i];
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawEffects(){
    for (var i = 0; i < effects.length; i++) {
      var ef = effects[i];
      ctx.save();
      ctx.globalAlpha = Math.max(0, ef.life / 24);
      ctx.strokeStyle = ef.color;
      ctx.fillStyle = ef.color;
      if (ef.type === 'burst') {
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, ef.size * (1 - ef.life / 24 + 0.2), 0, Math.PI * 2);
        ctx.stroke();
      } else if (ef.type === 'spark') {
        ctx.fillRect(ef.x - 2, ef.y - 2, 4, 4);
      } else {
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, ef.size * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.strokeStyle = '#ffe066';
    for (var j = 0; j < stitches.length; j++) {
      var s = stitches[j];
      ctx.beginPath();
      ctx.moveTo(s.x - 8, s.y - 8);
      ctx.lineTo(s.x + 8, s.y + 8);
      ctx.moveTo(s.x + 8, s.y - 8);
      ctx.lineTo(s.x - 8, s.y + 8);
      ctx.stroke();
    }
    for (var k = 0; k < folds.length; k++) {
      var f = folds[k];
      ctx.strokeStyle = '#ff9f43';
      ctx.beginPath();
      ctx.moveTo(f.x - 12, f.y);
      ctx.lineTo(f.x, f.y - 8);
      ctx.lineTo(f.x + 12, f.y);
      ctx.lineTo(f.x, f.y + 8);
      ctx.closePath();
      ctx.stroke();
    }
  }

  function drawPlayer(){
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(player.x - 5, player.y);
    ctx.lineTo(player.x + 5, player.y);
    ctx.moveTo(player.x, player.y - 5);
    ctx.lineTo(player.x, player.y + 5);
    ctx.stroke();
    if (player.repairCooldown > 0) {
      ctx.strokeStyle = '#00f0ff55';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 22, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawHud(){
    ctx.fillStyle = '#ffffff';
    ctx.font = '16px Arial';
    ctx.fillText('Score: ' + score, 20, 25);
    ctx.fillText('Lives: ' + lives, 20, 47);
    ctx.fillText('Money: ' + money, 20, 69);
    ctx.fillText('Wave: ' + wave + '/' + maxWaves, 20, 91);
    ctx.fillText('Seam: ' + seamEnergy, 20, 113);
    ctx.fillText('Stress: ' + Math.floor(mapStress), 20, 135);
    ctx.fillText('Tower: ' + getTowerStats(selectedType).label, 20, 157);

    ctx.fillStyle = '#ffffff';
    ctx.fillText('1 Needle $25', 600, 25);
    ctx.fillText('2 Patch $35', 600, 47);
    ctx.fillText('3 Laser $40', 600, 69);
    ctx.fillText('Space Repair', 600, 91);

    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(20, 175, 160, 12);
    ctx.fillStyle = '#39ff88';
    ctx.fillRect(20, 175, 160 * Math.max(0, Math.min(1, seamEnergy / 120)), 12);
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(20, 195, 160, 12);
    ctx.fillStyle = '#ff4d6d';
    ctx.fillRect(20, 195, 160 * Math.max(0, Math.min(1, mapStress / 100)), 12);

    if (messageTimer > 0 || state === 'menu') {
      ctx.fillStyle = '#ffffff';
      ctx.font = '14px Arial';
      ctx.fillText(infoText, 200, 25);
    }
  }

  function render(){
    ctx.fillStyle = '#08111f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawPath();
    drawBuildSpots();
    drawEffects();
    drawTowers();
    drawEnemies();
    drawProjectiles();
    drawPlayer();
    drawHud();

    if (state === 'menu') {
      ctx.fillStyle = '#ffffff';
      ctx.font = '30px Arial';
      ctx.fillText('Neon Seam Guard', 280, 210);
      ctx.font = '16px Arial';
      ctx.fillText('Click to start. Move with WASD. Build on nodes. Repair with Space.', 185, 246);
    }
    if (state === 'game_over') {
      ctx.fillStyle = finalWin ? '#39ff88' : '#ff4d6d';
      ctx.font = '30px Arial';
      ctx.fillText(finalWin ? 'Fabric Secured' : 'Fabric Torn', 288, 215);
      ctx.font = '16px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Final Score: ' + score, 340, 245);
      ctx.fillText('Press R to restart', 330, 270);
    }
  }

  function updateHoveredSpot(){
    hoveredSpot = -1;
    for (var i = 0; i < buildSpots.length; i++) {
      var b = buildSpots[i];
      var dx = mouse.x - b.x;
      var dy = mouse.y - b.y;
      if (dx * dx + dy * dy < 18 * 18) {
        hoveredSpot = i;
        return;
      }
    }
  }

  function buildTowerAt(index){
    var b = buildSpots[index];
    var used = false;
    for (var j = 0; j < towers.length; j++) {
      if (towers[j].spotIndex === index) used = true;
    }
    var stats = getTowerStats(selectedType);
    if (!used && money >= stats.cost) {
      towers.push({
        x: b.x,
        y: b.y,
        cooldown: 0,
        type: selectedType,
        range: stats.range,
        cooldownMax: stats.cooldownMax,
        damage: stats.damage,
        color: stats.color,
        projSpeed: stats.projSpeed,
        size: stats.size,
        targetX: null,
        targetY: null,
        spotIndex: index
      });
      money -= stats.cost;
      infoText = stats.label + ' tower built.';
      messageTimer = 70;
    } else if (!used && money < stats.cost) {
      infoText = 'Not enough thread credits.';
      messageTimer = 70;
    }
  }

  canvas.addEventListener('mousemove', function(e){
    var rect = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
    updateHoveredSpot();
  });

  canvas.addEventListener('mousedown', function(){
    mouse.down = true;
    if (state === 'menu') {
      startGame();
      return;
    }
    if (state !== 'playing') return;
    for (var i = 0; i < buildSpots.length; i++) {
      var b = buildSpots[i];
      var dx = mouse.x - b.x;
      var dy = mouse.y - b.y;
      if (dx * dx + dy * dy < 20 * 20) {
        buildTowerAt(i);
        break;
      }
    }
  });

  canvas.addEventListener('mouseup', function(){ mouse.down = false; });

  window.addEventListener('keydown', function(e){
    keys[e.key] = true;
    if (e.key === 'r' || e.key === 'R') resetGame();
    if (e.key === '1') selectedType = 'needle';
    if (e.key === '2') selectedType = 'patch';
    if (e.key === '3') selectedType = 'laser';
    if (e.key === ' ') tryRepair();
  });

  window.addEventListener('keyup', function(e){ keys[e.key] = false; });

  function loop(){
    if (state === 'playing') updateGame();
    render();
    requestAnimationFrame(loop);
  }

  resetGame();
  loop();
};
</script>
</body>
</html>
