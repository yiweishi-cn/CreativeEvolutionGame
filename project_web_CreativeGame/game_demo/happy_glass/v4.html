<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Tri-Line Command</title>
<style>
body { margin: 0; background: #081018; color: #d8f6ff; font-family: Arial, sans-serif; overflow: hidden; }
canvas { width: 800px; height: 500px; display: block; margin: 0 auto; background: #07131d; }
</style>
</head>
<body>
<canvas id='game' width='800' height='500'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

var state = 'menu';
var score = 0;
var wave = 0;
var credits = 140;
var baseHp = 100;
var maxBaseHp = 100;
var selectedLane = 1;
var playerLane = 1;
var towers = [];
var enemies = [];
var bullets = [];
var particles = [];
var supplyDrops = [];
var lanePressure = [0, 0, 0];
var overdriveTimer = 0;
var waveTimer = 0;
var waveInProgress = false;
var enemiesToSpawn = 0;
var spawnGap = 0;
var totalWaves = 6;
var finalBossSpawned = false;
var mouse = { x: 0, y: 0, down: false };
var flashTextTimer = 0;
var flashText = '';
var flashColor = '#fff';
var buildMode = 'gun';

var laneYs = [140, 250, 360];
var towerSlots = [];
for (var li = 0; li < 3; li++) {
  for (var si = 0; si < 5; si++) {
    towerSlots.push({ lane: li, x: 150 + si * 95, y: laneYs[li], built: false });
  }
}

function resetGame() {
  state = 'menu';
  score = 0;
  wave = 0;
  credits = 140;
  baseHp = 100;
  selectedLane = 1;
  playerLane = 1;
  towers = [];
  enemies = [];
  bullets = [];
  particles = [];
  supplyDrops = [];
  lanePressure = [0, 0, 0];
  overdriveTimer = 0;
  waveTimer = 0;
  waveInProgress = false;
  enemiesToSpawn = 0;
  spawnGap = 0;
  finalBossSpawned = false;
  flashTextTimer = 0;
  flashText = '';
  for (var i = 0; i < towerSlots.length; i++) {
    towerSlots[i].built = false;
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  wave = 0;
  credits = 140;
  baseHp = 100;
  selectedLane = 1;
  playerLane = 1;
  towers = [];
  enemies = [];
  bullets = [];
  particles = [];
  supplyDrops = [];
  lanePressure = [0, 0, 0];
  overdriveTimer = 0;
  waveTimer = 100;
  waveInProgress = false;
  enemiesToSpawn = 0;
  spawnGap = 0;
  finalBossSpawned = false;
  flashTextTimer = 180;
  flashText = 'Click slots to build. 1/2/3 switch command lane.';
  flashColor = '#8ff';
  for (var i = 0; i < towerSlots.length; i++) {
    towerSlots[i].built = false;
  }
}

function spawnWave() {
  wave++;
  waveInProgress = true;
  enemiesToSpawn = 5 + wave * 2;
  if (wave >= 4) {
    enemiesToSpawn += 2;
  }
  spawnGap = 0;
  flashTextTimer = 120;
  flashText = 'Wave ' + wave;
  flashColor = '#ffd54a';
}

function spawnEnemy(lane, type) {
  var hp = 26 + wave * 8;
  var speed = 0.45 + wave * 0.04;
  var color = '#ff6b6b';
  var size = 16;
  if (type === 'tank') {
    hp *= 2.1;
    speed *= 0.65;
    color = '#ff9b4a';
    size = 22;
  }
  if (type === 'runner') {
    hp *= 0.7;
    speed *= 1.7;
    color = '#ff4ad8';
    size = 12;
  }
  if (type === 'boss') {
    hp = 380;
    speed = 0.33;
    color = '#ffffff';
    size = 30;
  }
  enemies.push({ x: 790, y: laneYs[lane], lane: lane, hp: hp, maxHp: hp, speed: speed, type: type, size: size, slow: 0, pulseHit: 0 });
}

function addParticles(x, y, color, count, speed) {
  for (var i = 0; i < count; i++) {
    var a = Math.random() * Math.PI * 2;
    var s = Math.random() * speed;
    particles.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 20 + Math.random() * 20, color: color });
  }
}

function buildTower(slot, type) {
  var cost = type === 'gun' ? 40 : 65;
  if (credits < cost || slot.built) {
    return;
  }
  credits -= cost;
  slot.built = true;
  towers.push({ x: slot.x, y: slot.y, lane: slot.lane, type: type, cooldown: 0, hp: 100 });
  flashTextTimer = 50;
  flashText = type === 'gun' ? 'Gun Tower Built' : 'Beam Tower Built';
  flashColor = '#7dff9d';
  addParticles(slot.x, slot.y, '#7dff9d', 12, 2.5);
}

function createSupplyDrop(lane) {
  var existing = false;
  for (var i = 0; i < supplyDrops.length; i++) {
    if (supplyDrops[i].lane === lane) {
      existing = true;
    }
  }
  if (existing) {
    return;
  }
  supplyDrops.push({ x: 420 + Math.random() * 180, y: laneYs[lane] - 34, lane: lane, timer: 420 - wave * 20, pulse: 0 });
  flashTextTimer = 120;
  flashText = 'Pressure Airdrop on lane ' + (lane + 1);
  flashColor = '#6cf';
}

function useSupplyDrop(drop) {
  var choice = 'credits';
  if (baseHp < 45 && Math.random() < 0.45) {
    choice = 'heal';
  } else if (lanePressure[drop.lane] > 130) {
    choice = 'strike';
  }
  if (choice === 'credits') {
    credits += 45;
    flashText = 'Airdrop: +45 credits';
    flashColor = '#77ff77';
  } else if (choice === 'heal') {
    baseHp = Math.min(maxBaseHp, baseHp + 18);
    flashText = 'Airdrop: base repaired';
    flashColor = '#77ffdd';
  } else {
    flashText = 'Airdrop: frontline strike';
    flashColor = '#ffb347';
    for (var i = enemies.length - 1; i >= 0; i--) {
      if (enemies[i].lane === drop.lane && enemies[i].x > 280) {
        enemies[i].hp -= 42;
        addParticles(enemies[i].x, enemies[i].y, '#ffb347', 10, 3);
      }
    }
  }
  flashTextTimer = 90;
  addParticles(drop.x, drop.y, flashColor, 16, 3.5);
  supplyDrops.splice(supplyDrops.indexOf(drop), 1);
}

function firePlayerShot() {
  var target = null;
  var bestX = 9999;
  for (var i = 0; i < enemies.length; i++) {
    if (enemies[i].lane === playerLane && enemies[i].x < bestX) {
      bestX = enemies[i].x;
      target = enemies[i];
    }
  }
  if (target) {
    bullets.push({ x: 86, y: laneYs[playerLane], vx: 6.5, vy: 0, lane: playerLane, damage: 12, color: '#9cf', life: 90, player: true });
    addParticles(90, laneYs[playerLane], '#9cf', 4, 1.5);
  }
}

function update() {
  if (state !== 'playing') {
    return;
  }

  if (flashTextTimer > 0) {
    flashTextTimer--;
  }

  if (overdriveTimer > 0) {
    overdriveTimer--;
  }

  if (!waveInProgress && wave < totalWaves) {
    waveTimer--;
    if (waveTimer <= 0) {
      spawnWave();
    }
  }

  if (waveInProgress) {
    spawnGap--;
    if (enemiesToSpawn > 0 && spawnGap <= 0) {
      var lane = Math.floor(Math.random() * 3);
      var type = 'normal';
      var r = Math.random();
      if (wave >= 2 && r < 0.22) {
        type = 'runner';
      } else if (wave >= 3 && r < 0.42) {
        type = 'tank';
      }
      spawnEnemy(lane, type);
      enemiesToSpawn--;
      spawnGap = Math.max(18, 55 - wave * 4);
    }
    if (enemiesToSpawn <= 0 && enemies.length === 0) {
      waveInProgress = false;
      waveTimer = 140;
      credits += 35;
      if (wave === totalWaves && !finalBossSpawned) {
        finalBossSpawned = true;
        waveInProgress = true;
        spawnEnemy(1, 'boss');
        flashTextTimer = 150;
        flashText = 'Final Siege Unit!';
        flashColor = '#fff';
      } else if (wave >= totalWaves && finalBossSpawned && enemies.length === 0) {
        state = 'victory';
      }
    }
  }

  lanePressure = [0, 0, 0];
  for (var e = enemies.length - 1; e >= 0; e--) {
    var enemy = enemies[e];
    if (enemy.slow > 0) {
      enemy.slow--;
    }
    var speedFactor = enemy.slow > 0 ? 0.45 : 1;
    enemy.x -= enemy.speed * speedFactor;
    lanePressure[enemy.lane] += (enemy.type === 'tank' ? 30 : enemy.type === 'boss' ? 65 : enemy.type === 'runner' ? 18 : 22);
    if (enemy.x < 70) {
      var dmg = enemy.type === 'tank' ? 12 : enemy.type === 'boss' ? 30 : 7;
      baseHp -= dmg;
      addParticles(65, enemy.y, '#ff5555', 12, 3.5);
      enemies.splice(e, 1);
      if (baseHp <= 35 && overdriveTimer <= 0) {
        overdriveTimer = 160;
        flashTextTimer = 140;
        flashText = 'Base Overdrive Pulse!';
        flashColor = '#ff6';
        for (var oe = 0; oe < enemies.length; oe++) {
          enemies[oe].slow = 120;
          enemies[oe].pulseHit = 30;
        }
      }
      if (baseHp <= 0) {
        baseHp = 0;
        state = 'game_over';
      }
    }
  }

  for (var lp = 0; lp < 3; lp++) {
    if (lanePressure[lp] > 85 && baseHp > 0 && Math.random() < 0.0035) {
      createSupplyDrop(lp);
    }
  }

  for (var t = 0; t < towers.length; t++) {
    var tower = towers[t];
    if (tower.cooldown > 0) {
      tower.cooldown--;
    }
    var buff = tower.lane === playerLane ? 0.78 : 1;
    var range = tower.type === 'gun' ? 175 : 215;
    if (tower.lane === playerLane) {
      range += 35;
    }
    var target = null;
    var tx = 9999;
    for (var te = 0; te < enemies.length; te++) {
      var en = enemies[te];
      if (en.lane === tower.lane && en.x > tower.x && en.x - tower.x < range && en.x < tx) {
        tx = en.x;
        target = en;
      }
    }
    if (target && tower.cooldown <= 0) {
      if (tower.type === 'gun') {
        bullets.push({ x: tower.x + 8, y: tower.y, vx: 5.5, vy: 0, lane: tower.lane, damage: tower.lane === playerLane ? 14 : 10, color: tower.lane === playerLane ? '#7df9ff' : '#7dff9d', life: 90, player: false });
        tower.cooldown = Math.floor(28 * buff);
      } else {
        bullets.push({ x: tower.x + 8, y: tower.y, vx: 4.2, vy: 0, lane: tower.lane, damage: tower.lane === playerLane ? 24 : 18, color: tower.lane === playerLane ? '#c08cff' : '#b26cff', life: 70, player: false, beam: true });
        tower.cooldown = Math.floor(50 * buff);
      }
      if (tower.lane === playerLane) {
        addParticles(tower.x + 10, tower.y, '#7df9ff', 4, 1.2);
      }
    }
  }

  for (var b = bullets.length - 1; b >= 0; b--) {
    var bullet = bullets[b];
    bullet.x += bullet.vx;
    bullet.life--;
    var hit = false;
    for (var he = 0; he < enemies.length; he++) {
      var h = enemies[he];
      if (h.lane === bullet.lane && Math.abs(h.x - bullet.x) < h.size && Math.abs(h.y - bullet.y) < h.size) {
        h.hp -= bullet.damage;
        if (bullet.beam) {
          h.slow = Math.max(h.slow, 28);
        }
        addParticles(bullet.x, bullet.y, bullet.color, bullet.beam ? 8 : 5, 2.2);
        hit = true;
        if (h.hp <= 0) {
          score += h.type === 'boss' ? 300 : h.type === 'tank' ? 40 : h.type === 'runner' ? 18 : 24;
          credits += h.type === 'boss' ? 80 : 10;
          addParticles(h.x, h.y, h.color, 15, 3.5);
          enemies.splice(he, 1);
        }
        break;
      }
    }
    if (hit || bullet.life <= 0 || bullet.x > 810) {
      bullets.splice(b, 1);
    }
  }

  for (var s = supplyDrops.length - 1; s >= 0; s--) {
    supplyDrops[s].timer--;
    supplyDrops[s].pulse += 0.12;
    if (supplyDrops[s].timer <= 0) {
      supplyDrops.splice(s, 1);
    }
  }

  for (var p = particles.length - 1; p >= 0; p--) {
    particles[p].x += particles[p].vx;
    particles[p].y += particles[p].vy;
    particles[p].life--;
    particles[p].vx *= 0.98;
    particles[p].vy *= 0.98;
    if (particles[p].life <= 0) {
      particles.splice(p, 1);
    }
  }
}

function drawLane(y, lane) {
  var active = lane === playerLane;
  ctx.strokeStyle = active ? '#4fe3ff' : '#1a5366';
  ctx.lineWidth = active ? 4 : 2;
  ctx.beginPath();
  ctx.moveTo(70, y);
  ctx.lineTo(760, y);
  ctx.stroke();

  if (active) {
    for (var i = 0; i < 10; i++) {
      var ex = 70 + ((Date.now() / 10 + i * 70) % 700);
      ctx.strokeStyle = 'rgba(120,240,255,0.35)';
      ctx.beginPath();
      ctx.moveTo(ex, y - 10);
      ctx.lineTo(ex + 25, y);
      ctx.lineTo(ex - 5, y + 10);
      ctx.stroke();
    }
  }
}

function render() {
  ctx.clearRect(0, 0, 800, 500);

  var bg = ctx.createLinearGradient(0, 0, 0, 500);
  bg.addColorStop(0, '#07131d');
  bg.addColorStop(1, '#0b1f2c');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 800, 500);

  if (state === 'menu') {
    ctx.fillStyle = '#d8f6ff';
    ctx.font = 'bold 32px Arial';
    ctx.fillText('Tri-Line Command', 268, 100);
    ctx.font = '16px Arial';
    ctx.fillStyle = '#9dd7e8';
    ctx.fillText('Build towers on three lanes, switch your command lane, and survive all waves.', 130, 160);
    ctx.fillText('Commanded lane towers gain range and fire rate. Pressure may trigger clickable airdrops.', 110, 190);
    ctx.fillText('When base HP gets low, overdrive pulses slow enemies for a comeback moment.', 135, 220);
    ctx.fillStyle = '#12394c';
    ctx.fillRect(300, 290, 200, 56);
    ctx.strokeStyle = '#6cf';
    ctx.strokeRect(300, 290, 200, 56);
    ctx.fillStyle = '#eaffff';
    ctx.font = 'bold 24px Arial';
    ctx.fillText('START', 364, 326);
    ctx.font = '14px Arial';
    ctx.fillStyle = '#8fb8c4';
    ctx.fillText('Build: click slot   Switch lane: 1/2/3 or lane label   Shoot: space', 180, 390);
    return;
  }

  for (var l = 0; l < 3; l++) {
    drawLane(laneYs[l], l);
  }

  ctx.fillStyle = '#29485a';
  ctx.fillRect(30, 90, 35, 320);
  ctx.fillRect(735, 90, 35, 320);
  ctx.fillStyle = '#7dd3fc';
  ctx.fillRect(38, 100, 18, Math.max(0, 300 * (baseHp / maxBaseHp)));
  ctx.fillStyle = '#ff7b7b';
  ctx.fillRect(742, 100, 18, 300);

  for (var ts = 0; ts < towerSlots.length; ts++) {
    var slot = towerSlots[ts];
    ctx.strokeStyle = slot.lane === playerLane ? '#4fe3ff' : '#406070';
    ctx.lineWidth = 2;
    ctx.strokeRect(slot.x - 18, slot.y - 18, 36, 36);
    if (!slot.built) {
      ctx.fillStyle = 'rgba(120,180,200,0.12)';
      ctx.fillRect(slot.x - 18, slot.y - 18, 36, 36);
    }
  }

  for (var tt = 0; tt < towers.length; tt++) {
    var tw = towers[tt];
    ctx.fillStyle = tw.type === 'gun' ? '#7dff9d' : '#c08cff';
    ctx.fillRect(tw.x - 12, tw.y - 12, 24, 24);
    if (tw.lane === playerLane) {
      ctx.strokeStyle = '#7df9ff';
      ctx.strokeRect(tw.x - 15, tw.y - 15, 30, 30);
    }
  }

  for (var sd = 0; sd < supplyDrops.length; sd++) {
    var d = supplyDrops[sd];
    var r = 12 + Math.sin(d.pulse) * 3;
    ctx.strokeStyle = '#7cf';
    ctx.beginPath();
    ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(120,200,255,0.2)';
    ctx.fillRect(d.x - 10, d.y - 10, 20, 20);
    ctx.fillStyle = '#dff';
    ctx.font = '10px Arial';
    ctx.fillText('DROP', d.x - 13, d.y + 4);
  }

  for (var en = 0; en < enemies.length; en++) {
    var enemy = enemies[en];
    ctx.fillStyle = enemy.pulseHit > 0 ? '#ffff99' : enemy.color;
    ctx.fillRect(enemy.x - enemy.size / 2, enemy.y - enemy.size / 2, enemy.size, enemy.size);
    ctx.fillStyle = '#000';
    ctx.fillRect(enemy.x - 16, enemy.y - enemy.size / 2 - 10, 32, 5);
    ctx.fillStyle = '#ff6b6b';
    ctx.fillRect(enemy.x - 16, enemy.y - enemy.size / 2 - 10, 32 * (enemy.hp / enemy.maxHp), 5);
    if (enemy.pulseHit > 0) {
      enemy.pulseHit--;
    }
  }

  for (var bl = 0; bl < bullets.length; bl++) {
    var bullet = bullets[bl];
    ctx.fillStyle = bullet.color;
    if (bullet.beam) {
      ctx.fillRect(bullet.x - 5, bullet.y - 3, 10, 6);
    } else {
      ctx.beginPath();
      ctx.arc(bullet.x, bullet.y, bullet.player ? 4 : 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (var pa = 0; pa < particles.length; pa++) {
    var part = particles[pa];
    ctx.globalAlpha = Math.max(0, part.life / 40);
    ctx.fillStyle = part.color;
    ctx.fillRect(part.x, part.y, 3, 3);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#9cf';
  ctx.fillRect(82, laneYs[playerLane] - 10, 16, 20);
  ctx.strokeStyle = '#fff';
  ctx.strokeRect(80, laneYs[playerLane] - 12, 20, 24);

  ctx.fillStyle = '#0d2230';
  ctx.fillRect(0, 0, 800, 70);
  ctx.strokeStyle = '#1f4f64';
  ctx.strokeRect(0, 0, 800, 70);
  ctx.fillStyle = '#d8f6ff';
  ctx.font = '16px Arial';
  ctx.fillText('Credits: ' + credits, 18, 24);
  ctx.fillText('Score: ' + score, 18, 48);
  ctx.fillText('Wave: ' + wave + '/' + totalWaves, 150, 24);
  ctx.fillText('Base HP: ' + baseHp, 150, 48);
  ctx.fillText('Build [Q] Gun 40  [W] Beam 65', 290, 24);
  ctx.fillText('Command Lane: ' + (playerLane + 1), 290, 48);
  ctx.fillText('Pressure: ' + Math.floor(lanePressure[0]) + ' / ' + Math.floor(lanePressure[1]) + ' / ' + Math.floor(lanePressure[2]), 520, 24);
  ctx.fillText(overdriveTimer > 0 ? 'OVERDRIVE ACTIVE' : 'Hold the line', 520, 48);

  for (var li = 0; li < 3; li++) {
    ctx.fillStyle = li === playerLane ? '#7df9ff' : '#7aa2b2';
    ctx.fillText('Lane ' + (li + 1), 10, laneYs[li] - 18);
    if (lanePressure[li] > 85) {
      ctx.fillStyle = 'rgba(255,90,90,0.18)';
      ctx.fillRect(70, laneYs[li] - 28, 690, 56);
    }
  }

  if (flashTextTimer > 0) {
    ctx.fillStyle = flashColor;
    ctx.font = 'bold 18px Arial';
    ctx.fillText(flashText, 270, 92);
  }

  if (state === 'victory' || state === 'game_over') {
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, 800, 500);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 34px Arial';
    ctx.fillText(state === 'victory' ? 'VICTORY' : 'BASE LOST', 315, 190);
    ctx.font = '18px Arial';
    ctx.fillText('Score: ' + score, 360, 230);
    ctx.fillText('Click to return to menu', 305, 270);
  }
}

function handleClick(x, y) {
  if (state === 'menu') {
    if (x >= 300 && x <= 500 && y >= 290 && y <= 346) {
      startGame();
    }
    return;
  }

  if (state === 'victory' || state === 'game_over') {
    resetGame();
    return;
  }

  if (state !== 'playing') {
    return;
  }

  for (var i = 0; i < supplyDrops.length; i++) {
    var d = supplyDrops[i];
    if (Math.abs(x - d.x) < 18 && Math.abs(y - d.y) < 18) {
      useSupplyDrop(d);
      return;
    }
  }

  for (var l = 0; l < 3; l++) {
    if (x < 80 && y > laneYs[l] - 30 && y < laneYs[l] + 10) {
      playerLane = l;
      selectedLane = l;
      flashTextTimer = 50;
      flashText = 'Command shifted to lane ' + (l + 1);
      flashColor = '#7df9ff';
      return;
    }
  }

  for (var s = 0; s < towerSlots.length; s++) {
    var slot = towerSlots[s];
    if (Math.abs(x - slot.x) < 20 && Math.abs(y - slot.y) < 20) {
      buildTower(slot, buildMode);
      return;
    }
  }
}

window.addEventListener('keydown', function(e) {
  if (state !== 'playing') {
    return;
  }
  if (e.key === '1') {
    playerLane = 0;
    selectedLane = 0;
  }
  if (e.key === '2') {
    playerLane = 1;
    selectedLane = 1;
  }
  if (e.key === '3') {
    playerLane = 2;
    selectedLane = 2;
  }
  if (e.key === 'q' || e.key === 'Q') {
    buildMode = 'gun';
    flashTextTimer = 45;
    flashText = 'Build mode: Gun';
    flashColor = '#7dff9d';
  }
  if (e.key === 'w' || e.key === 'W') {
    buildMode = 'beam';
    flashTextTimer = 45;
    flashText = 'Build mode: Beam';
    flashColor = '#c08cff';
  }
  if (e.key === ' ' || e.code === 'Space') {
    firePlayerShot();
  }
});

canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener('mousedown', function(e) {
  var rect = canvas.getBoundingClientRect();
  var x = (e.clientX - rect.left) * (canvas.width / rect.width);
  var y = (e.clientY - rect.top) * (canvas.height / rect.height);
  handleClick(x, y);
});

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

resetGame();
loop();
};
</script>
</body>
</html>
