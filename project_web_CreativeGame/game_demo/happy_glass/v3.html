<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Ink Chain Codex</title><style>body{margin:0;background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif;}canvas{width:800px;height:500px;display:block;background:#f2ead9;box-shadow:0 10px 30px rgba(0,0,0,0.35);}button{font-family:Arial,sans-serif;}</style></head><body><canvas id='gameCanvas'></canvas><script>window.onload=function(){var canvas=document.getElementById('gameCanvas');var ctx=canvas.getContext('2d');canvas.width=800;canvas.height=500;var mouse={x:0,y:0,down:false};var state={screen:'start',inkType:'solid',ink:320,gravityIndex:2,manualRotations:3,ritualCharged:false,ritualNeed:3,ritualCharge:0,cupFill:0,cupTarget:8,bonusNeed:2,bonusCount:0,spill:0,spillLimit:18,spawnTimer:0,spawned:0,maxDrops:18,won:false,lost:false,message:'',tutorialStep:0};var gravityDirs=[{x:0,y:-0.12,name:'UP',angle:-Math.PI/2},{x:0.12,y:0,name:'RIGHT',angle:0},{x:0,y:0.12,name:'DOWN',angle:Math.PI/2},{x:-0.12,y:0,name:'LEFT',angle:Math.PI}];var strokes=[];var droplets=[];var source={x:90,y:70,r:16};var ritual={x:345,y:250,r:28,required:1};var cup={x:665,y:370,w:82,h:78};var buttons=[];var drawPoints=[];function resetGame(){state.inkType='solid';state.ink=320;state.gravityIndex=2;state.manualRotations=3;state.ritualCharged=false;state.ritualNeed=3;state.ritualCharge=0;state.cupFill=0;state.cupTarget=8;state.bonusNeed=2;state.bonusCount=0;state.spill=0;state.spillLimit=18;state.spawnTimer=0;state.spawned=0;state.maxDrops=18;state.won=false;state.lost=false;state.message='';state.screen='play';strokes=[];droplets=[];buttons=[];drawPoints=[];seedLevel();}function seedLevel(){strokes.push(makeStroke('solid',[{x:120,y:120},{x:210,y:150},{x:270,y:170}],false));strokes.push(makeStroke('solid',[{x:385,y:145},{x:455,y:145},{x:530,y:155}],false));strokes.push(makeStroke('solid',[{x:560,y:210},{x:610,y:295},{x:640,y:340}],false));strokes.push(makeStroke('absorb',[{x:255,y:215},{x:320,y:215}],true));strokes.push(makeStroke('absorb',[{x:468,y:255},{x:535,y:255}],true));strokes[3].echoDir=1;strokes[4].echoDir=2;}function makeStroke(type,pts,placed){return{type:type,points:pts.slice(),width:type==='solid'?8:12,placed:placed,stored:null,releaseTimer:0,maxRelease:95,echoDir:2,relayTimer:0,relayMode:'none',blessingTimer:0,blessingDir:1,id:Math.random()};}function dist(ax,ay,bx,by){var dx=ax-bx,dy=ay-by;return Math.sqrt(dx*dx+dy*dy);}function pointSegDist(px,py,ax,ay,bx,by){var dx=bx-ax,dy=by-ay;var len=dx*dx+dy*dy;if(len===0)return dist(px,py,ax,ay);var t=((px-ax)*dx+(py-ay)*dy)/len;t=Math.max(0,Math.min(1,t));var x=ax+t*dx,y=ay+t*dy;return{x:x,y:y,d:dist(px,py,x,y)};}function strokeCenter(st){var sx=0,sy=0;for(var i=0;i<st.points.length;i++){sx+=st.points[i].x;sy+=st.points[i].y;}return{x:sx/st.points.length,y:sy/st.points.length};}function getMousePos(e){var r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)};}function addButton(x,y,w,h,label,action){buttons.push({x:x,y:y,w:w,h:h,label:label,action:action});}function clickButton(mx,my){for(var i=0;i<buttons.length;i++){var b=buttons[i];if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){b.action();return true;}}return false;}function tryCycleAbsorb(mx,my){for(var i=strokes.length-1;i>=0;i--){var st=strokes[i];if(st.type!=='absorb')continue;for(var j=0;j<st.points.length-1;j++){var a=st.points[j],b=st.points[j+1];var hit=pointSegDist(mx,my,a.x,a.y,b.x,b.y);if(hit.d<12){st.echoDir=(st.echoDir+1)%4;state.message='Inscription set to '+gravityDirs[st.echoDir].name;return true;}}}return false;}canvas.addEventListener('mousedown',function(e){var m=getMousePos(e);mouse.x=m.x;mouse.y=m.y;mouse.down=true;if(state.screen==='start'){resetGame();return;}if(state.screen==='win'||state.screen==='lose'){resetGame();return;}if(clickButton(m.x,m.y))return;if(tryCycleAbsorb(m.x,m.y))return;drawPoints=[{x:m.x,y:m.y}];});canvas.addEventListener('mousemove',function(e){var m=getMousePos(e);mouse.x=m.x;mouse.y=m.y;if(mouse.down&&state.screen==='play'){if(drawPoints.length===0)drawPoints.push({x:m.x,y:m.y});var last=drawPoints[drawPoints.length-1];if(dist(last.x,last.y,m.x,m.y)>8&&state.ink>0){drawPoints.push({x:m.x,y:m.y});state.ink-=2;}}});canvas.addEventListener('mouseup',function(){mouse.down=false;if(state.screen!=='play')return;if(drawPoints.length>1){strokes.push(makeStroke(state.inkType,drawPoints,true));}drawPoints=[];});window.addEventListener('keydown',function(e){if(e.key==='r'||e.key==='R')resetGame();if(state.screen==='play'&&(e.key==='g'||e.key==='G'))manualRotate();if(state.screen==='play'&&(e.key==='z'||e.key==='Z'))undoStroke();});window.addEventListener('keyup',function(e){});function manualRotate(){if(state.manualRotations<=0)return;state.manualRotations--;state.gravityIndex=(state.gravityIndex+1)%4;state.message='Manual gravity rotated';}function undoStroke(){for(var i=strokes.length-1;i>=0;i--){if(!strokes[i].placed)continue;var refund=Math.min(80,strokes[i].points.length*2);state.ink=Math.min(320,state.ink+refund);strokes.splice(i,1);state.message='Undid latest stroke';return;}}function spawnDroplet(){if(state.spawned>=state.maxDrops)return;droplets.push({x:source.x+Math.random()*8-4,y:source.y+2,vx:0,vy:0,r:5,alive:true,inCup:false,spent:false,charged:false,ritualTouched:false,storedCount:0,chainQualified:false,color:'#2f4858'});state.spawned++;}function updatePlay(){state.spawnTimer++;if(state.spawned<state.maxDrops&&state.spawnTimer>24){state.spawnTimer=0;spawnDroplet();}for(var s=0;s<strokes.length;s++){var st=strokes[s];if(st.stored){st.releaseTimer--;if(st.releaseTimer<=0){releaseStored(st);}}if(st.relayTimer>0)st.relayTimer--;if(st.blessingTimer>0)st.blessingTimer--;}for(var i=0;i<droplets.length;i++){var d=droplets[i];if(!d.alive||d.spent)continue;var g=gravityDirs[state.gravityIndex];d.vx+=g.x;d.vy+=g.y;d.vx*=0.995;d.vy*=0.995;d.x+=d.vx;d.y+=d.vy;handleStrokeCollisions(d);handleRitual(d);handleCup(d);if(d.x<-30||d.x>830||d.y<-30||d.y>530){d.spent=true;state.spill++;}}if(!state.won&&!state.lost){if(state.cupFill>=state.cupTarget&&state.ritualCharged&&state.bonusCount>=state.bonusNeed){state.won=true;state.screen='win';}else if((state.spawned>=state.maxDrops&&allDropsResolved())||state.spill>=state.spillLimit){state.lost=true;state.screen='lose';}}}function allDropsResolved(){for(var i=0;i<droplets.length;i++){if(!droplets[i].spent&&!droplets[i].inCup&&droplets[i].alive)return false;}for(var j=0;j<strokes.length;j++){if(strokes[j].stored)return false;}return true;}function releaseStored(st){var d=st.stored;if(!d)return;st.stored=null;var c=strokeCenter(st);d.x=c.x;d.y=c.y;d.alive=true;d.vx=gravityDirs[st.echoDir].x*18;d.vy=gravityDirs[st.echoDir].y*18;d.storedCount++;if(d.ritualTouched){d.chainQualified=true;st.blessingTimer=170;st.blessingDir=st.echoDir;st.relayTimer=120;primeNearbyStrokes(st,d);}state.gravityIndex=st.echoDir;state.message='Echo release rewrote gravity to '+gravityDirs[state.gravityIndex].name;}function primeNearbyStrokes(sourceStroke,droplet){var c=strokeCenter(sourceStroke);for(var i=0;i<strokes.length;i++){var st=strokes[i];if(st===sourceStroke)continue;var c2=strokeCenter(st);var dd=dist(c.x,c.y,c2.x,c2.y);if(dd<120){if(st.type==='absorb'){st.relayTimer=140;if(st.relayMode==='none'){st.relayMode='inherit';st.echoDir=sourceStroke.echoDir;}else{st.relayMode=st.relayMode==='inherit'?'invert':'inherit';if(st.relayMode==='invert')st.echoDir=(sourceStroke.echoDir+2)%4;else st.echoDir=sourceStroke.echoDir;}}else if(st.type==='solid'){st.blessingTimer=170;st.blessingDir=sourceStroke.echoDir;}}}}function handleStrokeCollisions(d){for(var i=0;i<strokes.length;i++){var st=strokes[i];for(var j=0;j<st.points.length-1;j++){var a=st.points[j],b=st.points[j+1];var hit=pointSegDist(d.x,d.y,a.x,a.y,b.x,b.y);if(hit.d<d.r+st.width*0.5){if(st.type==='solid'){var nx=d.x-hit.x,ny=d.y-hit.y;var nlen=Math.sqrt(nx*nx+ny*ny)||1;nx/=nlen;ny/=nlen;var push=(d.r+st.width*0.5-hit.d)+0.5;d.x+=nx*push;d.y+=ny*push;var dot=d.vx*nx+d.vy*ny;d.vx-=2*dot*nx;d.vy-=2*dot*ny;d.vx*=0.82;d.vy*=0.82;if(st.blessingTimer>0){var dir=gravityDirs[st.blessingDir];d.vx+=dir.x*10;d.vy+=dir.y*10;}}else if(st.type==='absorb'){if(!st.stored&&d.alive){st.stored=d;d.alive=false;st.releaseTimer=st.maxRelease;var c=strokeCenter(st);d.x=c.x;d.y=c.y;if(st.relayTimer>0){if(st.relayMode==='inherit'){st.echoDir=st.echoDir;}else if(st.relayMode==='invert'){st.echoDir=(st.echoDir+2)%4;}st.relayTimer=0;}}}return;}}}}function handleRitual(d){if(d.spent||!d.alive)return;var dd=dist(d.x,d.y,ritual.x,ritual.y);if(dd<ritual.r+d.r){if(state.gravityIndex===ritual.required){if(!d.ritualTouched){d.ritualTouched=true;d.charged=true;state.ritualCharge++;state.message='Ritual accepted droplet under '+gravityDirs[state.gravityIndex].name;if(state.ritualCharge>=state.ritualNeed)state.ritualCharged=true;}}else{state.message='Ritual rejects wrong gravity';}var dx=d.x-ritual.x,dy=d.y-ritual.y;var len=Math.sqrt(dx*dx+dy*dy)||1;d.x=ritual.x+dx/len*(ritual.r+d.r+1);d.y=ritual.y+dy/len*(ritual.r+d.r+1);d.vx+=dx/len*0.8;d.vy+=dy/len*0.8;}}function handleCup(d){if(d.spent||!d.alive)return;var left=cup.x,right=cup.x+cup.w,top=cup.y,bottom=cup.y+cup.h;if(d.x>left+8&&d.x<right-8&&d.y>top+10&&d.y<bottom){d.spent=true;d.inCup=true;if(state.ritualCharged){var gain=1;if(d.chainQualified&&d.storedCount>0){gain=2;state.bonusCount++;}state.cupFill+=gain;state.message=gain===2?'Cup accepted a chained bonus droplet':'Cup accepted droplet';}else{state.message='Cup ignores droplets before ritual';}}}function drawWorld(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#f1e7cf';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(120,90,40,0.08)';for(var i=0;i<26;i++){ctx.fillRect(0,i*20+((i%2)*3),800,1);}ctx.strokeStyle='#7f6a43';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,470);ctx.lineTo(800,470);ctx.stroke();ctx.fillStyle='#6b4f2a';ctx.beginPath();ctx.arc(source.x,source.y,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f7f0dc';ctx.beginPath();ctx.arc(source.x,source.y,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5b4324';ctx.fillText('Source',63,42);drawRitual();drawCup();for(var s=0;s<strokes.length;s++)drawStroke(strokes[s]);if(drawPoints.length>1){drawTempStroke();}for(var d=0;d<droplets.length;d++)drawDroplet(droplets[d]);drawUI();}function drawRitual(){ctx.save();ctx.translate(ritual.x,ritual.y);ctx.strokeStyle=state.ritualCharged?'#1f9d55':'#7f5a2f';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,ritual.r,0,Math.PI*2);ctx.stroke();for(var i=0;i<4;i++){ctx.save();ctx.rotate(i*Math.PI/2);ctx.beginPath();ctx.moveTo(0,-38);ctx.lineTo(0,-26);ctx.stroke();ctx.restore();}ctx.fillStyle='#2f2410';ctx.font='12px Arial';ctx.fillText('Need '+gravityDirs[ritual.required].name,-24,4);ctx.restore();}function drawCup(){ctx.strokeStyle='#5a6c7c';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cup.x,cup.y);ctx.lineTo(cup.x,cup.y+cup.h);ctx.lineTo(cup.x+cup.w,cup.y+cup.h);ctx.lineTo(cup.x+cup.w,cup.y);ctx.stroke();var fillH=Math.min(cup.h-8,(state.cupFill/state.cupTarget)*(cup.h-8));ctx.fillStyle='rgba(70,120,180,0.65)';ctx.fillRect(cup.x+4,cup.y+cup.h-4-fillH,cup.w-8,fillH);ctx.fillStyle='#2f2410';ctx.fillText('Cup',cup.x+24,cup.y-10);}function drawStroke(st){ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=st.width;if(st.type==='solid'){ctx.strokeStyle=st.blessingTimer>0?'#d08a2f':'#3b2b1f';}else{ctx.strokeStyle='#6a4fb3';}ctx.beginPath();for(var i=0;i<st.points.length;i++){var p=st.points[i];if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);}ctx.stroke();if(st.type==='absorb'){var c=strokeCenter(st);ctx.fillStyle='#ffffff';ctx.font='11px Arial';ctx.fillText(gravityDirs[st.echoDir].name,c.x-16,c.y-10);if(st.stored){ctx.strokeStyle='#2f4858';ctx.lineWidth=3;ctx.beginPath();ctx.arc(c.x,c.y,14,-Math.PI/2,-Math.PI/2+(1-st.releaseTimer/st.maxRelease)*Math.PI*2);ctx.stroke();}if(st.relayTimer>0){ctx.strokeStyle=st.relayMode==='invert'?'#d94f70':'#2e8bcb';ctx.lineWidth=2;ctx.beginPath();ctx.arc(c.x,c.y,20,0,Math.PI*2);ctx.stroke();}}if(st.type==='solid'&&st.blessingTimer>0){var c2=strokeCenter(st);ctx.fillStyle='#d08a2f';ctx.fillText('Ramp '+gravityDirs[st.blessingDir].name,c2.x-24,c2.y-12);}}function drawTempStroke(){ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=state.inkType==='solid'?8:12;ctx.strokeStyle=state.inkType==='solid'?'rgba(59,43,31,0.6)':'rgba(106,79,179,0.6)';ctx.beginPath();for(var i=0;i<drawPoints.length;i++){var p=drawPoints[i];if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);}ctx.stroke();}function drawDroplet(d){if(d.spent&&!d.inCup)return;if(!d.alive&&d.spent)return;ctx.beginPath();ctx.fillStyle=d.chainQualified?'#1a9f6d':d.ritualTouched?'#d08a2f':'#2f4858';ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();if(d.ritualTouched){ctx.strokeStyle='#fff4c2';ctx.lineWidth=1.5;ctx.stroke();}}function drawUI(){buttons=[];addButton(16,14,78,24,'Solid',function(){state.inkType='solid';});addButton(100,14,90,24,'Absorb',function(){state.inkType='absorb';});addButton(196,14,90,24,'Rotate G',function(){manualRotate();});addButton(292,14,70,24,'Undo',function(){undoStroke();});addButton(368,14,72,24,'Restart',function(){resetGame();});for(var i=0;i<buttons.length;i++){var b=buttons[i];ctx.fillStyle=(b.label==='Solid'&&state.inkType==='solid')||(b.label==='Absorb'&&state.inkType==='absorb')?'#d9c28b':'#e8dcc0';ctx.fillRect(b.x,b.y,b.w,b.h);ctx.strokeStyle='#6d5a3a';ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.fillStyle='#2f2410';ctx.font='12px Arial';ctx.fillText(b.label,b.x+10,b.y+16);}ctx.fillStyle='#2f2410';ctx.font='14px Arial';ctx.fillText('Ink: '+Math.floor(state.ink),16,58);ctx.fillText('Gravity: '+gravityDirs[state.gravityIndex].name,16,78);ctx.fillText('Manual Rotations: '+state.manualRotations,16,98);ctx.fillText('Ritual: '+state.ritualCharge+'/'+state.ritualNeed+' required '+gravityDirs[ritual.required].name,16,118);ctx.fillText('Cup: '+state.cupFill+'/'+state.cupTarget,16,138);ctx.fillText('Bonus chained droplets: '+state.bonusCount+'/'+state.bonusNeed,16,158);ctx.fillText('Spill: '+state.spill+'/'+state.spillLimit,16,178);ctx.fillStyle='#5a4524';ctx.fillText('Drag to draw. Click absorb strokes to cycle delayed gravity.',410,28);ctx.fillText('Charged droplets from ritual can bless nearby solids and relay absorb inscriptions.',340,48);if(state.message){ctx.fillStyle='#7a2f2f';ctx.fillText(state.message,410,70);}}function drawStart(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#f1e7cf';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#2f2410';ctx.font='34px Arial';ctx.fillText('Ink Chain Codex',262,120);ctx.font='16px Arial';ctx.fillText('Draw solid wax lines to deflect droplets.',230,190);ctx.fillText('Draw absorb fibers to capture one droplet and release it later.',180,220);ctx.fillText('Click an absorb stroke to inscribe which gravity it will trigger on release.',135,250);ctx.fillText('Ritual only charges when hit under RIGHT gravity. Then the cup starts counting.',120,280);ctx.fillText('Charged droplets stored later can bless nearby solids into temporary one-way ramps.',95,310);ctx.fillText('Win by charging the ritual, filling the cup, and landing bonus chained droplets.',110,340);ctx.fillStyle='#d9c28b';ctx.fillRect(300,390,200,42);ctx.strokeStyle='#6d5a3a';ctx.strokeRect(300,390,200,42);ctx.fillStyle='#2f2410';ctx.font='22px Arial';ctx.fillText('Click to Begin',337,418);}function drawEnd(win){drawWorld();ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,800,500);ctx.fillStyle='#f7edd2';ctx.fillRect(190,130,420,220);ctx.strokeStyle='#6d5a3a';ctx.strokeRect(190,130,420,220);ctx.fillStyle='#2f2410';ctx.font='30px Arial';ctx.fillText(win?'Codex Complete':'Ink Scattered',300,180);ctx.font='18px Arial';ctx.fillText('Ritual charge: '+state.ritualCharge+'/'+state.ritualNeed,280,225);ctx.fillText('Cup fill: '+state.cupFill+'/'+state.cupTarget,280,255);ctx.fillText('Chained bonus droplets: '+state.bonusCount+'/'+state.bonusNeed,280,285);ctx.fillText('Click anywhere to restart',286,320);}function loop(){if(state.screen==='play')updatePlay();if(state.screen==='start')drawStart();else if(state.screen==='play')drawWorld();else if(state.screen==='win')drawEnd(true);else if(state.screen==='lose')drawEnd(false);requestAnimationFrame(loop);}loop();};</script></body></html>
