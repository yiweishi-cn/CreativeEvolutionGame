<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Neon Lane Guard</title>
<style>
body { margin: 0; background: #050816; display: flex; justify-content: center; align-items: center; height: 100vh; }
canvas { width: 800px; height: 500px; display: block; background: #08101f; box-shadow: 0 0 20px #0ff3; }
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 500;

  var state, score, player, keys, mouse, selectedLane;
  var lanes = [140, 250, 360];
  var base, enemies, bullets, towers, particles, wave, spawnTimer, waveTimer, credits, hoveredLane, hoveredSlot;
  var laneSlots = [
    [220, 360, 500, 640],
    [220, 360, 500, 640],
    [220, 360, 500, 640]
  ];

  function resetGame(){
    state = 'menu';
    score = 0;
    selectedLane = 1;
    player = { x: 120, y: lanes[selectedLane], r: 14, speed: 4, color: '#00f5ff', fireCooldown: 0, hp: 5, maxHp: 5 };
    keys = {};
    mouse = { x: 0, y: 0, down: false, clicked: false };
    base = { x: 70, y: 250, hp: 20, maxHp: 20 };
    enemies = [];
    bullets = [];
    towers = [];
    particles = [];
    wave = 1;
    spawnTimer = 60;
    waveTimer = 0;
    credits = 120;
    hoveredLane = -1;
    hoveredSlot = -1;
  }

  function startGame(){
    state = 'playing';
    score = 0;
    selectedLane = 1;
    player.x = 120;
    player.y = lanes[selectedLane];
    player.hp = player.maxHp;
    player.fireCooldown = 0;
    base.hp = base.maxHp;
    enemies = [];
    bullets = [];
    towers = [];
    particles = [];
    wave = 1;
    spawnTimer = 50;
    waveTimer = 0;
    credits = 120;
  }

  document.addEventListener('keydown', function(e){
    keys[e.key] = true;
    if(state === 'menu' && e.key === 'Enter') startGame();
    if(e.key === 'r' || e.key === 'R') resetGame();
    if(state === 'playing'){
      if(e.key === '1') selectedLane = 0;
      if(e.key === '2') selectedLane = 1;
      if(e.key === '3') selectedLane = 2;
      if(e.key === 'q' || e.key === 'Q') attemptBuild(selectedLane, nearestSlotInLane(selectedLane), 'blaster');
      if(e.key === 'e' || e.key === 'E') attemptBuild(selectedLane, nearestSlotInLane(selectedLane), 'beam');
    }
    if(state === 'game_over' && e.key === 'Enter') startGame();
  });

  document.addEventListener('keyup', function(e){ keys[e.key] = false; });

  canvas.addEventListener('mousemove', function(e){
    var rect = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
  });

  canvas.addEventListener('mousedown', function(){
    mouse.down = true;
    mouse.clicked = true;
    if(state === 'menu') startGame();
    else if(state === 'game_over') startGame();
  });

  canvas.addEventListener('mouseup', function(){ mouse.down = false; });

  function nearestSlotInLane(laneIndex){
    var best = 0;
    var bestDist = 999999;
    for(var i = 0; i < laneSlots[laneIndex].length; i++){
      var d = Math.abs(player.x - laneSlots[laneIndex][i]);
      if(d < bestDist){
        bestDist = d;
        best = i;
      }
    }
    return best;
  }

  function getTowerAt(laneIndex, slotIndex){
    for(var i = 0; i < towers.length; i++){
      if(towers[i].lane === laneIndex && towers[i].slot === slotIndex) return towers[i];
    }
    return null;
  }

  function attemptBuild(laneIndex, slotIndex, type){
    if(state !== 'playing') return;
    if(slotIndex < 0) return;
    if(getTowerAt(laneIndex, slotIndex)) return;
    var cost = type === 'beam' ? 90 : 60;
    if(credits < cost) return;
    credits -= cost;
    towers.push({
      lane: laneIndex,
      slot: slotIndex,
      x: laneSlots[laneIndex][slotIndex],
      y: lanes[laneIndex],
      type: type,
      cooldown: 0,
      range: type === 'beam' ? 190 : 160,
      fireRate: type === 'beam' ? 22 : 36,
      damage: type === 'beam' ? 0.55 : 1,
      color: type === 'beam' ? '#ff6bff' : '#6bff8a'
    });
    spawnBurst(laneSlots[laneIndex][slotIndex], lanes[laneIndex], type === 'beam' ? '#ff6bff' : '#6bff8a', 10);
  }

  function spawnEnemy(){
    var lane = Math.floor(Math.random() * 3);
    var kindRoll = Math.random();
    var enemy;
    if(kindRoll < Math.min(0.12 + wave * 0.01, 0.28)){
      enemy = { x: 840, y: lanes[lane], lane: lane, r: 16, speed: 0.7 + wave * 0.05, hp: 6 + wave * 1.8, maxHp: 6 + wave * 1.8, color: '#ff3b6e', reward: 18, damage: 2, type: 'tank', pulse: 0 };
    } else if(kindRoll < Math.min(0.32 + wave * 0.015, 0.52)){
      enemy = { x: 840, y: lanes[lane], lane: lane, r: 9, speed: 1.8 + wave * 0.08, hp: 2 + wave * 0.5, maxHp: 2 + wave * 0.5, color: '#ffd166', reward: 10, damage: 1, type: 'runner', pulse: 0 };
    } else {
      enemy = { x: 840, y: lanes[lane], lane: lane, r: 12, speed: 1.1 + wave * 0.06, hp: 3.5 + wave * 0.9, maxHp: 3.5 + wave * 0.9, color: '#00e5ff', reward: 12, damage: 1, type: 'drone', pulse: 0 };
    }
    enemies.push(enemy);
  }

  function spawnBurst(x, y, color, amount){
    for(var i = 0; i < amount; i++){
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        life: 20 + Math.random() * 18,
        maxLife: 20 + Math.random() * 18,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function firePlayerShot(){
    var target = null;
    var bestX = 999999;
    for(var i = 0; i < enemies.length; i++){
      if(enemies[i].lane === selectedLane && enemies[i].x < bestX){
        bestX = enemies[i].x;
        target = enemies[i];
      }
    }
    if(target){
      bullets.push({ x: player.x + 16, y: player.y, vx: 7, vy: 0, r: 4, damage: 1.3, color: '#00f5ff', lane: selectedLane, from: 'player' });
      player.fireCooldown = 14;
      spawnBurst(player.x + 18, player.y, '#00f5ff', 4);
    }
  }

  function updateHoverSlot(){
    hoveredLane = -1;
    hoveredSlot = -1;
    for(var l = 0; l < lanes.length; l++){
      if(Math.abs(mouse.y - lanes[l]) < 28){
        hoveredLane = l;
        var best = -1;
        var bestDist = 999999;
        for(var s = 0; s < laneSlots[l].length; s++){
          var d = Math.abs(mouse.x - laneSlots[l][s]);
          if(d < bestDist){
            bestDist = d;
            best = s;
          }
        }
        if(bestDist < 50) hoveredSlot = best;
      }
    }
  }

  function update(){
    updateHoverSlot();

    if(state === 'playing'){
      if(keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
      if(keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;
      if(keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
      if(keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
      if(mouse.down) player.y += (mouse.y - player.y) * 0.12;

      player.y += (lanes[selectedLane] - player.y) * 0.08;
      player.x = Math.max(40, Math.min(760, player.x));
      player.y = Math.max(60, Math.min(440, player.y));
      score += 1;

      if(player.fireCooldown > 0) player.fireCooldown -= 1;
      if((keys[' '] || mouse.down) && player.fireCooldown <= 0) firePlayerShot();

      waveTimer += 1;
      spawnTimer -= 1;
      if(spawnTimer <= 0){
        spawnEnemy();
        var baseRate = Math.max(18, 70 - wave * 3);
        spawnTimer = baseRate + Math.random() * 20;
      }
      if(waveTimer > 900){
        wave += 1;
        waveTimer = 0;
        credits += 30;
      }

      if(mouse.clicked && hoveredLane !== -1 && hoveredSlot !== -1){
        if(mouse.y < 90){
        } else {
          if(mouse.x > 560 && mouse.y > 50 && mouse.y < 82){
            attemptBuild(selectedLane, nearestSlotInLane(selectedLane), 'blaster');
          } else if(mouse.x > 560 && mouse.y > 88 && mouse.y < 120){
            attemptBuild(selectedLane, nearestSlotInLane(selectedLane), 'beam');
          } else {
            selectedLane = hoveredLane;
            if(keys['Shift']) attemptBuild(hoveredLane, hoveredSlot, 'beam');
            else attemptBuild(hoveredLane, hoveredSlot, 'blaster');
          }
        }
      }

      for(var t = towers.length - 1; t >= 0; t--){
        var tower = towers[t];
        if(tower.cooldown > 0) tower.cooldown -= 1;
        var target = null;
        var nearest = 999999;
        for(var e = 0; e < enemies.length; e++){
          var enemy = enemies[e];
          if(enemy.lane !== tower.lane) continue;
          var dx = enemy.x - tower.x;
          var dist = Math.abs(dx);
          if(dx > 0 && dist < tower.range && dist < nearest){
            nearest = dist;
            target = enemy;
          }
        }
        if(target && tower.cooldown <= 0){
          if(tower.type === 'blaster'){
            bullets.push({ x: tower.x + 12, y: tower.y, vx: 6, vy: 0, r: 4, damage: tower.damage, color: tower.color, lane: tower.lane, from: 'tower' });
            tower.cooldown = tower.fireRate;
            spawnBurst(tower.x + 8, tower.y, tower.color, 3);
          } else {
            target.hp -= tower.damage;
            tower.cooldown = tower.fireRate;
            particles.push({ x: target.x, y: target.y, vx: 0, vy: 0, life: 6, maxLife: 6, color: '#ff6bff', size: 6, beamX: tower.x, beamY: tower.y });
          }
        }
      }

      for(var b = bullets.length - 1; b >= 0; b--){
        var bullet = bullets[b];
        bullet.x += bullet.vx;
        bullet.y += bullet.vy;
        var hit = false;
        for(var j = enemies.length - 1; j >= 0; j--){
          var foe = enemies[j];
          if(foe.lane !== bullet.lane) continue;
          var ddx = bullet.x - foe.x;
          var ddy = bullet.y - foe.y;
          var rr = bullet.r + foe.r;
          if(ddx * ddx + ddy * ddy <= rr * rr){
            foe.hp -= bullet.damage;
            spawnBurst(bullet.x, bullet.y, bullet.color, 4);
            bullets.splice(b, 1);
            hit = true;
            break;
          }
        }
        if(hit) continue;
        if(bullet.x > 840){
          bullets.splice(b, 1);
        }
      }

      for(var i = enemies.length - 1; i >= 0; i--){
        var en = enemies[i];
        en.x -= en.speed;
        en.pulse += 0.1;

        var pdx = en.x - player.x;
        var pdy = en.y - player.y;
        var pr = en.r + player.r;
        if(pdx * pdx + pdy * pdy <= pr * pr){
          player.hp -= 0.02 * en.damage;
          en.x += 0.4;
          spawnBurst(player.x, player.y, '#ffffff', 1);
        }

        if(en.hp <= 0){
          credits += en.reward;
          score += en.reward * 8;
          spawnBurst(en.x, en.y, en.color, 10);
          enemies.splice(i, 1);
          continue;
        }

        if(en.x < base.x + 18){
          base.hp -= en.damage;
          spawnBurst(base.x + 20, en.y, '#ff3b6e', 10);
          enemies.splice(i, 1);
          continue;
        }
      }

      for(var p = particles.length - 1; p >= 0; p--){
        var part = particles[p];
        part.x += part.vx;
        part.y += part.vy;
        part.life -= 1;
        if(part.life <= 0) particles.splice(p, 1);
      }

      if(base.hp <= 0 || player.hp <= 0 || score > 5000){
        state = 'game_over';
      }
    }

    mouse.clicked = false;
  }

  function drawLanes(){
    for(var i = 0; i < lanes.length; i++){
      ctx.strokeStyle = i === selectedLane ? '#ff00aa' : '#16324a';
      ctx.lineWidth = i === selectedLane ? 4 : 2;
      ctx.beginPath();
      ctx.moveTo(40, lanes[i]);
      ctx.lineTo(760, lanes[i]);
      ctx.stroke();
      for(var x = 60; x < 760; x += 80){
        ctx.fillStyle = '#0ff2';
        ctx.fillRect(x, lanes[i] - 6, 18, 12);
      }
      for(var s = 0; s < laneSlots[i].length; s++){
        var sx = laneSlots[i][s];
        var occupied = getTowerAt(i, s);
        ctx.strokeStyle = hoveredLane === i && hoveredSlot === s && !occupied ? '#ffffff' : '#1f4d63';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - 16, lanes[i] - 16, 32, 32);
      }
    }
  }

  function drawBase(){
    ctx.fillStyle = '#10263e';
    ctx.fillRect(28, 180, 70, 140);
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth = 3;
    ctx.strokeRect(28, 180, 70, 140);
    ctx.fillStyle = '#00f5ff';
    ctx.fillRect(45, 205, 36, 90);
    ctx.fillStyle = '#08101f';
    ctx.fillRect(20, 20, 140, 12);
    ctx.fillStyle = '#ff5f7a';
    ctx.fillRect(20, 20, 140 * Math.max(0, base.hp) / base.maxHp, 12);
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(20, 20, 140, 12);
  }

  function drawPlayer(){
    ctx.shadowBlur = 16;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(player.x + 10, player.y);
    ctx.lineTo(player.x + 24, player.y);
    ctx.stroke();

    ctx.fillStyle = '#08101f';
    ctx.fillRect(player.x - 18, player.y - 26, 36, 5);
    ctx.fillStyle = '#7dffea';
    ctx.fillRect(player.x - 18, player.y - 26, 36 * Math.max(0, player.hp) / player.maxHp, 5);
  }

  function drawTowers(){
    for(var i = 0; i < towers.length; i++){
      var t = towers[i];
      ctx.shadowBlur = 12;
      ctx.shadowColor = t.color;
      ctx.fillStyle = t.color;
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#ffffff';
      ctx.strokeRect(t.x - 12, t.y - 12, 24, 24);
      if(t.type === 'beam'){
        ctx.beginPath();
        ctx.moveTo(t.x - 6, t.y + 6);
        ctx.lineTo(t.x + 6, t.y - 6);
        ctx.strokeStyle = '#ffe0ff';
        ctx.stroke();
      }
    }
  }

  function drawEnemies(){
    for(var i = 0; i < enemies.length; i++){
      var e = enemies[i];
      ctx.shadowBlur = 14;
      ctx.shadowColor = e.color;
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r + Math.sin(e.pulse) * 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#08101f';
      ctx.fillRect(e.x - 14, e.y - e.r - 12, 28, 4);
      ctx.fillStyle = '#7dffea';
      ctx.fillRect(e.x - 14, e.y - e.r - 12, 28 * Math.max(0, e.hp) / e.maxHp, 4);
    }
  }

  function drawBullets(){
    for(var i = 0; i < bullets.length; i++){
      var b = bullets[i];
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles(){
    for(var i = 0; i < particles.length; i++){
      var p = particles[i];
      if(p.beamX !== undefined){
        ctx.strokeStyle = 'rgba(255,107,255,' + (p.life / p.maxLife) + ')';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.beamX, p.beamY);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      ctx.globalAlpha = 1;
    }
  }

  function drawUI(){
    ctx.fillStyle = '#d7f7ff';
    ctx.font = '16px monospace';
    ctx.fillText('Score: ' + score, 20, 52);
    ctx.fillText('Lane: ' + (selectedLane + 1), 180, 52);
    ctx.fillText('Credits: ' + credits, 280, 52);
    ctx.fillText('Wave: ' + wave, 430, 52);
    ctx.fillText('R to reset', 680, 30);

    ctx.strokeStyle = '#2d6f8e';
    ctx.strokeRect(560, 50, 190, 30);
    ctx.strokeRect(560, 88, 190, 30);
    ctx.fillStyle = '#6bff8a';
    ctx.fillText('Q / Click: Blaster 60', 570, 70);
    ctx.fillStyle = '#ff6bff';
    ctx.fillText('E / Shift+Click: Beam 90', 570, 108);

    ctx.fillStyle = '#9bc7d9';
    ctx.fillText('Space or hold mouse: shoot', 560, 145);
    ctx.fillText('Click lane slot to build', 560, 165);
  }

  function drawOverlay(){
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    if(state === 'menu'){
      ctx.fillStyle = '#00f5ff';
      ctx.font = '34px monospace';
      ctx.fillText('NEON LANE GUARD', 400, 180);
      ctx.fillStyle = '#ffffff';
      ctx.font = '18px monospace';
      ctx.fillText('Click or Enter to start', 400, 225);
      ctx.fillText('Move: WASD or Arrows | Select lane: 1 2 3', 400, 258);
      ctx.fillText('Build blaster: Q or click slot | Build beam: E or Shift+click', 400, 288);
      ctx.fillText('Hold mouse or Space to fire your drone and defend the core', 400, 318);
    }
    if(state === 'game_over'){
      ctx.fillStyle = '#ff4fd8';
      ctx.font = '34px monospace';
      ctx.fillText('GAME OVER', 400, 200);
      ctx.fillStyle = '#ffffff';
      ctx.font = '18px monospace';
      ctx.fillText('Final Score: ' + score, 400, 240);
      ctx.fillText('Wave Reached: ' + wave + ' | Credits: ' + credits, 400, 270);
      ctx.fillText('Click, Enter, or R to restart', 400, 300);
    }
    ctx.textAlign = 'left';
  }

  function render(){
    ctx.fillStyle = '#08101f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#1bffb3';
    ctx.strokeRect(20, 20, 760, 460);
    drawBase();
    drawLanes();
    drawTowers();
    drawBullets();
    drawEnemies();
    drawParticles();
    drawPlayer();
    drawUI();
    if(state !== 'playing') drawOverlay();
  }

  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }

  resetGame();
  loop();
};
</script>
</body>
</html>
