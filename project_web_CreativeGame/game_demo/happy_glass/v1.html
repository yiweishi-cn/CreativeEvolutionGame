<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Neon Pushline Defense</title>
<style>
body{margin:0;background:#050816;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif;overflow:hidden;}
canvas{width:800px;height:500px;display:block;background:#0a1020;box-shadow:0 0 20px #00e5ff33;}
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
  canvas.width = 800; canvas.height = 500;

  var state, score, mouse = {x:0,y:0,clicked:false};
  var keys = {}, player, last = 0;
  var lanes, enemies, bullets, towers, particles;
  var baseHealth, energy, wave, spawnTimer, spawnGap, enemyId, selectedLane;
  var waveTimer, buildFlash, survivalTime;
  var camShake, flashTimer, pulseTime, playerTrail, stars;

  function resetGame(){
    state = 'menu';
    score = 0;
    player = {x:120,y:250,w:28,h:28,speed:220,color:'#00e5ff'};
    lanes = [140, 250, 360];
    enemies = [];
    bullets = [];
    towers = [];
    particles = [];
    baseHealth = 20;
    energy = 120;
    wave = 1;
    spawnTimer = 0;
    spawnGap = 1.8;
    enemyId = 0;
    selectedLane = 1;
    waveTimer = 0;
    buildFlash = 0;
    survivalTime = 0;
    camShake = 0;
    flashTimer = 0;
    pulseTime = 0;
    playerTrail = [];
    stars = [];
    for(var s=0;s<70;s++){
      stars.push({x:Math.random()*800,y:Math.random()*500,r:Math.random()*2+0.5,a:Math.random()*0.6+0.2,spd:8+Math.random()*18});
    }
    mouse.x = 0; mouse.y = 0; mouse.clicked = false;
    keys = {};
  }

  document.addEventListener('keydown', function(e){
    keys[e.key.toLowerCase()] = true;
    if(e.key.toLowerCase() === 'r') resetGame();
    if(state === 'menu' && e.key === 'Enter') state = 'playing';
    if(state === 'game_over' && e.key === 'Enter') state = 'menu';
    if(state === 'playing'){
      if(e.key === '1') selectedLane = 0;
      if(e.key === '2') selectedLane = 1;
      if(e.key === '3') selectedLane = 2;
      if(e.key.toLowerCase() === 'e') placeTowerAtLane(selectedLane);
      if(e.key === ' ') firePushBlast();
    }
  });

  document.addEventListener('keyup', function(e){
    keys[e.key.toLowerCase()] = false;
  });

  canvas.addEventListener('mousemove', function(e){
    var r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * canvas.width / r.width;
    mouse.y = (e.clientY - r.top) * canvas.height / r.height;
  });

  canvas.addEventListener('mousedown', function(){
    mouse.clicked = true;
    if(state === 'menu') state = 'playing';
    else if(state === 'game_over') state = 'menu';
    else if(state === 'playing'){
      var lane = getLaneFromMouse(mouse.y);
      if(lane !== -1){
        selectedLane = lane;
        placeTowerAtLane(lane);
      } else {
        firePushBlast();
      }
    }
  });

  function getLaneFromMouse(y){
    for(var i=0;i<lanes.length;i++){
      if(Math.abs(y - lanes[i]) < 36) return i;
    }
    return -1;
  }

  function addImpact(x,y,color,count,power){
    for(var i=0;i<count;i++){
      particles.push({x:x,y:y,vx:(Math.random()-0.5)*power,vy:(Math.random()-0.5)*power,life:0.2+Math.random()*0.35,color:color,size:2+Math.random()*3});
    }
  }

  function placeTowerAtLane(laneIndex){
    var cost = 40 + towers.length * 10;
    var laneY = lanes[laneIndex];
    var occupied = false;
    for(var i=0;i<towers.length;i++){
      if(towers[i].lane === laneIndex) occupied = true;
    }
    if(occupied || energy < cost) {
      buildFlash = 0.25;
      flashTimer = 0.08;
      return;
    }
    towers.push({
      x: 210,
      y: laneY,
      lane: laneIndex,
      cooldown: 0,
      fireRate: 0.75,
      range: 520,
      damage: 1,
      hp: 8,
      glow: 1,
      recoil: 0
    });
    energy -= cost;
    buildFlash = 0.45;
    flashTimer = 0.06;
    addImpact(210,laneY,'#00e5ff',16,110);
  }

  function firePushBlast(){
    var lane = nearestLaneToPlayer();
    bullets.push({
      x: player.x + player.w + 2,
      y: lanes[lane],
      vx: 420,
      w: 18,
      h: 8,
      damage: 1,
      push: 26,
      color: '#b8fff9',
      fromPlayer: true
    });
    addImpact(player.x + player.w + 18, lanes[lane], '#b8fff9', 8, 80);
  }

  function nearestLaneToPlayer(){
    var best = 0;
    var bestDist = 99999;
    for(var i=0;i<lanes.length;i++){
      var d = Math.abs((player.y + player.h / 2) - lanes[i]);
      if(d < bestDist){
        bestDist = d;
        best = i;
      }
    }
    return best;
  }

  function spawnEnemy(){
    var lane = Math.floor(Math.random() * lanes.length);
    var hp = 2 + Math.floor((wave - 1) / 2);
    var speed = 42 + wave * 5 + Math.random() * 12;
    if(Math.random() < 0.18 + wave * 0.02){
      hp += 3;
      speed *= 0.75;
    }
    enemies.push({
      id: enemyId++,
      x: 770,
      y: lanes[lane] - 15,
      w: 28,
      h: 30,
      lane: lane,
      speed: speed,
      hp: hp,
      maxHp: hp,
      damage: 1,
      tint: lane === 0 ? '#ff6a00' : (lane === 1 ? '#ff8f3d' : '#ffb066'),
      flash: 0,
      bob: Math.random() * 6.28
    });
  }

  function rectsOverlap(a, b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function update(dt){
    pulseTime += dt;
    camShake = Math.max(0, camShake - dt * 3.5);
    flashTimer = Math.max(0, flashTimer - dt);

    for(var st=0;st<stars.length;st++){
      stars[st].x -= stars[st].spd * dt;
      if(stars[st].x < -5){
        stars[st].x = 805;
        stars[st].y = Math.random()*500;
      }
    }

    for(var tr=playerTrail.length-1;tr>=0;tr--){
      playerTrail[tr].life -= dt;
      playerTrail[tr].x -= 20 * dt;
      if(playerTrail[tr].life <= 0) playerTrail.splice(tr,1);
    }

    if(state !== 'playing') return;
    var dx = 0, dy = 0;
    if(keys['w'] || keys['arrowup']) dy -= 1;
    if(keys['s'] || keys['arrowdown']) dy += 1;
    if(keys['a'] || keys['arrowleft']) dx -= 1;
    if(keys['d'] || keys['arrowright']) dx += 1;
    player.x += dx * player.speed * dt;
    player.y += dy * player.speed * dt;
    player.x = Math.max(40, Math.min(canvas.width - 40 - player.w, player.x));
    player.y = Math.max(80, Math.min(canvas.height - 40 - player.h, player.y));

    if(dx !== 0 || dy !== 0){
      playerTrail.push({x:player.x + player.w / 2,y:player.y + player.h / 2,life:0.35,size:12});
      if(playerTrail.length > 20) playerTrail.shift();
    }

    if(mouse.clicked){ score += 1; mouse.clicked = false; }
    score += dt * 3;
    survivalTime += dt;
    energy += dt * 8;
    if(energy > 180) energy = 180;
    waveTimer += dt;
    buildFlash = Math.max(0, buildFlash - dt);

    if(waveTimer > 14){
      waveTimer = 0;
      wave += 1;
      score += 25;
      flashTimer = 0.12;
      if(spawnGap > 0.55) spawnGap -= 0.12;
    }

    spawnTimer += dt;
    if(spawnTimer >= spawnGap){
      spawnTimer = 0;
      spawnEnemy();
      if(Math.random() < Math.min(0.45, wave * 0.08)) spawnEnemy();
    }

    for(var i=0;i<towers.length;i++){
      var tower = towers[i];
      tower.cooldown -= dt;
      tower.glow = Math.max(0, tower.glow - dt * 2);
      tower.recoil = Math.max(0, tower.recoil - dt * 5);
      var target = null;
      var furthestProgress = -99999;
      for(var e=0;e<enemies.length;e++){
        var enemy = enemies[e];
        if(enemy.lane === tower.lane && enemy.x - tower.x < tower.range){
          var progress = 800 - enemy.x;
          if(progress > furthestProgress){
            furthestProgress = progress;
            target = enemy;
          }
        }
      }
      if(target && tower.cooldown <= 0){
        tower.cooldown = tower.fireRate;
        tower.glow = 1;
        tower.recoil = 1;
        bullets.push({x:tower.x + 18,y:tower.y,vx:310,w:14,h:6,damage:tower.damage,push:10,color:'#00e5ff',fromPlayer:false,lane:tower.lane});
        addImpact(tower.x + 18, tower.y, '#00e5ff', 6, 60);
      }
    }

    for(var b=bullets.length-1;b>=0;b--){
      var bullet = bullets[b];
      bullet.x += bullet.vx * dt;
      bullet.y -= bullet.h / 2 * 0;
      if(Math.random() < 0.7){
        particles.push({x:bullet.x,y:bullet.y,vx:-20-Math.random()*20,vy:(Math.random()-0.5)*20,life:0.12,color:bullet.color,size:2+Math.random()*2});
      }
      if(bullet.x > 820){ bullets.splice(b,1); continue; }
      var hit = false;
      for(var en=enemies.length-1;en>=0;en--){
        var foe = enemies[en];
        var bulletRect = {x:bullet.x,y:bullet.y - bullet.h / 2,w:bullet.w,h:bullet.h};
        if(rectsOverlap(bulletRect, foe)){
          foe.hp -= bullet.damage;
          foe.x += bullet.push;
          foe.flash = 0.12;
          hit = true;
          camShake = Math.max(camShake, 0.18);
          flashTimer = Math.max(flashTimer, 0.04);
          addImpact(bullet.x, bullet.y, bullet.color, 8, 130);
          if(foe.hp <= 0){
            score += 10;
            energy += 8;
            camShake = Math.max(camShake, 0.28);
            flashTimer = Math.max(flashTimer, 0.08);
            addImpact(foe.x+foe.w/2,foe.y+foe.h/2,'#ff6a00',18,150);
            enemies.splice(en,1);
          }
          break;
        }
      }
      if(hit) bullets.splice(b,1);
    }

    for(var j=enemies.length-1;j>=0;j--){
      var enemyMove = enemies[j];
      enemyMove.flash = Math.max(0, enemyMove.flash - dt);
      enemyMove.bob += dt * 4;
      var blocked = false;
      for(var tw=towers.length-1;tw>=0;tw--){
        var towerHit = towers[tw];
        if(enemyMove.lane === towerHit.lane){
          var enemyFront = enemyMove.x;
          var towerFront = towerHit.x + 16;
          if(enemyFront <= towerFront + 8){
            blocked = true;
            towerHit.hp -= dt * enemyMove.damage;
            if(Math.random() < 0.25){
              particles.push({x:towerHit.x+8,y:towerHit.y,vx:(Math.random()-0.5)*80,vy:(Math.random()-0.5)*80,life:0.18,color:'#ffb066',size:2+Math.random()*2});
            }
            if(towerHit.hp <= 0){
              camShake = Math.max(camShake, 0.32);
              flashTimer = Math.max(flashTimer, 0.07);
              addImpact(towerHit.x,towerHit.y,'#00e5ff',18,120);
              towers.splice(tw,1);
            }
            break;
          }
        }
      }
      if(!blocked) enemyMove.x -= enemyMove.speed * dt;
      if(enemyMove.x <= 60){
        baseHealth -= enemyMove.damage;
        camShake = Math.max(camShake, 0.45);
        flashTimer = Math.max(flashTimer, 0.12);
        addImpact(60,enemyMove.y+15,'#ff4d6d',16,140);
        enemies.splice(j,1);
        if(baseHealth <= 0){
          state = 'game_over';
        }
      }
    }

    for(var pr=particles.length-1;pr>=0;pr--){
      var part = particles[pr];
      part.x += part.vx * dt;
      part.y += part.vy * dt;
      part.life -= dt;
      part.vx *= 0.99;
      part.vy *= 0.99;
      if(part.life <= 0) particles.splice(pr,1);
    }

    if(player.x > 700) state = 'game_over';
  }

  function drawArena(){
    var laneGlow = 0.5 + Math.sin(pulseTime * 2.2) * 0.15;
    var grad = ctx.createLinearGradient(0,0,800,500);
    grad.addColorStop(0,'#07101c');
    grad.addColorStop(1,'#0b1226');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,800,500);

    for(var s=0;s<stars.length;s++){
      ctx.globalAlpha = stars[s].a;
      ctx.fillStyle = '#8fdcff';
      ctx.fillRect(stars[s].x, stars[s].y, stars[s].r, stars[s].r);
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#0d1730'; ctx.fillRect(0,0,800,70);
    ctx.fillStyle = '#0a1330'; ctx.fillRect(0,70,800,360);
    ctx.fillStyle = '#0a1122'; ctx.fillRect(0,430,800,70);

    for(var g=0;g<20;g++){
      ctx.strokeStyle = 'rgba(0,229,255,0.05)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(g * 40, 70);
      ctx.lineTo(g * 40, 430);
      ctx.stroke();
    }

    for(var i=0;i<lanes.length;i++){
      ctx.strokeStyle = i === selectedLane ? '#00e5ffaa' : 'rgba(50,120,180,0.35)';
      ctx.lineWidth = i === selectedLane ? 3 : 1;
      ctx.beginPath();
      ctx.moveTo(60, lanes[i]);
      ctx.lineTo(760, lanes[i]);
      ctx.stroke();

      ctx.strokeStyle = i === selectedLane ? 'rgba(0,229,255,' + (0.18 + laneGlow * 0.15) + ')' : 'rgba(0,229,255,0.06)';
      ctx.lineWidth = 18;
      ctx.beginPath();
      ctx.moveTo(60, lanes[i]);
      ctx.lineTo(760, lanes[i]);
      ctx.stroke();
    }

    ctx.strokeStyle = '#00e5ff44'; ctx.lineWidth = 2;
    for(var a=0;a<3;a++) ctx.strokeRect(190, lanes[a]-24, 42, 42);
    ctx.strokeStyle = '#ff6a0044';
    for(var j=0;j<6;j++) ctx.strokeRect(120 + j*70, 338, 42, 42);

    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#00e5ff'; ctx.fillRect(20,190,40,120);
    ctx.shadowBlur = 0;

    ctx.shadowColor = '#ff6a00';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#ff6a00'; ctx.fillRect(740,190,40,120);
    ctx.shadowBlur = 0;

    ctx.strokeStyle = '#00e5ff66'; ctx.beginPath(); ctx.moveTo(400,80); ctx.lineTo(400,420); ctx.stroke();

    if(buildFlash > 0){
      ctx.fillStyle = buildFlash > 0.3 ? 'rgba(0,229,255,0.10)' : 'rgba(255,77,109,0.08)';
      ctx.fillRect(0,0,800,500);
    }
  }

  function drawPlayerTrail(){
    for(var i=0;i<playerTrail.length;i++){
      var t = playerTrail[i];
      ctx.globalAlpha = t.life * 0.6;
      ctx.fillStyle = '#00e5ff';
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur = 10;
      ctx.fillRect(t.x - t.size / 2, t.y - t.size / 2, t.size, t.size);
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  function drawPlayer(){
    ctx.fillStyle = player.color;
    ctx.shadowColor = player.color;
    ctx.shadowBlur = 12;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#7cf7ff';
    ctx.fillRect(player.x + 4, player.y + 4, player.w - 8, 4);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#b8fff9';
    ctx.fillRect(player.x + 18, player.y + 10, 16, 8);
  }

  function drawTowers(){
    for(var i=0;i<towers.length;i++){
      var tower = towers[i];
      var recoilOffset = tower.recoil * 4;
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur = 10 + tower.glow * 10;
      ctx.fillStyle = '#0fd3ff';
      ctx.fillRect(tower.x - 12, tower.y - 18, 24, 36);
      ctx.fillStyle = '#b8fff9';
      ctx.fillRect(tower.x - recoilOffset, tower.y - 4, 18, 8);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(184,255,249,0.35)';
      ctx.strokeRect(tower.x - 12, tower.y - 18, 24, 36);
      ctx.fillStyle = '#10243f';
      ctx.fillRect(tower.x - 14, tower.y - 28, 30, 6);
      ctx.fillStyle = '#44ff99';
      ctx.fillRect(tower.x - 14, tower.y - 28, 30 * Math.max(0, tower.hp / 8), 6);
    }
  }

  function drawEnemies(){
    for(var i=0;i<enemies.length;i++){
      var e = enemies[i];
      var bobY = Math.sin(e.bob) * 1.5;
      ctx.shadowColor = e.tint;
      ctx.shadowBlur = 8;
      ctx.fillStyle = e.flash > 0 ? '#ffffff' : e.tint;
      ctx.fillRect(e.x, e.y + bobY, e.w, e.h);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.strokeRect(e.x, e.y + bobY, e.w, e.h);
      ctx.fillStyle = '#2a0d00';
      ctx.fillRect(e.x, e.y - 8 + bobY, e.w, 4);
      ctx.fillStyle = '#ff4d6d';
      ctx.fillRect(e.x, e.y - 8 + bobY, e.w * (e.hp / e.maxHp), 4);
    }
  }

  function drawBullets(){
    for(var i=0;i<bullets.length;i++){
      var b = bullets[i];
      ctx.fillStyle = b.color;
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 10;
      ctx.fillRect(b.x, b.y - b.h / 2, b.w, b.h);
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fillRect(b.x - 6, b.y - 1, 8, 2);
      ctx.shadowBlur = 0;
    }
  }

  function drawParticles(){
    for(var i=0;i<particles.length;i++){
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life * 1.8);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.fillRect(p.x, p.y, p.size || 3, p.size || 3);
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  function drawPanel(x,y,w,h,title){
    ctx.fillStyle = 'rgba(8,16,32,0.78)';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle = 'rgba(0,229,255,0.35)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x,y,w,h);
    if(title){
      ctx.fillStyle = '#8fe8ff';
      ctx.font = '12px Arial';
      ctx.fillText(title, x + 10, y + 16);
    }
  }

  function drawUI(){
    drawPanel(12,12,776,48,'STATUS');
    drawPanel(12,68,320,56,'COMMANDS');

    ctx.fillStyle = '#d7e7ff';
    ctx.font = 'bold 20px Arial';
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 8;
    ctx.fillText('Score ' + Math.floor(score), 24, 42);
    ctx.shadowBlur = 0;

    ctx.font = '16px Arial';
    ctx.fillStyle = '#d7e7ff';
    ctx.fillText('Wave ' + wave, 190, 42);
    ctx.fillText('Lane ' + (selectedLane + 1), 270, 42);
    ctx.fillText('Towers ' + towers.length, 340, 42);
    ctx.fillText('Survival ' + Math.floor(survivalTime), 445, 42);

    ctx.fillStyle = '#89a7c8';
    ctx.font = '13px Arial';
    ctx.fillText('Click lane or press 1/2/3 + E to build', 24, 92);
    ctx.fillText('Click off lane or press Space to fire push blast', 24, 112);

    ctx.fillStyle = '#9fd8ff';
    ctx.font = '12px Arial';
    ctx.fillText('BASE', 575, 26);
    ctx.fillText('ENERGY', 575, 44);

    ctx.fillStyle = '#14243f';
    ctx.fillRect(625, 18, 140, 10);
    ctx.fillRect(625, 36, 140, 10);

    ctx.fillStyle = baseHealth > 8 ? '#44ff99' : '#ff4d6d';
    ctx.fillRect(625, 18, 140 * Math.max(0, baseHealth / 20), 10);
    ctx.fillStyle = '#00e5ff';
    ctx.fillRect(625, 36, 140 * Math.max(0, energy / 180), 10);

    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.strokeRect(625, 18, 140, 10);
    ctx.strokeRect(625, 36, 140, 10);

    if(state === 'menu'){
      ctx.fillStyle = 'rgba(2,8,20,0.62)';
      ctx.fillRect(0,0,800,500);
      drawPanel(170,108,460,250,'NEON DEFENSE GRID');
      ctx.textAlign = 'center';
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#00e5ff';
      ctx.font = 'bold 36px Arial';
      ctx.fillText('Neon Pushline Defense', 400, 170);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#d7e7ff';
      ctx.font = '18px Arial';
      ctx.fillText('Defend the left base from incoming lane creeps', 400, 215);
      ctx.fillText('Move with WASD or Arrow Keys', 400, 245);
      ctx.fillText('Build towers in lanes, use push shots to hold them back', 400, 275);
      ctx.fillStyle = '#8fe8ff';
      ctx.font = 'bold 20px Arial';
      ctx.fillText('Click or press Enter to start', 400, 315);
      ctx.fillStyle = '#9fb8d8';
      ctx.font = '16px Arial';
      ctx.fillText('Press R to reset all state', 400, 340);
      ctx.textAlign = 'left';
    }
    if(state === 'game_over'){
      ctx.fillStyle = 'rgba(8,4,14,0.68)';
      ctx.fillRect(0,0,800,500);
      drawPanel(240,130,320,190,'SYSTEM FAILURE');
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff4d6d';
      ctx.shadowColor = '#ff4d6d';
      ctx.shadowBlur = 16;
      ctx.font = 'bold 36px Arial';
      ctx.fillText('Base Overrun', 400, 182);
      ctx.shadowBlur = 0;
      ctx.font = '18px Arial';
      ctx.fillStyle = '#d7e7ff';
      ctx.fillText('Final Score: ' + Math.floor(score), 400, 225);
      ctx.fillText('Wave Reached: ' + wave, 400, 252);
      ctx.fillStyle = '#8fe8ff';
      ctx.fillText('Click or Enter for menu', 400, 282);
      ctx.fillStyle = '#9fb8d8';
      ctx.fillText('Press R to reset', 400, 305);
      ctx.textAlign = 'left';
    }
  }

  function drawOverlay(){
    if(flashTimer > 0){
      ctx.fillStyle = 'rgba(255,255,255,' + (flashTimer * 1.8) + ')';
      ctx.fillRect(0,0,800,500);
    }
    var vignette = ctx.createRadialGradient(400,250,120,400,250,460);
    vignette.addColorStop(0,'rgba(0,0,0,0)');
    vignette.addColorStop(1,'rgba(0,0,0,0.35)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0,0,800,500);
  }

  function loop(t){
    var dt = (t - last) / 1000; last = t;
    if(dt > 0.05) dt = 0.05;
    update(dt);

    var shakeX = 0;
    var shakeY = 0;
    if(camShake > 0){
      shakeX = (Math.random() - 0.5) * 10 * camShake;
      shakeY = (Math.random() - 0.5) * 10 * camShake;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawArena();
    drawPlayerTrail();
    drawTowers();
    drawEnemies();
    drawBullets();
    drawParticles();
    if(state === 'playing') drawPlayer();
    if(state === 'menu') drawPlayer();
    ctx.restore();

    drawUI();
    drawOverlay();
    requestAnimationFrame(loop);
  }

  resetGame();
  requestAnimationFrame(loop);
};
</script>
</body>
