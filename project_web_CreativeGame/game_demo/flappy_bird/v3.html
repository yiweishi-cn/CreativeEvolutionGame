<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Sky Pulse Bird</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at 50% 20%, #17284a 0%, #0a1020 45%, #060913 100%);
  overflow: hidden;
}
canvas {
  width: 800px;
  height: 500px;
  display: block;
  background: linear-gradient(180deg, #0b1631 0%, #102445 36%, #142d4b 65%, #0d1e31 100%);
  box-shadow: 0 0 0 2px rgba(110, 220, 255, 0.18), 0 0 18px rgba(62, 188, 255, 0.18), 0 0 55px rgba(0, 0, 0, 0.55);
}
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 500;

  var state = 'menu';
  var score = 0;
  var bestScore = 0;
  var progress = 0;
  var chain = 0;
  var gravity = 0.42;
  var flap = -7.4;
  var spawnTimer = 0;
  var pipeGapBase = 148;
  var baseSpeed = 2.6;
  var speed = 2.6;
  var player;
  var pipes = [];
  var keys = {};
  var pulse = 0;
  var distanceStage = 1;
  var flash = 0;
  var bgScroll = 0;
  var clouds = [];
  var hills = [];
  var lastHint = null;
  var groundY = canvas.height - 28;
  var particles = [];
  var stars = [];
  var playerTrail = [];
  var screenShake = 0;
  var titlePulse = 0;

  function rand(min, max){
    return min + Math.random() * (max - min);
  }

  function makeScenery(){
    clouds = [];
    hills = [];
    stars = [];
    for (var i = 0; i < 6; i++) {
      clouds.push({ x: i * 150 + Math.random() * 80, y: 40 + Math.random() * 120, s: 0.7 + Math.random() * 0.8, sp: 0.15 + Math.random() * 0.25 });
    }
    for (var j = 0; j < 5; j++) {
      hills.push({ x: j * 190, h: 50 + Math.random() * 40, w: 220 + Math.random() * 60 });
    }
    for (var k = 0; k < 70; k++) {
      stars.push({ x: Math.random() * canvas.width, y: Math.random() * (groundY - 40), r: Math.random() * 1.8 + 0.4, a: Math.random() * 0.8 + 0.2, t: Math.random() * Math.PI * 2 });
    }
  }

  function resetGame(){
    score = 0;
    progress = 0;
    chain = 0;
    spawnTimer = 0;
    speed = baseSpeed;
    pulse = 0;
    flash = 0;
    bgScroll = 0;
    distanceStage = 1;
    pipes = [];
    particles = [];
    playerTrail = [];
    screenShake = 0;
    lastHint = null;
    player = { x: 170, y: 250, vy: 0, r: 14, rot: 0, flapTilt: 0 };
    state = 'playing';
  }

  function addParticle(x, y, vx, vy, life, size, color, glow){
    particles.push({ x: x, y: y, vx: vx, vy: vy, life: life, maxLife: life, size: size, color: color, glow: glow });
  }

  function burst(x, y, count, colorA, colorB, force){
    for (var i = 0; i < count; i++) {
      var ang = Math.random() * Math.PI * 2;
      var sp = Math.random() * force;
      addParticle(x, y, Math.cos(ang) * sp, Math.sin(ang) * sp, rand(18, 34), rand(2, 5), Math.random() > 0.5 ? colorA : colorB, rand(8, 18));
    }
  }

  function flapNow(){
    if (state === 'menu') {
      resetGame();
      player.vy = flap;
      player.flapTilt = 1;
      burst(player.x - 8, player.y + 4, 10, '#6ef2ff', '#ffe066', 2.2);
    } else if (state === 'playing') {
      player.vy = flap;
      player.flapTilt = 1;
      burst(player.x - 8, player.y + 4, 7, '#6ef2ff', '#8bffb7', 1.8);
    } else if (state === 'game_over') {
      resetGame();
      player.vy = flap;
      player.flapTilt = 1;
      burst(player.x - 8, player.y + 4, 10, '#6ef2ff', '#ffe066', 2.2);
    }
  }

  function getDifficultyLevel(){
    return Math.min(12, Math.floor(score / 3) + Math.floor(progress / 1200));
  }

  function spawnPipe(){
    var level = getDifficultyLevel();
    var center = 120 + Math.random() * 220;
    var baseGap = pipeGapBase - Math.min(level * 3, 24);
    var amp = 0;
    if (score >= 2 || progress > 450) {
      amp = 6 + Math.min(level * 1.25, 16) + Math.random() * 8;
    }
    if (score < 2 && progress < 450) amp *= 0.2;
    var breatheSpeed = 0.018 + Math.random() * 0.018 + level * 0.0008;
    pipes.push({
      x: 840,
      w: 78,
      center: center,
      baseGap: baseGap,
      amp: amp,
      phase: Math.random() * Math.PI * 2,
      breatheSpeed: breatheSpeed,
      passed: false,
      scoredClean: false,
      id: Math.random()
    });
  }

  function getGap(p){
    return p.baseGap + Math.sin(p.phase) * p.amp;
  }

  function hitPipe(p, gap){
    var topH = p.center - gap / 2;
    var botY = p.center + gap / 2;
    return player.x + player.r > p.x && player.x - player.r < p.x + p.w && (player.y - player.r < topH || player.y + player.r > botY);
  }

  function updateHint(){
    lastHint = null;
    for (var i = 0; i < pipes.length; i++) {
      if (pipes[i].x + pipes[i].w >= canvas.width) {
        lastHint = pipes[i];
        return;
      }
    }
  }

  function triggerCrash(){
    flash = 1;
    screenShake = 10;
    burst(player.x, player.y, 28, '#ff6b8d', '#ffe066', 4.5);
    state = 'game_over';
    chain = 0;
  }

  document.addEventListener('keydown', function(e){
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); flapNow(); }
    if (e.code === 'KeyR') { if (state !== 'playing') resetGame(); }
  });
  document.addEventListener('keyup', function(e){ keys[e.code] = false; });
  canvas.addEventListener('mousedown', flapNow);
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); flapNow(); }, { passive: false });

  function updateParticles(){
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.02;
      p.vx *= 0.99;
      p.life -= 1;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateTrail(){
    if (!player) return;
    if (state === 'playing') {
      playerTrail.push({ x: player.x - 10, y: player.y + 2, r: rand(3, 6), a: 0.35, vy: rand(-0.08, 0.08) });
      if (playerTrail.length > 18) playerTrail.shift();
    }
    for (var i = playerTrail.length - 1; i >= 0; i--) {
      playerTrail[i].x -= 0.7;
      playerTrail[i].y += playerTrail[i].vy;
      playerTrail[i].a *= 0.92;
      playerTrail[i].r *= 0.97;
      if (playerTrail[i].a < 0.03) playerTrail.splice(i, 1);
    }
  }

  function update(){
    titlePulse += 0.03;
    flash *= 0.93;
    screenShake *= 0.84;
    updateParticles();
    updateTrail();

    if (state !== 'playing') return;

    pulse += 0.05 + chain * 0.002;
    bgScroll += speed * 0.35;

    player.vy += gravity;
    player.y += player.vy;
    player.flapTilt *= 0.88;
    player.rot = Math.max(-0.9, Math.min(1.3, player.vy * 0.08 - player.flapTilt * 0.45));

    progress += speed;
    distanceStage = 1 + Math.floor(progress / 700);
    spawnTimer++;
    speed = baseSpeed + Math.min(chain * 0.09, 1.0) + Math.min(distanceStage * 0.03, 0.5);

    var spawnInterval = Math.max(86, 112 - Math.min(distanceStage * 2, 16) - Math.min(chain, 6));
    if (spawnTimer > spawnInterval) {
      spawnTimer = 0;
      spawnPipe();
    }

    for (var i = pipes.length - 1; i >= 0; i--) {
      var p = pipes[i];
      p.x -= speed;
      p.phase += p.breatheSpeed;
      var gap = getGap(p);
      if (gap < 92) gap = 92;
      if (hitPipe(p, gap)) {
        triggerCrash();
        break;
      }
      if (!p.passed && p.x + p.w < player.x) {
        p.passed = true;
        score++;
        chain++;
        flash = 1;
        screenShake = Math.max(screenShake, 3);
        burst(player.x + 40, player.y, 12, '#6ef2ff', '#8bffb7', 2.8);
        if (score > bestScore) bestScore = score;
      }
      if (p.x + p.w < 0) pipes.splice(i, 1);
    }

    updateHint();

    if (state === 'playing' && (player.y + player.r > groundY || player.y - player.r < 0)) triggerCrash();
  }

  function drawCloud(x, y, s){
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.fillStyle = 'rgba(130, 205, 255, 0.08)';
    ctx.shadowColor = 'rgba(110, 242, 255, 0.12)';
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.arc(22, -8, 22, 0, Math.PI * 2);
    ctx.arc(48, 0, 18, 0, Math.PI * 2);
    ctx.arc(24, 10, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBackground(){
    var pulseBoost = Math.min(chain * 0.018, 0.14) + flash * 0.06;
    var skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, '#091325');
    skyGrad.addColorStop(0.45, '#102445');
    skyGrad.addColorStop(1, '#091320');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (var s = 0; s < stars.length; s++) {
      var st = stars[s];
      st.t += 0.02;
      var alpha = st.a + Math.sin(st.t + pulse * 0.4) * 0.12 + pulseBoost * 0.35;
      if (alpha < 0.05) alpha = 0.05;
      ctx.fillStyle = 'rgba(170,230,255,' + alpha + ')';
      ctx.fillRect(st.x, st.y, st.r, st.r);
    }

    ctx.fillStyle = 'rgba(110, 242, 255,' + (0.06 + pulseBoost * 0.5) + ')';
    for (var i = 0; i < 4; i++) {
      ctx.fillRect(0, 60 + i * 70 + Math.sin(pulse + i) * 6, canvas.width, 1);
    }

    for (var c = 0; c < clouds.length; c++) {
      var cl = clouds[c];
      cl.x -= cl.sp + speed * 0.08;
      if (cl.x < -100) cl.x = canvas.width + Math.random() * 80;
      drawCloud(cl.x, cl.y, cl.s);
    }

    ctx.fillStyle = '#0f2741';
    for (var j = 0; j < hills.length; j++) {
      var h = hills[j];
      var hx = (h.x - bgScroll * 0.25) % 980;
      if (hx < -260) hx += 980;
      ctx.beginPath();
      ctx.moveTo(hx, groundY);
      ctx.lineTo(hx + h.w * 0.5, groundY - h.h);
      ctx.lineTo(hx + h.w, groundY);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = '#16385b';
    for (var k = 0; k < hills.length; k++) {
      var h2 = hills[k];
      var hx2 = (h2.x + 80 - bgScroll * 0.45) % 980;
      if (hx2 < -260) hx2 += 980;
      ctx.beginPath();
      ctx.moveTo(hx2, groundY);
      ctx.lineTo(hx2 + h2.w * 0.45, groundY - h2.h - 20);
      ctx.lineTo(hx2 + h2.w, groundY);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawHint(p){
    if (!p) return;
    var gap = getGap(p);
    var center = p.center;
    ctx.save();
    ctx.strokeStyle = 'rgba(110,242,255,0.65)';
    ctx.shadowColor = 'rgba(110,242,255,0.45)';
    ctx.shadowBlur = 10;
    ctx.lineWidth = 2;
    for (var i = 0; i < 4; i++) {
      var x1 = 790 - i * 10;
      var sway = Math.sin(pulse * 1.8 + i) * 4;
      ctx.beginPath();
      ctx.moveTo(x1, center + sway - 16);
      ctx.lineTo(x1 - 18, center + sway - 8);
      ctx.moveTo(x1, center + sway);
      ctx.lineTo(x1 - 22, center + sway);
      ctx.moveTo(x1, center + sway + 16);
      ctx.lineTo(x1 - 18, center + sway + 8);
      ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(770, center - Math.min(28, gap * 0.18));
    ctx.lineTo(790, center - Math.min(28, gap * 0.18));
    ctx.moveTo(770, center + Math.min(28, gap * 0.18));
    ctx.lineTo(790, center + Math.min(28, gap * 0.18));
    ctx.stroke();
    ctx.restore();
  }

  function drawPipe(p){
    var gap = getGap(p);
    if (gap < 92) gap = 92;
    var topH = p.center - gap / 2;
    var botY = p.center + gap / 2;
    var bulge = Math.sin(p.phase) * Math.min(p.amp * 0.18, 4);
    var pipeGrad = ctx.createLinearGradient(p.x, 0, p.x + p.w, 0);
    pipeGrad.addColorStop(0, '#103b49');
    pipeGrad.addColorStop(0.45, '#1ce0a1');
    pipeGrad.addColorStop(1, '#0c9f8b');

    ctx.save();
    ctx.shadowColor = 'rgba(28, 224, 161, 0.35)';
    ctx.shadowBlur = 14;

    ctx.fillStyle = pipeGrad;
    ctx.fillRect(p.x, 0, p.w, topH);
    ctx.fillRect(p.x, botY, p.w, groundY - botY);

    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fillRect(p.x + 6, 0, 8, topH);
    ctx.fillRect(p.x + 6, botY, 8, groundY - botY);

    ctx.fillStyle = '#26ffd1';
    ctx.fillRect(p.x - 6, topH - 12 - bulge, p.w + 12, 12 + bulge);
    ctx.fillRect(p.x - 6, botY, p.w + 12, 12 + bulge);

    ctx.strokeStyle = 'rgba(190,255,243,0.55)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x + 12, topH - 6 - bulge * 0.5);
    ctx.lineTo(p.x + p.w - 12, topH - 6 - bulge * 0.5);
    ctx.moveTo(p.x + 12, botY + 6 + bulge * 0.5);
    ctx.lineTo(p.x + p.w - 12, botY + 6 + bulge * 0.5);
    ctx.stroke();

    ctx.restore();
  }

  function drawTrail(){
    for (var i = 0; i < playerTrail.length; i++) {
      var t = playerTrail[i];
      ctx.save();
      ctx.globalAlpha = t.a;
      ctx.fillStyle = '#6ef2ff';
      ctx.shadowColor = '#6ef2ff';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawPlayer(){
    var x = player ? player.x : 170;
    var y = player ? player.y : 250;
    var rot = player ? player.rot : 0;
    drawTrail();
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.shadowColor = 'rgba(255, 224, 102, 0.45)';
    ctx.shadowBlur = 18;

    var bodyGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, 18);
    bodyGrad.addColorStop(0, '#fff2a8');
    bodyGrad.addColorStop(0.5, '#ffd84d');
    bodyGrad.addColorStop(1, '#ff9f1c');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.beginPath();
    ctx.arc(-4, -5, 6, 0, Math.PI * 2);
    ctx.fill();

    var wingLift = player ? Math.sin(pulse * 2.6) * 4 - player.vy * 0.15 : 0;
    ctx.fillStyle = '#ff6b8d';
    ctx.beginPath();
    ctx.ellipse(-4, 5 + wingLift * 0.25, 8, 5, -0.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ff8b3d';
    ctx.beginPath();
    ctx.moveTo(12, -1);
    ctx.lineTo(24, 3);
    ctx.lineTo(12, 7);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(4, -4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222222';
    ctx.beginPath();
    ctx.arc(5, -4, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawGround(){
    var groundGrad = ctx.createLinearGradient(0, groundY, 0, canvas.height);
    groundGrad.addColorStop(0, '#12344d');
    groundGrad.addColorStop(1, '#08121d');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
    ctx.fillStyle = '#26ffd1';
    ctx.shadowColor = '#26ffd1';
    ctx.shadowBlur = 10;
    ctx.fillRect(0, groundY, canvas.width, 3);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(110,242,255,0.18)';
    ctx.lineWidth = 2;
    for (var i = 0; i < canvas.width; i += 28) {
      var shift = (bgScroll * 1.8) % 28;
      ctx.beginPath();
      ctx.moveTo(i - shift, groundY + 8);
      ctx.lineTo(i + 12 - shift, groundY + 18);
      ctx.stroke();
    }
  }

  function drawParticles(){
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var a = p.life / p.maxLife;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = p.glow;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawPanel(x, y, w, h){
    ctx.save();
    ctx.fillStyle = 'rgba(7, 14, 28, 0.62)';
    ctx.strokeStyle = 'rgba(110, 242, 255, 0.35)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(110,242,255,0.12)';
    ctx.shadowBlur = 10;
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);
    ctx.restore();
  }

  function drawUI(){
    drawPanel(14, 14, 196, 92);
    ctx.fillStyle = '#dffcff';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText('SCORE', 28, 34);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 30px sans-serif';
    ctx.shadowColor = 'rgba(255,224,102,0.4)';
    ctx.shadowBlur = 10;
    ctx.fillText(String(score), 28, 66);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#8fdfff';
    ctx.font = '16px sans-serif';
    ctx.fillText('Best ' + bestScore, 28, 90);
    ctx.fillText('Stage ' + distanceStage, 104, 90);

    drawPanel(594, 14, 192, 92);
    ctx.fillStyle = '#dffcff';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText('PROGRESS', 608, 34);
    ctx.fillStyle = '#6ef2ff';
    ctx.font = '16px sans-serif';
    ctx.fillText('Miles ' + Math.floor(progress / 18), 608, 60);
    ctx.fillText('Chain ' + chain, 608, 84);

    var meterX = 250;
    var meterY = 22;
    var meterW = 300;
    var meterH = 16;
    drawPanel(meterX - 8, meterY - 8, meterW + 16, 32);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(meterX, meterY, meterW, meterH);
    var fill = Math.min(1, (progress % 700) / 700);
    var meterGrad = ctx.createLinearGradient(meterX, 0, meterX + meterW, 0);
    meterGrad.addColorStop(0, '#6ef2ff');
    meterGrad.addColorStop(1, '#26ffd1');
    ctx.fillStyle = meterGrad;
    ctx.shadowColor = 'rgba(110,242,255,0.4)';
    ctx.shadowBlur = 12;
    ctx.fillRect(meterX, meterY, meterW * fill, meterH);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.strokeRect(meterX, meterY, meterW, meterH);

    if (chain >= 2 && state === 'playing') {
      ctx.fillStyle = 'rgba(110,242,255,' + Math.min(0.08 + chain * 0.02, 0.22) + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 20px sans-serif';
      ctx.shadowColor = 'rgba(110,242,255,0.5)';
      ctx.shadowBlur = 10;
      ctx.fillText('Rhythm Rush x' + chain, 318, 72);
      ctx.shadowBlur = 0;
    }
  }

  function drawMenu(){
    var bob = Math.sin(titlePulse) * 4;
    drawPanel(185, 95, 430, 250);
    ctx.fillStyle = '#6ef2ff';
    ctx.font = 'bold 42px sans-serif';
    ctx.shadowColor = 'rgba(110,242,255,0.45)';
    ctx.shadowBlur = 14;
    ctx.fillText('Sky Pulse Bird', 244, 155 + bob);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#dffcff';
    ctx.font = '20px sans-serif';
    ctx.fillText('Click, tap, or press Space to start', 248, 205);
    ctx.fillText('Tap to rise. Gravity pulls you down.', 246, 236);
    ctx.fillText('Pipe gaps breathe, so read timing too.', 242, 266);
    ctx.fillText('Avoid pipes, ground, and the top edge.', 246, 296);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('Best Score: ' + bestScore, 334, 328);
  }

  function drawGameOver(){
    ctx.fillStyle = 'rgba(255, 80, 120, 0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawPanel(245, 132, 310, 186);
    ctx.fillStyle = '#ff6b8d';
    ctx.font = 'bold 38px sans-serif';
    ctx.shadowColor = 'rgba(255,107,141,0.45)';
    ctx.shadowBlur = 12;
    ctx.fillText('Crash!', 344, 178);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#dffcff';
    ctx.font = '20px sans-serif';
    ctx.fillText('Score: ' + score, 354, 218);
    ctx.fillText('Best: ' + bestScore, 358, 246);
    ctx.fillText('Stage: ' + distanceStage, 352, 274);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('Click, Space, or R to restart', 281, 302);
  }

  function render(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var shakeX = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
    var shakeY = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawBackground();
    drawHint(lastHint);

    for (var i = 0; i < pipes.length; i++) drawPipe(pipes[i]);

    drawGround();
    drawPlayer();
    drawParticles();
    drawUI();

    if (state === 'menu') drawMenu();
    if (state === 'game_over') drawGameOver();

    if (flash > 0.02) {
      ctx.fillStyle = 'rgba(255,255,255,' + (flash * 0.18) + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    ctx.restore();
  }

  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }

  player = { x: 170, y: 250, vy: 0, r: 14, rot: 0, flapTilt: 0 };
  makeScenery();
  loop();
};
</script>
</body>
</html>
