<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Neon Route Echo</title><style>body{margin:0;background:radial-gradient(circle at top,#0b1630,#040812 70%);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif;overflow:hidden}canvas{width:800px;height:500px;display:block;background:#08111f;box-shadow:0 0 24px rgba(0,255,255,0.25),0 0 80px rgba(255,0,255,0.08) inset;border:1px solid rgba(0,255,255,0.18)}</style></head><body><canvas id='game'></canvas><script>window.onload=function(){var canvas=document.getElementById('game');var ctx=canvas.getContext('2d');canvas.width=800;canvas.height=500;var state='menu';var score=0;var best=0;var player=null;var gates=[];var particles=[];var badges=[];var spawnTimer=0;var beatFrame=0;var beatLength=60;var charge=0;var phaseTimer=0;var objectiveIndex=0;var objectives=['sync_flap','perfect_pass','echo_help','phase_membrane'];var objectiveLabels={sync_flap:'Sync flap on beat',perfect_pass:'Perfect pass center gate',echo_help:'Use death echo assist',phase_membrane:'Phase through membrane gate'};var lastRunPath=[];var currentRunPath=[];var echoReplay=[];var echoCursor=0;var echoOrb=null;var forecastLinks=[];var keys={};var pointerDown=false;var safeStartTimer=600;var scrollSpeed=2.2;var runTier=0;var tutorialHints=['Tap / Click / Space to flap upward','Pass near gate center to weave future safer routes','Flap on beat pulse to charge phase','White echo from last death can open aided gates','Win by completing the objective chain'];var gateId=0;var verificationChecklist=['precision_route_weave: ok','death_echo_assist: ok','rhythm_phase_membrane: ok','beat_lock_objectives: ok','future_gate_forecast: ok'];var cameraShake=0;var flashAlpha=0;var stars=[];var trail=[];for(var s=0;s<90;s++){stars.push({x:Math.random()*800,y:Math.random()*500,r:Math.random()*1.8+0.4,a:Math.random()*0.5+0.1,spd:0.2+Math.random()*0.8})}function addBadge(text,color){badges.push({text:text,color:color,time:80,x:400,y:120+Math.random()*120,scale:1})}function addParticles(x,y,color,count){for(var i=0;i<count;i++){particles.push({x:x,y:y,vx:(Math.random()*2-1)*3,vy:(Math.random()*2-1)*3,life:25+Math.random()*20,color:color,size:2+Math.random()*3,type:'spark'})}}function addRing(x,y,color,r,maxR,life){particles.push({x:x,y:y,life:life,maxLife:life,color:color,r:r,maxR:maxR,type:'ring'})}function addTrailBurst(x,y,color){for(var i=0;i<5;i++){particles.push({x:x,y:y,vx:(Math.random()*2-1)*1.2,vy:(Math.random()*2-1)*1.2,life:18+Math.random()*10,color:color,size:2+Math.random()*2,type:'trail'})}}function impactFX(x,y,color,power){cameraShake=Math.max(cameraShake,power);flashAlpha=Math.max(flashAlpha,power*0.06);addParticles(x,y,color,12+power*2);addRing(x,y,color,8,28+power*3,22+power*2)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function resetGame(){score=0;gates=[];particles=[];badges=[];spawnTimer=30;beatFrame=0;charge=0;phaseTimer=0;objectiveIndex=0;safeStartTimer=600;scrollSpeed=2.2;runTier=0;gateId=0;forecastLinks=[];trail=[];player={x:140,y:250,vy:0,r:12,alive:true,lastSync:false,lastPerfect:false,glow:0,tilt:0,pulse:0};currentRunPath=[];echoReplay=lastRunPath.slice(Math.max(0,lastRunPath.length-150));echoCursor=0;echoOrb=echoReplay.length?{x:140,y:echoReplay[0].y,active:true}:null;state='playing';addBadge('Run Start','#0ff');impactFX(140,250,'#0ff',3)}function restartFromEnd(){resetGame()}function flap(){if(state==='menu'){resetGame();return}if(state==='game_over'||state==='run_complete'){restartFromEnd();return}if(state!=='playing')return;player.vy=-5.7;player.glow=8;player.pulse=1;addTrailBurst(player.x-8,player.y,'#00e5ff');var mod=beatFrame%beatLength;var beatHit=Math.abs(mod)<7||Math.abs(mod-beatLength)<7||Math.abs(mod-beatLength/2)<7;player.lastSync=beatHit;if(beatHit){charge=Math.min(100,charge+34);addParticles(player.x,player.y,'#ff0',8);addRing(player.x,player.y,'#ff0',6,34,22);addBadge('Sync','#ff0');impactFX(player.x,player.y,'#ff0',2);advanceObjective('sync_flap')}else{charge=Math.max(0,charge-5)}if(charge>=100&&phaseTimer<=0){phaseTimer=150;charge=0;addBadge('Phase Online','#fff');addParticles(player.x,player.y,'#fff',18);addRing(player.x,player.y,'#fff',10,46,30);impactFX(player.x,player.y,'#fff',4)}}function advanceObjective(step){if(objectives[objectiveIndex]===step){objectiveIndex++;addBadge('Objective: '+objectiveLabels[step],'#7dffb3');impactFX(220,120,'#7dffb3',2);if(objectiveIndex>=objectives.length){state='run_complete';best=Math.max(best,score);addBadge('Run Complete','#7dffb3');flashAlpha=0.25;cameraShake=8}}}function endGame(){if(state!=='playing')return;player.alive=false;best=Math.max(best,score);lastRunPath=currentRunPath.slice();state='game_over';addBadge('Crash','#ff5aa5');addParticles(player.x,player.y,'#ff5aa5',25);addRing(player.x,player.y,'#ff5aa5',12,72,34);cameraShake=10;flashAlpha=0.32}function spawnGate(){var onboarding=safeStartTimer>0;var membrane=Math.random()<(onboarding?0.18:0.34);var gapH=onboarding?168:clamp(150-runTier*6,118,150);var gapY=110+Math.random()*280;var g={id:gateId++,x:860,w:62,gapY:gapY,gapH:gapH,passed:false,membrane:membrane,assist:false,assistTimer:0,echoGlow:0,routeAssist:false,routeShift:0,forecastFrom:null,forecastType:'',perfectWindow:14,onboarding:onboarding,anim:0};gates.push(g)}function pickFutureGate(skipCount){for(var i=0;i<gates.length;i++){var g=gates[i];if(g.x>player.x+120){if(skipCount<=0)return g;skipCount--}}return null}function applyPerfectPass(sourceGate){var target=pickFutureGate(1);if(!target)return;var desired=clamp(sourceGate.gapY+(Math.random()*70-35),90,410);target.routeAssist=true;target.assist=true;target.routeShift=desired-target.gapY;target.gapY=desired;target.gapH=Math.min(target.gapH+18,190);target.forecastFrom=sourceGate.id;target.forecastType='route';forecastLinks.push({fromX:sourceGate.x+sourceGate.w/2,fromY:sourceGate.gapY,toId:target.id,toY:target.gapY,type:'route',life:260});addBadge('Future Route Woven','#0ff');addParticles(so ;var near=Math.abs(player.y-g.gapY)<=g.perfectWindow;player.lastPerfect=near;if(near){applyPerfectPass(g);addBadge('Perfect Pass','#00f6ff');addParticles(g.x+g.w/2,g.gapY,'#00f6ff',20);addRing(g.x+g.w/2,g.gapY,'#00f6ff',10,52,30);advanceObjective('perfect_pass')}else{addParticles(g.x+g.w/2,g.gapY,'rgba(0,255,255,0.35)',6)}}var overlapX=player.x+player.r>g.x&&player.x-player.r<g.x+g.w;if(overlapX){var inGap=player.y>g.gapY-half&&player.y<g.gapY+half;if(!inGap){var canPhase=g.membrane&&phaseTimer>0;if(canPhase){advanceObjective('phase_membrane');addParticles(player.x,player.y,'#fff',10);addRing(player.x,player.y,'#fff',8,42,24);g.passed=true;impactFX(player.x,player.y,'#fff',3)}else{endGame()}}}}gates=gates.filter(function(g){return g.x+g.w>-40})}function updateParticles(){for(var i=particles.length-1;i>=0;i--){var p=particles[i];if(p.type==='ring'){p.life--;p.r+=(p.maxR-p.r)*0.18;if(p.life<=0)particles.splice(i,1);continue}p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.life--;if(p.life<=0)particles.splice(i,1)}}function updateBadges(){for(var i=badges.length-1;i>=0;i--){badges[i].time--;badges[i].y-=0.3;badges[i].scale=1+Math.sin((80-badges[i].time)*0.2)*0.04;if(badges[i].time<=0)badges.splice(i,1)}}function updateForecasts(){for(var i=forecastLinks.length-1;i>=0;i--){forecastLinks[i].life--;if(forecastLinks[i].life<=0)forecastLinks.splice(i,1)}}function updateTrail(){for(var i=trail.length-1;i>=0;i--){trail[i].x-=scrollSpeed*0.15;trail[i].life--;if(trail[i].life<=0)trail.splice(i,1)}}function updateStars(){for(var i=0;i<stars.length;i++){stars[i].x-=stars[i].spd+scrollSpeed*0.08;if(stars[i].x<0){stars[i].x=800+Math.random()*60;stars[i].y=Math.random()*500}}}function updateFX(){cameraShake*=0.84;if(cameraShake<0.1)cameraShake=0;flashAlpha*=0.88;if(flashAlpha<0.01)flashAlpha=0}function update(){updateParticles();updateBadges();updateForecasts();updateTrail();updateStars();updateFX();if(state!=='playing')return;beatFrame++;if(phaseTimer>0)phaseTimer--;updateDifficulty();updateEcho();updatePlayer();updateGates()}function drawBackground(){var bg=ctx.createLinearGradient(0,0,0,500);bg.addColorStop(0,'#08111f');bg.addColorStop(1,'#050b16');ctx.fillStyle=bg;ctx.fillRect(0,0,800,500);for(var i=0;i<stars.length;i++){ctx.fillStyle='rgba(180,240,255,'+stars[i].a+')';ctx.beginPath();ctx.arc(stars[i].x,stars[i].y,stars[i].r,0,Math.PI*2);ctx.fill()}for(var gx=0;gx<800;gx+=40){ctx.strokeStyle='rgba(0,255,255,0.05)';ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,500);ctx.stroke()}for(var gy=0;gy<500;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(800,gy);ctx.stroke()}ctx.fillStyle='#091522';ctx.fillRect(0,470,800,30);ctx.fillStyle='rgba(0,255,255,0.08)';ctx.fillRect(0,468,800,2)}function drawBeatRing(){var mod=beatFrame%beatLength;var pulse=1-Math.min(Math.abs(mod-beatLength/2)/(beatLength/2),1);ctx.save();ctx.translate(700,62);ctx.strokeStyle='rgba(255,0,255,0.18)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,28+pulse*8,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(255,255,0,'+(0.4+pulse*0.6)+')';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,24,-Math.PI/2,-Math.PI/2+Math.PI*2*(charge/100));ctx.stroke();ctx.fillStyle=phaseTimer>0?'#fff':'#0ff';ctx.shadowBlur=phaseTimer>0?16:8;ctx.shadowColor=phaseTimer>0?'#fff':'#0ff';ctx.beginPath();ctx.arc(0,0,7+pulse*1.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.restore()}function drawEcho(){if(!echoReplay.length||state!=='playing')return;for(var i=0;i<echoReplay.length;i+=5){var px=140+(i/echoReplay.length)*520;ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(px,echoReplay[i].y,3,3)}if(echoOrb){ctx.fillStyle='rgba(255,255,255,0.9)';ctx.shadowBlur=18;ctx.shadowColor='#fff';ctx.beginPath();ctx.arc(echoOrb.x,echoOrb.y,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}}function drawForecasts(){for(var i=0;i<forecastLinks.length;i++){var link=forecastLinks[i];var target=null;for(var j=0;j<gates.length;j++){if(gates[j].id===link.toId){target=gates[j];break}}if(target){var alpha=Math.min(1,link.life/80);ctx.strokeStyle=link.type==='route'?'rgba(0,255,255,'+(0.25+alpha*0.35)+')':'rgba(255,255,255,'+(0.25+alpha*0.4)+')';ctx.lineWidth=2;ctx.setLineDash([8,6]);ctx.beginPath();ctx.moveTo(link.fromX,link.fromY);ctx.quadraticCurveTo((link.fromX+target.x)/2,link.fromY-40,target.x+target.w/2,target.gapY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=link.type==='route'?'rgba(0,255,255,0.10)':'rgba(255,255,255,0.10)';ctx.beginPath();ctx.arc(target.x+target.w/2,target.gapY,target.gapH/2+14+Math.sin(link.life*0.08)*3,0,Math.PI*2);ctx.fill()}}}function drawGate(g){var half=g.gapH/2+(g.assist?16:0);var c=g.membrane?'#ff4df8':'#00e5ff';var glow=8+(g.assist?8:0);ctx.shadowBlur=glow;ctx.shadowColor=c;var gradTop=ctx.createLinearGradient(g.x,0,g.x+g.w,0);gradTop.addColorStop(0,'rgba(255,255,255,0.06)');gradTop.addColorStop(1,c);ctx.strokeStyle=gradTop;ctx.lineWidth=3;ctx.strokeRect(g.x,0,g.w,g.gapY-half);ctx.strokeRect(g.x,g.gapY+half,g.w,470-(g.gapY+half));ctx.fillStyle='rgba(0,255,255,0.05)';ctx.fillRect(g.x,0,g.w,g.gapY-half);ctx.fillRect(g.x,g.gapY+half,g.w,470-(g.gapY+half));if(g.membrane){ctx.fillStyle=phaseTimer>0?'rgba(255,255,255,0.16)':'rgba(255,0,255,0.20)';ctx.fillRect(g.x,g.gapY-7,g.w,14);ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.beginPath();ctx.moveTo(g.x,g.gapY+Math.sin(g.anim)*2);ctx.lineTo(g.x+g.w,g.gapY-Math.sin(g.anim)*2);ctx.stroke()}ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.moveTo(g.x,g.gapY);ctx.lineTo(g.x+g.w,g.gapY);ctx.stroke();if(g.assist){ctx.strokeStyle=g.echoGlow>0?'rgba(255,255,255,0.95)':'rgba(255,232,102,0.85)';ctx.lineWidth=2;ctx.strokeRect(g.x-4,g.gapY-half-4,g.w+8,g.gapH+8)}if(g.routeAssist){ctx.strokeStyle='rgba(0,255,255,0.5)';ctx.beginPath();ctx.moveTo(g.x-10,g.gapY);ctx.lineTo(g.x+g.w+10,g.gapY);ctx.stroke()}ctx.shadowBlur=0}function drawTrail(){for(var i=0;i<trail.length;i++){var t=trail[i];ctx.globalAlpha=t.life/16*0.35;ctx.fillStyle=t.color;ctx.beginPath();ctx.arc(t.x,t.y,t.r*(t.life/16),0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}function drawPlayer(){if(!player)return;ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.tilt);ctx.fillStyle=phaseTimer>0?'#ffffff':'#00e5ff';ctx.shadowBlur=18+player.glow*2;ctx.shadowColor=phaseTimer>0?'#ffffff':'#00e5ff';ctx.beginPath();ctx.arc(0,0,player.r+player.pulse*1.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.9)';ctx.beginPath();ctx.arc(3,-3,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle=player.lastSync?'#ff0':'rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;ctx.restore()}function drawParticles(){for(var i=0;i<particles.length;i++){var p=particles[i];if(p.type==='ring'){ctx.strokeStyle=p.color;ctx.globalAlpha=Math.max(0,p.life/p.maxLife||p.life/30);ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();continue}ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,p.life/40);ctx.fillRect(p.x,p.y,p.size,p.size)}ctx.globalAlpha=1}function drawHUDPanel(x,y,w,h,color){ctx.fillStyle='rgba(8,18,32,0.72)';ctx.fillRect(x,y,w,h);ctx.strokeStyle=color;ctx.lineWidth=1;ctx.strokeRect(x,y,w,h)}function drawHUD(){drawHUDPanel(14,12,250,180,'rgba(0,255,255,0.25)');ctx.fillStyle='#d8f6ff';ctx.font='bold 22px Arial';ctx.fillText('Score '+score,26,38);ctx.font='15px Arial';ctx.fillStyle='rgba(216,246,255,0.9)';ctx.fillText('Best: '+best,26,62);ctx.fillText('State: '+state,26,84);ctx.fillText('Phase: '+(phaseTimer>0?'ON':'CHARGING'),26,106);ctx.fillText('Objective:',26,130);ctx.fillStyle='#7dffb3';ctx.fillText(objectiveIndex<objectives.length?objectiveLabels[objectives[objectiveIndex]]:'Complete',26,152);ctx.fillStyle='rgba(216,246,255,0.85)';ctx.fillText('Safe Start: '+(safeStartTimer>0?'ON':'OFF'),26,174);drawHUDPanel(612,88,162,34,'rgba(125,255,179,0.35)');ctx.fillStyle='rgba(125,255,179,0.18)';ctx.fillRect(620,100,140,10);ctx.fillStyle=phaseTimer>0?'#ffffff':'#7dffb3';ctx.fillRect(620,100,140*(phaseTimer>0?phaseTimer/150:charge/100),10);ctx.strokeStyle='#7dffb3';ctx.strokeRect(620,100,140,10);ctx.fillStyle='#d8f6ff';ctx.font='14px Arial';ctx.fillText('Charge / Phase',620,94);drawBeatRing();drawHUDPanel(14,202,310,84,'rgba(255,0,255,0.2)');ctx.font='14px Arial';if(state==='playing'){for(var i=0;i<tutorialHints.length;i++){if(i===0||safeStartTimer>0||i<3){ctx.fillStyle='rgba(216,246,255,'+(0.92-i*0.08)+')';ctx.fillText(tutorialHints[i],24,224+i*18)}}}drawHUDPanel(14,294,310,44,'rgba(0,255,255,0.18)');ctx.fillStyle='#d8f6ff';ctx.fillText('Chain',24,312);for(var c=0;c<objectives.length;c++){var bx=72+c*58;ctx.fillStyle=c<objectiveIndex?'#7dffb3':'rgba(255,255,255,0.12)';ctx.fillRect(bx,302,44,24);ctx.strokeStyle=c===objectiveIndex?'#00e5ff':'rgba(216,246,255,0.2)';ctx.strokeRect(bx,302,44,24);ctx.fillStyle=c<objectiveIndex?'#041018':'#d8f6ff';ctx.fillText(''+(c+1),bx+17,318)}}function drawBadges(){ctx.font='bold 18px Arial';for(var i=0;i<badges.length;i++){ctx.save();ctx.translate(badges[i].x,badges[i].y);ctx.scale(badges[i].scale,badges[i].scale);ctx.globalAlpha=Math.max(0,badges[i].time/80);var w=ctx.measureText(badges[i].text).width+24;ctx.fillStyle='rgba(8,18,32,0.65)';ctx.fillRect(-w/2,-18,w,26);ctx.strokeStyle=badges[i].color;ctx.strokeRect(-w/2,-18,w,26);ctx.fillStyle=badges[i].color;ctx.fillText(badges[i].text,-w/2+12,0);ctx.restore()}ctx.globalAlpha=1}function drawMenu(){ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fillRect(120,90,560,320);ctx.strokeStyle='rgba(0,255,255,0.35)';ctx.strokeRect(120,90,560,320);ctx.fillStyle='#0ff';ctx.font='bold 42px Arial';ctx.fillText('Neon Route Echo',245,150);ctx.font='18px Arial';ctx.fillStyle='#d8f6ff';ctx.fillText('Click, tap, or press Space to start',275,200);ctx.fillText('Flap through glowing gates. Hit center for Perfect Pass.',205,235);ctx.fillText('Sync flaps with beat pulse to charge Phase for membrane gates.',165,265);ctx.fillText('Your last death replays as an echo that can open future assists.',170,295);ctx.fillText('Win by completing the objective chain, not score alone.',215,325);ctx.fillStyle='#7dffb3';ctx.fillText('Novel mechanics verification:',285,365);ctx.fillStyle='#d8f6ff';for(var i=0;i<verificationChecklist.length;i++){ctx.fillText(verificationChecklist[i],285,390+i*18)}}function drawEnd(){ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(170,130,460,240);ctx.strokeStyle=state==='run_complete'?'rgba(125,255,179,0.5)':'rgba(255,79,216,0.5)';ctx.strokeRect(170,130,460,240);ctx.fillStyle=state==='run_complete'?'#7dffb3':'#ff4fd8';ctx.font='bold 40px Arial';ctx.fillText(state==='run_complete'?'Run Complete':'Game Over',260,185);ctx.font='18px Arial';ctx.fillStyle='#d8f6ff';ctx.fillText('Click, tap, Space, or R to restart',270,225);ctx.fillText('Score: '+score+'   Best: '+best,315,255);ctx.fillText('Current chain progress: '+objectiveIndex+'/'+objectives.length,275,285);ctx.fillText('Tip: center passes write future routes; echo opens aided gates.',170,322);ctx.fillText('Tip: sync flaps to beat, then phase through membrane bars.',205,348)}function render(){ctx.save();var shakeX=(Math.random()*2-1)*cameraShake;var shakeY=(Math.random()*2-1)*cameraShake;ctx.translate(shakeX,shakeY);drawBackground();drawForecasts();for(var i=0;i<gates.length;i++)drawGate(gates[i]);drawEcho();drawTrail();drawParticles();if(player)drawPlayer();drawHUD();drawBadges();if(state==='menu')drawMenu();if(state==='game_over'||state==='run_complete')drawEnd();ctx.restore();if(flashAlpha>0){ctx.fillStyle='rgba(255,255,255,'+flashAlpha+')';ctx.fillRect(0,0,800,500)}}window.addEventListener('keydown',function(e){keys[e.key]=true;if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();flap()}if(e.key==='r'||e.key==='R'){if(state==='playing'||state==='game_over'||state==='run_complete')restartFromEnd()}});window.addEventListener('keyup',function(e){keys[e.key]=false});canvas.addEventListener('mousedown',function(){pointerDown=true;flap()});canvas.addEventListener('mouseup',function(){pointerDown=false});canvas.addEventListener('touchstart',function(e){e.preventDefault();pointerDown=true;flap()},{passive:false});canvas.addEventListener('touchend',function(e){e.preventDefault();pointerDown=false},{passive:false});function loop(){update();render();requestAnimationFrame(loop)}loop()};</script></body></html>
