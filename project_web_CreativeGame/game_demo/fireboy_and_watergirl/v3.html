<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Neon Chain Lab</title>
<style>
body{margin:0;background:#05060a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;overflow:hidden;}
canvas{width:800px;height:500px;display:block;background:#0a0d14;box-shadow:0 0 30px #0ff3,0 0 60px #f0f1 inset;image-rendering:auto;}
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 500;
var keys = {}, state, score, player, lastTime;
var enemies = [], bullets = [], pickups = [], particles = [];
var enemySpawnTimer = 0, enemySpawnDelay = 1.1;
var pickupTimer = 0, waveTime = 0, winScore = 150;
var shootCooldown = 0;
var resultText = 'Game Over';
var trails = [];
var flashes = [];
var screenShake = 0;
var cameraX = 0;
var cameraY = 0;
var stars = [];
var uiPulse = 0;

function resetGame(){
  state = 'menu'; score = 0; lastTime = 0;
  enemies = []; bullets = []; pickups = []; particles = []; trails = []; flashes = [];
  enemySpawnTimer = 0; pickupTimer = 0; waveTime = 0; shootCooldown = 0;
  resultText = 'Game Over';
  screenShake = 0; cameraX = 0; cameraY = 0; uiPulse = 0;
  player = {
    x:400,y:250,w:18,h:18,speed:220,color:'#00f5ff',vx:0,vy:0,hp:3,
    fireRate:0.22, facingX:1, facingY:0, invuln:0, maxHp:3
  };
}

function rectsOverlap(a,b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function clamp(v,min,max){
  if(v < min) return min;
  if(v > max) return max;
  return v;
}

function spawnEnemy(){
  var side = Math.floor(Math.random() * 4);
  var size = 16 + Math.random() * 14;
  var x = 0, y = 0;
  if(side === 0){ x = -size; y = Math.random() * (canvas.height - size); }
  if(side === 1){ x = canvas.width + size; y = Math.random() * (canvas.height - size); }
  if(side === 2){ x = Math.random() * (canvas.width - size); y = -size; }
  if(side === 3){ x = Math.random() * (canvas.width - size); y = canvas.height + size; }
  var speed = 70 + Math.random() * 45 + Math.min(70, waveTime * 4);
  enemies.push({
    x:x,y:y,w:size,h:size,speed:speed,color:'#ff3df2',hp:1,
    pulse:Math.random() * Math.PI * 2, damageCooldown:0
  });
  addFlash('#ff3df2', 0.04, 0.08);
}

function spawnPickup(){
  var type = Math.random() < 0.65 ? 'heal' : 'burst';
  pickups.push({
    x:40 + Math.random() * 720,
    y:40 + Math.random() * 420,
    w:16,
    h:16,
    type:type,
    life:8,
    spin:Math.random() * Math.PI * 2
  });
}

function shootBullet(){
  var dx = player.facingX;
  var dy = player.facingY;
  if(dx === 0 && dy === 0){ dx = 1; dy = 0; }
  var len = Math.sqrt(dx * dx + dy * dy);
  dx /= len; dy /= len;
  bullets.push({
    x:player.x + player.w / 2 - 4,
    y:player.y + player.h / 2 - 4,
    w:8,
    h:8,
    vx:dx * 420,
    vy:dy * 420,
    life:1.3,
    color:'#8aff00'
  });
  addParticles(player.x + player.w / 2, player.y + player.h / 2, '#8aff00', 4);
  addFlash('#8aff00', 0.03, 0.05);
}

function burstShot(){
  var angles = [0, Math.PI / 2, Math.PI, Math.PI * 1.5];
  for(var i = 0; i < angles.length; i++){
    bullets.push({
      x:player.x + player.w / 2 - 4,
      y:player.y + player.h / 2 - 4,
      w:8,
      h:8,
      vx:Math.cos(angles[i]) * 350,
      vy:Math.sin(angles[i]) * 350,
      life:0.9,
      color:'#ffd166'
    });
  }
  addFlash('#ffd166', 0.05, 0.08);
}

function addParticles(x,y,color,count){
  for(var i = 0; i < count; i++){
    particles.push({
      x:x,
      y:y,
      vx:(Math.random() * 2 - 1) * 120,
      vy:(Math.random() * 2 - 1) * 120,
      life:0.45 + Math.random() * 0.35,
      maxLife:0.8,
      color:color,
      size:2 + Math.random() * 3
    });
  }
}

function addTrail(x,y,color,size,life){
  trails.push({x:x,y:y,color:color,size:size,life:life,maxLife:life});
}

function addFlash(color,life,alpha){
  flashes.push({color:color,life:life,maxLife:life,alpha:alpha});
}

function shake(amount){
  if(amount > screenShake) screenShake = amount;
}

for(var s = 0; s < 70; s++){
  stars.push({
    x:Math.random() * canvas.width,
    y:Math.random() * canvas.height,
    r:Math.random() * 1.8 + 0.4,
    a:0.15 + Math.random() * 0.35,
    c:Math.random() < 0.5 ? '#0ff' : '#f0f'
  });
}

window.addEventListener('keydown', function(e){
  keys[e.key.toLowerCase()] = true;
  if(e.key === ' ' || e.code === 'Space') e.preventDefault();
  if(state === 'menu' && (e.key === ' ' || e.code === 'Space')) state = 'playing';
  else if(state === 'playing' && (e.key === ' ' || e.code === 'Space')){
    if(shootCooldown <= 0){
      shootBullet();
      shootCooldown = player.fireRate;
    }
  }
  if((state === 'game_over' || state === 'win') && e.key.toLowerCase() === 'r') resetGame();
});
window.addEventListener('keyup', function(e){ keys[e.key.toLowerCase()] = false; });

function update(dt){
  uiPulse += dt * 3;
  if(screenShake > 0){
    screenShake -= dt * 10;
    if(screenShake < 0) screenShake = 0;
  }
  cameraX = screenShake > 0 ? (Math.random() * 2 - 1) * screenShake : 0;
  cameraY = screenShake > 0 ? (Math.random() * 2 - 1) * screenShake : 0;

  for(var tf = flashes.length - 1; tf >= 0; tf--){
    flashes[tf].life -= dt;
    if(flashes[tf].life <= 0) flashes.splice(tf,1);
  }

  for(var tr = trails.length - 1; tr >= 0; tr--){
    trails[tr].life -= dt;
    if(trails[tr].life <= 0) trails.splice(tr,1);
  }

  if(state !== 'playing') return;

  waveTime += dt;
  player.vx = 0; player.vy = 0;
  if(player.invuln > 0) player.invuln -= dt;
  if(shootCooldown > 0) shootCooldown -= dt;

  if(keys['w'] || keys['arrowup']) player.vy = -player.speed;
  if(keys['s'] || keys['arrowdown']) player.vy = player.speed;
  if(keys['a'] || keys['arrowleft']) player.vx = -player.speed;
  if(keys['d'] || keys['arrowright']) player.vx = player.speed;

  if(player.vx !== 0 || player.vy !== 0){
    var mag = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
    if(mag > 0){
      player.vx = player.vx / mag * player.speed;
      player.vy = player.vy / mag * player.speed;
      player.facingX = player.vx / player.speed;
      player.facingY = player.vy / player.speed;
    }
  }

  player.x += player.vx * dt;
  player.y += player.vy * dt;
  if(player.x < 0) player.x = 0;
  if(player.y < 0) player.y = 0;
  if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;
  if(player.y + player.h > canvas.height) player.y = canvas.height - player.h;

  if(Math.abs(player.vx) > 0 || Math.abs(player.vy) > 0){
    addTrail(player.x + player.w / 2, player.y + player.h / 2, '#00f5ff', 12, 0.22);
  }

  enemySpawnTimer += dt;
  pickupTimer += dt;
  var dynamicDelay = clamp(enemySpawnDelay - waveTime * 0.01, 0.38, 1.1);
  if(enemySpawnTimer >= dynamicDelay){
    enemySpawnTimer = 0;
    spawnEnemy();
    if(waveTime > 25 && Math.random() < 0.35) spawnEnemy();
  }
  if(pickupTimer >= 7){
    pickupTimer = 0;
    if(pickups.length < 2) spawnPickup();
  }

  for(var i = bullets.length - 1; i >= 0; i--){
    var b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    addTrail(b.x + b.w / 2, b.y + b.h / 2, b.color, 7, 0.14);
    if(b.life <= 0 || b.x + b.w < 0 || b.x > canvas.width || b.y + b.h < 0 || b.y > canvas.height){
      bullets.splice(i,1);
    }
  }

  for(var j = enemies.length - 1; j >= 0; j--){
    var e = enemies[j];
    e.pulse += dt * 5;
    if(e.damageCooldown > 0) e.damageCooldown -= dt;
    var ex = player.x + player.w / 2 - (e.x + e.w / 2);
    var ey = player.y + player.h / 2 - (e.y + e.h / 2);
    var dist = Math.sqrt(ex * ex + ey * ey) || 1;
    e.x += ex / dist * e.speed * dt;
    e.y += ey / dist * e.speed * dt;
    addTrail(e.x + e.w / 2, e.y + e.h / 2, '#ff3df2', e.w * 0.5, 0.12);

    for(var k = bullets.length - 1; k >= 0; k--){
      if(rectsOverlap(e, bullets[k])){
        addParticles(bullets[k].x + 4, bullets[k].y + 4, bullets[k].color, 5);
        addFlash(bullets[k].color, 0.04, 0.06);
        shake(2.5);
        bullets.splice(k,1);
        e.hp -= 1;
        if(e.hp <= 0){
          addParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff3df2', 10);
          addParticles(e.x + e.w / 2, e.y + e.h / 2, '#ffffff', 4);
          addFlash('#ff3df2', 0.08, 0.08);
          shake(4);
          enemies.splice(j,1);
          score += 12;
        }
        break;
      }
    }
  }

  for(var m = enemies.length - 1; m >= 0; m--){
    if(rectsOverlap(player, enemies[m]) && player.invuln <= 0){
      player.hp -= 1;
      player.invuln = 1.1;
      addParticles(player.x + player.w / 2, player.y + player.h / 2, '#00f5ff', 12);
      addFlash('#ff4d6d', 0.11, 0.12);
      shake(7);
      var pushX = player.x + player.w / 2 - (enemies[m].x + enemies[m].w / 2);
      var pushY = player.y + player.h / 2 - (enemies[m].y + enemies[m].h / 2);
      var pushLen = Math.sqrt(pushX * pushX + pushY * pushY) || 1;
      player.x += pushX / pushLen * 22;
      player.y += pushY / pushLen * 22;
      player.x = clamp(player.x, 0, canvas.width - player.w);
      player.y = clamp(player.y, 0, canvas.height - player.h);
      if(player.hp <= 0){
        resultText = 'Game Over';
        state = 'game_over';
      }
    }
  }

  for(var n = pickups.length - 1; n >= 0; n--){
    pickups[n].life -= dt;
    pickups[n].spin += dt * 4;
    if(pickups[n].life <= 0){
      pickups.splice(n,1);
      continue;
    }
    if(rectsOverlap(player, pickups[n])){
      if(pickups[n].type === 'heal'){
        player.hp = Math.min(player.maxHp, player.hp + 1);
        score += 5;
        addParticles(pickups[n].x + 8, pickups[n].y + 8, '#6ef58c', 10);
        addFlash('#6ef58c', 0.06, 0.08);
      } else {
        score += 8;
        burstShot();
        addParticles(pickups[n].x + 8, pickups[n].y + 8, '#ffd166', 12);
      }
      shake(3);
      pickups.splice(n,1);
    }
  }

  for(var p = particles.length - 1; p >= 0; p--){
    var part = particles[p];
    part.x += part.vx * dt;
    part.y += part.vy * dt;
    part.life -= dt;
    if(part.life <= 0) particles.splice(p,1);
  }

  score += dt * 6;
  if(score >= winScore){
    resultText = 'Lab Cleared';
    addFlash('#8aff00', 0.18, 0.12);
    shake(6);
    state = 'win';
  }
}

function drawGrid(){
  var grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  grad.addColorStop(0,'#08111d');
  grad.addColorStop(1,'#0d1020');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(var i = 0; i < stars.length; i++){
    ctx.globalAlpha = stars[i].a + Math.sin(uiPulse + i) * 0.05;
    ctx.fillStyle = stars[i].c;
    ctx.fillRect(stars[i].x, stars[i].y, stars[i].r, stars[i].r);
  }
  ctx.globalAlpha = 1;

  ctx.strokeStyle = '#102030'; ctx.lineWidth = 1;
  for(var x=0;x<=canvas.width;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for(var y=0;y<=canvas.height;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

  ctx.strokeStyle = '#0ff2';
  ctx.lineWidth = 2;
  ctx.strokeRect(8,8,canvas.width-16,canvas.height-16);
}

function drawHud(){
  var hpRatio = player.hp / player.maxHp;
  ctx.save();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(4,10,20,0.7)';
  ctx.fillRect(14,14,210,104);
  ctx.strokeStyle = '#00f5ff66';
  ctx.strokeRect(14,14,210,104);

  ctx.fillStyle = '#d7f7ff';
  ctx.font = 'bold 24px Arial';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 10;
  ctx.fillText('Score ' + Math.floor(score), 24, 40);

  ctx.shadowBlur = 0;
  ctx.font = '14px Arial';
  ctx.fillStyle = '#9ec7d6';
  ctx.fillText('Goal ' + winScore, 24, 62);
  ctx.fillText('Enemies ' + enemies.length, 24, 82);

  ctx.fillStyle = '#1a2235';
  ctx.fillRect(24,92,160,14);
  var hpColor = hpRatio > 0.6 ? '#6ef58c' : hpRatio > 0.3 ? '#ffd166' : '#ff4d6d';
  ctx.fillStyle = hpColor;
  ctx.shadowColor = hpColor;
  ctx.shadowBlur = 10;
  ctx.fillRect(24,92,160 * hpRatio,14);
  ctx.strokeStyle = '#ffffff22';
  ctx.lineWidth = 2;
  ctx.strokeRect(24,92,160,14);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#d7f7ff';
  ctx.font = '12px Arial';
  ctx.fillText('HP ' + player.hp + ' / ' + player.maxHp, 190, 103);

  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(4,10,20,0.68)';
  ctx.fillRect(622,14,164,36);
  ctx.strokeStyle = '#ff3df266';
  ctx.strokeRect(622,14,164,36);
  ctx.fillStyle = '#f4d7ff';
  ctx.shadowColor = '#ff3df2';
  ctx.shadowBlur = 8;
  ctx.fillText('Space fire', 774, 38);
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(cameraX, cameraY);
  drawGrid();

  for(var t = 0; t < trails.length; t++){
    var tr = trails[t];
    ctx.globalAlpha = Math.max(0, tr.life / tr.maxLife) * 0.45;
    ctx.fillStyle = tr.color;
    ctx.shadowColor = tr.color;
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, tr.size * (0.4 + tr.life / tr.maxLife * 0.6), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  for(var i = 0; i < pickups.length; i++){
    var pk = pickups[i];
    var bob = Math.sin(pk.spin) * 3;
    ctx.save();
    ctx.translate(pk.x + pk.w / 2, pk.y + pk.h / 2 + bob);
    ctx.rotate(pk.spin * 0.3);
    ctx.shadowBlur = 18;
    if(pk.type === 'heal'){
      ctx.fillStyle = '#6ef58c'; ctx.shadowColor = '#6ef58c';
      ctx.fillRect(-8, -3, 16, 6);
      ctx.fillRect(-3, -8, 6, 16);
    } else {
      ctx.fillStyle = '#ffd166'; ctx.shadowColor = '#ffd166';
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff3';
      ctx.stroke();
    }
    ctx.restore();
  }

  for(var j = 0; j < bullets.length; j++){
    ctx.fillStyle = bullets[j].color; ctx.shadowColor = bullets[j].color; ctx.shadowBlur = 14;
    ctx.fillRect(bullets[j].x, bullets[j].y, bullets[j].w, bullets[j].h);
  }

  for(var k = 0; k < enemies.length; k++){
    var e = enemies[k];
    var pulseSize = Math.sin(e.pulse) * 1.5;
    ctx.fillStyle = '#ff3df2'; ctx.shadowColor = '#ff3df2'; ctx.shadowBlur = 18;
    ctx.fillRect(e.x - pulseSize * 0.5, e.y - pulseSize * 0.5, e.w + pulseSize, e.h + pulseSize);
    ctx.strokeStyle = '#ffa8f7'; ctx.lineWidth = 2;
    ctx.strokeRect(e.x, e.y, e.w, e.h);
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = '#ff3df2';
    ctx.strokeRect(e.x - 4, e.y - 4, e.w + 8, e.h + 8);
    ctx.globalAlpha = 1;
  }

  for(var p = 0; p < particles.length; p++){
    var part = particles[p];
    ctx.globalAlpha = Math.max(0, part.life / part.maxLife);
    ctx.fillStyle = part.color; ctx.shadowColor = part.color; ctx.shadowBlur = 8;
    ctx.fillRect(part.x, part.y, part.size, part.size);
  }
  ctx.globalAlpha = 1;

  if(state === 'menu'){
    ctx.fillStyle = 'rgba(2,6,14,0.35)';
    ctx.fillRect(120,90,560,270);
    ctx.strokeStyle = '#00f5ff55';
    ctx.lineWidth = 2;
    ctx.strokeRect(120,90,560,270);
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#00f5ff'; ctx.shadowColor = '#00f5ff';
    ctx.font = 'bold 44px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Neon Chain Lab', 400, 165);
    ctx.font = '18px Arial'; ctx.fillStyle = '#ff3df2'; ctx.shadowColor = '#ff3df2';
    ctx.fillText('WASD / Arrows to move', 400, 225);
    ctx.fillText('Space to start and fire', 400, 255);
    ctx.fillText('Collect green heals and gold burst nodes', 400, 285);
    ctx.fillText('Reach ' + winScore + ' score to win', 400, 315);
    ctx.fillStyle = '#8aff00'; ctx.shadowColor = '#8aff00';
    ctx.font = 'bold 20px Arial';
    ctx.fillText('Press Space', 400, 350 + Math.sin(uiPulse * 2) * 4);
  }

  if(state === 'playing' || state === 'game_over' || state === 'win'){
    if(player.invuln > 0 && Math.floor(player.invuln * 12) % 2 === 0){
      ctx.globalAlpha = 0.35;
    }
    ctx.fillStyle = player.color; ctx.shadowColor = player.color; ctx.shadowBlur = 16;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.strokeStyle = '#8aff00'; ctx.lineWidth = 2; ctx.shadowColor = '#8aff00';
    ctx.strokeRect(player.x-2, player.y-2, player.w+4, player.h+4);
    ctx.globalAlpha = 1;

    ctx.beginPath();
    ctx.moveTo(player.x + player.w / 2, player.y + player.h / 2);
    ctx.lineTo(player.x + player.w / 2 + player.facingX * 16, player.y + player.h / 2 + player.facingY * 16);
    ctx.strokeStyle = '#00f5ff'; ctx.lineWidth = 2; ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 10; ctx.stroke();

    drawHud();
  }

  if(state === 'game_over' || state === 'win'){
    ctx.fillStyle = 'rgba(3,6,12,0.58)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'rgba(8,12,24,0.86)';
    ctx.fillRect(200,150,400,170);
    ctx.strokeStyle = state === 'win' ? '#8aff0088' : '#ff4d6d88';
    ctx.lineWidth = 2;
    ctx.strokeRect(200,150,400,170);
    ctx.fillStyle = state === 'win' ? '#8aff00' : '#ff4d6d';
    ctx.shadowColor = state === 'win' ? '#8aff00' : '#ff4d6d'; ctx.shadowBlur = 16;
    ctx.font = 'bold 34px Arial'; ctx.textAlign = 'center';
    ctx.fillText(resultText, 400, 200);
    ctx.font = '18px Arial';
    if(state === 'win') ctx.fillText('You survived the lab assault', 400, 235);
    if(state === 'game_over') ctx.fillText('Your chain core was shattered', 400, 235);
    ctx.fillStyle = '#d7f7ff'; ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 8;
    ctx.fillText('Final Score: ' + Math.floor(score), 400, 265);
    ctx.fillText('Press R to restart', 400, 295);
  }

  for(var f = 0; f < flashes.length; f++){
    var fl = flashes[f];
    ctx.globalAlpha = (fl.life / fl.maxLife) * fl.alpha;
    ctx.fillStyle = fl.color;
    ctx.fillRect(-cameraX, -cameraY, canvas.width, canvas.height);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function loop(t){
  var dt = (t - lastTime) / 1000; if(!lastTime) dt = 0; lastTime = t;
  update(dt); render(); requestAnimationFrame(loop);
}

resetGame(); requestAnimationFrame(loop);
};
</script>
</body>
</html>
