<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Relay Glyph Temple</title>
<style>
body { margin: 0; background: radial-gradient(circle at top, #0b1630 0%, #05060a 55%, #020308 100%); overflow: hidden; }
canvas { width: 800px; height: 500px; display: block; margin: 20px auto; background: #0a0f1f; box-shadow: 0 0 20px #0ff3, 0 0 50px #7c3aed33 inset; border: 1px solid #1f2d52; }
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 500;

var keys = {};
var justPressed = {};

document.addEventListener('keydown', function(e){
  if (!keys[e.key]) {
    justPressed[e.key] = true;
  }
  keys[e.key] = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Shift'].indexOf(e.key) >= 0) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', function(e){
  keys[e.key] = false;
});

var state = 'playing';
var gravity = 0.45;
var attempts = 1;
var frameCount = 0;
var message = 'Park the inactive body in the cyan aura. Swap leaves a ghost replay.';
var messageTimer = 0;

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function makeAvatar(name, element, color, x, y) {
  return {
    name: name,
    element: element,
    color: color,
    x: x,
    y: y,
    w: 24,
    h: 30,
    vx: 0,
    vy: 0,
    speed: 2.6,
    jump: 8.8,
    onGround: false,
    facing: 1,
    gravitySign: 1,
    exitReached: false
  };
}

var fire;
var water;
var activeAvatar;
var inactiveAvatar;
var platforms;
var hazards;
var exits;
var auraCrystal;
var auraDoor;
var echoSensor;
var echoDoor;
var gravityGlyph;
var ghostRecordBuffer = [];
var ghostReplay = null;
var particles = [];

function resetGame(keepAttempts) {
  if (!keepAttempts) {
    attempts += 1;
  }
  state = 'playing';
  frameCount = 0;
  messageTimer = 240;
  message = 'Goal chain: inactive body powers cyan bridge, ghost opens white gate, both reach exits.';

  fire = makeAvatar('Fire', 'fire', '#ff6b3d', 70, 390);
  water = makeAvatar('Water', 'water', '#47c6ff', 130, 390);
  activeAvatar = fire;
  inactiveAvatar = water;

  platforms = [
    { x: 0, y: 460, w: 800, h: 40, type: 'ground' },
    { x: 35, y: 420, w: 180, h: 14, type: 'ledge' },
    { x: 250, y: 370, w: 110, h: 12, type: 'ledge' },
    { x: 420, y: 325, w: 110, h: 12, type: 'ledge' },
    { x: 615, y: 370, w: 120, h: 12, type: 'ledge' },
    { x: 600, y: 250, w: 130, h: 12, type: 'ledge' },
    { x: 240, y: 250, w: 120, h: 12, type: 'ledge' },
    { x: 150, y: 180, w: 120, h: 12, type: 'ledge' },
    { x: 430, y: 180, w: 150, h: 12, type: 'ledge' }
  ];

  hazards = [
    { x: 215, y: 446, w: 90, h: 14, type: 'water' },
    { x: 505, y: 446, w: 95, h: 14, type: 'fire' },
    { x: 640, y: 236, w: 52, h: 14, type: 'water' },
    { x: 270, y: 236, w: 55, h: 14, type: 'fire' }
  ];

  exits = {
    fire: { x: 718, y: 220, w: 28, h: 30, element: 'fire' },
    water: { x: 665, y: 220, w: 28, h: 30, element: 'water' }
  };

  auraCrystal = { x: 92, y: 390, w: 54, h: 30, active: false };
  auraDoor = { x: 360, y: 332, w: 60, h: 38, open: false };
  echoSensor = { x: 458, y: 160, w: 34, h: 20, active: false };
  echoDoor = { x: 585, y: 210, w: 14, h: 115, openTimer: 0, open: false };
  gravityGlyph = { x: 470, y: 305, w: 34, h: 20, pulse: 0 };

  ghostRecordBuffer = [];
  ghostReplay = null;
  particles = [];
}

function setMessage(text, timer) {
  message = text;
  messageTimer = timer;
}

function spawnParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 2.2,
      vy: (Math.random() - 0.5) * 2.2,
      life: 20 + Math.random() * 25,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

function currentControlsLeft() {
  return keys['a'] || keys['A'] || keys['ArrowLeft'];
}

function currentControlsRight() {
  return keys['d'] || keys['D'] || keys['ArrowRight'];
}

function currentControlsJump() {
  return keys['w'] || keys['W'] || keys['ArrowUp'] || keys[' '];
}

function swapPressed() {
  return justPressed['q'] || justPressed['Q'] || justPressed['Shift'];
}

function restartPressed() {
  return justPressed['r'] || justPressed['R'];
}

function updateAvatarPhysics(av, controlled) {
  var move = 0;
  if (controlled && state === 'playing') {
    if (currentControlsLeft()) {
      move -= 1;
    }
    if (currentControlsRight()) {
      move += 1;
    }
    av.vx = move * av.speed;
    if (move !== 0) {
      av.facing = move;
    }
    if (currentControlsJump() && av.onGround) {
      av.vy = -av.jump * av.gravitySign;
      av.onGround = false;
      spawnParticles(av.x + av.w / 2, av.y + av.h / 2, av.color, 8);
    }
  } else {
    av.vx *= 0.75;
    if (Math.abs(av.vx) < 0.05) {
      av.vx = 0;
    }
  }

  av.vy += gravity * av.gravitySign;
  av.x += av.vx;
  resolveHorizontal(av);
  av.y += av.vy;
  av.onGround = false;
  resolveVertical(av);

  if (av.x < 0) { av.x = 0; av.vx = 0; }
  if (av.x + av.w > canvas.width) { av.x = canvas.width - av.w; av.vx = 0; }

  if (av.y > canvas.height + 80 || av.y + av.h < -80) {
    lose(av.name + ' fell out of the time mine.');
  }
}

function resolveHorizontal(av) {
  var solids = getSolidRects();
  for (var i = 0; i < solids.length; i++) {
    var p = solids[i];
    if (rectsOverlap(av, p)) {
      if (av.vx > 0) {
        av.x = p.x - av.w;
      } else if (av.vx < 0) {
        av.x = p.x + p.w;
      }
      av.vx = 0;
    }
  }
}

function resolveVertical(av) {
  var solids = getSolidRects();
  for (var i = 0; i < solids.length; i++) {
    var p = solids[i];
    if (rectsOverlap(av, p)) {
      if (av.gravitySign > 0) {
        if (av.vy > 0) {
          av.y = p.y - av.h;
          av.vy = 0;
          av.onGround = true;
        } else if (av.vy < 0) {
          av.y = p.y + p.h;
          av.vy = 0;
        }
      } else {
        if (av.vy < 0) {
          av.y = p.y + p.h;
          av.vy = 0;
          av.onGround = true;
        } else if (av.vy > 0) {
          av.y = p.y - av.h;
          av.vy = 0;
        }
      }
    }
  }
}

function getSolidRects() {
  var solids = platforms.slice();
  if (!auraDoor.open) {
    solids.push(auraDoor);
  }
  if (!echoDoor.open) {
    solids.push(echoDoor);
  }
  return solids;
}

function updateAura() {
  auraCrystal.active = rectsOverlap(inactiveAvatar, auraCrystal) && !rectsOverlap(activeAvatar, auraCrystal);
  auraDoor.open = auraCrystal.active;
}

function recordActiveFrame() {
  ghostRecordBuffer.push({
    x: activeAvatar.x,
    y: activeAvatar.y,
    vx: activeAvatar.vx,
    vy: activeAvatar.vy,
    gravitySign: activeAvatar.gravitySign,
    facing: activeAvatar.facing
  });
  if (ghostRecordBuffer.length > 180) {
    ghostRecordBuffer.shift();
  }
}

function doSwap() {
  if (state !== 'playing') {
    return;
  }
  if (ghostRecordBuffer.length > 8) {
    ghostReplay = {
      frames: ghostRecordBuffer.slice(),
      index: 0,
      x: ghostRecordBuffer[0].x,
      y: ghostRecordBuffer[0].y,
      w: 24,
      h: 30,
      active: true,
      sensorHit: false,
      gravitySign: ghostRecordBuffer[0].gravitySign,
      trail: []
    };
    setMessage('Swap created a ghost replay. It can trigger the white echo sensor.', 180);
  }
  ghostRecordBuffer = [];
  var temp = activeAvatar;
  activeAvatar = inactiveAvatar;
  inactiveAvatar = temp;
  spawnParticles(activeAvatar.x + activeAvatar.w / 2, activeAvatar.y + activeAvatar.h / 2, '#ffffff', 10);
}

function updateGhost() {
  echoSensor.active = false;
  if (!ghostReplay || !ghostReplay.active) {
    return;
  }
  if (ghostReplay.index >= ghostReplay.frames.length) {
    ghostReplay.active = false;
    return;
  }
  var frame = ghostReplay.frames[ghostReplay.index];
  ghostReplay.x = frame.x;
  ghostReplay.y = frame.y;
  ghostReplay.gravitySign = frame.gravitySign;
  ghostReplay.trail.push({ x: frame.x, y: frame.y, life: 18 });
  if (ghostReplay.trail.length > 12) {
    ghostReplay.trail.shift();
  }
  for (var i = 0; i < ghostReplay.trail.length; i++) {
    ghostReplay.trail[i].life -= 1;
  }
  ghostReplay.trail = ghostReplay.trail.filter(function(t){ return t.life > 0; });

  if (rectsOverlap(ghostReplay, echoSensor)) {
    echoSensor.active = true;
    echoDoor.openTimer = 50;
    if (!ghostReplay.sensorHit) {
      ghostReplay.sensorHit = true;
      setMessage('Past movement opened the white gate for a moment.', 120);
      spawnParticles(echoSensor.x + echoSensor.w / 2, echoSensor.y + echoSensor.h / 2, '#dffaff', 12);
    }
  }
  ghostReplay.index += 1;
}

function updateEchoDoor() {
  if (echoDoor.openTimer > 0) {
    echoDoor.openTimer -= 1;
  }
  echoDoor.open = echoDoor.openTimer > 0;
}

function updateGravityGlyphForActive() {
  gravityGlyph.pulse += 0.08;
  if (rectsOverlap(activeAvatar, gravityGlyph)) {
    activeAvatar.gravitySign = -1;
  } else if (activeAvatar.gravitySign < 0 && activeAvatar.y + activeAvatar.h >= 430) {
    activeAvatar.gravitySign = 1;
  }
}

function checkHazards(av) {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    if (rectsOverlap(av, h)) {
      if (h.type !== av.element) {
        lose(av.name + ' dissolved in ' + h.type + '.');
        return;
      }
    }
  }
}

function updateExits() {
  fire.exitReached = rectsOverlap(fire, exits.fire);
  water.exitReached = rectsOverlap(water, exits.water);
  if (fire.exitReached && water.exitReached) {
    state = 'win';
    setMessage('Both avatars escaped the sliced temple.', 9999);
  }
}

function lose(text) {
  if (state !== 'playing') {
    return;
  }
  state = 'game_over';
  setMessage(text + ' Press R to rewind.', 9999);
  spawnParticles(activeAvatar.x + activeAvatar.w / 2, activeAvatar.y + activeAvatar.h / 2, '#ff8899', 18);
}

function updateParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 1;
    p.vy += 0.03;
  }
  particles = particles.filter(function(p){ return p.life > 0; });
}

function update() {
  frameCount += 1;
  if (messageTimer > 0) {
    messageTimer -= 1;
  }

  if (restartPressed()) {
    resetGame(false);
  }

  if (state === 'playing') {
    if (swapPressed()) {
      doSwap();
    }

    updateGravityGlyphForActive();
    updateAvatarPhysics(activeAvatar, true);
    updateAvatarPhysics(inactiveAvatar, false);
    updateAura();
    recordActiveFrame();
    updateGhost();
    updateEchoDoor();
    checkHazards(fire);
    checkHazards(water);
    updateExits();
  } else {
    updateGhost();
    updateEchoDoor();
  }

  updateParticles();
  clearJustPressed();
}

function clearJustPressed() {
  justPressed = {};
}

function drawPlatform(p) {
  ctx.fillStyle = '#24314f';
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.fillStyle = '#3d527f';
  for (var i = 0; i < p.w; i += 16) {
    ctx.fillRect(p.x + i, p.y, 8, 3);
  }
}

function drawHazard(h) {
  var colorA = h.type === 'fire' ? '#ff6a3d' : '#3dbdff';
  var colorB = h.type === 'fire' ? '#ffb36b' : '#a7ecff';
  var grad = ctx.createLinearGradient(h.x, h.y, h.x, h.y + h.h);
  grad.addColorStop(0, colorB);
  grad.addColorStop(1, colorA);
  ctx.fillStyle = grad;
  ctx.fillRect(h.x, h.y, h.w, h.h);
  for (var i = 0; i < h.w; i += 10) {
    ctx.fillStyle = colorB;
    ctx.fillRect(h.x + i, h.y + 2 + Math.sin((frameCount + i) * 0.2) * 2, 6, 3);
  }
}

function drawDoor(door, color, openAmount) {
  ctx.save();
  ctx.globalAlpha = openAmount ? 0.18 : 0.9;
  ctx.fillStyle = color;
  ctx.fillRect(door.x, door.y, door.w, door.h);
  ctx.restore();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(door.x, door.y, door.w, door.h);
}

function drawAuraCrystal() {
  var cx = auraCrystal.x + auraCrystal.w / 2;
  var cy = auraCrystal.y + auraCrystal.h / 2;
  var pulse = 8 + Math.sin(frameCount * 0.12) * 5;
  ctx.strokeStyle = auraCrystal.active ? '#8ffff0' : '#3d7f8a';
  ctx.lineWidth = 2;
  ctx.strokeRect(auraCrystal.x, auraCrystal.y, auraCrystal.w, auraCrystal.h);
  ctx.beginPath();
  ctx.arc(cx, cy, 12 + pulse, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = auraCrystal.active ? '#8ffff0' : '#5cb8c4';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 12);
  ctx.lineTo(cx + 10, cy);
  ctx.lineTo(cx, cy + 12);
  ctx.lineTo(cx - 10, cy);
  ctx.closePath();
  ctx.fill();
}

function drawEchoSensor() {
  ctx.fillStyle = echoSensor.active ? '#e9ffff' : '#6e7d8d';
  ctx.fillRect(echoSensor.x, echoSensor.y, echoSensor.w, echoSensor.h);
  ctx.strokeStyle = '#ffffff';
  ctx.strokeRect(echoSensor.x, echoSensor.y, echoSensor.w, echoSensor.h);
}

function drawGravityGlyph() {
  var pulse = 0.5 + 0.5 * Math.sin(gravityGlyph.pulse);
  ctx.strokeStyle = '#b88cff';
  ctx.lineWidth = 2;
  ctx.strokeRect(gravityGlyph.x, gravityGlyph.y, gravityGlyph.w, gravityGlyph.h);
  ctx.fillStyle = 'rgba(184,140,255,' + (0.2 + pulse * 0.25) + ')';
  ctx.fillRect(gravityGlyph.x, gravityGlyph.y, gravityGlyph.w, gravityGlyph.h);
  ctx.fillStyle = '#d9c3ff';
  ctx.beginPath();
  ctx.moveTo(gravityGlyph.x + 17, gravityGlyph.y + 4);
  ctx.lineTo(gravityGlyph.x + 28, gravityGlyph.y + 16);
  ctx.lineTo(gravityGlyph.x + 21, gravityGlyph.y + 16);
  ctx.lineTo(gravityGlyph.x + 21, gravityGlyph.y + 24);
  ctx.lineTo(gravityGlyph.x + 13, gravityGlyph.y + 24);
  ctx.lineTo(gravityGlyph.x + 13, gravityGlyph.y + 16);
  ctx.lineTo(gravityGlyph.x + 6, gravityGlyph.y + 16);
  ctx.closePath();
  ctx.fill();
}

function drawExit(ex) {
  ctx.strokeStyle = ex.element === 'fire' ? '#ff8a66' : '#7edcff';
  ctx.lineWidth = 2;
  ctx.strokeRect(ex.x, ex.y, ex.w, ex.h);
  ctx.fillStyle = ex.element === 'fire' ? 'rgba(255,106,61,0.18)' : 'rgba(71,198,255,0.18)';
  ctx.fillRect(ex.x, ex.y, ex.w, ex.h);
}

function drawAvatar(av, isActive) {
  ctx.save();
  var glow = isActive ? 14 : 6;
  ctx.shadowBlur = glow;
  ctx.shadowColor = av.color;
  ctx.globalAlpha = isActive ? 1 : 0.72;
  ctx.fillStyle = av.color;
  ctx.fillRect(av.x, av.y, av.w, av.h);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(av.x + 6, av.y + 8, 4, 4);
  ctx.fillRect(av.x + 14, av.y + 8, 4, 4);
  ctx.restore();

  if (av.gravitySign < 0) {
    ctx.strokeStyle = '#d8b8ff';
    ctx.beginPath();
    ctx.moveTo(av.x + av.w / 2, av.y - 8);
    ctx.lineTo(av.x + av.w / 2, av.y - 18);
    ctx.lineTo(av.x + av.w / 2 - 5, av.y - 13);
    ctx.moveTo(av.x + av.w / 2, av.y - 18);
    ctx.lineTo(av.x + av.w / 2 + 5, av.y - 13);
    ctx.stroke();
  }

  if (av.exitReached) {
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(av.x - 2, av.y - 2, av.w + 4, av.h + 4);
  }
}

function drawGhost() {
  if (!ghostReplay || !ghostReplay.active) {
    return;
  }
  for (var i = 0; i < ghostReplay.trail.length; i++) {
    var t = ghostReplay.trail[i];
    ctx.fillStyle = 'rgba(190,255,255,' + (t.life / 20 * 0.25) + ')';
    ctx.fillRect(t.x, t.y, 24, 30);
  }
  ctx.fillStyle = 'rgba(210,255,255,0.7)';
  ctx.fillRect(ghostReplay.x, ghostReplay.y, ghostReplay.w, ghostReplay.h);
  ctx.strokeStyle = '#ffffff';
  ctx.strokeRect(ghostReplay.x, ghostReplay.y, ghostReplay.w, ghostReplay.h);
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / 30);
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawBackground() {
  var grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0c1730');
  grad.addColorStop(1, '#06101d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (var i = 0; i < 18; i++) {
    var x = (i * 47 + frameCount * 0.15) % 860 - 30;
    ctx.strokeStyle = 'rgba(120,160,255,0.08)';
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x - 20, 500);
    ctx.stroke();
  }
}

function drawUI() {
  ctx.fillStyle = '#dfe9ff';
  ctx.font = '14px monospace';
  ctx.fillText('Active: ' + activeAvatar.name + '   Swap: Q/Shift   Move: A/D or Arrows   Jump: W/Up/Space   Restart: R', 14, 22);
  ctx.fillText('Attempts: ' + attempts, 14, 42);
  ctx.fillStyle = '#8ffff0';
  ctx.fillText('Cyan aura bridge opens only if the inactive avatar is parked inside.', 14, 62);
  ctx.fillStyle = '#f5fbff';
  ctx.fillText('White ghost sensor opens the tall gate only during replay.', 14, 80);
  ctx.fillStyle = '#d9c3ff';
  ctx.fillText('Purple glyph flips current gravity, and that state is recorded into the ghost.', 14, 98);

  if (messageTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(120, 8, 560, 28);
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText(message, 400, 27);
    ctx.textAlign = 'left';
  }

  if (state === 'game_over') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffb0b0';
    ctx.font = '28px monospace';
    ctx.fillText('Temporal Collapse', 265, 210);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(message, 190, 245);
  }

  if (state === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.48)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#aefcff';
    ctx.font = '28px monospace';
    ctx.fillText('Relay Complete', 285, 210);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('You used an abandoned body and a replayed past to solve one room. Press R to replay.', 112, 245);
  }
}

function draw() {
  drawBackground();

  for (var i = 0; i < platforms.length; i++) {
    drawPlatform(platforms[i]);
  }
  for (var j = 0; j < hazards.length; j++) {
    drawHazard(hazards[j]);
  }

  drawAuraCrystal();
  drawGravityGlyph();
  drawEchoSensor();
  drawDoor(auraDoor, '#8ffff0', auraDoor.open);
  drawDoor(echoDoor, '#f2ffff', echoDoor.open);
  drawExit(exits.fire);
  drawExit(exits.water);
  drawGhost();
  drawAvatar(fire, activeAvatar === fire);
  drawAvatar(water, activeAvatar === water);
  drawParticles();
  drawUI();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

resetGame(true);
gameLoop();
};
</script>
</body>
</html>
