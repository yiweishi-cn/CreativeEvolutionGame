<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Neon Ragdoll Rush</title>
<style>
body { margin: 0; background: radial-gradient(circle at top, #0b1020, #05060a 60%); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { width: 800px; height: 500px; display: block; background: linear-gradient(#0a0f1f, #05060a); box-shadow: 0 0 24px #00f0ff33, 0 0 60px #ff4fd822; border: 1px solid #1c2948; }
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 500;

  var keys = {};
  var state = 'menu';
  var score = 0;
  var player;
  var ground = 430;
  var enemies = [];
  var projectiles = [];
  var particles = [];
  var trails = [];
  var spawnTimer = 0;
  var spawnDelay = 80;
  var gameTime = 0;
  var kills = 0;
  var lives = 3;
  var maxLives = 3;
  var winScore = 120;
  var attackCooldown = 0;
  var flashTimer = 0;
  var shakeTimer = 0;
  var shakePower = 0;
  var titlePulse = 0;

  function resetGame(){
    state = 'menu';
    score = 0;
    gameTime = 0;
    kills = 0;
    lives = maxLives;
    enemies = [];
    projectiles = [];
    particles = [];
    trails = [];
    spawnTimer = 0;
    spawnDelay = 80;
    attackCooldown = 0;
    flashTimer = 0;
    shakeTimer = 0;
    shakePower = 0;
    player = {
      x: 390, y: 380, w: 24, h: 36,
      vx: 0, vy: 0, speed: 4, jump: -11,
      onGround: false, color: '#00f0ff',
      facing: 1, hurtTimer: 0, attackTimer: 0
    };
  }

  function rectsOverlap(a, b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
  }

  function addParticles(x, y, color, amount){
    var i;
    for (i = 0; i < amount; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5 - 1,
        life: 20 + Math.random() * 20,
        maxLife: 40,
        size: 2 + Math.random() * 3,
        color: color
      });
    }
  }

  function addTrail(x, y, color, size, life){
    trails.push({
      x: x,
      y: y,
      size: size,
      life: life,
      maxLife: life,
      color: color
    });
  }

  function impactShake(power, time){
    shakePower = Math.max(shakePower, power);
    shakeTimer = Math.max(shakeTimer, time);
  }

  function spawnEnemy(){
    var side = Math.random() < 0.5 ? 'left' : 'right';
    var speedBoost = Math.min(2.5, gameTime / 1200);
    var enemy = {
      x: side === 'left' ? -30 : canvas.width + 30,
      y: ground - 32,
      w: 26 + Math.random() * 10,
      h: 32,
      vx: side === 'left' ? 1.5 + Math.random() * 1.6 + speedBoost : -(1.5 + Math.random() * 1.6 + speedBoost),
      vy: 0,
      color: Math.random() < 0.5 ? '#ff4fd8' : '#ff9f1c',
      bob: Math.random() * Math.PI * 2,
      hp: 1,
      damageCooldown: 0
    };
    enemies.push(enemy);
  }

  function fireProjectile(){
    if (attackCooldown > 0 || state !== 'playing') return;
    attackCooldown = 18;
    player.attackTimer = 8;
    var px = player.facing === 1 ? player.x + player.w + 4 : player.x - 14;
    var py = player.y + 14;
    projectiles.push({
      x: px,
      y: py,
      w: 14,
      h: 8,
      vx: player.facing * 8,
      color: '#7df9ff'
    });
    addParticles(px, py, '#7df9ff', 8);
    addTrail(px, py, '#7df9ff', 12, 10);
  }

  window.addEventListener('keydown', function(e){
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ') keys.space = true;
    if (e.key.toLowerCase() === 'r') resetGame();
    if (state === 'menu' && (e.key === ' ' || e.key === 'Enter')) state = 'playing';
    else if (state === 'game_over' && (e.key === ' ' || e.key === 'Enter')) resetGame();
    else if (state === 'win' && (e.key === ' ' || e.key === 'Enter')) resetGame();
  });

  window.addEventListener('keyup', function(e){
    keys[e.key.toLowerCase()] = false;
    if (e.key === ' ') keys.space = false;
  });

  function updatePlayer(){
    if (keys.a || keys.arrowleft) {
      player.vx = -player.speed;
      player.facing = -1;
    } else if (keys.d || keys.arrowright) {
      player.vx = player.speed;
      player.facing = 1;
    } else {
      player.vx *= 0.8;
    }

    if ((keys.w || keys.arrowup) && player.onGround) {
      player.vy = player.jump;
      player.onGround = false;
      addParticles(player.x + player.w / 2, player.y + player.h, '#00f0ff', 6);
    }

    if (keys.s || keys.arrowdown) {
      player.vx *= 0.92;
    }

    if (keys.space) {
      fireProjectile();
      score += 0.01;
    }

    player.vy += 0.5;
    player.x += player.vx;
    player.y += player.vy;

    if (Math.abs(player.vx) > 0.4 || !player.onGround) {
      addTrail(player.x + player.w / 2, player.y + player.h / 2, player.hurtTimer > 0 ? '#ffffff' : '#00f0ff', 16, 12);
    }

    if (player.y + player.h >= ground) {
      if (!player.onGround && player.vy > 1) {
        addParticles(player.x + player.w / 2, ground, '#00f0ff', 5);
      }
      player.y = ground - player.h;
      player.vy = 0;
      player.onGround = true;
    }

    if (player.x < 0) player.x = 0;
    if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

    if (player.y > canvas.height + 80) state = 'game_over';

    if (player.hurtTimer > 0) player.hurtTimer--;
    if (player.attackTimer > 0) player.attackTimer--;
    if (attackCooldown > 0) attackCooldown--;
  }

  function updateEnemies(){
    var i;
    for (i = enemies.length - 1; i >= 0; i--) {
      var enemy = enemies[i];
      enemy.x += enemy.vx;
      enemy.bob += 0.08;
      if (enemy.damageCooldown > 0) enemy.damageCooldown--;
      addTrail(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.color, 12, 8);

      if (enemy.x < -80 || enemy.x > canvas.width + 80) {
        enemies.splice(i, 1);
      }
    }
  }

  function updateProjectiles(){
    var i;
    for (i = projectiles.length - 1; i >= 0; i--) {
      var p = projectiles[i];
      p.x += p.vx;
      addTrail(p.x + p.w / 2, p.y + p.h / 2, p.color, 10, 8);
      if (p.x < -30 || p.x > canvas.width + 30) {
        projectiles.splice(i, 1);
      }
    }
  }

  function updateParticles(){
    var i;
    for (i = particles.length - 1; i >= 0; i--) {
      var part = particles[i];
      part.x += part.vx;
      part.y += part.vy;
      part.vy += 0.08;
      part.life--;
      if (part.life <= 0) particles.splice(i, 1);
    }
  }

  function updateTrails(){
    var i;
    for (i = trails.length - 1; i >= 0; i--) {
      trails[i].life--;
      if (trails[i].life <= 0) trails.splice(i, 1);
    }
  }

  function handleCollisions(){
    var i;
    var j;

    for (i = projectiles.length - 1; i >= 0; i--) {
      for (j = enemies.length - 1; j >= 0; j--) {
        if (rectsOverlap(projectiles[i], enemies[j])) {
          addParticles(enemies[j].x + enemies[j].w / 2, enemies[j].y + enemies[j].h / 2, enemies[j].color, 12);
          addParticles(enemies[j].x + enemies[j].w / 2, enemies[j].y + enemies[j].h / 2, '#ffffff', 6);
          enemies.splice(j, 1);
          projectiles.splice(i, 1);
          score += 10;
          kills += 1;
          flashTimer = 4;
          impactShake(4, 8);
          break;
        }
      }
    }

    var playerBox = { x: player.x, y: player.y, w: player.w, h: player.h };
    for (i = enemies.length - 1; i >= 0; i--) {
      if (rectsOverlap(playerBox, enemies[i]) && player.hurtTimer <= 0) {
        lives -= 1;
        player.hurtTimer = 45;
        player.vx = enemies[i].vx > 0 ? 5 : -5;
        player.vy = -6;
        addParticles(player.x + player.w / 2, player.y + player.h / 2, '#ffffff', 10);
        addParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff4fd8', 8);
        impactShake(6, 12);
        flashTimer = 5;
        enemies.splice(i, 1);
        if (lives <= 0) {
          state = 'game_over';
          return;
        }
      }
    }
  }

  function updateSpawning(){
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnDelay = Math.max(28, 80 - Math.floor(gameTime / 180));
      spawnTimer = spawnDelay + Math.floor(Math.random() * 20);
    }
  }

  function update(){
    titlePulse += 0.05;

    if (state !== 'playing') {
      updateParticles();
      updateTrails();
      if (flashTimer > 0) flashTimer--;
      if (shakeTimer > 0) {
        shakeTimer--;
        shakePower *= 0.88;
      }
      return;
    }

    gameTime++;
    updatePlayer();
    updateEnemies();
    updateProjectiles();
    updateParticles();
    updateTrails();
    updateSpawning();
    handleCollisions();

    score += 0.03;

    if (score >= winScore) {
      state = 'win';
      addParticles(player.x + player.w / 2, player.y, '#00f0ff', 24);
      addParticles(player.x + player.w / 2, player.y, '#ff4fd8', 24);
      impactShake(5, 14);
      flashTimer = 8;
    }

    if (flashTimer > 0) flashTimer--;
    if (shakeTimer > 0) {
      shakeTimer--;
      shakePower *= 0.88;
    }
  }

  function drawPlayer(){
    var cx = player.x + player.w / 2;
    var armSwing = player.attackTimer > 0 ? player.facing * 14 : Math.sin(Date.now() * 0.02) * 6;
    ctx.strokeStyle = player.hurtTimer > 0 && player.hurtTimer % 6 < 3 ? '#ffffff' : player.color;
    ctx.fillStyle = ctx.strokeStyle;
    ctx.lineWidth = 3;
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur = 12;

    ctx.beginPath();
    ctx.arc(cx, player.y - 8, 10, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx, player.y + 4);
    ctx.lineTo(cx, player.y + 28);
    ctx.moveTo(cx, player.y + 10);
    ctx.lineTo(cx - 14, player.y + 18);
    ctx.lineTo(cx - 22 + armSwing, player.y + 12);
    ctx.moveTo(cx, player.y + 10);
    ctx.lineTo(cx + 14, player.y + 18);
    ctx.lineTo(cx + 22 + armSwing, player.y + 12);
    ctx.moveTo(cx, player.y + 28);
    ctx.lineTo(cx - 10, player.y + 42);
    ctx.moveTo(cx, player.y + 28);
    ctx.lineTo(cx + 10, player.y + 42);
    ctx.stroke();
  }

  function drawEnemies(){
    var i;
    for (i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      var bobY = Math.sin(e.bob) * 3;
      ctx.shadowColor = e.color;
      ctx.shadowBlur = 14;
      ctx.fillStyle = e.color;
      ctx.strokeStyle = '#ffffff22';
      ctx.lineWidth = 2;
      ctx.fillRect(e.x, e.y + bobY, e.w, e.h);
      ctx.strokeRect(e.x, e.y + bobY, e.w, e.h);
      ctx.fillStyle = '#05060a';
      ctx.fillRect(e.x + 5, e.y + 9 + bobY, 4, 4);
      ctx.fillRect(e.x + e.w - 9, e.y + 9 + bobY, 4, 4);
    }
  }

  function drawProjectiles(){
    var i;
    for (i = 0; i < projectiles.length; i++) {
      var p = projectiles[i];
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.5;
      ctx.fillRect(p.x + 2, p.y + 2, p.w - 4, p.h - 4);
      ctx.globalAlpha = 1;
    }
  }

  function drawParticles(){
    var i;
    for (i = 0; i < particles.length; i++) {
      var part = particles[i];
      ctx.shadowColor = part.color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = part.color;
      ctx.globalAlpha = Math.max(0, part.life / part.maxLife);
      ctx.fillRect(part.x, part.y, part.size, part.size);
      ctx.globalAlpha = 1;
    }
  }

  function drawTrails(){
    var i;
    for (i = 0; i < trails.length; i++) {
      var t = trails[i];
      var alpha = t.life / t.maxLife;
      ctx.globalAlpha = alpha * 0.35;
      ctx.shadowColor = t.color;
      ctx.shadowBlur = 14;
      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.size * alpha * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawBackground(){
    var i;
    var j;
    ctx.shadowBlur = 0;

    for (i = 0; i < 30; i++) {
      var sx = (i * 29 + gameTime * 0.2) % canvas.width;
      var sy = 40 + (i * 13) % 220;
      ctx.fillStyle = '#0ff2';
      ctx.fillRect(sx, sy, 2, 2);
    }

    ctx.strokeStyle = '#0ff1';
    ctx.lineWidth = 1;
    for (j = 0; j < 8; j++) {
      var gy = 70 + j * 34;
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(canvas.width, gy);
      ctx.stroke();
    }

    for (j = 0; j < 10; j++) {
      var gx = (j * 90 + (gameTime * 0.15)) % (canvas.width + 90);
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx - 40, ground);
      ctx.stroke();
    }

    ctx.fillStyle = '#11182a';
    ctx.fillRect(0, ground, canvas.width, canvas.height - ground);

    ctx.fillStyle = '#0a1220';
    for (i = 0; i < canvas.width; i += 40) {
      ctx.fillRect(i, ground + 12, 24, 40);
    }

    ctx.shadowColor = '#ff9f1c';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff9f1c';
    ctx.fillRect(0, ground, canvas.width, 4);
    ctx.shadowBlur = 0;
  }

  function drawPanel(x, y, w, h){
    ctx.fillStyle = '#08111dcc';
    ctx.strokeStyle = '#1be7ff55';
    ctx.lineWidth = 2;
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);
  }

  function drawUI(){
    var i;
    ctx.shadowBlur = 0;

    drawPanel(14, 14, 190, 104);
    ctx.fillStyle = '#d8f6ff';
    ctx.font = '20px monospace';
    ctx.fillText('Score: ' + Math.floor(score), 26, 38);
    ctx.fillText('Kills: ' + kills, 26, 64);
    ctx.fillText('Goal: ' + winScore, 26, 90);

    ctx.fillStyle = '#9fdcff';
    ctx.font = '14px monospace';
    ctx.fillText('Lives', 640, 52);
    for (i = 0; i < maxLives; i++) {
      ctx.shadowColor = i < lives ? '#ff4fd8' : '#22334d';
      ctx.shadowBlur = i < lives ? 10 : 0;
      ctx.fillStyle = i < lives ? '#ff4fd8' : '#1a2638';
      ctx.fillRect(690 + i * 28, 38, 18, 18);
      ctx.fillStyle = i < lives ? '#ffffffaa' : '#00000000';
      if (i < lives) ctx.fillRect(694 + i * 28, 42, 10, 4);
    }

    drawPanel(560, 14, 226, 52);
    ctx.fillStyle = '#d8f6ff';
    ctx.font = '14px monospace';
    ctx.fillText('Progress', 574, 33);
    ctx.fillStyle = '#10192b';
    ctx.fillRect(574, 42, 198, 12);
    var progress = Math.min(198, score / winScore * 198);
    var grad = ctx.createLinearGradient(574, 0, 772, 0);
    grad.addColorStop(0, '#00f0ff');
    grad.addColorStop(1, '#ff4fd8');
    ctx.fillStyle = grad;
    ctx.fillRect(574, 42, progress, 12);
    ctx.strokeStyle = '#d8f6ff';
    ctx.strokeRect(574, 42, 198, 12);

    if (state === 'menu') {
      ctx.fillStyle = '#05060acc';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawPanel(150, 110, 500, 230);
      ctx.shadowColor = '#00f0ff';
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#00f0ff';
      ctx.font = '36px monospace';
      ctx.fillText('NEON RAGDOLL RUSH', 205, 178 + Math.sin(titlePulse) * 2);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff4fd8';
      ctx.font = '18px monospace';
      ctx.fillText('Move: WASD / Arrows   Jump: W / Up   Fire: Space', 168, 230);
      ctx.fillText('Survive, shoot drones, and reach 120 score to win', 170, 260);
      ctx.fillStyle = Math.sin(titlePulse * 2) > 0 ? '#d8f6ff' : '#7df9ff';
      ctx.fillText('Press Space or Enter to Start   Press R to Reset', 170, 300);
    }

    if (state === 'game_over') {
      ctx.fillStyle = '#05060acc';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawPanel(240, 140, 320, 180);
      ctx.shadowColor = '#ff4fd8';
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#ff4fd8';
      ctx.font = '36px monospace';
      ctx.fillText('GAME OVER', 286, 190);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#d8f6ff';
      ctx.font = '20px monospace';
      ctx.fillText('Final Score: ' + Math.floor(score), 290, 235);
      ctx.fillText('Kills: ' + kills, 340, 265);
      ctx.fillStyle = '#7df9ff';
      ctx.fillText('Press R or Enter', 305, 295);
    }

    if (state === 'win') {
      ctx.fillStyle = '#05060acc';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawPanel(240, 140, 320, 180);
      ctx.shadowColor = '#00f0ff';
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#00f0ff';
      ctx.font = '36px monospace';
      ctx.fillText('YOU WIN', 305, 190);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#d8f6ff';
      ctx.font = '20px monospace';
      ctx.fillText('Final Score: ' + Math.floor(score), 290, 235);
      ctx.fillText('Drones Defeated: ' + kills, 275, 265);
      ctx.fillStyle = '#7df9ff';
      ctx.fillText('Press R or Enter', 305, 295);
    }
  }

  function render(){
    var shakeX = 0;
    var shakeY = 0;
    if (shakeTimer > 0) {
      shakeX = (Math.random() - 0.5) * shakePower;
      shakeY = (Math.random() - 0.5) * shakePower;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBackground();
    drawTrails();
    drawParticles();
    drawEnemies();
    drawProjectiles();
    if (state === 'playing' || state === 'menu' || state === 'win' || state === 'game_over') drawPlayer();
    drawUI();

    if (flashTimer > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    ctx.restore();
  }

  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }

  resetGame();
  loop();
};
</script>
</body>
</html>
