<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Neon Chain Lab</title>
<style>
body { margin: 0; background: #05060a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
canvas { width: 800px; height: 500px; display: block; background: linear-gradient(#080b12, #030408); box-shadow: 0 0 24px #00f0ff33, inset 0 0 30px #ff00aa11; border: 1px solid #1d2a3a; }
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 500;

  var keys = {};
  var state = 'menu';
  var score = 0;
  var lastTime = 0;
  var player;
  var stars = [];
  var enemies = [];
  var orbs = [];
  var pulses = [];
  var particles = [];
  var spawnTimer = 0;
  var orbTimer = 0;
  var pulseCooldown = 0;
  var survivalTime = 0;
  var targetScore = 250;
  var lives = 3;
  var invulnerable = 0;
  var wave = 1;
  var messageTimer = 0;
  var messageText = '';

  function makeStars(){
    stars = [];
    for (var i = 0; i < 60; i++) {
      stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: 1 + Math.random() * 2 });
    }
  }

  function resetGame(){
    score = 0;
    survivalTime = 0;
    spawnTimer = 0;
    orbTimer = 1.2;
    pulseCooldown = 0;
    lives = 3;
    invulnerable = 0;
    wave = 1;
    messageTimer = 0;
    messageText = '';
    enemies = [];
    orbs = [];
    pulses = [];
    particles = [];
    player = {
      x: 400,
      y: 250,
      w: 18,
      h: 18,
      speed: 230,
      color: '#00f0ff',
      radius: 11,
      facingX: 1,
      facingY: 0,
      chargeGlow: 0
    };
    makeStars();
  }

  function showMessage(text){
    messageText = text;
    messageTimer = 1.2;
  }

  function spawnEnemy(){
    var side = Math.floor(Math.random() * 4);
    var x = 0;
    var y = 0;
    if (side === 0) {
      x = -20;
      y = Math.random() * canvas.height;
    } else if (side === 1) {
      x = canvas.width + 20;
      y = Math.random() * canvas.height;
    } else if (side === 2) {
      x = Math.random() * canvas.width;
      y = -20;
    } else {
      x = Math.random() * canvas.width;
      y = canvas.height + 20;
    }

    var typeRoll = Math.random();
    var enemy = {
      x: x,
      y: y,
      vx: 0,
      vy: 0,
      radius: 12,
      speed: 70 + Math.random() * 40 + wave * 10,
      color: '#ff4fd8',
      type: 'chaser',
      spin: Math.random() * Math.PI * 2,
      hp: 1,
      scoreValue: 10
    };

    if (typeRoll > 0.68) {
      enemy.type = 'runner';
      enemy.radius = 10;
      enemy.speed = 110 + Math.random() * 40 + wave * 8;
      enemy.color = '#ff9f40';
      enemy.scoreValue = 14;
    }
    if (typeRoll > 0.88) {
      enemy.type = 'tank';
      enemy.radius = 16;
      enemy.speed = 55 + wave * 6;
      enemy.color = '#b86cff';
      enemy.hp = 2;
      enemy.scoreValue = 22;
    }

    enemies.push(enemy);
  }

  function spawnOrb(){
    var margin = 45;
    orbs.push({
      x: margin + Math.random() * (canvas.width - margin * 2),
      y: margin + Math.random() * (canvas.height - margin * 2),
      radius: 8,
      pulse: Math.random() * Math.PI * 2,
      value: 25
    });
  }

  function emitParticles(x, y, color, count){
    for (var i = 0; i < count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: -80 + Math.random() * 160,
        vy: -80 + Math.random() * 160,
        life: 0.5 + Math.random() * 0.4,
        maxLife: 0.5 + Math.random() * 0.4,
        color: color
      });
    }
  }

  function circleHit(ax, ay, ar, bx, by, br){
    var dx = ax - bx;
    var dy = ay - by;
    var rr = ar + br;
    return dx * dx + dy * dy <= rr * rr;
  }

  window.addEventListener('keydown', function(e){
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ') {
      e.preventDefault();
      if (state === 'menu') {
        resetGame();
        state = 'playing';
      } else if (state === 'game_over' || state === 'win') {
        resetGame();
        state = 'playing';
      }
    }
    if (e.key.toLowerCase() === 'r') {
      resetGame();
      state = 'menu';
    }
  });

  window.addEventListener('keyup', function(e){
    keys[e.key.toLowerCase()] = false;
  });

  function updatePlayer(dt){
    var dx = 0;
    var dy = 0;
    if (keys['w'] || keys['arrowup']) dy -= 1;
    if (keys['s'] || keys['arrowdown']) dy += 1;
    if (keys['a'] || keys['arrowleft']) dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;

    if (dx || dy) {
      var len = Math.sqrt(dx * dx + dy * dy) || 1;
      player.facingX = dx / len;
      player.facingY = dy / len;
      player.x += player.facingX * player.speed * dt;
      player.y += player.facingY * player.speed * dt;
      score += dt * 6;
      player.chargeGlow = Math.min(1, player.chargeGlow + dt * 2);
    } else {
      player.chargeGlow = Math.max(0, player.chargeGlow - dt * 1.5);
    }

    player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

    if (pulseCooldown > 0) pulseCooldown -= dt;
    if (invulnerable > 0) invulnerable -= dt;

    if (keys[' '] && pulseCooldown <= 0) {
      pulses.push({
        x: player.x,
        y: player.y,
        radius: 18,
        maxRadius: 90,
        speed: 260
      });
      pulseCooldown = 0.6;
      score = Math.max(0, score - 3);
      emitParticles(player.x, player.y, '#00f0ff', 10);
    }
  }

  function updateEnemies(dt){
    spawnTimer -= dt;
    var spawnRate = Math.max(0.35, 1.2 - wave * 0.08);
    if (spawnTimer <= 0) {
      spawnEnemy();
      if (wave > 3 && Math.random() < 0.25) spawnEnemy();
      spawnTimer = spawnRate;
    }

    for (var i = enemies.length - 1; i >= 0; i--) {
      var enemy = enemies[i];
      var dx = player.x - enemy.x;
      var dy = player.y - enemy.y;
      var len = Math.sqrt(dx * dx + dy * dy) || 1;

      if (enemy.type === 'runner') {
        enemy.vx = dx / len * enemy.speed;
        enemy.vy = dy / len * enemy.speed;
      } else if (enemy.type === 'tank') {
        enemy.vx += dx / len * enemy.speed * dt * 2;
        enemy.vy += dy / len * enemy.speed * dt * 2;
        enemy.vx *= 0.98;
        enemy.vy *= 0.98;
      } else {
        enemy.vx = dx / len * enemy.speed;
        enemy.vy = dy / len * enemy.speed;
      }

      enemy.x += enemy.vx * dt;
      enemy.y += enemy.vy * dt;
      enemy.spin += dt * 4;

      if (circleHit(player.x, player.y, player.radius, enemy.x, enemy.y, enemy.radius)) {
        if (invulnerable <= 0) {
          lives -= 1;
          invulnerable = 1.2;
          emitParticles(player.x, player.y, '#ff4fd8', 16);
          enemies.splice(i, 1);
          showMessage('Core hit!');
          if (lives <= 0) {
            state = 'game_over';
          }
          continue;
        }
      }
    }
  }

  function updatePulses(dt){
    for (var i = pulses.length - 1; i >= 0; i--) {
      var pulse = pulses[i];
      pulse.radius += pulse.speed * dt;

      for (var j = enemies.length - 1; j >= 0; j--) {
        var enemy = enemies[j];
        if (circleHit(pulse.x, pulse.y, pulse.radius, enemy.x, enemy.y, enemy.radius)) {
          enemy.hp -= 1;
          emitParticles(enemy.x, enemy.y, enemy.color, 8);
          if (enemy.hp <= 0) {
            score += enemy.scoreValue;
            enemies.splice(j, 1);
          }
        }
      }

      if (pulse.radius >= pulse.maxRadius) {
        pulses.splice(i, 1);
      }
    }
  }

  function updateOrbs(dt){
    orbTimer -= dt;
    if (orbTimer <= 0) {
      if (orbs.length < 4) spawnOrb();
      orbTimer = 2.2;
    }

    for (var i = orbs.length - 1; i >= 0; i--) {
      var orb = orbs[i];
      orb.pulse += dt * 4;
      if (circleHit(player.x, player.y, player.radius, orb.x, orb.y, orb.radius + 2)) {
        score += orb.value;
        if (lives < 5 && Math.random() < 0.2) {
          lives += 1;
          showMessage('Life gained');
        } else {
          showMessage('Energy collected');
        }
        emitParticles(orb.x, orb.y, '#7aff9a', 12);
        orbs.splice(i, 1);
      }
    }
  }

  function updateParticles(dt){
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.98;
      p.vy *= 0.98;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function update(dt){
    if (dt > 0.05) dt = 0.05;
    if (state !== 'playing') return;

    survivalTime += dt;
    wave = 1 + Math.floor(survivalTime / 12);
    if (messageTimer > 0) messageTimer -= dt;

    updatePlayer(dt);
    updateEnemies(dt);
    updatePulses(dt);
    updateOrbs(dt);
    updateParticles(dt);

    score += dt * 4;

    if (score >= targetScore) {
      state = 'win';
      showMessage('Lab stabilized');
    }
  }

  function drawBackground(){
    ctx.fillStyle = '#05060a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      ctx.fillStyle = 'rgba(0,240,255,0.18)';
      ctx.fillRect(s.x, s.y, s.s, s.s);
    }
    ctx.strokeStyle = '#102030';
    ctx.lineWidth = 1;
    for (var x = 0; x <= canvas.width; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    for (var y = 0; y <= canvas.height; y += 40) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }
  }

  function drawPlayer(){
    if (!player) return;
    if (invulnerable > 0 && Math.floor(invulnerable * 12) % 2 === 0) return;
    ctx.shadowBlur = 18;
    ctx.shadowColor = player.color;
    ctx.fillStyle = '#00f0ff22';
    ctx.beginPath();
    ctx.arc(player.x, player.y, 20 + player.chargeGlow * 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x - player.w / 2, player.y - player.h / 2, player.w, player.h);
    ctx.strokeStyle = '#d8f6ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x + player.facingX * 14, player.y + player.facingY * 14);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawEnemies(){
    for (var i = 0; i < enemies.length; i++) {
      var enemy = enemies[i];
      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(enemy.spin);
      ctx.shadowBlur = 12;
      ctx.shadowColor = enemy.color;
      ctx.strokeStyle = enemy.color;
      ctx.lineWidth = 2;
      if (enemy.type === 'tank') {
        ctx.strokeRect(-enemy.radius, -enemy.radius, enemy.radius * 2, enemy.radius * 2);
        ctx.beginPath();
        ctx.arc(0, 0, enemy.radius * 0.45, 0, Math.PI * 2);
        ctx.stroke();
      } else if (enemy.type === 'runner') {
        ctx.beginPath();
        ctx.moveTo(0, -enemy.radius);
        ctx.lineTo(enemy.radius, enemy.radius);
        ctx.lineTo(-enemy.radius, enemy.radius);
        ctx.closePath();
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, enemy.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-enemy.radius, 0);
        ctx.lineTo(enemy.radius, 0);
        ctx.moveTo(0, -enemy.radius);
        ctx.lineTo(0, enemy.radius);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawOrbs(){
    for (var i = 0; i < orbs.length; i++) {
      var orb = orbs[i];
      var r = orb.radius + Math.sin(orb.pulse) * 2;
      ctx.shadowBlur = 14;
      ctx.shadowColor = '#7aff9a';
      ctx.fillStyle = '#7aff9a';
      ctx.beginPath();
      ctx.arc(orb.x, orb.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function drawPulses(){
    for (var i = 0; i < pulses.length; i++) {
      var pulse = pulses[i];
      var alpha = 1 - pulse.radius / pulse.maxRadius;
      ctx.strokeStyle = 'rgba(0,240,255,' + alpha.toFixed(3) + ')';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(pulse.x, pulse.y, pulse.radius, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawParticles(){
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var alpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color.replace(')', '');
      if (p.color.indexOf('rgba') === 0) {
        ctx.fillStyle = p.color;
      } else {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
      }
      ctx.fillRect(p.x, p.y, 3, 3);
      ctx.globalAlpha = 1;
    }
  }

  function drawHUD(){
    ctx.fillStyle = '#d8f6ff';
    ctx.font = '18px Arial';
    ctx.fillText('Score: ' + Math.floor(score), 20, 30);
    ctx.fillStyle = '#7aff9a';
    ctx.fillText('State: ' + state.toUpperCase(), 20, 55);
    ctx.fillStyle = '#ff8fbf';
    ctx.fillText('Lives: ' + lives, 20, 80);
    ctx.fillStyle = '#ffd36c';
    ctx.fillText('Wave: ' + wave, 20, 105);
    ctx.fillStyle = '#9edbff';
    ctx.fillText('Pulse: ' + (pulseCooldown <= 0 ? 'READY' : pulseCooldown.toFixed(1) + 's'), 20, 130);
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Goal: ' + targetScore, 20, 155);
    ctx.fillText('Move, collect green orbs, press Space to pulse', 20, 480);

    var barX = 590;
    var barY = 20;
    var barW = 180;
    var ratio = Math.min(1, score / targetScore);
    ctx.strokeStyle = '#3a4f66';
    ctx.strokeRect(barX, barY, barW, 16);
    ctx.fillStyle = '#00f0ff';
    ctx.fillRect(barX + 1, barY + 1, (barW - 2) * ratio, 14);
  }

  function drawOverlay(){
    ctx.textAlign = 'center';
    if (state === 'menu') {
      ctx.fillStyle = '#ffffff';
      ctx.font = '34px Arial';
      ctx.fillText('NEON CHAIN LAB', 400, 155);
      ctx.fillStyle = '#00f0ff';
      ctx.font = '20px Arial';
      ctx.fillText('Move: WASD / Arrows', 400, 215);
      ctx.fillText('Space: Start and fire pulse during play', 400, 245);
      ctx.fillText('Collect green energy. Avoid neon drones.', 400, 275);
      ctx.fillText('Reach 250 score to win. Lose all lives to fail.', 400, 305);
      ctx.fillText('R: Reset All State', 400, 335);
    }
    if (state === 'game_over') {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff4fd8';
      ctx.font = '34px Arial';
      ctx.fillText('CORE COLLAPSED', 400, 210);
      ctx.fillStyle = '#ffffff';
      ctx.font = '20px Arial';
      ctx.fillText('Final Score: ' + Math.floor(score), 400, 250);
      ctx.fillText('Press Space to Play Again', 400, 280);
      ctx.fillText('Press R for Full Reset', 400, 310);
    }
    if (state === 'win') {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#7aff9a';
      ctx.font = '34px Arial';
      ctx.fillText('EXPERIMENT STABILIZED', 400, 210);
      ctx.fillStyle = '#ffffff';
      ctx.font = '20px Arial';
      ctx.fillText('Final Score: ' + Math.floor(score), 400, 250);
      ctx.fillText('Press Space to Run Again', 400, 280);
      ctx.fillText('Press R for Full Reset', 400, 310);
    }
    if (messageTimer > 0 && state === 'playing') {
      ctx.fillStyle = '#ffffff';
      ctx.font = '24px Arial';
      ctx.fillText(messageText, 400, 60);
    }
    ctx.textAlign = 'left';
  }

  function render(){
    drawBackground();
    drawOrbs();
    drawPulses();
    drawEnemies();
    if (player) drawPlayer();
    drawParticles();
    drawHUD();
    drawOverlay();
  }

  function loop(timestamp){
    var dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    update(dt || 0);
    render();
    requestAnimationFrame(loop);
  }

  resetGame();
  state = 'menu';
  requestAnimationFrame(loop);
};
</script>
</body>
</html>
