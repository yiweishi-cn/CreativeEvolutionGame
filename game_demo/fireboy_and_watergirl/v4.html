<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Memory Relay Temple</title>
<style>
body{margin:0;background:#050816;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif;overflow:hidden;}
canvas{width:800px;height:500px;display:block;background:#0a1020;box-shadow:0 0 28px #00f0ff,0 0 70px rgba(0,240,255,0.18);border:1px solid #14314a;}
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

var keys = {};
var prevKeys = {};
var gravity = 0.45;
var groundY = 440;
var screenState = 'start';
var attempts = 3;
var timer = 0;
var score = 0;
var gems = 0;
var activeIndex = 0;
var tutorialStep = 0;
var messageQueue = [];
var particles = [];
var failReason = '';
var winPulse = 0;

var level = {
  platforms: [
    {x:0,y:440,w:800,h:60,type:'ground'},
    {x:95,y:360,w:140,h:14,type:'platform'},
    {x:280,y:330,w:120,h:14,type:'platform'},
    {x:470,y:292,w:120,h:14,type:'platform'},
    {x:615,y:250,w:110,h:14,type:'platform'},
    {x:470,y:205,w:120,h:14,type:'platform'}
  ],
  aura:{x:125,y:328,w:64,h:32},
  bridge:{x:235,y:307,w:95,h:14},
  floorSensor:{x:520,y:274,w:42,h:18},
  ceilingSensor:{x:642,y:70,w:46,h:14},
  gate:{x:714,y:150,w:18,h:100},
  gravityGlyph:{x:515,y:173,w:28,h:28},
  firePool:{x:330,y:430,w:90,h:10},
  waterPool:{x:560,y:430,w:90,h:10},
  fireExit:{x:738,y:214,w:28,h:36},
  waterExit:{x:700,y:214,w:28,h:36},
  gem:{x:535,y:145,r:8,taken:false}
};

function makePlayer(name, element, color, x, y){
  return {
    name:name,
    element:element,
    color:color,
    x:x,
    y:y,
    w:22,
    h:28,
    vx:0,
    vy:0,
    onGround:false,
    alive:true,
    finished:false,
    record:[],
    recordMax:240,
    touchedGlyphDuringRecord:false,
    recordDistance:0,
    facing:1
  };
}

var players = [];
var ghost = null;
var relay = {
  auraHeld:false,
  floorLatched:false,
  ceilingLatched:false,
  exitUnlocked:false
};

function resetPlayers(){
  players = [
    makePlayer('Fire','fire','#ff7a5c',110,410),
    makePlayer('Water','water','#63c8ff',170,410)
  ];
  activeIndex = 0;
  ghost = null;
}

function pushMessage(text, life, color){
  messageQueue.push({text:text,life:life || 150,color:color || '#dff'});
}

function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    particles.push({x:x,y:y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:25+Math.random()*20,color:color,size:2+Math.random()*3});
  }
}

function rectsOverlap(a,b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function pointInRect(px,py,r){
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function startRun(){
  timer = 0;
  score = 0;
  gems = 0;
  tutorialStep = 0;
  messageQueue = [];
  particles = [];
  failReason = '';
  winPulse = 0;
  level.gem.taken = false;
  relay.auraHeld = false;
  relay.floorLatched = false;
  relay.ceilingLatched = false;
  relay.exitUnlocked = false;
  resetPlayers();
  pushMessage('Park a body in the aura to power the bridge.', 220, '#9ff');
}

function restartRun(reason){
  if(reason){
    failReason = reason;
    attempts = Math.max(0, attempts - 1);
    screenState = 'lose';
    pushMessage(reason, 200, '#ff9b9b');
  } else {
    startRun();
    screenState = 'play';
  }
}

function beginGame(){
  attempts = 3;
  startRun();
  screenState = 'play';
}

function isPressed(key){
  return !!keys[key];
}

function wasJustPressed(key){
  return !!keys[key] && !prevKeys[key];
}

function currentPlayer(){
  return players[activeIndex];
}

function inactivePlayer(){
  return players[1 - activeIndex];
}

function addRecordFrame(p){
  if(!p.alive || p.finished){ return; }
  var last = p.record.length ? p.record[p.record.length - 1] : null;
  if(last){
    p.recordDistance += Math.abs(p.x - last.x) + Math.abs(p.y - last.y);
  }
  p.record.push({x:p.x,y:p.y,w:p.w,h:p.h});
  if(p.record.length > p.recordMax){
    p.record.shift();
  }
}

function createGhostFromPlayer(p){
  if(p.record.length < 18){
    pushMessage('Swap after moving more to create a useful echo.', 120, '#ffd98a');
    return null;
  }
  var path = [];
  for(var i=0;i<p.record.length;i++){
    path.push({x:p.record[i].x,y:p.record[i].y,w:p.record[i].w,h:p.record[i].h});
  }
  spawnParticles(p.x + p.w / 2, p.y + p.h / 2, p.touchedGlyphDuringRecord ? '#d8b6ff' : '#9cf6ff', 18);
  pushMessage(p.touchedGlyphDuringRecord ? 'Inverted memory recorded.' : 'Echo replay spawned.', 110, p.touchedGlyphDuringRecord ? '#d8b6ff' : '#9cf6ff');
  return {
    path:path,
    index:0,
    x:path[0].x,
    y:path[0].y,
    w:p.w,
    h:p.h,
    active:true,
    inverted:p.touchedGlyphDuringRecord,
    color:p.touchedGlyphDuringRecord ? '#d8b6ff' : '#8ff7ff',
    latchedFloor:false,
    latchedCeiling:false
  };
}

function swapAvatar(){
  var old = currentPlayer();
  if(!old.alive || old.finished){
    activeIndex = 1 - activeIndex;
    return;
  }
  var newGhost = createGhostFromPlayer(old);
  if(newGhost){
    ghost = newGhost;
  }
  old.record = [];
  old.recordDistance = 0;
  old.touchedGlyphDuringRecord = false;
  activeIndex = 1 - activeIndex;
  pushMessage('Control switched to ' + currentPlayer().name + '.', 80, '#dff');
}

function applyPlatformCollisions(p){
  p.onGround = false;
  var solids = [];
  for(var i=0;i<level.platforms.length;i++){
    solids.push(level.platforms[i]);
  }
  if(relay.auraHeld){
    solids.push(level.bridge);
  }

  p.x += p.vx;
  for(var j=0;j<solids.length;j++){
    var s = solids[j];
    if(rectsOverlap(p,s)){
      if(p.vx > 0){ p.x = s.x - p.w; }
      if(p.vx < 0){ p.x = s.x + s.w; }
      p.vx = 0;
    }
  }

  p.y += p.vy;
  for(var k=0;k<solids.length;k++){
    var t = solids[k];
    if(rectsOverlap(p,t)){
      if(p.vy > 0){
        p.y = t.y - p.h;
        p.vy = 0;
        p.onGround = true;
      } else if(p.vy < 0){
        p.y = t.y + t.h;
        p.vy = 0;
      }
    }
  }

  if(p.x < 0){ p.x = 0; p.vx = 0; }
  if(p.x + p.w > 800){ p.x = 800 - p.w; p.vx = 0; }
  if(p.y + p.h > 500){
    p.y = 500 - p.h;
    p.vy = 0;
    p.onGround = true;
  }
}

function updatePlayer(p, controlled){
  if(!p.alive || p.finished){ return; }
  if(controlled){
    var left = isPressed('a') || isPressed('ArrowLeft');
    var right = isPressed('d') || isPressed('ArrowRight');
    if(left && !right){ p.vx = -2.4; p.facing = -1; }
    else if(right && !left){ p.vx = 2.4; p.facing = 1; }
    else { p.vx *= 0.72; if(Math.abs(p.vx) < 0.05){ p.vx = 0; } }
    if((wasJustPressed('w') || wasJustPressed('ArrowUp') || wasJustPressed(' ')) && p.onGround){
      p.vy = -10.0;
      spawnParticles(p.x + p.w / 2, p.y + p.h, p.color, 8);
    }
  } else {
    p.vx *= 0.75;
    if(Math.abs(p.vx) < 0.05){ p.vx = 0; }
  }

  p.vy += gravity;
  if(p.vy > 9){ p.vy = 9; }
  applyPlatformCollisions(p);

  if(rectsOverlap(p, level.gravityGlyph)){
    p.touchedGlyphDuringRecord = true;
  }

  if(!level.gem.taken){
    var gemRect = {x:level.gem.x - level.gem.r,y:level.gem.y - level.gem.r,w:level.gem.r * 2,h:level.gem.r * 2};
    if(rectsOverlap(p, gemRect)){
      level.gem.taken = true;
      gems += 1;
      score += 150;
      spawnParticles(level.gem.x, level.gem.y, '#ffe778', 16);
      pushMessage('Memory gem collected.', 100, '#ffe778');
    }
  }
}

function updateGhost(){
  relay.floorLatched = false;
  relay.ceilingLatched = false;
  if(!ghost || !ghost.active){ return; }
  if(ghost.index >= ghost.path.length){
    ghost.active = false;
    return;
  }
  var node = ghost.path[ghost.index];
  ghost.x = node.x;
  ghost.y = ghost.inverted ? (500 - node.y - ghost.h - 60) : node.y;
  if(ghost.inverted){
    ghost.y = Math.max(0, ghost.y);
  }
  var gRect = {x:ghost.x,y:ghost.y,w:ghost.w,h:ghost.h};
  if(rectsOverlap(gRect, level.floorSensor)){
    relay.floorLatched = true;
    ghost.latchedFloor = true;
  }
  if(rectsOverlap(gRect, level.ceilingSensor)){
    relay.ceilingLatched = true;
    ghost.latchedCeiling = true;
  }
  ghost.index += 1;
}

function updateRelay(){
  var inactive = inactivePlayer();
  relay.auraHeld = inactive.alive && !inactive.finished && rectsOverlap(inactive, level.aura);
  relay.exitUnlocked = relay.floorLatched && relay.ceilingLatched;
}

function checkHazardsAndExits(){
  for(var i=0;i<players.length;i++){
    var p = players[i];
    if(!p.alive || p.finished){ continue; }
    if(rectsOverlap(p, level.firePool) && p.element !== 'fire'){
      p.alive = false;
      spawnParticles(p.x + p.w / 2, p.y + p.h / 2, '#ff6b6b', 20);
      restartRun('Water dissolved in fire pool. Press R to retry.');
      return;
    }
    if(rectsOverlap(p, level.waterPool) && p.element !== 'water'){
      p.alive = false;
      spawnParticles(p.x + p.w / 2, p.y + p.h / 2, '#63c8ff', 20);
      restartRun('Fire was quenched in water pool. Press R to retry.');
      return;
    }
    if(p.element === 'fire' && rectsOverlap(p, level.fireExit) && relay.exitUnlocked){
      p.finished = true;
      score += 300;
      spawnParticles(p.x + p.w / 2, p.y, '#ffb08f', 12);
      pushMessage('Fire reached the exit.', 80, '#ffb08f');
    }
    if(p.element === 'water' && rectsOverlap(p, level.waterExit) && relay.exitUnlocked){
      p.finished = true;
      score += 300;
      spawnParticles(p.x + p.w / 2, p.y, '#8fdcff', 12);
      pushMessage('Water reached the exit.', 80, '#8fdcff');
    }
  }
  if(players[0].finished && players[1].finished && relay.exitUnlocked){
    screenState = 'win';
    winPulse = 0;
    score += Math.max(0, 1000 - Math.floor(timer * 2));
    pushMessage('Temple relay solved.', 220, '#a8ffb8');
  }
}

function updateTutorial(){
  if(timer < 10 && tutorialStep === 0){
    tutorialStep = 1;
  }
  if(relay.auraHeld && tutorialStep < 2){
    tutorialStep = 2;
    pushMessage('Bridge powered: inactive body can hold circuits.', 140, '#9ff');
    score += 100;
  }
  if(ghost && ghost.active && tutorialStep < 3){
    tutorialStep = 3;
    pushMessage('Echo active: your movement history became a helper.', 150, '#9ff');
    score += 150;
  }
  if(ghost && ghost.inverted && tutorialStep < 4){
    tutorialStep = 4;
    pushMessage('Glyph imprinted gravity into memory, not the body.', 180, '#d8b6ff');
    score += 250;
  }
}

function updateMessages(){
  for(var i=messageQueue.length - 1;i>=0;i--){
    messageQueue[i].life -= 1;
    if(messageQueue[i].life <= 0){
      messageQueue.splice(i,1);
    }
  }
}

function updateParticles(){
  for(var i=particles.length - 1;i>=0;i--){
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.life -= 1;
    if(p.life <= 0){ particles.splice(i,1); }
  }
}

function drawBeam(x1,y1,x2,y2,active,color){
  ctx.save();
  ctx.strokeStyle = active ? color : 'rgba(80,100,120,0.25)';
  ctx.lineWidth = active ? 4 : 2;
  ctx.setLineDash(active ? [10,6] : [4,8]);
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
  ctx.restore();
}

function drawWorld(){
  var sky = ctx.createLinearGradient(0,0,0,500);
  sky.addColorStop(0,'#0b1228');
  sky.addColorStop(1,'#08101b');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,800,500);

  ctx.fillStyle = '#16243d';
  for(var i=0;i<level.platforms.length;i++){
    var pl = level.platforms[i];
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    ctx.strokeStyle = '#27486b';
    ctx.strokeRect(pl.x, pl.y, pl.w, pl.h);
  }

  if(relay.auraHeld){
    ctx.fillStyle = '#8ef6ff';
    ctx.fillRect(level.bridge.x, level.bridge.y, level.bridge.w, level.bridge.h);
    ctx.strokeStyle = '#d4ffff';
    ctx.strokeRect(level.bridge.x, level.bridge.y, level.bridge.w, level.bridge.h);
  } else {
    ctx.fillStyle = 'rgba(90,120,150,0.18)';
    ctx.fillRect(level.bridge.x, level.bridge.y, level.bridge.w, level.bridge.h);
    ctx.strokeStyle = 'rgba(130,170,190,0.35)';
    ctx.strokeRect(level.bridge.x, level.bridge.y, level.bridge.w, level.bridge.h);
  }

  var auraPulse = 0.5 + Math.sin(timer * 0.08) * 0.25;
  ctx.fillStyle = relay.auraHeld ? 'rgba(130,255,255,' + (0.45 + auraPulse * 0.4) + ')' : 'rgba(70,140,160,0.25)';
  ctx.fillRect(level.aura.x, level.aura.y, level.aura.w, level.aura.h);
  ctx.strokeStyle = relay.auraHeld ? '#b6ffff' : '#4e8aa0';
  ctx.strokeRect(level.aura.x, level.aura.y, level.aura.w, level.aura.h);

  ctx.fillStyle = '#6fdb9f';
  ctx.fillRect(level.floorSensor.x, level.floorSensor.y, level.floorSensor.w, level.floorSensor.h);
  if(relay.floorLatched){
    ctx.fillStyle = '#c7ffd9';
    ctx.fillRect(level.floorSensor.x + 8, level.floorSensor.y + 3, level.floorSensor.w - 16, level.floorSensor.h - 6);
  }

  ctx.fillStyle = '#b48cff';
  ctx.fillRect(level.ceilingSensor.x, level.ceilingSensor.y, level.ceilingSensor.w, level.ceilingSensor.h);
  if(relay.ceilingLatched){
    ctx.fillStyle = '#ead8ff';
    ctx.fillRect(level.ceilingSensor.x + 7, level.ceilingSensor.y + 2, level.ceilingSensor.w - 14, level.ceilingSensor.h - 4);
  }

  ctx.fillStyle = 'rgba(186,120,255,0.28)';
  ctx.fillRect(level.gravityGlyph.x, level.gravityGlyph.y, level.gravityGlyph.w, level.gravityGlyph.h);
  ctx.strokeStyle = '#d8b6ff';
  ctx.strokeRect(level.gravityGlyph.x, level.gravityGlyph.y, level.gravityGlyph.w, level.gravityGlyph.h);
  ctx.beginPath();
  ctx.strokeStyle = '#f0e4ff';
  ctx.moveTo(level.gravityGlyph.x + 6, level.gravityGlyph.y + 20);
  ctx.lineTo(level.gravityGlyph.x + 14, level.gravityGlyph.y + 8);
  ctx.lineTo(level.gravityGlyph.x + 22, level.gravityGlyph.y + 20);
  ctx.stroke();

  ctx.fillStyle = '#ff704d';
  ctx.fillRect(level.firePool.x, level.firePool.y, level.firePool.w, level.firePool.h);
  ctx.fillStyle = '#4dbbff';
  ctx.fillRect(level.waterPool.x, level.waterPool.y, level.waterPool.w, level.waterPool.h);

  ctx.fillStyle = relay.exitUnlocked ? '#7dffb1' : '#3b4e54';
  ctx.fillRect(level.gate.x, level.gate.y, level.gate.w, level.gate.h);
  ctx.strokeStyle = relay.exitUnlocked ? '#d7ffe7' : '#667b80';
  ctx.strokeRect(level.gate.x, level.gate.y, level.gate.w, level.gate.h);

  ctx.fillStyle = 'rgba(255,120,90,0.22)';
  ctx.fillRect(level.fireExit.x, level.fireExit.y, level.fireExit.w, level.fireExit.h);
  ctx.strokeStyle = '#ff8a70';
  ctx.strokeRect(level.fireExit.x, level.fireExit.y, level.fireExit.w, level.fireExit.h);

  ctx.fillStyle = 'rgba(100,200,255,0.22)';
  ctx.fillRect(level.waterExit.x, level.waterExit.y, level.waterExit.w, level.waterExit.h);
  ctx.strokeStyle = '#7fd7ff';
  ctx.strokeRect(level.waterExit.x, level.waterExit.y, level.waterExit.w, level.waterExit.h);

  if(!level.gem.taken){
    ctx.fillStyle = '#ffe778';
    ctx.beginPath();
    ctx.arc(level.gem.x, level.gem.y, level.gem.r, 0, Math.PI * 2);
    ctx.fill();
  }

  drawBeam(level.aura.x + level.aura.w, level.aura.y + level.aura.h / 2, level.bridge.x, level.bridge.y + level.bridge.h / 2, relay.auraHeld, '#8ef6ff');
  drawBeam(level.floorSensor.x + level.floorSensor.w / 2, level.floorSensor.y, level.gate.x, level.gate.y + 25, relay.floorLatched, '#83ffb5');
  drawBeam(level.ceilingSensor.x + level.ceilingSensor.w / 2, level.ceilingSensor.y + level.ceilingSensor.h, level.gate.x, level.gate.y + 70, relay.ceilingLatched, '#d6b5ff');
}

function drawPlayer(p, controlled){
  if(!p.alive){ return; }
  ctx.save();
  ctx.globalAlpha = p.finished ? 0.45 : 1;
  ctx.fillStyle = p.color;
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(p.x + (p.facing > 0 ? 14 : 4), p.y + 7, 4, 4);
  if(controlled){
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.strokeRect(p.x - 2, p.y - 2, p.w + 4, p.h + 4);
  }
  ctx.restore();
}

function drawGhost(){
  if(!ghost || !ghost.active){ return; }
  for(var i=ghost.index;i<Math.min(ghost.index + 35, ghost.path.length);i+=4){
    var node = ghost.path[i];
    var gy = ghost.inverted ? (500 - node.y - ghost.h - 60) : node.y;
    ctx.fillStyle = ghost.inverted ? 'rgba(216,182,255,0.18)' : 'rgba(143,247,255,0.16)';
    ctx.fillRect(node.x, gy, ghost.w, ghost.h);
  }
  ctx.fillStyle = ghost.color;
  ctx.globalAlpha = 0.8;
  ctx.fillRect(ghost.x, ghost.y, ghost.w, ghost.h);
  ctx.globalAlpha = 1;
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p = particles[i];
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / 45);
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawUI(){
  ctx.fillStyle = 'rgba(8,18,28,0.82)';
  ctx.fillRect(10,10,250,108);
  ctx.strokeStyle = '#2d5668';
  ctx.strokeRect(10,10,250,108);
  ctx.fillStyle = '#dff';
  ctx.font = '14px Arial';
  ctx.fillText('Goal: park body, spawn echo, imprint glyph, open exits', 18, 30);
  ctx.fillText('Attempts: ' + attempts + '   Score: ' + score + '   Gems: ' + gems, 18, 50);
  ctx.fillText('Active: ' + currentPlayer().name + '   Time: ' + Math.floor(timer / 60) + 's', 18, 70);
  ctx.fillText('Q/Shift swap   R restart   A/D move   W jump', 18, 90);
  ctx.fillText('Gate: ' + (relay.exitUnlocked ? 'UNLOCKED' : 'LOCKED'), 18, 110);

  ctx.fillStyle = 'rgba(8,18,28,0.82)';
  ctx.fillRect(570,10,220,120);
  ctx.strokeStyle = '#2d5668';
  ctx.strokeRect(570,10,220,120);
  ctx.fillStyle = '#dff';
  ctx.fillText('Relay Status', 585, 30);
  ctx.fillStyle = relay.auraHeld ? '#8ef6ff' : '#6b7f8e';
  ctx.fillText('Aura bridge: ' + (relay.auraHeld ? 'powered' : 'off'), 585, 52);
  ctx.fillStyle = relay.floorLatched ? '#83ffb5' : '#6b7f8e';
  ctx.fillText('Floor echo sensor: ' + (relay.floorLatched ? 'latched' : 'idle'), 585, 74);
  ctx.fillStyle = relay.ceilingLatched ? '#d6b5ff' : '#6b7f8e';
  ctx.fillText('Ceiling memory sensor: ' + (relay.ceilingLatched ? 'latched' : 'idle'), 585, 96);
  ctx.fillStyle = ghost && ghost.active ? (ghost.inverted ? '#d8b6ff' : '#9cf6ff') : '#6b7f8e';
  ctx.fillText('Echo: ' + (ghost && ghost.active ? (ghost.inverted ? 'inverted replay' : 'normal replay') : 'none'), 585, 118);

  var p = currentPlayer();
  var meter = Math.min(1, p.record.length / 90);
  ctx.fillStyle = 'rgba(8,18,28,0.82)';
  ctx.fillRect(260,10,300,46);
  ctx.strokeStyle = '#2d5668';
  ctx.strokeRect(260,10,300,46);
  ctx.fillStyle = '#dff';
  ctx.fillText('Echo Record', 272, 28);
  ctx.fillStyle = '#22384b';
  ctx.fillRect(360,18,180,14);
  ctx.fillStyle = p.touchedGlyphDuringRecord ? '#d8b6ff' : '#8ef6ff';
  ctx.fillRect(360,18,180 * meter,14);
  ctx.strokeStyle = '#dff';
  ctx.strokeRect(360,18,180,14);
  ctx.fillStyle = '#dff';
  ctx.fillText(p.touchedGlyphDuringRecord ? 'Glyph imprinted' : 'Recording path', 272, 46);

  for(var i=0;i<messageQueue.length && i<4;i++){
    var m = messageQueue[messageQueue.length - 1 - i];
    ctx.fillStyle = m.color;
    ctx.fillText(m.text, 20, 150 + i * 18);
  }

  if(tutorialStep < 2){
    ctx.fillStyle = '#9ff';
    ctx.fillText('Step 1: leave the inactive body inside the cyan aura.', 210, 470);
  } else if(tutorialStep < 3){
    ctx.fillStyle = '#9ff';
    ctx.fillText('Step 2: move, then swap to spawn an echo onto the green plate.', 188, 470);
  } else if(tutorialStep < 4){
    ctx.fillStyle = '#d8b6ff';
    ctx.fillText('Step 3: route a recording through the glyph so the echo runs inverted.', 165, 470);
  } else {
    ctx.fillStyle = '#a8ffb8';
    ctx.fillText('Step 4: get both elements into matching exits after the gate unlocks.', 178, 470);
  }
}

function drawStartScreen(){
  drawWorld();
  ctx.fillStyle = 'rgba(4,10,20,0.78)';
  ctx.fillRect(90,70,620,340);
  ctx.strokeStyle = '#3a7187';
  ctx.strokeRect(90,70,620,340);
  ctx.fillStyle = '#9ff6ff';
  ctx.font = '34px Arial';
  ctx.fillText('Memory Relay Temple', 225, 125);
  ctx.font = '18px Arial';
  ctx.fillStyle = '#dff';
  ctx.fillText('A single-room puzzle where your inactive body and your past movement both become machinery.', 120, 170);
  ctx.fillText('Fire and Water must cooperate with themselves.', 260, 200);
  ctx.fillText('1. Park the inactive body in the aura to power the bridge.', 145, 245);
  ctx.fillText('2. Swap after moving to create an echo that replays onto sensors.', 145, 275);
  ctx.fillText('3. Touch the gravity glyph before swapping to imprint inverted memory.', 145, 305);
  ctx.fillText('4. Unlock the gate, then guide both elements to matching exits.', 145, 335);
  ctx.fillStyle = '#ffe778';
  ctx.fillText('Press Enter to begin', 315, 380);
}

function drawEndScreen(win){
  drawWorld();
  drawGhost();
  for(var i=0;i<players.length;i++){
    drawPlayer(players[i], i === activeIndex);
  }
  drawParticles();
  drawUI();
  ctx.fillStyle = 'rgba(4,10,20,0.72)';
  ctx.fillRect(170,120,460,220);
  ctx.strokeStyle = win ? '#86ffb6' : '#ff8f8f';
  ctx.lineWidth = 2;
  ctx.strokeRect(170,120,460,220);
  ctx.fillStyle = win ? '#baffd1' : '#ffb0b0';
  ctx.font = '32px Arial';
  ctx.fillText(win ? 'Relay Complete' : 'Temple Reset', 300, 170);
  ctx.font = '18px Arial';
  ctx.fillStyle = '#dff';
  if(win){
    ctx.fillText('Both elements escaped and the memory circuit held.', 230, 215);
    ctx.fillText('Final score: ' + score + '   Gems: ' + gems, 295, 245);
    ctx.fillText('Press Enter to play again', 300, 290);
  } else {
    ctx.fillText(failReason || 'A relay failure occurred.', 235, 215);
    ctx.fillText('Attempts left after reset: ' + attempts, 300, 245);
    ctx.fillText('Press R to retry or Enter to reset attempts', 235, 290);
  }
}

function updatePlay(){
  timer += 1;
  score += 1;

  if(wasJustPressed('q') || wasJustPressed('Q') || wasJustPressed('Shift')){
    swapAvatar();
  }
  if(wasJustPressed('r') || wasJustPressed('R')){
    startRun();
    screenState = 'play';
    pushMessage('Run restarted.', 90, '#ffd98a');
  }

  updatePlayer(players[0], activeIndex === 0);
  updatePlayer(players[1], activeIndex === 1);
  addRecordFrame(currentPlayer());
  updateGhost();
  updateRelay();
  updateTutorial();
  checkHazardsAndExits();
  updateMessages();
  updateParticles();
}

function renderPlay(){
  drawWorld();
  drawGhost();
  drawPlayer(players[0], activeIndex === 0);
  drawPlayer(players[1], activeIndex === 1);
  drawParticles();
  drawUI();
}

function gameLoop(){
  if(screenState === 'start'){
    if(wasJustPressed('Enter')){
      beginGame();
    }
    drawStartScreen();
  } else if(screenState === 'play'){
    updatePlay();
    renderPlay();
  } else if(screenState === 'win'){
    winPulse += 1;
    updateMessages();
    updateParticles();
    drawEndScreen(true);
    if(wasJustPressed('Enter') || wasJustPressed('r') || wasJustPressed('R')){
      beginGame();
    }
  } else if(screenState === 'lose'){
    updateMessages();
    updateParticles();
    drawEndScreen(false);
    if(wasJustPressed('r') || wasJustPressed('R')){
      startRun();
      screenState = 'play';
    }
    if(wasJustPressed('Enter')){
      beginGame();
    }
  }

  prevKeys = {};
  for(var k in keys){
    prevKeys[k] = keys[k];
  }
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', function(e){
  keys[e.key] = true;
  if(['ArrowUp','ArrowLeft','ArrowRight',' '].indexOf(e.key) >= 0){
    e.preventDefault();
  }
});

document.addEventListener('keyup', function(e){
  keys[e.key] = false;
});

startRun();
requestAnimationFrame(gameLoop);
};
</script>
</body>
</html>
