<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Relay Echo Temple</title>
<style>
body{margin:0;background:radial-gradient(circle at top,#0b1630 0%,#050816 55%,#02040b 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif;overflow:hidden;}
canvas{width:800px;height:500px;display:block;background:#0a1020;box-shadow:0 0 20px #00f0ff33,0 0 60px #8a5cff22;border:1px solid #1d355e;}
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

var keys = {};
var prevKeys = {};
var attempts = 1;
var frameCount = 0;
var gameState = 'play';
var loseReason = '';
var messageTimer = 0;
var pulse = 0;

var gravity = 0.38;
var moveSpeed = 3.1;
var jumpSpeed = -8.4;
var maxRecordFrames = 180;

var world = {
platforms: [
{x:0,y:460,w:800,h:40,type:'ground'},
{x:0,y:0,w:800,h:18,type:'ceiling'},
{x:0,y:0,w:18,h:500,type:'wall'},
{x:782,y:0,w:18,h:500,type:'wall'},
{x:70,y:390,w:150,h:14,type:'plat'},
{x:250,y:330,w:120,h:14,type:'plat'},
{x:420,y:330,w:90,h:14,type:'plat'},
{x:540,y:270,w:120,h:14,type:'plat'},
{x:650,y:205,w:100,h:14,type:'plat'},
{x:325,y:240,w:100,h:14,type:'plat'},
{x:120,y:205,w:90,h:14,type:'plat'},
{x:500,y:150,w:110,h:14,type:'plat'}
],
auraZone: {x:90,y:350,w:70,h:40},
bridge: {x:215,y:286,w:120,h:12},
floorSensor: {x:675,y:173,w:44,h:18},
ceilingSensor: {x:525,y:18,w:54,h:18},
gravityGlyph: {x:345,y:208,w:60,h:22},
firePool: {x:430,y:442,w:110,h:18,element:'fire'},
waterPool: {x:560,y:442,w:110,h:18,element:'water'},
finalGate: {x:708,y:112,w:18,h:93},
fireExit: {x:650,y:165,w:30,h:40,element:'fire'},
waterExit: {x:730,y:112,w:30,h:40,element:'water'}
};

var players;
var activeIndex;
var ghost;
var relay;
var particles;
var tutorialText;

function makePlayer(name, element, color, x, y){
return {
name:name,
element:element,
color:color,
x:x,
y:y,
w:24,
h:34,
vx:0,
vy:0,
onGround:false,
record:[],
recordImprinted:false,
touchedGlyphThisRun:false,
atExit:false
};
}

function resetGame(fullReset){
players = [
makePlayer('Fire','fire','#ff6b5e',95,356),
makePlayer('Water','water','#59d0ff',145,356)
];
activeIndex = 0;
ghost = null;
relay = {
auraHeld:false,
floorLatched:false,
ceilingLatched:false,
exitUnlocked:false,
dependencyBrokenFlash:0,
lastValidFloor:false,
lastValidCeiling:false
};
particles = [];
gameState = 'play';
loseReason = '';
messageTimer = 0;
pulse = 0;
tutorialText = 'Park the inactive body in the cyan aura, swap with Q or Shift, then use echoes to complete the relay.';
if(fullReset){
attempts = 1;
}
}

function restartAttempt(){
attempts += 1;
resetGame(false);
}

function overlap(a,b){
return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function pointInRect(px, py, r){
return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function rectCenter(r){
return {x:r.x + r.w * 0.5, y:r.y + r.h * 0.5};
}

function addBurst(x, y, color, count){
for(var i = 0; i < count; i++){
particles.push({
x:x,
y:y,
vx:(Math.random() - 0.5) * 2.8,
vy:(Math.random() - 0.5) * 2.8,
life:20 + Math.random() * 20,
maxLife:40,
color:color
});
}
}

function keyPressed(k){
return !!keys[k] && !prevKeys[k];
}

function solidRects(){
var rects = [];
for(var i = 0; i < world.platforms.length; i++){
rects.push(world.platforms[i]);
}
if(relay.auraHeld){
rects.push(world.bridge);
}
if(!relay.exitUnlocked){
rects.push(world.finalGate);
}
return rects;
}

function resolvePlayerPhysics(p, controllable){
var left = keys['arrowleft'] || keys['a'];
var right = keys['arrowright'] || keys['d'];
var jump = keys['arrowup'] || keys['w'] || keys[' '];

if(controllable){
if(left && !right){
p.vx = -moveSpeed;
}else if(right && !left){
p.vx = moveSpeed;
}else{
p.vx *= 0.72;
if(Math.abs(p.vx) < 0.05) p.vx = 0;
}
if(jump && !prevKeys['arrowup'] && !prevKeys['w'] && !prevKeys[' '] && p.onGround){
p.vy = jumpSpeed;
p.onGround = false;
addBurst(p.x + p.w * 0.5, p.y + p.h, '#ffffff', 5);
}
}else{
p.vx *= 0.78;
if(Math.abs(p.vx) < 0.05) p.vx = 0;
}

p.vy += gravity;
if(p.vy > 10) p.vy = 10;

p.x += p.vx;
var solids = solidRects();
for(var i = 0; i < solids.length; i++){
var s = solids[i];
if(overlap(p, s)){
if(p.vx > 0){
p.x = s.x - p.w;
}else if(p.vx < 0){
p.x = s.x + s.w;
}
p.vx = 0;
}
}

p.y += p.vy;
p.onGround = false;
solids = solidRects();
for(i = 0; i < solids.length; i++){
var t = solids[i];
if(overlap(p, t)){
if(p.vy > 0){
p.y = t.y - p.h;
p.vy = 0;
p.onGround = true;
}else if(p.vy < 0){
p.y = t.y + t.h;
p.vy = 0;
}
}
}

if(p.x < 18) p.x = 18;
if(p.x > canvas.width - 18 - p.w) p.x = canvas.width - 18 - p.w;
}

function recordActivePath(p){
var centerX = p.x + p.w * 0.5;
var centerY = p.y + p.h * 0.5;
p.record.push({x:centerX,y:centerY});
if(p.record.length > maxRecordFrames){
p.record.shift();
}
if(overlap(p, world.gravityGlyph)){
p.touchedGlyphThisRun = true;
}
}

function spawnGhostFromActive(){
var source = players[activeIndex];
if(source.record.length < 8){
messageTimer = 90;
tutorialText = 'Not enough motion recorded yet. Move first, then swap.';
return;
}
ghost = {
frames:source.record.slice(0),
index:0,
x:source.record[0].x - 10,
y:source.record[0].y - 14,
w:20,
h:28,
active:true,
imprinted:source.touchedGlyphThisRun,
hitFloor:false,
hitCeiling:false,
trail:source.record.slice(Math.max(0, source.record.length - 40))
};
addBurst(source.x + source.w * 0.5, source.y + source.h * 0.5, ghost.imprinted ? '#b999ff' : '#ffffff', 12);
source.record = [];
source.touchedGlyphThisRun = false;
}

function processSwap(){
if(keyPressed('q') || keyPressed('shift')){
spawnGhostFromActive();
activeIndex = 1 - activeIndex;
messageTimer = 60;
tutorialText = ghost && ghost.imprinted ? 'Imprinted echo spawned: it mirrors memory along the ceiling.' : 'Echo spawned: keep the parked body in the aura while the ghost touches sensors.';
}
}

function updateGhost(){
if(!ghost || !ghost.active) return;
if(ghost.index >= ghost.frames.length){
ghost.active = false;
return;
}
var f = ghost.frames[ghost.index];
ghost.x = f.x - ghost.w * 0.5;
if(ghost.imprinted){
ghost.y = canvas.height - f.y - ghost.h;
}else{
ghost.y = f.y - ghost.h * 0.5;
}

ghost.index += 1;

if(overlap(ghost, world.floorSensor) && !ghost.imprinted){
ghost.hitFloor = true;
addBurst(world.floorSensor.x + world.floorSensor.w * 0.5, world.floorSensor.y + world.floorSensor.h * 0.5, '#ffffff', 2);
}
if(overlap(ghost, world.ceilingSensor) && ghost.imprinted){
ghost.hitCeiling = true;
addBurst(world.ceilingSensor.x + world.ceilingSensor.w * 0.5, world.ceilingSensor.y + world.ceilingSensor.h * 0.5, '#c6a2ff', 2);
}
}

function updateRelay(){
var inactive = players[1 - activeIndex];
relay.auraHeld = overlap(inactive, world.auraZone);

var validFloorNow = relay.auraHeld && ghost && ghost.active && ghost.hitFloor;
var validCeilingNow = relay.auraHeld && ghost && ghost.active && ghost.hitCeiling;

if(relay.auraHeld && !relay.floorLatched && validFloorNow){
relay.floorLatched = true;
messageTimer = 90;
tutorialText = 'Phase 2 sealed: the normal echo counted because the inactive body kept the aura alive.';
addBurst(world.floorSensor.x + 20, world.floorSensor.y + 10, '#ffffff', 10);
}

if(relay.auraHeld && relay.floorLatched && !relay.ceilingLatched && validCeilingNow){
relay.ceilingLatched = true;
messageTimer = 90;
tutorialText = 'Phase 3 sealed: the gravity-imprinted echo reached the ceiling sensor while the aura chain held.';
addBurst(world.ceilingSensor.x + 24, world.ceilingSensor.y + 10, '#c6a2ff', 12);
}

if((ghost && ghost.hitFloor && !relay.auraHeld && !relay.floorLatched) || (ghost && ghost.hitCeiling && !relay.auraHeld && !relay.ceilingLatched)){
relay.dependencyBrokenFlash = 14;
}

relay.lastValidFloor = validFloorNow;
relay.lastValidCeiling = validCeilingNow;
relay.exitUnlocked = relay.auraHeld && relay.floorLatched && relay.ceilingLatched;
if(relay.dependencyBrokenFlash > 0) relay.dependencyBrokenFlash -= 1;
}

function updateHazardsAndGoals(){
for(var i = 0; i < players.length; i++){
var p = players[i];
if(p.y > canvas.height + 60){
loseReason = p.name + ' fell out of the temple.';
gameState = 'lose';
}
if(overlap(p, world.firePool) && p.element !== 'fire'){
loseReason = p.name + ' dissolved in fire.';
gameState = 'lose';
}
if(overlap(p, world.waterPool) && p.element !== 'water'){
loseReason = p.name + ' shorted out in water.';
gameState = 'lose';
}
p.atExit = relay.exitUnlocked && overlap(p, p.element === 'fire' ? world.fireExit : world.waterExit);
}
if(relay.exitUnlocked && players[0].atExit && players[1].atExit){
gameState = 'win';
}
}

function updateParticles(){
for(var i = particles.length - 1; i >= 0; i--){
var p = particles[i];
p.x += p.vx;
p.y += p.vy;
p.life -= 1;
if(p.life <= 0){
particles.splice(i,1);
}
}
}

function update(){
frameCount += 1;
pulse += 0.08;
if(gameState !== 'play'){
updateParticles();
return;
}
processSwap();
for(var i = 0; i < players.length; i++){
resolvePlayerPhysics(players[i], i === activeIndex);
}
recordActivePath(players[activeIndex]);
updateGhost();
updateRelay();
updateHazardsAndGoals();
updateParticles();
if(messageTimer > 0) messageTimer -= 1;
}

function drawTempleBackdrop(){
var g = ctx.createLinearGradient(0,0,0,500);
g.addColorStop(0,'#111a38');
g.addColorStop(1,'#050816');
ctx.fillStyle = g;
ctx.fillRect(0,0,canvas.width,canvas.height);
for(var i = 0; i < 8; i++){
ctx.fillStyle = 'rgba(120,160,255,0.05)';
ctx.fillRect(40 + i * 95, 70 + (i % 3) * 40, 42, 260);
}
}

function drawPlatforms(){
for(var i = 0; i < world.platforms.length; i++){
var p = world.platforms[i];
ctx.fillStyle = p.type === 'ground' ? '#22355a' : '#29456f';
ctx.fillRect(p.x,p.y,p.w,p.h);
ctx.fillStyle = 'rgba(255,255,255,0.08)';
ctx.fillRect(p.x,p.y,p.w,3);
}
}

function drawAuraAndBridge(){
var auraLit = relay.auraHeld;
ctx.fillStyle = auraLit ? 'rgba(70,255,255,0.24)' : 'rgba(70,180,220,0.10)';
ctx.fillRect(world.auraZone.x,world.auraZone.y,world.auraZone.w,world.auraZone.h);
ctx.strokeStyle = auraLit ? '#7dffff' : '#2d8ea0';
ctx.lineWidth = 2;
ctx.strokeRect(world.auraZone.x,world.auraZone.y,world.auraZone.w,world.auraZone.h);
ctx.beginPath();
ctx.arc(world.auraZone.x + world.auraZone.w * 0.5, world.auraZone.y - 12, 10 + Math.sin(pulse * 2) * 2, 0, Math.PI * 2);
ctx.fillStyle = auraLit ? '#8dffff' : '#3e6f7f';
ctx.fill();

if(relay.auraHeld){
ctx.fillStyle = 'rgba(120,255,255,0.75)';
ctx.fillRect(world.bridge.x,world.bridge.y,world.bridge.w,world.bridge.h);
ctx.strokeStyle = '#d8ffff';
ctx.strokeRect(world.bridge.x,world.bridge.y,world.bridge.w,world.bridge.h);
}else{
ctx.strokeStyle = 'rgba(120,255,255,0.25)';
ctx.setLineDash([6,6]);
ctx.strokeRect(world.bridge.x,world.bridge.y,world.bridge.w,world.bridge.h);
ctx.setLineDash([]);
}

ctx.strokeStyle = relay.dependencyBrokenFlash > 0 ? '#ff4a7a' : 'rgba(100,220,255,0.18)';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(world.auraZone.x + world.auraZone.w, world.auraZone.y + 10);
ctx.lineTo(world.floorSensor.x + 10, world.floorSensor.y + 10);
ctx.lineTo(world.ceilingSensor.x + 10, world.ceilingSensor.y + 10);
ctx.lineTo(world.finalGate.x + 9, world.finalGate.y + 40);
ctx.stroke();
}

function drawSensorsAndGlyph(){
ctx.fillStyle = overlap(players[activeIndex], world.gravityGlyph) ? '#caa2ff' : '#6f53c9';
ctx.fillRect(world.gravityGlyph.x,world.gravityGlyph.y,world.gravityGlyph.w,world.gravityGlyph.h);
ctx.strokeStyle = '#e0c7ff';
ctx.strokeRect(world.gravityGlyph.x,world.gravityGlyph.y,world.gravityGlyph.w,world.gravityGlyph.h);
ctx.fillStyle = '#f0e6ff';
ctx.font = '12px Arial';
ctx.fillText('Glyph', world.gravityGlyph.x + 12, world.gravityGlyph.y + 15);

ctx.fillStyle = relay.floorLatched ? '#ffffff' : '#6f7b94';
ctx.fillRect(world.floorSensor.x,world.floorSensor.y,world.floorSensor.w,world.floorSensor.h);
ctx.strokeStyle = relay.lastValidFloor ? '#ffffff' : '#a8b3c9';
ctx.strokeRect(world.floorSensor.x,world.floorSensor.y,world.floorSensor.w,world.floorSensor.h);

ctx.fillStyle = relay.ceilingLatched ? '#d6b4ff' : '#6f5f88';
ctx.fillRect(world.ceilingSensor.x,world.ceilingSensor.y,world.ceilingSensor.w,world.ceilingSensor.h);
ctx.strokeStyle = relay.lastValidCeiling ? '#e6ccff' : '#a89ab8';
ctx.strokeRect(world.ceilingSensor.x,world.ceilingSensor.y,world.ceilingSensor.w,world.ceilingSensor.h);
}

function drawHazardsAndExits(){
ctx.fillStyle = '#ff6b5e';
ctx.fillRect(world.firePool.x,world.firePool.y,world.firePool.w,world.firePool.h);
ctx.fillStyle = '#59d0ff';
ctx.fillRect(world.waterPool.x,world.waterPool.y,world.waterPool.w,world.waterPool.h);

ctx.fillStyle = relay.exitUnlocked ? 'rgba(255,220,120,0.2)' : 'rgba(255,90,120,0.25)';
ctx.fillRect(world.finalGate.x,world.finalGate.y,world.finalGate.w,world.finalGate.h);
ctx.strokeStyle = relay.exitUnlocked ? '#ffe08a' : '#ff6688';
ctx.strokeRect(world.finalGate.x,world.finalGate.y,world.finalGate.w,world.finalGate.h);

ctx.fillStyle = '#ff8c72';
ctx.fillRect(world.fireExit.x,world.fireExit.y,world.fireExit.w,world.fireExit.h);
ctx.fillStyle = '#7fdcff';
ctx.fillRect(world.waterExit.x,world.waterExit.y,world.waterExit.w,world.waterExit.h);
ctx.strokeStyle = '#fff';
ctx.strokeRect(world.fireExit.x,world.fireExit.y,world.fireExit.w,world.fireExit.h);
ctx.strokeRect(world.waterExit.x,world.waterExit.y,world.waterExit.w,world.waterExit.h);
}

function drawGhost(){
if(!ghost || !ghost.active) return;
if(ghost.trail && ghost.trail.length > 1){
ctx.beginPath();
for(var i = 0; i < ghost.trail.length; i++){
var t = ghost.trail[i];
var tx = t.x;
var ty = ghost.imprinted ? canvas.height - t.y : t.y;
if(i === 0){
ctx.moveTo(tx, ty);
}else{
ctx.lineTo(tx, ty);
}
}
ctx.strokeStyle = ghost.imprinted ? 'rgba(210,170,255,0.55)' : 'rgba(255,255,255,0.45)';
ctx.lineWidth = 2;
ctx.stroke();
}
ctx.fillStyle = ghost.imprinted ? 'rgba(205,170,255,0.65)' : 'rgba(255,255,255,0.65)';
ctx.fillRect(ghost.x,ghost.y,ghost.w,ghost.h);
ctx.strokeStyle = ghost.imprinted ? '#f0d8ff' : '#ffffff';
ctx.strokeRect(ghost.x,ghost.y,ghost.w,ghost.h);
}

function drawPlayers(){
for(var i = 0; i < players.length; i++){
var p = players[i];
ctx.globalAlpha = i === activeIndex ? 1 : 0.7;
ctx.fillStyle = p.color;
ctx.fillRect(p.x,p.y,p.w,p.h);
ctx.strokeStyle = i === activeIndex ? '#ffffff' : '#9fb7cc';
ctx.strokeRect(p.x,p.y,p.w,p.h);
if(i !== activeIndex){
ctx.strokeStyle = 'rgba(120,255,255,0.45)';
ctx.strokeRect(p.x - 2,p.y - 2,p.w + 4,p.h + 4);
}
ctx.globalAlpha = 1;

if(p.record.length > 1 && i === activeIndex){
ctx.beginPath();
for(var j = 0; j < p.record.length; j += 4){
var r = p.record[j];
if(j === 0){
ctx.moveTo(r.x, r.y);
}else{
ctx.lineTo(r.x, r.y);
}
}
ctx.strokeStyle = p.touchedGlyphThisRun ? 'rgba(210,170,255,0.55)' : 'rgba(255,255,255,0.18)';
ctx.lineWidth = 1.5;
ctx.stroke();
}
}
}

function drawParticles(){
for(var i = 0; i < particles.length; i++){
var p = particles[i];
ctx.globalAlpha = p.life / p.maxLife;
ctx.fillStyle = p.color;
ctx.fillRect(p.x,p.y,3,3);
}
ctx.globalAlpha = 1;
}

function drawUI(){
ctx.fillStyle = 'rgba(5,10,20,0.72)';
ctx.fillRect(14,14,360,110);
ctx.strokeStyle = '#38527d';
ctx.strokeRect(14,14,360,110);
ctx.fillStyle = '#d7f7ff';
ctx.font = '14px Arial';
ctx.fillText('Controls: A/D or Arrows move, W/Up/Space jump, Q or Shift swap, R restart', 24, 36);
ctx.fillText('Active: ' + players[activeIndex].name + '   Attempts: ' + attempts, 24, 58);
ctx.fillText('Relay: Aura ' + (relay.auraHeld ? 'on' : 'off') + ' | Floor ' + (relay.floorLatched ? 'done' : 'pending') + ' | Ceiling ' + (relay.ceilingLatched ? 'done' : 'pending'), 24, 80);
ctx.fillText('Gate: ' + (relay.exitUnlocked ? 'unlocked' : 'locked by relay chain'), 24, 102);

ctx.fillStyle = 'rgba(5,10,20,0.72)';
ctx.fillRect(390,14,396,74);
ctx.strokeStyle = '#38527d';
ctx.strokeRect(390,14,396,74);
ctx.fillStyle = relay.dependencyBrokenFlash > 0 ? '#ff8aa8' : '#d7f7ff';
ctx.font = '13px Arial';
ctx.fillText(messageTimer > 0 ? tutorialText : 'Solve by choreography: parked body powers aura, normal echo hits floor sensor, imprinted echo hits ceiling sensor.', 402, 38);
ctx.fillText('Cross-phase lock: ghost sensors only count while the inactive body still occupies the aura zone.', 402, 60);

if(gameState === 'win' || gameState === 'lose'){
ctx.fillStyle = 'rgba(0,0,0,0.6)';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = '#ffffff';
ctx.font = '28px Arial';
ctx.fillText(gameState === 'win' ? 'Temple Relay Complete' : 'Relay Broken', 275, 210);
ctx.font = '16px Arial';
ctx.fillText(gameState === 'win' ? 'Both avatars reached their exits after the full memory chain unlocked the gate.' : loseReason, 170, 245);
ctx.fillText('Press R to restart the temple.', 300, 275);
}
}

function render(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawTempleBackdrop();
drawPlatforms();
drawAuraAndBridge();
drawSensorsAndGlyph();
drawHazardsAndExits();
drawGhost();
drawPlayers();
drawParticles();
drawUI();
}

window.addEventListener('keydown', function(e){
keys[e.key.toLowerCase()] = true;
if(['arrowup','arrowdown','arrowleft','arrowright',' '].indexOf(e.key.toLowerCase()) !== -1){
e.preventDefault();
}
if(e.key.toLowerCase() === 'r'){
restartAttempt();
}
});

window.addEventListener('keyup', function(e){
keys[e.key.toLowerCase()] = false;
});

function gameLoop(){
update();
render();
prevKeys = {};
for(var k in keys){
prevKeys[k] = keys[k];
}
requestAnimationFrame(gameLoop);
}

resetGame(true);
gameLoop();
};
</script>
</body>
</html>
