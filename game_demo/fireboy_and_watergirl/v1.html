<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Echo Relay Temple</title>
<style>
body{margin:0;background:#030711;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:Arial,sans-serif;}
canvas{width:800px;height:500px;display:block;background:#08111f;box-shadow:0 0 30px #00e5ff22,0 0 80px #ff6a0022 inset;border:1px solid #1a2b46;}
</style>
</head>
<body>
<canvas id='game'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 500;
var keys = {}, state, score, active, flash, switchTimer, maxSwitchTimer, fire, water, gems, platforms, hazards, exits, switchPad, bridge, particles, failReason, pulse;
var trails, screenShake, impactFlash, ambient, attempts, roomTimer;
var echoDoor, echoSensor, echoBridge, ghost, relayCrystal, auraDoor, beam, messageTimer;
function reset(){
state = 'menu';
score = 0;
attempts = 1;
active = 'fire';
flash = 0;
switchTimer = 0;
maxSwitchTimer = 210;
pulse = 0;
roomTimer = 0;
messageTimer = 0;
failReason = '';
particles = [];
trails = [];
ambient = [];
screenShake = 0;
impactFlash = 0;
fire = {x:70,y:390,w:26,h:26,vx:0,vy:0,onGround:false,color:'#ff6a00',type:'fire',done:false,breathe:0,facing:1,passedEcho:false};
water = {x:130,y:390,w:26,h:26,vx:0,vy:0,onGround:false,color:'#00d8ff',type:'water',done:false,breathe:2,facing:1,passedEcho:false};
gems = [
{x:215,y:405,r:8,type:'fire',taken:false,spin:0},
{x:356,y:345,r:8,type:'water',taken:false,spin:1},
{x:558,y:275,r:8,type:'water',taken:false,spin:2},
{x:720,y:140,r:8,type:'fire',taken:false,spin:3}
];
platforms = [
{x:0,y:460,w:800,h:40,type:'stone'},
{x:160,y:430,w:110,h:12,type:'stone'},
{x:320,y:380,w:90,h:12,type:'stone'},
{x:520,y:300,w:110,h:12,type:'stone'},
{x:660,y:230,w:90,h:12,type:'stone'},
{x:690,y:160,w:85,h:12,type:'stone'},
{x:250,y:430,w:36,h:30,type:'stone'},
{x:590,y:186,w:50,h:10,type:'stone'}
];
hazards = [
{x:280,y:460,w:110,h:40,type:'lava'},
{x:410,y:460,w:110,h:40,type:'water'},
{x:438,y:288,w:64,h:12,type:'water'},
{x:610,y:448,w:120,h:12,type:'lava'}
];
exits = {
fire:{x:700,y:424,w:34,h:36,glow:0},
water:{x:745,y:424,w:34,h:36,glow:0}
};
switchPad = {x:198,y:418,w:32,h:12,glow:0};
bridge = {x:404,y:250,w:118,h:12};
echoDoor = {x:540,y:248,w:24,h:52,active:true};
echoSensor = {x:640,y:198,w:24,h:32,on:false};
echoBridge = {x:620,y:214,w:74,h:10};
relayCrystal = {x:332,y:344,r:18,element:'water',powered:false,radius:78};
auraDoor = {x:470,y:332,w:18,h:48,open:false};
beam = {x1:565,y1:120,x2:565,y2:300,blocked:false};
ghost = {available:false,recording:false,replaying:false,sourceType:'fire',frames:[],playIndex:0,triggered:false,doorTouch:false};
for(var i=0;i<26;i++){
ambient.push({x:Math.random()*800,y:Math.random()*500,s:1+Math.random()*2,a:0.15+Math.random()*0.35,v:0.2+Math.random()*0.5,c:i%2===0?'#113355':'#0d2445'});
}
}
function restartPlay(){
reset();
state = 'playing';
}
function overlap(a,b){
return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function circleHit(p,g){
var cx = p.x + p.w / 2, cy = p.y + p.h / 2, dx = cx - g.x, dy = cy - g.y;
return dx * dx + dy * dy < 20 * 20;
}
function switchActive(){
return switchTimer > 0;
}
function current(){
return active === 'fire' ? fire : water;
}
function inactivePlayer(){
return active === 'fire' ? water : fire;
}
function addParticles(x,y,color,count,spread,speed){
for(var i=0;i<count;i++){
particles.push({x:x,y:y,vx:(Math.random()-0.5)*spread,vy:(Math.random()-0.5)*spread-speed,life:20+Math.random()*20,color:color,size:2+Math.random()*3});
}
}
function addTrail(p){
trails.push({x:p.x + p.w / 2,y:p.y + p.h / 2,w:p.w,h:p.h,life:16,type:p.type});
if(trails.length > 120) trails.shift();
}
function hitFX(power){
screenShake = Math.max(screenShake, power);
impactFlash = Math.max(impactFlash, power * 0.1);
}
function startGhostReplay(){
if(ghost.available && ghost.frames.length > 8){
ghost.replaying = true;
ghost.playIndex = 0;
ghost.triggered = false;
addParticles(ghost.frames[0].x + 13, ghost.frames[0].y + 13, '#d6f3ff', 14, 4, 0.2);
}
}
function doSwitch(){
active = active === 'fire' ? 'water' : 'fire';
flash = 14;
impactFlash = 0.2;
startGhostReplay();
addParticles(current().x + current().w / 2, current().y + current().h / 2, active === 'fire' ? '#ffcf66' : '#a8f4ff', 14, 4, 0.5);
addParticles(current().x + current().w / 2, current().y + current().h / 2, '#ffffff', 8, 3, 0.2);
}
function lose(msg, x, y, color){
if(state !== 'playing') return;
state = 'game_over';
failReason = msg;
hitFX(10);
addParticles(x, y, color, 24, 6, -1);
addParticles(x, y, '#ffffff', 12, 7, -1);
}
function winGame(){
if(state !== 'playing') return;
state = 'win';
hitFX(6);
addParticles(fire.x + 10, fire.y, '#ffb347', 18, 5, 1);
addParticles(water.x + 10, water.y, '#7ae7ff', 18, 5, 1);
addParticles(400, 220, '#ffffff', 24, 8, 0.5);
}
window.addEventListener('keydown', function(e){
keys[e.key.toLowerCase()] = true;
if((e.key === 'q' || e.key === 'Q' || e.key === 'Shift') && state === 'playing') doSwitch();
if(e.key === 'Enter' && state === 'menu') state = 'playing';
if((e.key === 'r' || e.key === 'R') && state !== 'playing'){ restartPlay(); }
if((e.key === 'r' || e.key === 'R') && state === 'playing'){ attempts++; restartPlay(); }
if((e.key === 'q' || e.key === 'Q' || e.key === 'Shift') && state === 'menu') active = active === 'fire' ? 'water' : 'fire';
});
window.addEventListener('keyup', function(e){
keys[e.key.toLowerCase()] = false;
});
function solidPlatforms(){
var cols = platforms.slice();
if(switchActive()) cols.push(bridge);
if(echoSensor.on) cols.push(echoBridge);
if(!auraDoor.open) cols.push(auraDoor);
return cols;
}
function movePlayer(p, controlled){
if(p.done){ p.vx = 0; p.vy += 0.35; }
else if(controlled){
var left = keys['a'] || keys['arrowleft'];
var right = keys['d'] || keys['arrowright'];
var jump = keys['w'] || keys['arrowup'] || keys[' '];
p.vx = 0;
if(left){ p.vx = -3.1; p.facing = -1; }
if(right){ p.vx = 3.1; p.facing = 1; }
if(jump && p.onGround){
p.vy = -8.7;
p.onGround = false;
addParticles(p.x + p.w / 2, p.y + p.h, p.type === 'fire' ? '#ff9b4f' : '#7ae7ff', 6, 2, 0);
}
}else{
p.vx = 0;
}
p.vy += 0.38;
if(p.vy > 10) p.vy = 10;
p.x += p.vx;
var cols = solidPlatforms();
for(var i=0;i<cols.length;i++){
var plx = cols[i];
if(overlap(p, plx)){
if(p.vx > 0 && p.x + p.w - p.vx <= plx.x + 4){ p.x = plx.x - p.w; }
if(p.vx < 0 && p.x - p.vx >= plx.x + plx.w - 4){ p.x = plx.x + plx.w; }
}
}
p.y += p.vy;
p.onGround = false;
cols = solidPlatforms();
for(i=0;i<cols.length;i++){
var pl = cols[i];
if(overlap(p, pl)){
if(p.vy >= 0 && p.y + p.h - p.vy <= pl.y + 5){
p.y = pl.y - p.h;
if(p.vy > 6) hitFX(2);
p.vy = 0;
p.onGround = true;
}else if(p.vy < 0 && p.y - p.vy >= pl.y + pl.h - 5){
p.y = pl.y + pl.h;
p.vy = 0.2;
}
}
}
if(p.x < 0) p.x = 0;
if(p.x + p.w > 800) p.x = 800 - p.w;
if(p.y > 540) lose('An avatar fell out of the temple.', p.x + p.w / 2, 490, p.type === 'fire' ? '#ff6a00' : '#00d8ff');
if(controlled && (Math.abs(p.vx) > 0.2 || Math.abs(p.vy) > 1.2)) addTrail(p);
}
function updateHazardsFor(p){
for(var i=0;i<hazards.length;i++){
var h = hazards[i];
if(overlap(p, h)){
if((p.type === 'fire' && h.type === 'water') || (p.type === 'water' && h.type === 'lava')){
lose(p.type === 'fire' ? 'Fire touched water.' : 'Water touched lava.', p.x + p.w / 2, p.y + p.h / 2, p.type === 'fire' ? '#ff6a00' : '#00d8ff');
return;
}else if(Math.random() < 0.18){
addParticles(p.x + p.w / 2, h.y + 2, h.type === 'lava' ? '#ffb347' : '#9fefff', 1, 1.5, 0.2);
}
}
}
if(!beam.blocked){
var cx = p.x + p.w / 2;
var cy1 = p.y;
var cy2 = p.y + p.h;
if(cx > beam.x1 - 3 && cx < beam.x1 + 3 && cy2 > beam.y1 && cy1 < beam.y2){
lose('A memory beam erased the relay.', p.x + p.w / 2, p.y + p.h / 2, '#d6f3ff');
}
}
}
function updateGems(){
for(var i=0;i<gems.length;i++){
var g = gems[i];
g.spin += 0.08;
if(g.taken) continue;
if(g.type === 'fire' && circleHit(fire, g)){
g.taken = true;
score += 10;
hitFX(2);
addParticles(g.x, g.y, '#ffb347', 10, 4, 0.5);
addParticles(g.x, g.y, '#ffffff', 6, 3, 0.3);
}
if(g.type === 'water' && circleHit(water, g)){
g.taken = true;
score += 10;
hitFX(2);
addParticles(g.x, g.y, '#7ae7ff', 10, 4, 0.5);
addParticles(g.x, g.y, '#ffffff', 6, 3, 0.3);
}
}
}
function updateSwitch(){
var onSwitch = overlap(fire, switchPad) || overlap(water, switchPad);
if(onSwitch){
if(switchTimer <= 0){
addParticles(switchPad.x + switchPad.w / 2, switchPad.y, '#9dff9f', 12, 3, 0.5);
hitFX(3);
}
switchTimer = maxSwitchTimer;
switchPad.glow = 1;
}else if(switchTimer > 0){
switchTimer--;
if(switchTimer < 45 && switchTimer % 10 === 0) addParticles(bridge.x + bridge.w / 2, bridge.y, '#d8ffd7', 4, 2, 0.1);
}
}
function updateAura(){
var parked = inactivePlayer();
var cx = parked.x + parked.w / 2;
var cy = parked.y + parked.h / 2;
var dx = cx - relayCrystal.x;
var dy = cy - relayCrystal.y;
var dist = Math.sqrt(dx * dx + dy * dy);
relayCrystal.powered = parked.type === relayCrystal.element && dist < relayCrystal.radius;
auraDoor.open = relayCrystal.powered;
}
function updateEchoDoor(){
var p = current();
var touching = overlap(p, echoDoor);
if(touching && !p.passedEcho){
ghost.recording = true;
ghost.available = false;
ghost.replaying = false;
ghost.frames = [];
ghost.sourceType = p.type;
ghost.triggered = false;
addParticles(echoDoor.x + echoDoor.w / 2, echoDoor.y + 20, '#d6f3ff', 12, 4, 0.2);
}
p.passedEcho = touching;
if(ghost.recording){
ghost.frames.push({x:p.x,y:p.y,w:p.w,h:p.h});
if(ghost.frames.length > 150){
ghost.recording = false;
ghost.available = true;
}
if(!touching && ghost.frames.length > 20){
ghost.recording = false;
ghost.available = true;
addParticles(echoDoor.x + echoDoor.w / 2, echoDoor.y + 20, '#ffffff', 8, 3, 0.1);
}
}
}
function updateGhost(){
beam.blocked = false;
echoSensor.on = false;
if(!ghost.replaying) return;
if(ghost.playIndex >= ghost.frames.length){
ghost.replaying = false;
return;
}
var f = ghost.frames[ghost.playIndex];
var ghostBox = {x:f.x,y:f.y,w:f.w,h:f.h};
if(overlap(ghostBox, echoSensor)){
echoSensor.on = true;
if(!ghost.triggered){
ghost.triggered = true;
score += 15;
addParticles(echoSensor.x + 12, echoSensor.y + 10, '#d6f3ff', 10, 3, 0.2);
}
}
if(ghostBox.x < beam.x1 && ghostBox.x + ghostBox.w > beam.x1 - 2 && ghostBox.y + ghostBox.h > beam.y1 && ghostBox.y < beam.y2){
beam.blocked = true;
}
if(ghost.playIndex % 3 === 0){
addParticles(ghostBox.x + ghostBox.w / 2, ghostBox.y + ghostBox.h / 2, '#d6f3ff', 1, 1.2, 0.1);
}
ghost.playIndex++;
}
function updateExits(){
fire.done = overlap(fire, exits.fire);
water.done = overlap(water, exits.water);
var allGems = true;
for(var i=0;i<gems.length;i++) if(!gems[i].taken) allGems = false;
if(fire.done && water.done && allGems && echoSensor.on && auraDoor.open) winGame();
}
function updateParticles(){
for(var i=particles.length-1;i>=0;i--){
var p = particles[i];
p.x += p.vx;
p.y += p.vy;
p.vy += 0.05;
p.life--;
if(p.life <= 0) particles.splice(i,1);
}
for(i=trails.length-1;i>=0;i--){
trails[i].life--;
if(trails[i].life <= 0) trails.splice(i,1);
}
}
function updateAmbient(){
for(var i=0;i<ambient.length;i++){
ambient[i].y += ambient[i].v * 0.15;
if(ambient[i].y > 500){
ambient[i].y = -10;
ambient[i].x = Math.random()*800;
}
}
}
function update(){
if(state === 'playing'){
roomTimer++;
pulse += 0.05;
fire.breathe += 0.08;
water.breathe += 0.08;
movePlayer(fire, active === 'fire');
movePlayer(water, active === 'water');
updateSwitch();
updateAura();
updateEchoDoor();
updateGhost();
updateHazardsFor(fire);
updateHazardsFor(water);
updateGems();
updateExits();
if(flash > 0) flash--;
if(messageTimer > 0) messageTimer--;
}
if(screenShake > 0) screenShake *= 0.82;
if(impactFlash > 0) impactFlash *= 0.84;
updateAmbient();
updateParticles();
}
function drawTempleBackground(){
var grad = ctx.createLinearGradient(0,0,0,500);
grad.addColorStop(0,'#060d1b');
grad.addColorStop(1,'#0a1224');
ctx.fillStyle = grad;
ctx.fillRect(0,0,800,500);
for(var i=0;i<8;i++){
ctx.fillStyle = i % 2 === 0 ? '#0d1830' : '#0a1327';
ctx.fillRect(i*100, 0, 50, 500);
}
ctx.strokeStyle = '#13233b';
for(i=0;i<800;i+=80){
ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,500);
ctx.stroke();
}
for(i=0;i<ambient.length;i++){
ctx.globalAlpha = ambient[i].a;
ctx.fillStyle = ambient[i].c;
ctx.fillRect(ambient[i].x, ambient[i].y, ambient[i].s, ambient[i].s);
}
ctx.globalAlpha = 1;
ctx.fillStyle = '#07101d';
ctx.fillRect(0,430,800,70);
}
function drawPlatform(pl){
var grad = ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+pl.h);
grad.addColorStop(0,'#97a4b3');
grad.addColorStop(1,'#5d6875');
ctx.fillStyle = grad;
ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
ctx.fillStyle = '#c8d1da';
ctx.fillRect(pl.x, pl.y, pl.w, 2);
ctx.strokeStyle = '#3d4958';
ctx.strokeRect(pl.x, pl.y, pl.w, pl.h);
ctx.fillStyle = '#00000022';
ctx.fillRect(pl.x, pl.y + pl.h - 2, pl.w, 2);
}
function drawHazard(h){
ctx.save();
if(h.type === 'lava'){
var lg = ctx.createLinearGradient(h.x,h.y,h.x,h.y+h.h);
lg.addColorStop(0,'#ff8a3d');
lg.addColorStop(0.45,'#ff4a21');
lg.addColorStop(1,'#b01600');
ctx.fillStyle = lg;
ctx.shadowColor = '#ff5a2a';
ctx.shadowBlur = 16;
ctx.fillRect(h.x, h.y, h.w, h.h);
ctx.fillStyle = '#ffd27a';
for(var i=0;i<h.w;i+=18){
ctx.fillRect(h.x + i, h.y + 2 + Math.sin((pulse*2)+i*0.2)*2, 10, 3);
}
}else{
var wg = ctx.createLinearGradient(h.x,h.y,h.x,h.y+h.h);
wg.addColorStop(0,'#68e1ff');
wg.addColorStop(0.5,'#00b7ff');
wg.addColorStop(1,'#005f9a');
ctx.fillStyle = wg;
ctx.shadowColor = '#00d8ff';
ctx.shadowBlur = 16;
ctx.fillRect(h.x, h.y, h.w, h.h);
ctx.fillStyle = '#d7fbff';
for(var j=0;j<h.w;j+=18){
ctx.fillRect(h.x + j, h.y + 2 + Math.sin((pulse*2)+j*0.2)*2, 10, 2);
}
}
ctx.restore();
}
function drawGem(g){
ctx.save();
ctx.translate(g.x, g.y);
ctx.rotate(g.spin);
ctx.fillStyle = g.type === 'fire' ? '#ffb347' : '#7ae7ff';
ctx.shadowColor = g.type === 'fire' ? '#ffb347' : '#7ae7ff';
ctx.shadowBlur = 14;
ctx.beginPath();
ctx.moveTo(0,-9);
ctx.lineTo(7,0);
ctx.lineTo(0,9);
ctx.lineTo(-7,0);
ctx.closePath();
ctx.fill();
ctx.fillStyle = '#ffffffaa';
ctx.fillRect(-1,-6,2,4);
ctx.restore();
}
function drawExit(ex, type, filled){
ctx.save();
ctx.strokeStyle = type === 'fire' ? '#ff6a00' : '#00d8ff';
ctx.lineWidth = 3;
ctx.shadowColor = type === 'fire' ? '#ff6a00' : '#00d8ff';
ctx.shadowBlur = 14 + Math.sin(pulse*2) * 3;
ctx.strokeRect(ex.x, ex.y, ex.w, ex.h);
ctx.fillStyle = filled ? (type === 'fire' ? '#ff6a0066' : '#00d8ff66') : '#ffffff10';
ctx.fillRect(ex.x + 4, ex.y + 4, ex.w - 8, ex.h - 8);
ctx.fillStyle = type === 'fire' ? '#ffb347' : '#9fefff';
ctx.fillRect(ex.x + 10, ex.y + 10, ex.w - 20, 6);
ctx.fillStyle = '#ffffff55';
ctx.fillRect(ex.x + 12, ex.y + 18, ex.w - 24, 10);
ctx.restore();
}
function drawSwitchPad(){
ctx.save();
ctx.fillStyle = switchActive() ? '#7dff8a' : '#2d5a38';
ctx.shadowColor = switchActive() ? '#7dff8a' : 'transparent';
ctx.shadowBlur = switchActive() ? 16 : 0;
ctx.fillRect(switchPad.x, switchPad.y, switchPad.w, switchPad.h);
ctx.strokeStyle = '#b7ffc0';
ctx.strokeRect(switchPad.x, switchPad.y, switchPad.w, switchPad.h);
if(switchActive()){
ctx.globalAlpha = 0.35 + Math.sin(pulse*5) * 0.1;
ctx.fillStyle = '#caffcf';
ctx.fillRect(switchPad.x - 4, switchPad.y - 4, switchPad.w + 8, switchPad.h + 8);
}
ctx.restore();
}
function drawBridge(){
if(!switchActive()) return;
ctx.save();
var bg = ctx.createLinearGradient(bridge.x,bridge.y,bridge.x,bridge.y+bridge.h);
bg.addColorStop(0,'#b7ffbc');
bg.addColorStop(1,'#59dc6f');
ctx.fillStyle = bg;
ctx.shadowColor = '#8eff98';
ctx.shadowBlur = 18;
ctx.fillRect(bridge.x, bridge.y, bridge.w, bridge.h);
ctx.strokeStyle = '#dbffe1';
ctx.strokeRect(bridge.x, bridge.y, bridge.w, bridge.h);
var ratio = switchTimer / maxSwitchTimer;
ctx.fillStyle = ratio < 0.25 ? '#ffef7a' : '#d8ffd7';
ctx.fillRect(bridge.x, bridge.y - 9, bridge.w * ratio, 5);
ctx.strokeStyle = '#ffffff55';
ctx.strokeRect(bridge.x, bridge.y - 9, bridge.w, 5);
ctx.restore();
}
function drawEchoDoor(){
ctx.save();
ctx.strokeStyle = '#d6f3ff';
ctx.lineWidth = 2;
ctx.shadowColor = '#d6f3ff';
ctx.shadowBlur = 16;
ctx.strokeRect(echoDoor.x, echoDoor.y, echoDoor.w, echoDoor.h);
ctx.globalAlpha = 0.25 + Math.sin(pulse * 4) * 0.12;
ctx.fillStyle = '#bdefff';
ctx.fillRect(echoDoor.x + 3, echoDoor.y + 3, echoDoor.w - 6, echoDoor.h - 6);
ctx.globalAlpha = 1;
ctx.fillStyle = '#ffffff';
ctx.fillRect(echoDoor.x + 7, echoDoor.y + 10, 10, 2);
ctx.fillRect(echoDoor.x + 7, echoDoor.y + 22, 10, 2);
ctx.fillRect(echoDoor.x + 7, echoDoor.y + 34, 10, 2);
ctx.restore();
}
function drawEchoSensor(){
ctx.save();
ctx.fillStyle = echoSensor.on ? '#d6f3ff' : '#33495d';
ctx.shadowColor = echoSensor.on ? '#d6f3ff' : 'transparent';
ctx.shadowBlur = echoSensor.on ? 16 : 0;
ctx.fillRect(echoSensor.x, echoSensor.y, echoSensor.w, echoSensor.h);
ctx.strokeStyle = '#e8f7ff';
ctx.strokeRect(echoSensor.x, echoSensor.y, echoSensor.w, echoSensor.h);
ctx.fillStyle = '#ffffff';
ctx.fillRect(echoSensor.x + 6, echoSensor.y + 8, 12, 4);
ctx.fillRect(echoSensor.x + 6, echoSensor.y + 18, 12, 4);
ctx.restore();
if(echoSensor.on){
ctx.save();
ctx.fillStyle = '#d6f3ff';
ctx.shadowColor = '#d6f3ff';
ctx.shadowBlur = 18;
ctx.fillRect(echoBridge.x, echoBridge.y, echoBridge.w, echoBridge.h);
ctx.strokeStyle = '#ffffff';
ctx.strokeRect(echoBridge.x, echoBridge.y, echoBridge.w, echoBridge.h);
ctx.restore();
}
}
function drawRelayCrystal(){
ctx.save();
ctx.beginPath();
ctx.arc(relayCrystal.x, relayCrystal.y, relayCrystal.radius, 0, Math.PI * 2);
ctx.strokeStyle = '#00d8ff22';
ctx.stroke();
ctx.translate(relayCrystal.x, relayCrystal.y);
ctx.rotate(pulse);
ctx.fillStyle = relayCrystal.powered ? '#7ae7ff' : '#2d4660';
ctx.shadowColor = relayCrystal.powered ? '#7ae7ff' : 'transparent';
ctx.shadowBlur = relayCrystal.powered ? 20 : 0;
ctx.beginPath();
ctx.moveTo(0,-18);
ctx.lineTo(16,0);
ctx.lineTo(0,18);
ctx.lineTo(-16,0);
ctx.closePath();
ctx.fill();
ctx.strokeStyle = '#d8f8ff';
ctx.stroke();
ctx.restore();
}
function drawAuraDoor(){
if(auraDoor.open) return;
ctx.save();
ctx.fillStyle = '#1f5c7a';
ctx.shadowColor = '#00d8ff';
ctx.shadowBlur = 10;
ctx.fillRect(auraDoor.x, auraDoor.y, auraDoor.w, auraDoor.h);
ctx.strokeStyle = '#bdefff';
ctx.strokeRect(auraDoor.x, auraDoor.y, auraDoor.w, auraDoor.h);
ctx.restore();
}
function drawBeam(){
if(beam.blocked) return;
ctx.save();
ctx.strokeStyle = '#d6f3ff';
ctx.lineWidth = 4;
ctx.shadowColor = '#d6f3ff';
ctx.shadowBlur = 14;
ctx.beginPath();
ctx.moveTo(beam.x1, beam.y1);
ctx.lineTo(beam.x2, beam.y2);
ctx.stroke();
ctx.restore();
}
function drawTrails(){
for(var i=0;i<trails.length;i++){
var t = trails[i];
ctx.globalAlpha = t.life / 20;
ctx.fillStyle = t.type === 'fire' ? '#ff7f3277' : '#3ad8ff66';
ctx.shadowColor = t.type === 'fire' ? '#ff6a00' : '#00d8ff';
ctx.shadowBlur = 10;
ctx.fillRect(t.x - t.w * 0.35, t.y - t.h * 0.35, t.w * 0.7, t.h * 0.7);
}
ctx.globalAlpha = 1;
ctx.shadowBlur = 0;
}
function drawGhost(){
if(!ghost.replaying || ghost.playIndex >= ghost.frames.length) return;
var f = ghost.frames[ghost.playIndex];
ctx.save();
ctx.globalAlpha = 0.45;
ctx.fillStyle = '#d6f3ff';
ctx.shadowColor = '#d6f3ff';
ctx.shadowBlur = 18;
ctx.fillRect(f.x, f.y, f.w, f.h);
ctx.strokeStyle = '#ffffff';
ctx.strokeRect(f.x, f.y, f.w, f.h);
ctx.restore();
}
function drawPlayer(p){
ctx.save();
var activeNow = active === p.type;
var bob = activeNow ? 0 : Math.sin(p.breathe) * 1.5;
ctx.translate(0, bob);
ctx.fillStyle = p.color;
ctx.shadowColor = p.color;
ctx.shadowBlur = activeNow ? 20 : 8;
if(p.type === 'fire'){
ctx.beginPath();
ctx.moveTo(p.x + p.w / 2, p.y - 2);
ctx.lineTo(p.x + p.w, p.y + p.h - 2);
ctx.lineTo(p.x, p.y + p.h - 2);
ctx.closePath();
ctx.fill();
ctx.fillRect(p.x + 5, p.y + 10, p.w - 10, p.h - 8);
ctx.fillStyle = '#ffd38a';
ctx.beginPath();
ctx.moveTo(p.x + p.w / 2, p.y + 2);
ctx.lineTo(p.x + p.w - 6, p.y + p.h - 4);
ctx.lineTo(p.x + 6, p.y + p.h - 4);
ctx.closePath();
ctx.fill();
}else{
ctx.beginPath();
ctx.moveTo(p.x + p.w / 2, p.y - 2);
ctx.quadraticCurveTo(p.x + p.w + 4, p.y + 8, p.x + p.w - 2, p.y + p.h);
ctx.lineTo(p.x + 2, p.y + p.h);
ctx.quadraticCurveTo(p.x - 4, p.y + 8, p.x + p.w / 2, p.y - 2);
ctx.fill();
ctx.fillStyle = '#aef6ff';
ctx.beginPath();
ctx.moveTo(p.x + p.w / 2, p.y + 2);
ctx.quadraticCurveTo(p.x + p.w - 2, p.y + 10, p.x + p.w - 5, p.y + p.h - 4);
ctx.lineTo(p.x + 5, p.y + p.h - 4);
ctx.quadraticCurveTo(p.x + 2, p.y + 10, p.x + p.w / 2, p.y + 2);
ctx.fill();
}
ctx.fillStyle = '#ffffff';
ctx.fillRect(p.x + 6, p.y + 8, 4, 4);
ctx.fillRect(p.x + p.w - 10, p.y + 8, 4, 4);
if(!activeNow){
ctx.beginPath();
ctx.arc(p.x + p.w / 2, p.y + p.h / 2, 42, 0, Math.PI * 2);
ctx.strokeStyle = p.type === relayCrystal.element ? '#7ae7ff55' : '#ffb34733';
ctx.stroke();
}
if(activeNow){
ctx.lineWidth = 4;
ctx.strokeStyle = flash > 0 ? '#ffffff' : '#ffee88';
ctx.shadowColor = flash > 0 ? '#ffffff' : '#ffee88';
ctx.shadowBlur = 12;
ctx.strokeRect(p.x - 3, p.y - 3, p.w + 6, p.h + 6);
}else{
ctx.globalAlpha = 0.55;
ctx.strokeStyle = '#7d8ba5';
ctx.strokeRect(p.x, p.y, p.w, p.h);
}
if(p.done){
ctx.strokeStyle = '#ffffff';
ctx.lineWidth = 2;
ctx.strokeRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
}
ctx.restore();
}
function drawParticles(){
for(var i=0;i<particles.length;i++){
var p = particles[i];
ctx.globalAlpha = Math.max(0, p.life / 40);
ctx.fillStyle = p.color;
ctx.shadowColor = p.color;
ctx.shadowBlur = 8;
ctx.fillRect(p.x, p.y, p.size, p.size);
}
ctx.globalAlpha = 1;
ctx.shadowBlur = 0;
}
function gemCounts(){
var taken = 0;
for(var i=0;i<gems.length;i++) if(gems[i].taken) taken++;
return taken;
}
function drawBlueprintLinks(){
ctx.save();
ctx.strokeStyle = '#1e3553';
ctx.setLineDash([5,5]);
ctx.beginPath();
ctx.moveTo(switchPad.x + 16, switchPad.y + 6);
ctx.lineTo(bridge.x + 10, bridge.y + 6);
ctx.lineTo(relayCrystal.x, relayCrystal.y);
ctx.lineTo(auraDoor.x + 9, auraDoor.y + 24);
ctx.lineTo(echoDoor.x + 12, echoDoor.y + 24);
ctx.lineTo(echoSensor.x + 12, echoSensor.y + 16);
ctx.stroke();
ctx.setLineDash([]);
ctx.restore();
}
function renderUI(){
ctx.save();
ctx.fillStyle = '#07111ecc';
ctx.fillRect(10,10,360,130);
ctx.strokeStyle = '#1f3a5d';
ctx.strokeRect(10,10,360,130);
ctx.fillStyle = '#e8f6ff';
ctx.font = 'bold 18px Arial';
ctx.fillText('Score: ' + score, 20, 32);
ctx.font = '16px Arial';
ctx.fillText('Gems: ' + gemCounts() + '/' + gems.length, 20, 56);
ctx.fillStyle = active === 'fire' ? '#ffb347' : '#7ae7ff';
ctx.fillText('Active: ' + active, 20, 80);
ctx.fillStyle = '#b9cde0';
ctx.font = '14px Arial';
ctx.fillText('Move: A/D or Arrows   Jump: W/Up/Space', 20, 102);
ctx.fillText('Switch: Q or Shift   Reset: R', 20, 120);
ctx.fillStyle = '#07111ecc';
ctx.fillRect(430,10,360,88);
ctx.strokeStyle = '#1f3a5d';
ctx.strokeRect(430,10,360,88);
if(switchActive()){
ctx.fillStyle = '#aaffb1';
ctx.font = 'bold 16px Arial';
ctx.fillText('Bridge memory', 442, 30);
ctx.fillStyle = '#183325';
ctx.fillRect(550,18,150,14);
ctx.fillStyle = switchTimer / maxSwitchTimer < 0.25 ? '#ffef7a' : '#85ff96';
ctx.fillRect(550,18,150 * (switchTimer / maxSwitchTimer),14);
ctx.strokeStyle = '#d8ffd7';
ctx.strokeRect(550,18,150,14);
ctx.fillStyle = '#d8ffd7';
ctx.font = '14px Arial';
ctx.fillText((switchTimer / 60).toFixed(1) + 's', 710, 30);
}else{
ctx.fillStyle = '#8fa2b8';
ctx.font = '16px Arial';
ctx.fillText('Bridge memory: off', 442, 30);
}
ctx.fillStyle = ghost.available ? '#d6f3ff' : '#6f859c';
ctx.fillText('Echo stored: ' + (ghost.available ? 'yes' : ghost.recording ? 'recording' : 'no'), 442, 54);
ctx.fillStyle = relayCrystal.powered ? '#7ae7ff' : '#6f859c';
ctx.fillText('Aura crystal: ' + (relayCrystal.powered ? 'powered' : 'idle'), 600, 54);
ctx.fillStyle = echoSensor.on ? '#d6f3ff' : '#6f859c';
ctx.fillText('Echo sensor: ' + (echoSensor.on ? 'open' : 'closed'), 442, 78);
ctx.fillStyle = auraDoor.open ? '#7ae7ff' : '#6f859c';
ctx.fillText('Aura gate: ' + (auraDoor.open ? 'open' : 'closed'), 600, 78);
ctx.fillStyle = '#07111ecc';
ctx.fillRect(430,106,360,34);
ctx.strokeStyle = '#1f3a5d';
ctx.strokeRect(430,106,360,34);
ctx.fillStyle = '#d7e8f8';
ctx.font = '14px Arial';
ctx.fillText('Win: both exits + all gems + live aura gate + echo bridge', 440, 128);
ctx.restore();
}
function renderOverlayPanel(title, lines, accent, sub){
ctx.fillStyle = '#02060ddd';
ctx.fillRect(0,0,800,500);
ctx.strokeStyle = accent;
ctx.lineWidth = 2;
ctx.strokeRect(120,90,560,320);
ctx.fillStyle = '#08111fee';
ctx.fillRect(130,100,540,300);
ctx.fillStyle = accent;
ctx.font = 'bold 34px Arial';
ctx.fillText(title, 400 - ctx.measureText(title).width / 2, 150);
ctx.fillStyle = '#e8f6ff';
ctx.font = '18px Arial';
for(var i=0;i<lines.length;i++){
ctx.fillText(lines[i], 400 - ctx.measureText(lines[i]).width / 2, 200 + i * 32);
}
if(sub){
ctx.fillStyle = '#b7cce2';
ctx.font = '16px Arial';
ctx.fillText(sub, 400 - ctx.measureText(sub).width / 2, 360);
}
}
function render(){
ctx.clearRect(0,0,800,500);
ctx.save();
if(screenShake > 0){
ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
}
drawTempleBackground();
drawBlueprintLinks();
for(var i=0;i<platforms.length;i++) drawPlatform(platforms[i]);
for(i=0;i<hazards.length;i++) drawHazard(hazards[i]);
drawBeam();
drawSwitchPad();
drawBridge();
drawEchoDoor();
drawEchoSensor();
drawRelayCrystal();
drawAuraDoor();
for(i=0;i<gems.length;i++) if(!gems[i].taken) drawGem(gems[i]);
drawExit(exits.fire, 'fire', fire.done);
drawExit(exits.water, 'water', water.done);
drawTrails();
drawGhost();
drawPlayer(fire);
drawPlayer(water);
drawParticles();
renderUI();
ctx.restore();
if(impactFlash > 0){
ctx.fillStyle = 'rgba(255,255,255,' + impactFlash.toFixed(3) + ')';
ctx.fillRect(0,0,800,500);
}
if(state === 'menu'){
renderOverlayPanel('Echo Relay Temple',[
'Switch between Fire and Water. Only one moves at a time.',
'Green pad creates a bridge with fading memory.',
'Pass through the pale echo door, then switch to replay a ghost.',
'Park the inactive Water near the blue crystal to open its gate.',
'Reach both exits with all gems while the relay devices are active.'
],'#7ae7ff','Press Enter to start  •  Press Q or Shift to preview active avatar');
}
if(state === 'game_over'){
renderOverlayPanel('Temple Failed',[
failReason,
'Final Score: ' + score,
'Press R to restart'
],'#ff6a00','Relay across bodies, memory, and echoes.');
}
if(state === 'win'){
renderOverlayPanel('Temple Cleared',[
'Both avatars escaped the temporal relay chamber.',
'Final Score: ' + score,
'Press R to play again'
],'#7dff8a','You solved the bridge, echo, and aura chain.');
}
}
function loop(){
update();
render();
requestAnimationFrame(loop);
}
reset();
loop();
};
</script>
</body>
</html>
