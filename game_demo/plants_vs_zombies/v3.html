<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Resonance Garden</title>
<style>
body { margin: 0; background: radial-gradient(circle at top, #0a1630 0%, #040812 55%, #02040a 100%); color: #9ff; font-family: Arial, sans-serif; overflow: hidden; }
canvas { width: 800px; height: 500px; display: block; margin: 0 auto; background: linear-gradient(180deg, #08111f 0%, #07101c 100%); box-shadow: 0 0 24px rgba(0,255,255,0.18), 0 0 60px rgba(255,0,255,0.08), inset 0 0 40px rgba(0,180,255,0.06); }
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 500;

var rows = 5;
var cols = 8;
var cellW = 70;
var cellH = 68;
var gridX = 120;
var gridY = 90;
var laneCenters = [];
for (var r = 0; r < rows; r++) laneCenters.push(gridY + r * cellH + cellH / 2);

var selectedCard = 'shooter';
var mouse = { x: 0, y: 0 };
var particles = [];
var bullets = [];
var enemies = [];
var plants = [];
var floatTexts = [];
var waveIndex = 0;
var waveActive = false;
var waveTimer = 0;
var spawnTimer = 0;
var spawnIndex = 0;
var intermission = 6;
var gameTime = 0;
var energy = 180;
var baseHealth = 12;
var gameOver = false;
var victory = false;
var waveBannerTimer = 0;
var hoveredCell = null;

var laneStates = [];
for (var i = 0; i < rows; i++) {
  laneStates.push({ bent: false, bendTimer: 0, usedThisWave: false, pulse: 0 });
}

var cards = {
  shooter: { cost: 75, color: '#5cf' },
  generator: { cost: 50, color: '#ffb347' }
};

var waves = [
  {
    title: 'Teach The Block',
    duration: 18,
    forecast: [1, 3, 1, 2, 1],
    objective: {
      type: 'charge_end',
      text: 'Wave challenge: end with at least 1 generator at full charge',
      target: 1,
      progress: 0,
      success: false,
      failed: false
    },
    spawns: [
      { t: 1, lane: 1, type: 'drone' },
      { t: 2.5, lane: 3, type: 'drone' },
      { t: 4, lane: 1, type: 'drone' },
      { t: 6, lane: 0, type: 'drone' },
      { t: 7.5, lane: 3, type: 'drone' },
      { t: 10, lane: 1, type: 'tank' },
      { t: 12, lane: 4, type: 'drone' },
      { t: 14, lane: 3, type: 'drone' }
    ]
  },
  {
    title: 'Sacrificial Lane',
    duration: 23,
    forecast: [4, 1, 5, 1, 3],
    objective: {
      type: 'bent_tank_kills',
      text: 'Wave challenge: destroy 2 tanks with bent resonance discharge',
      target: 2,
      progress: 0,
      success: false,
      failed: false
    },
    spawns: [
      { t: 1, lane: 2, type: 'drone' },
      { t: 2, lane: 0, type: 'drone' },
      { t: 3.5, lane: 2, type: 'drone' },
      { t: 5, lane: 4, type: 'drone' },
      { t: 6.5, lane: 2, type: 'tank' },
      { t: 8.5, lane: 0, type: 'drone' },
      { t: 10, lane: 4, type: 'tank' },
      { t: 12, lane: 2, type: 'drone' },
      { t: 15, lane: 0, type: 'tank' },
      { t: 18, lane: 2, type: 'drone' }
    ]
  },
  {
    title: 'Double Pressure Split',
    duration: 26,
    forecast: [5, 1, 2, 5, 1],
    objective: {
      type: 'charged_lane_plan',
      text: 'Wave challenge: absorb 10 allied shots on low-pressure lanes',
      target: 10,
      progress: 0,
      success: false,
      failed: false
    },
    spawns: [
      { t: 1, lane: 0, type: 'drone' },
      { t: 2, lane: 3, type: 'drone' },
      { t: 3, lane: 0, type: 'tank' },
      { t: 4.5, lane: 3, type: 'tank' },
      { t: 6, lane: 2, type: 'drone' },
      { t: 7.5, lane: 1, type: 'drone' },
      { t: 9, lane: 4, type: 'drone' },
      { t: 11, lane: 0, type: 'drone' },
      { t: 13, lane: 3, type: 'drone' },
      { t: 15, lane: 2, type: 'tank' },
      { t: 17, lane: 0, type: 'drone' },
      { t: 18.5, lane: 3, type: 'drone' },
      { t: 20, lane: 1, type: 'drone' },
      { t: 22, lane: 4, type: 'tank' }
    ]
  }
];

function resetGame() {
  selectedCard = 'shooter';
  particles = [];
  bullets = [];
  enemies = [];
  plants = [];
  floatTexts = [];
  waveIndex = 0;
  waveActive = false;
  waveTimer = 0;
  spawnTimer = 0;
  spawnIndex = 0;
  intermission = 6;
  gameTime = 0;
  energy = 180;
  baseHealth = 12;
  gameOver = false;
  victory = false;
  waveBannerTimer = 0;
  for (var i = 0; i < rows; i++) {
    laneStates[i] = { bent: false, bendTimer: 0, usedThisWave: false, pulse: 0 };
  }
  for (var w = 0; w < waves.length; w++) {
    waves[w].objective.progress = 0;
    waves[w].objective.success = false;
    waves[w].objective.failed = false;
  }
}

function makePlant(type, row, col) {
  var x = gridX + col * cellW + cellW / 2;
  var y = gridY + row * cellH + cellH / 2;
  if (type === 'shooter') {
    return { type: 'shooter', row: row, col: col, x: x, y: y, hp: 6, fireCd: 0.2, fireRate: 1.1 };
  }
  return { type: 'generator', row: row, col: col, x: x, y: y, hp: 7, charge: 0, maxCharge: 8, pulse: 0, absorbedThisWave: 0 };
}

function getPlantAt(row, col) {
  for (var i = 0; i < plants.length; i++) {
    if (plants[i].row === row && plants[i].col === col) return plants[i];
  }
  return null;
}

function spawnEnemy(lane, type) {
  var y = laneCenters[lane];
  var enemy;
  if (type === 'tank') {
    enemy = { lane: lane, x: 790, y: y, type: 'tank', hp: 20, maxHp: 20, speed: 12, damage: 2, hitFlash: 0, taggedByBent: 0 };
  } else {
    enemy = { lane: lane, x: 790, y: y, type: 'drone', hp: 8, maxHp: 8, speed: 22, damage: 1, hitFlash: 0, taggedByBent: 0 };
  }
  enemies.push(enemy);
}

function addFloat(text, x, y, color) {
  floatTexts.push({ text: text, x: x, y: y, color: color, life: 1 });
}

function addParticle(x, y, color, vx, vy, life, size) {
  particles.push({ x: x, y: y, color: color, vx: vx, vy: vy, life: life, maxLife: life, size: size });
}

function fireBullet(plant) {
  bullets.push({ x: plant.x + 18, y: plant.y, row: plant.row, speed: 240, damage: 1.5, fromCol: plant.col, color: '#7df' });
  for (var i = 0; i < 3; i++) addParticle(plant.x + 18, plant.y, '#7df', 40 + Math.random() * 60, (Math.random() - 0.5) * 30, 0.25, 2);
}

function releaseGenerator(gen) {
  if (gen.charge <= 0) return;
  var lane = laneStates[gen.row];
  var power = gen.charge;
  gen.charge = 0;
  gen.pulse = 0.8;
  if (lane.bent) {
    for (var pulse = 0; pulse < 3; pulse++) {
      bullets.push({ x: gen.x + 10, y: gen.y, row: gen.row, speed: 340 + pulse * 20, damage: 2 + power * 0.8, radius: 22 + power * 2, resonance: true, bent: true, life: 1.8, delay: pulse * 0.12, color: '#ff59ff', source: 'generator' });
    }
    addFloat('Bent Resonance!', gen.x - 10, gen.y - 18, '#ff8cff');
    for (var i = 0; i < 16; i++) addParticle(gen.x, gen.y, '#ff59ff', (Math.random() - 0.2) * 160, (Math.random() - 0.5) * 90, 0.7, 3 + Math.random() * 3);
  } else {
    bullets.push({ x: gen.x + 10, y: gen.y, row: gen.row, speed: 260, damage: 1.2 + power * 0.7, radius: 16 + power * 1.5, resonance: true, bent: false, life: 1.2, delay: 0, color: '#ffd966', source: 'generator' });
    addFloat('Pulse Release', gen.x - 5, gen.y - 18, '#ffd966');
    for (var j = 0; j < 10; j++) addParticle(gen.x, gen.y, '#ffd966', (Math.random() - 0.2) * 120, (Math.random() - 0.5) * 70, 0.5, 2 + Math.random() * 2);
  }
}

function damageEnemy(enemy, dmg, bentTag) {
  enemy.hp -= dmg;
  enemy.hitFlash = 0.12;
  if (bentTag) enemy.taggedByBent = 0.4;
  for (var i = 0; i < 3; i++) addParticle(enemy.x, enemy.y, bentTag ? '#ff8cff' : '#7df', (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 40, 0.25, 2);
}

function killEnemy(enemy, sourceBent) {
  if (sourceBent && enemy.type === 'tank' && waveIndex < waves.length) {
    var obj = waves[waveIndex].objective;
    if (obj.type === 'bent_tank_kills') {
      obj.progress += 1;
      if (obj.progress >= obj.target) obj.success = true;
      addFloat('Objective +1', enemy.x - 10, enemy.y - 16, '#ff8cff');
    }
  }
  energy += enemy.type === 'tank' ? 18 : 8;
  for (var i = 0; i < 8; i++) addParticle(enemy.x, enemy.y, enemy.type === 'tank' ? '#ff9a3c' : '#7df', (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 60, 0.5, 2 + Math.random() * 3);
}

function startWave() {
  if (waveIndex >= waves.length) return;
  waveActive = true;
  waveTimer = 0;
  spawnIndex = 0;
  waveBannerTimer = 2.2;
  for (var i = 0; i < rows; i++) {
    laneStates[i].usedThisWave = false;
    laneStates[i].bent = false;
    laneStates[i].bendTimer = 0;
  }
  for (var p = 0; p < plants.length; p++) {
    if (plants[p].type === 'generator') plants[p].absorbedThisWave = 0;
  }
}

function endWave() {
  if (!waveActive) return;
  waveActive = false;
  var obj = waves[waveIndex].objective;
  if (obj.type === 'charge_end') {
    var full = 0;
    for (var i = 0; i < plants.length; i++) {
      if (plants[i].type === 'generator' && plants[i].charge >= plants[i].maxCharge) full++;
    }
    obj.progress = full;
    obj.success = full >= obj.target;
    obj.failed = !obj.success;
  }
  if (obj.type === 'charged_lane_plan') {
    obj.success = obj.progress >= obj.target;
    obj.failed = !obj.success;
  }
  if (obj.type === 'bent_tank_kills') {
    obj.success = obj.progress >= obj.target;
    obj.failed = !obj.success;
  }
  waveIndex += 1;
  intermission = 5.5;
}

function lowPressureLane(row) {
  var forecast = waveIndex < waves.length ? waves[waveIndex].forecast : [1,1,1,1,1];
  var min = 999;
  for (var i = 0; i < forecast.length; i++) if (forecast[i] < min) min = forecast[i];
  return forecast[row] === min;
}

function update(dt) {
  if (gameOver || victory) return;
  gameTime += dt;
  energy += dt * 5.5;
  if (energy > 999) energy = 999;
  if (waveBannerTimer > 0) waveBannerTimer -= dt;

  if (!waveActive) {
    intermission -= dt;
    if (intermission <= 0 && waveIndex < waves.length) startWave();
  } else {
    waveTimer += dt;
    var wave = waves[waveIndex];
    while (spawnIndex < wave.spawns.length && wave.spawns[spawnIndex].t <= waveTimer) {
      spawnEnemy(wave.spawns[spawnIndex].lane, wave.spawns[spawnIndex].type);
      spawnIndex++;
    }
    if (waveTimer >= wave.duration && spawnIndex >= wave.spawns.length && enemies.length === 0) {
      endWave();
    }
  }

  for (var r = 0; r < rows; r++) {
    var lane = laneStates[r];
    if (lane.bent) {
      lane.bendTimer -= dt;
      lane.pulse = Math.max(lane.pulse, 0.3);
      if (lane.bendTimer <= 0) lane.bent = false;
    }
    lane.pulse = Math.max(0, lane.pulse - dt);
  }

  for (var i = plants.length - 1; i >= 0; i--) {
    var p = plants[i];
    if (p.type === 'shooter') {
      p.fireCd -= dt;
      var hasEnemy = false;
      for (var e = 0; e < enemies.length; e++) {
        if (enemies[e].lane === p.row && enemies[e].x > p.x - 10) {
          hasEnemy = true;
          break;
        }
      }
      if (hasEnemy && p.fireCd <= 0) {
        fireBullet(p);
        p.fireCd = p.fireRate;
      }
    } else {
      p.pulse = Math.max(0, p.pulse - dt);
    }
  }

  for (var b = bullets.length - 1; b >= 0; b--) {
    var bullet = bullets[b];
    if (bullet.delay && bullet.delay > 0) {
      bullet.delay -= dt;
      continue;
    }
    bullet.x += bullet.speed * dt;
    if (bullet.life !== undefined) bullet.life -= dt;
    var removed = false;

    if (!bullet.resonance) {
      var nearestGen = null;
      var nearestX = 9999;
      for (var gp = 0; gp < plants.length; gp++) {
        var plant = plants[gp];
        if (plant.type === 'generator' && plant.row === bullet.row && plant.col > bullet.fromCol) {
          if (plant.x < nearestX) {
            nearestX = plant.x;
            nearestGen = plant;
          }
        }
      }
      if (nearestGen && bullet.x >= nearestGen.x - 10) {
        nearestGen.charge = Math.min(nearestGen.maxCharge, nearestGen.charge + 1);
        nearestGen.pulse = 0.45;
        nearestGen.absorbedThisWave += 1;
        if (waveActive && waveIndex < waves.length) {
          var objNow = waves[waveIndex].objective;
          if (objNow.type === 'charged_lane_plan' && lowPressureLane(nearestGen.row)) {
            objNow.progress += 1;
            if (objNow.progress >= objNow.target) objNow.success = true;
          }
        }
        addFloat('+charge', nearestGen.x - 12, nearestGen.y - 14, '#ffd966');
        for (var ap = 0; ap < 8; ap++) addParticle(nearestGen.x, nearestGen.y, '#ffd966', (Math.random() - 0.5) * 70, (Math.random() - 0.5) * 70, 0.35, 2 + Math.random() * 2);
        bullets.splice(b, 1);
        removed = true;
      }
    }
    if (removed) continue;

    for (var e2 = enemies.length - 1; e2 >= 0; e2--) {
      var enemy = enemies[e2];
      if (enemy.lane !== bullet.row) continue;
      var hitRadius = bullet.radius || 10;
      if (Math.abs(enemy.x - bullet.x) < hitRadius + 12) {
        damageEnemy(enemy, bullet.damage, bullet.bent);
        if (!bullet.resonance) {
          bullets.splice(b, 1);
        } else if (!bullet.bent) {
          bullets.splice(b, 1);
        }
        removed = true;
        break;
      }
    }
    if (removed) continue;
    if (bullet.x > canvas.width + 40 || bullet.life !== undefined && bullet.life <= 0) bullets.splice(b, 1);
  }

  for (var e = enemies.length - 1; e >= 0; e--) {
    var enemy = enemies[e];
    enemy.x -= enemy.speed * dt;
    enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
    enemy.taggedByBent = Math.max(0, enemy.taggedByBent - dt);
    if (enemy.hp <= 0) {
      killEnemy(enemy, enemy.taggedByBent > 0);
      enemies.splice(e, 1);
      continue;
    }
    if (enemy.x <= 70) {
      baseHealth -= enemy.damage;
      addFloat('-' + enemy.damage + ' base', 36, enemy.y - 10, '#ff6b6b');
      enemies.splice(e, 1);
      if (baseHealth <= 0) gameOver = true;
    }
  }

  for (var ft = floatTexts.length - 1; ft >= 0; ft--) {
    floatTexts[ft].life -= dt;
    floatTexts[ft].y -= 22 * dt;
    if (floatTexts[ft].life <= 0) floatTexts.splice(ft, 1);
  }

  for (var pt = particles.length - 1; pt >= 0; pt--) {
    var part = particles[pt];
    part.life -= dt;
    part.x += part.vx * dt;
    part.y += part.vy * dt;
    if (part.life <= 0) particles.splice(pt, 1);
  }

  if (waveIndex >= waves.length && !waveActive && enemies.length === 0) victory = true;
}

function drawLane(row) {
  var lane = laneStates[row];
  var y = laneCenters[row];
  ctx.strokeStyle = lane.bent ? 'rgba(255,100,255,0.9)' : 'rgba(90,220,255,0.35)';
  ctx.lineWidth = lane.bent ? 5 : 3;
  ctx.beginPath();
  ctx.moveTo(gridX - 10, y);
  if (lane.bent) {
    var lift = 18 + Math.sin(gameTime * 8 + row) * 4;
    ctx.quadraticCurveTo(gridX + cols * cellW / 2, y - lift, gridX + cols * cellW + 10, y);
  } else {
    ctx.lineTo(gridX + cols * cellW + 10, y);
  }
  ctx.stroke();
  if (lane.pulse > 0) {
    ctx.strokeStyle = 'rgba(255,255,255,' + (lane.pulse * 0.5) + ')';
    ctx.lineWidth = 9;
    ctx.stroke();
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#07111d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#0d1b2d';
  ctx.fillRect(0, 0, canvas.width, 72);
  ctx.fillStyle = '#0b1623';
  ctx.fillRect(0, 72, 100, canvas.height - 72);

  for (var r = 0; r < rows; r++) drawLane(r);

  for (var c = 0; c <= cols; c++) {
    ctx.strokeStyle = 'rgba(120,220,255,0.12)';
    ctx.beginPath();
    ctx.moveTo(gridX + c * cellW, gridY);
    ctx.lineTo(gridX + c * cellW, gridY + rows * cellH);
    ctx.stroke();
  }
  for (var rr = 0; rr <= rows; rr++) {
    ctx.beginPath();
    ctx.moveTo(gridX, gridY + rr * cellH);
    ctx.lineTo(gridX + cols * cellW, gridY + rr * cellH);
    ctx.stroke();
  }

  if (hoveredCell) {
    ctx.fillStyle = 'rgba(120,255,255,0.12)';
    ctx.fillRect(gridX + hoveredCell.col * cellW + 1, gridY + hoveredCell.row * cellH + 1, cellW - 2, cellH - 2);
  }

  for (var i = 0; i < plants.length; i++) {
    var p = plants[i];
    if (p.type === 'shooter') {
      ctx.fillStyle = '#3db7ff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#d7f7ff';
      ctx.fillRect(p.x + 4, p.y - 4, 16, 8);
      ctx.fillStyle = '#8ce8ff';
      ctx.fillText('S', p.x - 5, p.y + 5);
    } else {
      var swell = p.charge / p.maxCharge;
      var radius = 15 + swell * 8 + p.pulse * 6;
      ctx.fillStyle = 'rgba(255,180,70,0.18)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius + 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = p.charge >= p.maxCharge ? '#fff08a' : '#ffb347';
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff3c4';
      ctx.stroke();
      ctx.fillStyle = '#402300';
      ctx.fillText('G', p.x - 5, p.y + 5);
      ctx.fillStyle = '#fff08a';
      ctx.font = '11px Arial';
      ctx.fillText(p.charge + '/' + p.maxCharge, p.x - 16, p.y + 28);
      ctx.font = '14px Arial';
    }
  }

  for (var b = 0; b < bullets.length; b++) {
    var bullet = bullets[b];
    if (bullet.delay && bullet.delay > 0) continue;
    ctx.fillStyle = bullet.color || '#7df';
    if (bullet.resonance) {
      ctx.globalAlpha = bullet.bent ? 0.55 : 0.45;
      ctx.beginPath();
      ctx.arc(bullet.x, bullet.y, bullet.radius || 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = bullet.color || '#fff';
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (var e = 0; e < enemies.length; e++) {
    var enemy = enemies[e];
    ctx.fillStyle = enemy.type === 'tank' ? '#ff8c42' : '#ff5e7a';
    if (enemy.hitFlash > 0) ctx.fillStyle = '#ffffff';
    var w = enemy.type === 'tank' ? 28 : 20;
    var h = enemy.type === 'tank' ? 26 : 18;
    ctx.fillRect(enemy.x - w / 2, enemy.y - h / 2, w, h);
    if (enemy.taggedByBent > 0) {
      ctx.strokeStyle = '#ff8cff';
      ctx.lineWidth = 2;
      ctx.strokeRect(enemy.x - w / 2 - 3, enemy.y - h / 2 - 3, w + 6, h + 6);
    }
    ctx.fillStyle = '#111';
    ctx.fillRect(enemy.x - w / 2, enemy.y - h / 2 - 8, w, 4);
    ctx.fillStyle = '#7dff9a';
    ctx.fillRect(enemy.x - w / 2, enemy.y - h / 2 - 8, w * Math.max(0, enemy.hp / enemy.maxHp), 4);
  }

  for (var pt = 0; pt < particles.length; pt++) {
    var part = particles[pt];
    ctx.globalAlpha = Math.max(0, part.life / part.maxLife);
    ctx.fillStyle = part.color;
    ctx.beginPath();
    ctx.arc(part.x, part.y, part.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  for (var ft = 0; ft < floatTexts.length; ft++) {
    ctx.globalAlpha = Math.max(0, floatTexts[ft].life);
    ctx.fillStyle = floatTexts[ft].color;
    ctx.fillText(floatTexts[ft].text, floatTexts[ft].x, floatTexts[ft].y);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#9ff';
  ctx.font = '18px Arial';
  ctx.fillText('Resonance Garden', 18, 28);
  ctx.font = '14px Arial';
  ctx.fillText('Energy: ' + Math.floor(energy), 18, 50);
  ctx.fillText('Base: ' + baseHealth, 130, 50);
  ctx.fillText('Wave: ' + (waveIndex + 1 > waves.length ? waves.length : waveIndex + 1) + '/' + waves.length, 210, 50);

  var currentWave = waveIndex < waves.length ? waves[waveIndex] : waves[waves.length - 1];
  if (currentWave) {
    ctx.fillStyle = '#b7dfff';
    ctx.fillText('Forecast', 330, 28);
    for (var f = 0; f < rows; f++) {
      var val = currentWave.forecast[f];
      var x = 330 + f * 48;
      ctx.fillStyle = val >= 5 ? '#ff6b6b' : val >= 3 ? '#ffd166' : '#7dff9a';
      ctx.fillRect(x, 38, 30, 16);
      ctx.fillStyle = '#001018';
      ctx.fillText(String(val), x + 10, 51);
    }
    ctx.fillStyle = '#9ff';
    ctx.fillText(currentWave.title, 590, 28);
    ctx.font = '12px Arial';
    ctx.fillStyle = '#d6c8ff';
    var obj = currentWave.objective;
    ctx.fillText(obj.text, 330, 68);
    ctx.fillStyle = obj.success ? '#7dff9a' : obj.failed ? '#ff7a7a' : '#ffd166';
    ctx.fillText('Progress: ' + obj.progress + '/' + obj.target, 330, 84);
    ctx.font = '14px Arial';
  }

  ctx.fillStyle = selectedCard === 'shooter' ? 'rgba(61,183,255,0.4)' : 'rgba(61,183,255,0.15)';
  ctx.fillRect(10, 100, 80, 60);
  ctx.fillStyle = '#3db7ff';
  ctx.fillText('Shooter', 20, 122);
  ctx.fillStyle = '#9ff';
  ctx.fillText('75', 20, 145);
  ctx.fillText('fires', 20, 160);

  ctx.fillStyle = selectedCard === 'generator' ? 'rgba(255,179,71,0.4)' : 'rgba(255,179,71,0.15)';
  ctx.fillRect(10, 170, 80, 60);
  ctx.fillStyle = '#ffb347';
  ctx.fillText('Gen', 20, 192);
  ctx.fillStyle = '#fff0a0';
  ctx.fillText('50', 20, 215);
  ctx.fillText('blocks', 20, 230);

  for (var br = 0; br < rows; br++) {
    var bx = 690;
    var by = gridY + br * cellH + 14;
    ctx.fillStyle = laneStates[br].usedThisWave ? 'rgba(120,120,140,0.25)' : 'rgba(255,90,220,0.18)';
    ctx.fillRect(bx, by, 90, 28);
    ctx.strokeStyle = laneStates[br].bent ? '#ff8cff' : 'rgba(255,120,220,0.5)';
    ctx.strokeRect(bx, by, 90, 28);
    ctx.fillStyle = laneStates[br].usedThisWave ? '#889' : '#ffb8ff';
    ctx.fillText(laneStates[br].bent ? 'Bent' : 'Bend L' + (br + 1), bx + 16, by + 18);
  }

  if (!waveActive && !victory && !gameOver && waveIndex < waves.length) {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(235, 8, 220, 30);
    ctx.fillStyle = '#9ff';
    ctx.fillText('Next wave in ' + intermission.toFixed(1), 285, 28);
  }

  if (waveBannerTimer > 0 && waveIndex < waves.length) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(220, 200, 360, 70);
    ctx.fillStyle = '#ffb8ff';
    ctx.font = '24px Arial';
    ctx.fillText(waves[waveIndex].title, 270, 230);
    ctx.font = '14px Arial';
    ctx.fillStyle = '#d6c8ff';
    ctx.fillText(waves[waveIndex].objective.text, 245, 255);
  }

  if (gameOver || victory) {
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = victory ? '#7dff9a' : '#ff7a7a';
    ctx.font = '34px Arial';
    ctx.fillText(victory ? 'Circuit Stabilized' : 'Base Collapse', 250, 200);
    ctx.font = '16px Arial';
    ctx.fillStyle = '#dff';
    ctx.fillText(victory ? 'You completed all challenge waves.' : 'Enemies broke through the left base.', 255, 235);
    ctx.fillText('Click anywhere to restart', 300, 270);
  }

  ctx.font = '12px Arial';
  ctx.fillStyle = '#8fd';
  ctx.fillText('Place shooters behind generators to route fire into charge. Click charged generators to release. Bend once per lane each wave.', 110, 485);
}

function getCell(mx, my) {
  if (mx < gridX || mx >= gridX + cols * cellW || my < gridY || my >= gridY + rows * cellH) return null;
  return { col: Math.floor((mx - gridX) / cellW), row: Math.floor((my - gridY) / cellH) };
}

canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
  hoveredCell = getCell(mouse.x, mouse.y);
});

canvas.addEventListener('click', function(e) {
  var rect = canvas.getBoundingClientRect();
  var mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  var my = (e.clientY - rect.top) * (canvas.height / rect.height);

  if (gameOver || victory) {
    resetGame();
    return;
  }

  if (mx >= 10 && mx <= 90 && my >= 100 && my <= 160) {
    selectedCard = 'shooter';
    return;
  }
  if (mx >= 10 && mx <= 90 && my >= 170 && my <= 230) {
    selectedCard = 'generator';
    return;
  }

  for (var br = 0; br < rows; br++) {
    var bx = 690;
    var by = gridY + br * cellH + 14;
    if (mx >= bx && mx <= bx + 90 && my >= by && my <= by + 28) {
      if (!laneStates[br].usedThisWave && waveActive) {
        laneStates[br].usedThisWave = true;
        laneStates[br].bent = true;
        laneStates[br].bendTimer = 5.5;
        laneStates[br].pulse = 0.8;
        addFloat('Lane Bent', bx - 40, by + 18, '#ff8cff');
      }
      return;
    }
  }

  for (var i = 0; i < plants.length; i++) {
    var p = plants[i];
    var dx = mx - p.x;
    var dy = my - p.y;
    if (dx * dx + dy * dy < 24 * 24 && p.type === 'generator' && p.charge > 0) {
      releaseGenerator(p);
      return;
    }
  }

  var cell = getCell(mx, my);
  if (!cell) return;
  if (getPlantAt(cell.row, cell.col)) return;
  var cost = cards[selectedCard].cost;
  if (energy < cost) {
    addFloat('Need energy', mx - 20, my, '#ff7a7a');
    return;
  }
  energy -= cost;
  plants.push(makePlant(selectedCard, cell.row, cell.col));
  addFloat(selectedCard === 'shooter' ? 'Shooter' : 'Generator', mx - 10, my, '#9ff');
});

var lastTime = 0;
function loop(ts) {
  var dt = (ts - lastTime) / 1000;
  if (!lastTime) dt = 0;
  if (dt > 0.033) dt = 0.033;
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

resetGame();
requestAnimationFrame(loop);
};
</script>
</body>
