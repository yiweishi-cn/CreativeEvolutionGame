<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Resonance Garden</title>
<style>
body{margin:0;background:radial-gradient(circle at top,#0a1630,#050816 55%,#03040a);color:#9ff;font-family:Arial,sans-serif;overflow:hidden}
canvas{width:800px;height:500px;display:block;margin:20px auto;background:linear-gradient(180deg,#08111f,#050b16);box-shadow:0 0 20px #0ff3,0 0 60px #00f2 inset;border:1px solid #1be7ff33}
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

var mouse = {x:0,y:0,clicked:false};
var t = 0;

var grid = {
  rows: 4,
  cols: 8,
  x: 120,
  y: 90,
  cellW: 68,
  cellH: 82
};

var plantDefs = {
  shooter: {cost:50,name:'Shooter'},
  generator: {cost:75,name:'Generator'}
};

var game = {};

function resetGame(){
  game = {
    screenState:'start',
    energy:170,
    passiveEnergyTimer:0,
    currentWave:0,
    totalWaves:3,
    intermissionTimer:0,
    selectedCard:'shooter',
    plants:[],
    enemies:[],
    bullets:[],
    effects:[],
    floatTexts:[],
    occupancy:[],
    baseHealth:6,
    lanes:[],
    wavePlan:[],
    waveActive:false,
    tutorialTimer:0,
    spawnTimer:0,
    spawnedInWave:0,
    remainingToSpawn:0,
    waveResolved:false
  };
  for(var r=0;r<grid.rows;r++){
    game.occupancy[r] = [];
    game.lanes[r] = {
      forecast:1,
      bendAvailable:true,
      bendArmed:false,
      bendFlash:0,
      refract:0
    };
    for(var c=0;c<grid.cols;c++){
      game.occupancy[r][c] = null;
    }
  }
  prepareWave(1);
}

function prepareWave(num){
  game.currentWave = num;
  game.wavePlan = [];
  var forecastSets = [
    [1,2,1,1],
    [2,3,1,2],
    [3,2,1,3]
  ];
  var arr = forecastSets[num-1];
  for(var r=0;r<grid.rows;r++){
    game.lanes[r].forecast = arr[r];
    game.lanes[r].bendAvailable = true;
    game.lanes[r].bendArmed = false;
    game.lanes[r].bendFlash = 0;
    game.lanes[r].refract = 0;
  }
  var id = 0;
  for(var row=0;row<grid.rows;row++){
    var pressure = arr[row];
    var count = pressure + num;
    for(var i=0;i<count;i++){
      var type = 'drone';
      if(num >= 2 && pressure >= 2 && i === count - 1){
        type = 'tank';
      }
      if(num === 3 && pressure === 3 && i >= count - 2){
        type = i === count - 1 ? 'tank' : 'drone';
      }
      game.wavePlan.push({
        id:id++,
        row:row,
        type:type,
        time:40 + i * (50 - pressure * 8) + row * 8
      });
    }
  }
  game.wavePlan.sort(function(a,b){ return a.time - b.time; });
  game.spawnedInWave = 0;
  game.remainingToSpawn = game.wavePlan.length;
  game.spawnTimer = 0;
  game.waveResolved = false;
}

function startWave(){
  game.screenState = 'playing';
  game.waveActive = true;
  game.tutorialTimer = 600;
}

function laneCenterY(row){
  return grid.y + row * grid.cellH + grid.cellH * 0.5;
}

function cellAt(x,y){
  if(x < grid.x || y < grid.y || x > grid.x + grid.cols * grid.cellW || y > grid.y + grid.rows * grid.cellH){
    return null;
  }
  var c = Math.floor((x - grid.x) / grid.cellW);
  var r = Math.floor((y - grid.y) / grid.cellH);
  return {row:r,col:c};
}

function addFloatText(text,x,y,color){
  game.floatTexts.push({text:text,x:x,y:y,life:50,color:color});
}

function addEffect(effect){
  game.effects.push(effect);
}

function placePlant(row,col,type){
  if(game.occupancy[row][col]){ return; }
  var def = plantDefs[type];
  if(game.energy < def.cost){
    addFloatText('No energy', 80, 70, '#ff8');
    return;
  }
  game.energy -= def.cost;
  var plant = {
    type:type,
    row:row,
    col:col,
    x:grid.x + col * grid.cellW + grid.cellW * 0.5,
    y:grid.y + row * grid.cellH + grid.cellH * 0.5,
    fireCd:0,
    charge:0,
    maxCharge:6,
    energyCd:120,
    hitFlash:0
  };
  game.plants.push(plant);
  game.occupancy[row][col] = plant;
  addFloatText('-' + def.cost, plant.x - 10, plant.y - 20, '#9ff');
}

function spawnEnemy(plan){
  var hp = plan.type === 'tank' ? 16 : 6;
  var speed = plan.type === 'tank' ? 0.22 : 0.5;
  game.enemies.push({
    type:plan.type,
    row:plan.row,
    x:790,
    y:laneCenterY(plan.row),
    hp:hp,
    maxHp:hp,
    speed:speed,
    hitFlash:0
  });
}

function fireShooter(plant){
  game.bullets.push({
    row:plant.row,
    x:plant.x + 18,
    y:plant.y,
    vx:4.2,
    damage:1,
    alive:true
  });
  addEffect({type:'muzzle',x:plant.x + 16,y:plant.y,life:10});
}

function dischargeGenerator(plant){
  var lane = game.lanes[plant.row];
  var empowered = lane.bendArmed;
  lane.bendArmed = false;
  lane.refract = 24;
  if(empowered){
    lane.bendFlash = 18;
  }
  addEffect({type:'discharge',row:plant.row,x:plant.x,y:plant.y,life:24,empowered:empowered});
  var hitCount = 0;
  for(var i=0;i<game.enemies.length;i++){
    var enemy = game.enemies[i];
    if(enemy.row === plant.row && enemy.x > plant.x){
      enemy.hp -= empowered ? 5 : 3;
      enemy.hitFlash = 8;
      hitCount++;
    }
  }
  if(empowered){
    var chainedRows = [plant.row - 1, plant.row + 1];
    for(var j=0;j<chainedRows.length;j++){
      var rr = chainedRows[j];
      if(rr >= 0 && rr < grid.rows){
        for(var k=0;k<game.enemies.length;k++){
          var e = game.enemies[k];
          if(e.row === rr){
            e.hp -= 2;
            e.hitFlash = 8;
          }
        }
      }
    }
    addFloatText('Bent discharge', plant.x + 5, plant.y - 28, '#8ff');
  } else {
    addFloatText('Resonance', plant.x + 5, plant.y - 24, '#6ff');
  }
  plant.charge = 0;
}

function updatePlants(){
  for(var i=0;i<game.plants.length;i++){
    var plant = game.plants[i];
    if(plant.hitFlash > 0){ plant.hitFlash--; }
    if(plant.type === 'shooter'){
      plant.fireCd--;
      var laneHasEnemy = false;
      for(var e=0;e<game.enemies.length;e++){
        if(game.enemies[e].row === plant.row && game.enemies[e].x > plant.x - 10){
          laneHasEnemy = true;
          break;
        }
      }
      if(laneHasEnemy && plant.fireCd <= 0 && game.screenState === 'playing'){
        fireShooter(plant);
        plant.fireCd = 45;
      }
    } else if(plant.type === 'generator'){
      plant.energyCd--;
      if(plant.energyCd <= 0){
        game.energy += 10;
        plant.energyCd = 180;
        addFloatText('+10', plant.x - 10, plant.y - 18, '#9f9');
      }
      if(plant.charge >= plant.maxCharge){
        dischargeGenerator(plant);
      }
    }
  }
}

function updateBullets(){
  for(var i=game.bullets.length-1;i>=0;i--){
    var b = game.bullets[i];
    b.x += b.vx;
    var absorbed = false;
    for(var p=0;p<game.plants.length;p++){
      var plant = game.plants[p];
      if(plant.type === 'generator' && plant.row === b.row && plant.x > b.x - 8 && plant.x < b.x + 12){
        plant.charge = Math.min(plant.maxCharge, plant.charge + 1);
        plant.hitFlash = 8;
        addEffect({type:'absorb',x:plant.x,y:plant.y,life:12});
        addFloatText('+charge', plant.x - 12, plant.y - 22, '#ffb');
        absorbed = true;
        break;
      }
    }
    if(absorbed){
      game.bullets.splice(i,1);
      continue;
    }
    var hit = false;
    for(var e=0;e<game.enemies.length;e++){
      var enemy = game.enemies[e];
      if(enemy.row === b.row && Math.abs(enemy.x - b.x) < 16){
        enemy.hp -= b.damage;
        enemy.hitFlash = 6;
        addEffect({type:'spark',x:b.x,y:b.y,life:10});
        hit = true;
        break;
      }
    }
    if(hit || b.x > 810){
      game.bullets.splice(i,1);
    }
  }
}

function updateEnemies(){
  for(var i=game.enemies.length-1;i>=0;i--){
    var enemy = game.enemies[i];
    if(enemy.hitFlash > 0){ enemy.hitFlash--; }
    enemy.x -= enemy.speed;
    var blocked = false;
    for(var p=0;p<game.plants.length;p++){
      var plant = game.plants[p];
      if(plant.row === enemy.row && Math.abs(enemy.x - plant.x) < 24){
        blocked = true;
        plant.hitFlash = 8;
        if(t % 20 === 0){
          if(plant.type === 'generator'){
            plant.charge = Math.min(plant.maxCharge, plant.charge + 0.35);
          }
        }
        break;
      }
    }
    if(blocked){
      enemy.x += enemy.speed * 0.8;
    }
    if(enemy.hp <= 0){
      addFloatText(enemy.type === 'tank' ? '+20' : '+10', enemy.x, enemy.y - 10, '#9f9');
      game.energy += enemy.type === 'tank' ? 20 : 10;
      game.enemies.splice(i,1);
      continue;
    }
    if(enemy.x < 70){
      game.baseHealth--;
      addFloatText('Base hit', 30, 250, '#f88');
      game.enemies.splice(i,1);
      if(game.baseHealth <= 0){
        game.screenState = 'lose';
      }
    }
  }
}

function cleanupPlants(){
  for(var i=game.plants.length-1;i>=0;i--){
    var plant = game.plants[i];
    var crushed = false;
    for(var e=0;e<game.enemies.length;e++){
      var enemy = game.enemies[e];
      if(enemy.row === plant.row && Math.abs(enemy.x - plant.x) < 10){
        crushed = true;
        break;
      }
    }
    if(crushed){
      game.occupancy[plant.row][plant.col] = null;
      addFloatText('Lost plant', plant.x - 12, plant.y - 10, '#f88');
      game.plants.splice(i,1);
    }
  }
}

function updateWave(){
  if(game.screenState === 'playing'){
    game.spawnTimer++;
    while(game.spawnedInWave < game.wavePlan.length && game.wavePlan[game.spawnedInWave].time <= game.spawnTimer){
      spawnEnemy(game.wavePlan[game.spawnedInWave]);
      game.spawnedInWave++;
      game.remainingToSpawn = game.wavePlan.length - game.spawnedInWave;
    }
    if(game.spawnedInWave >= game.wavePlan.length && game.enemies.length === 0 && !game.waveResolved){
      game.waveResolved = true;
      if(game.currentWave >= game.totalWaves){
        game.screenState = 'win';
      } else {
        game.screenState = 'waveBreak';
        game.intermissionTimer = 360;
        prepareWave(game.currentWave + 1);
      }
    }
  } else if(game.screenState === 'waveBreak'){
    game.intermissionTimer--;
    if(game.intermissionTimer <= 0){
      startWave();
    }
  }
}

function updatePassiveEnergy(){
  if(game.screenState === 'playing' || game.screenState === 'waveBreak'){
    game.passiveEnergyTimer++;
    if(game.passiveEnergyTimer >= 120){
      game.passiveEnergyTimer = 0;
      game.energy += 15;
      addFloatText('+15', 140, 40, '#9f9');
    }
  }
}

function updateEffects(){
  for(var i=game.effects.length-1;i>=0;i--){
    game.effects[i].life--;
    if(game.effects[i].life <= 0){
      game.effects.splice(i,1);
    }
  }
  for(var j=game.floatTexts.length-1;j>=0;j--){
    var f = game.floatTexts[j];
    f.y -= 0.5;
    f.life--;
    if(f.life <= 0){
      game.floatTexts.splice(j,1);
    }
  }
  for(var r=0;r<grid.rows;r++){
    if(game.lanes[r].bendFlash > 0){ game.lanes[r].bendFlash--; }
    if(game.lanes[r].refract > 0){ game.lanes[r].refract--; }
  }
  if(game.tutorialTimer > 0){ game.tutorialTimer--; }
}

function handleClick(){
  if(!mouse.clicked){ return; }
  if(game.screenState === 'start'){
    game.screenState = 'waveBreak';
    game.intermissionTimer = 999999;
    return;
  }
  if(game.screenState === 'win' || game.screenState === 'lose'){
    resetGame();
    return;
  }

  var shooterBtn = {x:20,y:90,w:88,h:44};
  var genBtn = {x:20,y:145,w:88,h:44};
  var startBtn = {x:20,y:205,w:88,h:44};

  if(pointIn(mouse.x,mouse.y,shooterBtn)){
    game.selectedCard = 'shooter';
    return;
  }
  if(pointIn(mouse.x,mouse.y,genBtn)){
    game.selectedCard = 'generator';
    return;
  }
  if(game.screenState === 'waveBreak' && pointIn(mouse.x,mouse.y,startBtn)){
    game.intermissionTimer = 0;
    startWave();
    return;
  }

  for(var r=0;r<grid.rows;r++){
    var bendRect = {x:670,y:grid.y + r * grid.cellH + 22,w:92,h:34};
    if(pointIn(mouse.x,mouse.y,bendRect) && game.screenState === 'playing'){
      if(game.lanes[r].bendAvailable){
        game.lanes[r].bendAvailable = false;
        game.lanes[r].bendArmed = true;
        game.lanes[r].bendFlash = 30;
        addFloatText('Lane bent', 690, bendRect.y + 8, '#8ff');
      } else {
        addFloatText('Used', 700, bendRect.y + 8, '#fbb');
      }
      return;
    }
  }

  var cell = cellAt(mouse.x,mouse.y);
  if(cell && (game.screenState === 'waveBreak' || game.screenState === 'playing')){
    placePlant(cell.row,cell.col,game.selectedCard);
  }
}

function pointIn(x,y,r){
  return x >= r.x && y >= r.y && x <= r.x + r.w && y <= r.y + r.h;
}

function update(){
  t++;
  handleClick();
  updatePassiveEnergy();
  updateWave();
  if(game.screenState === 'playing'){
    updatePlants();
    updateBullets();
    updateEnemies();
    cleanupPlants();
  }
  updateEffects();
  mouse.clicked = false;
}

function drawPanelButton(rect,label,selected,color){
  ctx.fillStyle = selected ? '#1dd6ff55' : '#0d1b2f';
  ctx.fillRect(rect.x,rect.y,rect.w,rect.h);
  ctx.strokeStyle = color;
  ctx.lineWidth = selected ? 3 : 1;
  ctx.strokeRect(rect.x,rect.y,rect.w,rect.h);
  ctx.fillStyle = '#dff';
  ctx.font = '14px Arial';
  ctx.fillText(label, rect.x + 10, rect.y + 18);
}

function drawGrid(){
  for(var r=0;r<grid.rows;r++){
    var lane = game.lanes[r];
    var laneY = grid.y + r * grid.cellH;
    var pressureColor = lane.forecast === 3 ? '#ff5577' : lane.forecast === 2 ? '#ffb347' : '#66ffaa';
    var pulse = 0;
    if(lane.forecast >= 3 && (game.screenState === 'waveBreak' || game.screenState === 'start')){
      pulse = Math.sin(t * 0.12) * 0.5 + 0.5;
    }
    ctx.fillStyle = 'rgba(20,35,55,0.75)';
    ctx.fillRect(grid.x, laneY, grid.cols * grid.cellW, grid.cellH - 2);
    if(lane.refract > 0 || lane.bendArmed){
      ctx.fillStyle = lane.bendArmed ? 'rgba(90,220,255,0.16)' : 'rgba(90,180,255,0.08)';
      ctx.fillRect(grid.x, laneY + 8, grid.cols * grid.cellW, grid.cellH - 18);
      for(var s=0;s<6;s++){
        var ox = (t * 4 + s * 90) % 620;
        ctx.strokeStyle = 'rgba(170,255,255,0.18)';
        ctx.beginPath();
        ctx.moveTo(grid.x + ox, laneY + 14);
        ctx.lineTo(grid.x + ox + 18, laneY + 30);
        ctx.lineTo(grid.x + ox, laneY + 46);
        ctx.stroke();
      }
    }
    for(var c=0;c<grid.cols;c++){
      var x = grid.x + c * grid.cellW;
      var y = laneY;
      ctx.strokeStyle = 'rgba(90,150,180,0.4)';
      ctx.strokeRect(x,y,grid.cellW,grid.cellH);
    }
    ctx.fillStyle = pressureColor;
    ctx.fillRect(92, laneY + 14, 18 + lane.forecast * 10, 12);
    ctx.fillStyle = '#dff';
    ctx.font = '12px Arial';
    ctx.fillText('L' + (r + 1), 90, laneY + 48);
    if(pulse > 0){
      ctx.strokeStyle = 'rgba(255,120,140,' + (0.3 + pulse * 0.4) + ')';
      ctx.lineWidth = 2;
      ctx.strokeRect(grid.x - 3, laneY + 2, grid.cols * grid.cellW + 6, grid.cellH - 4);
      ctx.lineWidth = 1;
    }
  }
}

function drawPlants(){
  for(var i=0;i<game.plants.length;i++){
    var p = game.plants[i];
    var pulse = 0;
    if(p.type === 'generator' && p.charge >= p.maxCharge - 1){
      pulse = Math.sin(t * 0.2) * 0.5 + 0.5;
    }
    ctx.save();
    ctx.translate(p.x,p.y);
    if(p.type === 'shooter'){
      ctx.fillStyle = p.hitFlash > 0 ? '#fff' : '#5cf';
      ctx.beginPath();
      ctx.arc(0,0,18,0,Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#123';
      ctx.fillRect(2,-4,18,8);
    } else {
      ctx.fillStyle = p.hitFlash > 0 ? '#fff8c0' : '#ffd86b';
      ctx.fillRect(-16,-20,32,40);
      ctx.strokeStyle = '#fff';
      ctx.strokeRect(-16,-20,32,40);
      ctx.fillStyle = 'rgba(80,255,220,0.25)';
      ctx.fillRect(-10,16 - (p.charge / p.maxCharge) * 30,20,(p.charge / p.maxCharge) * 30);
      if(pulse > 0){
        ctx.strokeStyle = 'rgba(255,245,180,' + (0.3 + pulse * 0.6) + ')';
        ctx.lineWidth = 3;
        ctx.strokeRect(-21,-25,42,50);
        ctx.lineWidth = 1;
      }
    }
    ctx.restore();
  }
}

function drawEnemies(){
  for(var i=0;i<game.enemies.length;i++){
    var e = game.enemies[i];
    ctx.save();
    ctx.translate(e.x,e.y);
    if(e.type === 'drone'){
      ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#ff6b8a';
      ctx.beginPath();
      ctx.moveTo(-16,0);
      ctx.lineTo(0,-12);
      ctx.lineTo(16,0);
      ctx.lineTo(0,12);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#ff9b54';
      ctx.fillRect(-18,-14,36,28);
      ctx.strokeStyle = '#fff';
      ctx.strokeRect(-18,-14,36,28);
    }
    ctx.fillStyle = '#000a';
    ctx.fillRect(-18,-24,36,5);
    ctx.fillStyle = '#7fef9a';
    ctx.fillRect(-18,-24,36 * Math.max(0,e.hp) / e.maxHp,5);
    ctx.restore();
  }
}

function drawBullets(){
  ctx.fillStyle = '#bff';
  for(var i=0;i<game.bullets.length;i++){
    var b = game.bullets[i];
    ctx.fillRect(b.x - 4,b.y - 2,8,4);
  }
}

function drawEffects(){
  for(var i=0;i<game.effects.length;i++){
    var e = game.effects[i];
    if(e.type === 'muzzle'){
      ctx.strokeStyle = 'rgba(180,255,255,' + (e.life / 10) + ')';
      ctx.beginPath();
      ctx.arc(e.x,e.y,12 - e.life * 0.4,0,Math.PI * 2);
      ctx.stroke();
    } else if(e.type === 'absorb'){
      ctx.strokeStyle = 'rgba(255,220,120,' + (e.life / 12) + ')';
      ctx.beginPath();
      ctx.moveTo(e.x - 12,e.y);
      ctx.lineTo(e.x,e.y - 12);
      ctx.lineTo(e.x + 12,e.y);
      ctx.lineTo(e.x,e.y + 12);
      ctx.closePath();
      ctx.stroke();
    } else if(e.type === 'spark'){
      ctx.strokeStyle = 'rgba(255,255,255,' + (e.life / 10) + ')';
      ctx.beginPath();
      ctx.moveTo(e.x - 6,e.y - 6);
      ctx.lineTo(e.x + 6,e.y + 6);
      ctx.moveTo(e.x + 6,e.y - 6);
      ctx.lineTo(e.x - 6,e.y + 6);
      ctx.stroke();
    } else if(e.type === 'discharge'){
      var alpha = e.life / 24;
      var y = laneCenterY(e.row);
      ctx.strokeStyle = e.empowered ? 'rgba(120,255,255,' + alpha + ')' : 'rgba(255,235,150,' + alpha + ')';
      ctx.lineWidth = e.empowered ? 6 : 4;
      ctx.beginPath();
      ctx.moveTo(e.x,y);
      ctx.lineTo(760,y);
      ctx.stroke();
      if(e.empowered){
        ctx.beginPath();
        ctx.moveTo(e.x + 80,y);
        ctx.lineTo(e.x + 150,y - 34);
        ctx.moveTo(e.x + 120,y);
        ctx.lineTo(e.x + 190,y + 34);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    }
  }
  for(var j=0;j<game.floatTexts.length;j++){
    var f = game.floatTexts[j];
    ctx.fillStyle = f.color;
    ctx.font = '12px Arial';
    ctx.fillText(f.text,f.x,f.y);
  }
}

function drawUI(){
  ctx.fillStyle = '#0b1322';
  ctx.fillRect(0,0,800,72);
  ctx.fillStyle = '#9ff';
  ctx.font = '24px Arial';
  ctx.fillText('Resonance Garden', 18, 30);
  ctx.font = '14px Arial';
  ctx.fillText('Energy: ' + Math.floor(game.energy), 20, 54);
  ctx.fillText('Base: ' + game.baseHealth, 130, 54);
  ctx.fillText('Wave: ' + game.currentWave + '/' + game.totalWaves, 210, 54);
  var enemiesLeft = game.remainingToSpawn + game.enemies.length;
  ctx.fillText('Enemies left: ' + enemiesLeft, 300, 54);

  drawPanelButton({x:20,y:90,w:88,h:44}, 'Shooter 50', game.selectedCard === 'shooter', '#6cf');
  drawPanelButton({x:20,y:145,w:88,h:44}, 'Gen 75', game.selectedCard === 'generator', '#fd8');

  if(game.screenState === 'waveBreak'){
    drawPanelButton({x:20,y:205,w:88,h:44}, 'Start wave', false, '#8f8');
  }

  for(var r=0;r<grid.rows;r++){
    var lane = game.lanes[r];
    var rect = {x:670,y:grid.y + r * grid.cellH + 22,w:92,h:34};
    var pulse = 0;
    if(lane.bendAvailable && game.screenState === 'playing'){
      pulse = Math.sin(t * 0.18) * 0.5 + 0.5;
    }
    ctx.fillStyle = lane.bendArmed ? '#1dd6ff44' : '#0d1b2f';
    ctx.fillRect(rect.x,rect.y,rect.w,rect.h);
    ctx.strokeStyle = lane.bendAvailable ? '#8ff' : '#556';
    ctx.lineWidth = pulse > 0 ? 2 + pulse * 2 : 1;
    ctx.strokeRect(rect.x,rect.y,rect.w,rect.h);
    ctx.lineWidth = 1;
    ctx.fillStyle = lane.bendAvailable ? '#dff' : '#778';
    ctx.font = '12px Arial';
    ctx.fillText(lane.bendArmed ? 'Bent next hit' : 'Bend lane', rect.x + 10, rect.y + 20);
  }

  if(game.screenState === 'start'){
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(120,110,560,250);
    ctx.strokeStyle = '#6ff';
    ctx.strokeRect(120,110,560,250);
    ctx.fillStyle = '#dff';
    ctx.font = '28px Arial';
    ctx.fillText('Design bullet traffic, not just DPS', 170, 160);
    ctx.font = '16px Arial';
    ctx.fillText('Place Shooters behind Generators to feed them allied bullets.', 165, 205);
    ctx.fillText('Each lane can bend once per wave, empowering the next full discharge.', 150, 232);
    ctx.fillText('Forecast colors show which lanes should be defense lanes or charge lanes.', 145, 259);
    ctx.fillText('Click anywhere to enter planning mode.', 265, 305);
  }

  if(game.screenState === 'waveBreak'){
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(170,8,470,58);
    ctx.fillStyle = '#dff';
    ctx.font = '16px Arial';
    ctx.fillText('Planning break: high forecast lanes need direct fire; low forecast lanes can become charge lanes.', 180, 30);
    ctx.fillText('Click Start wave when ready.', 330, 52);
  }

  if(game.tutorialTimer > 0 && game.screenState === 'playing'){
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(165,8,470,42);
    ctx.fillStyle = '#eff';
    ctx.font = '14px Arial';
    ctx.fillText('Tip: a Generator in front of a Shooter steals allied bullets for charge, then blasts the lane.', 176, 34);
  }

  if(game.screenState === 'win' || game.screenState === 'lose'){
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(180,130,440,180);
    ctx.strokeStyle = game.screenState === 'win' ? '#8f8' : '#f88';
    ctx.strokeRect(180,130,440,180);
    ctx.fillStyle = '#fff';
    ctx.font = '34px Arial';
    ctx.fillText(game.screenState === 'win' ? 'Garden Stabilized' : 'Base Overrun', 255, 190);
    ctx.font = '18px Arial';
    ctx.fillText(game.screenState === 'win' ? 'You survived all 3 waves.' : 'Enemies reached the left base.', 290, 230);
    ctx.fillText('Click anywhere to restart.', 310, 268);
  }
}

function drawBase(){
  ctx.fillStyle = '#1e3147';
  ctx.fillRect(20,90,50,328);
  ctx.fillStyle = '#9ff';
  ctx.fillRect(54,110,6,290);
  for(var i=0;i<game.baseHealth;i++){
    ctx.fillStyle = '#7df';
    ctx.fillRect(28,380 - i * 18,24,10);
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var g = ctx.createLinearGradient(0,0,0,500);
  g.addColorStop(0,'#091325');
  g.addColorStop(1,'#04070f');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,800,500);

  drawBase();
  drawGrid();
  drawPlants();
  drawBullets();
  drawEnemies();
  drawEffects();
  drawUI();
}

canvas.addEventListener('mousemove',function(e){
  var rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener('mousedown',function(){
  mouse.clicked = true;
});

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

resetGame();
gameLoop();
};
</script>
</body>
</html>
