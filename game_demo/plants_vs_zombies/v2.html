<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Neon Bent Lanes</title>
<style>
body { margin: 0; background: radial-gradient(circle at top, #0a1830 0%, #050814 45%, #02040a 100%); color: #9ff; font-family: Arial, sans-serif; overflow: hidden; }
canvas { width: 800px; height: 500px; display: block; margin: 20px auto; background: linear-gradient(180deg, #08111f 0%, #07101c 100%); box-shadow: 0 0 20px #0ff3, 0 0 50px #00aaff22 inset; border: 1px solid #1d3b52; }
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

var mouse = { x: 0, y: 0, clicked: false };

var rows = 3;
var cols = 5;
var cellW = 96;
var cellH = 96;
var gridX = 120;
var gridY = 110;
var laneCenterOffset = cellH * 0.5;
var baseX = 70;
var rightSpawnX = 760;

var selectedCard = 'shooter';
var energy = 180;
var plants = [];
var enemies = [];
var projectiles = [];
var particles = [];
var gameOver = false;
var victory = false;
var lastTime = 0;
var hoverCell = null;

var cards = {
  shooter: { cost: 100, label: 'Shooter', desc: 'Fires along lane' },
  generator: { cost: 50, label: 'Generator', desc: 'Makes energy, blocks peas' }
};

var waves = [
  {
    duration: 11,
    spawns: [
      { t: 0.8, lane: 0, type: 'walker' },
      { t: 1.8, lane: 2, type: 'walker' },
      { t: 3.0, lane: 0, type: 'walker' },
      { t: 4.2, lane: 1, type: 'tank' },
      { t: 5.4, lane: 2, type: 'walker' },
      { t: 7.0, lane: 1, type: 'walker' }
    ]
  },
  {
    duration: 12,
    spawns: [
      { t: 0.5, lane: 2, type: 'walker' },
      { t: 1.2, lane: 2, type: 'walker' },
      { t: 2.5, lane: 0, type: 'tank' },
      { t: 3.8, lane: 1, type: 'walker' },
      { t: 5.0, lane: 0, type: 'walker' },
      { t: 6.4, lane: 1, type: 'tank' },
      { t: 8.0, lane: 2, type: 'walker' }
    ]
  },
  {
    duration: 13,
    spawns: [
      { t: 0.7, lane: 1, type: 'tank' },
      { t: 1.5, lane: 0, type: 'walker' },
      { t: 2.1, lane: 2, type: 'walker' },
      { t: 3.2, lane: 1, type: 'walker' },
      { t: 4.0, lane: 0, type: 'tank' },
      { t: 5.5, lane: 2, type: 'tank' },
      { t: 7.2, lane: 1, type: 'walker' },
      { t: 9.0, lane: 0, type: 'walker' }
    ]
  }
];

var enemyDefs = {
  walker: { hp: 90, speed: 26, color: '#ff6b9a', reward: 20, radius: 16 },
  tank: { hp: 180, speed: 16, color: '#ffb347', reward: 35, radius: 20 }
};

var currentWaveIndex = 0;
var waveTime = 0;
var spawnCursor = 0;

var bendStates = [];
for (var i = 0; i < rows; i++) {
  bendStates.push({ active: false, timer: 0, duration: 4.5, amplitude: 0, usedThisWave: false, flash: 0 });
}

function laneBaseY(lane) {
  return gridY + lane * cellH + laneCenterOffset;
}

function laneCurveY(lane, x) {
  var state = bendStates[lane];
  var y = laneBaseY(lane);
  if (!state.active) {
    return y;
  }
  var start = gridX;
  var end = gridX + cols * cellW;
  var nx = (x - start) / (end - start);
  if (nx < 0) {
    nx = 0;
  }
  if (nx > 1) {
    nx = 1;
  }
  return y - Math.sin(nx * Math.PI) * state.amplitude;
}

function laneForecast(index) {
  var result = [0, 0, 0];
  if (index < 0 || index >= waves.length) {
    return result;
  }
  var s = waves[index].spawns;
  for (var i = 0; i < s.length; i++) {
    result[s[i].lane] += s[i].type === 'tank' ? 2 : 1;
  }
  return result;
}

function resetWaveUsage() {
  for (var i = 0; i < rows; i++) {
    bendStates[i].usedThisWave = false;
  }
}

function restartGame() {
  energy = 180;
  selectedCard = 'shooter';
  plants = [];
  enemies = [];
  projectiles = [];
  particles = [];
  gameOver = false;
  victory = false;
  currentWaveIndex = 0;
  waveTime = 0;
  spawnCursor = 0;
  for (var i = 0; i < rows; i++) {
    bendStates[i].active = false;
    bendStates[i].timer = 0;
    bendStates[i].amplitude = 0;
    bendStates[i].usedThisWave = false;
    bendStates[i].flash = 0;
  }
}

function getPlantAt(row, col) {
  for (var i = 0; i < plants.length; i++) {
    if (plants[i].row === row && plants[i].col === col) {
      return plants[i];
    }
  }
  return null;
}

function addParticle(x, y, color, vx, vy, life, r) {
  particles.push({ x: x, y: y, color: color, vx: vx, vy: vy, life: life, maxLife: life, r: r });
}

function placePlant(row, col) {
  if (gameOver || victory) {
    return;
  }
  if (getPlantAt(row, col)) {
    return;
  }
  var card = cards[selectedCard];
  if (energy < card.cost) {
    return;
  }
  energy -= card.cost;
  var plant = {
    type: selectedCard,
    row: row,
    col: col,
    hp: selectedCard === 'generator' ? 140 : 100,
    shootTimer: 0,
    genTimer: 0,
    flash: 0,
    pulse: Math.random() * 10
  };
  plants.push(plant);
  for (var i = 0; i < 8; i++) {
    addParticle(gridX + col * cellW + 40 + Math.random() * 20, gridY + row * cellH + 40 + Math.random() * 20, selectedCard === 'generator' ? '#ffd84d' : '#78f0ff', (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30, 0.4, 2 + Math.random() * 2);
  }
}

function activateBend(row) {
  if (gameOver || victory) {
    return;
  }
  var cost = 60;
  var state = bendStates[row];
  if (state.usedThisWave || energy < cost) {
    return;
  }
  energy -= cost;
  state.usedThisWave = true;
  state.active = true;
  state.timer = state.duration;
  state.amplitude = 42;
  state.flash = 1;
  for (var i = 0; i < 18; i++) {
    addParticle(gridX + cols * cellW * 0.5, laneBaseY(row), '#7efcff', (Math.random() - 0.5) * 120, (Math.random() - 0.5) * 70, 0.7, 2 + Math.random() * 2);
  }
}

function spawnEnemy(lane, type) {
  var def = enemyDefs[type];
  enemies.push({ lane: lane, type: type, hp: def.hp, maxHp: def.hp, x: rightSpawnX, speed: def.speed, color: def.color, reward: def.reward, radius: def.radius, hitFlash: 0 });
}

function handleClick() {
  if (mouse.y >= 20 && mouse.y <= 90) {
    if (mouse.x >= 120 && mouse.x <= 250) {
      selectedCard = 'shooter';
      return;
    }
    if (mouse.x >= 260 && mouse.x <= 390) {
      selectedCard = 'generator';
      return;
    }
    if ((gameOver || victory) && mouse.x >= 620 && mouse.x <= 760) {
      restartGame();
      return;
    }
  }

  for (var r = 0; r < rows; r++) {
    var bx = 20;
    var by = gridY + r * cellH + 28;
    if (mouse.x >= bx && mouse.x <= bx + 80 && mouse.y >= by && mouse.y <= by + 40) {
      activateBend(r);
      return;
    }
  }

  if (mouse.x >= gridX && mouse.x < gridX + cols * cellW && mouse.y >= gridY && mouse.y < gridY + rows * cellH) {
    var col = Math.floor((mouse.x - gridX) / cellW);
    var row = Math.floor((mouse.y - gridY) / cellH);
    placePlant(row, col);
  }
}

canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener('mousedown', function() {
  mouse.clicked = true;
});

function update(dt) {
  if (mouse.clicked) {
    handleClick();
    mouse.clicked = false;
  }

  hoverCell = null;
  if (mouse.x >= gridX && mouse.x < gridX + cols * cellW && mouse.y >= gridY && mouse.y < gridY + rows * cellH) {
    hoverCell = {
      col: Math.floor((mouse.x - gridX) / cellW),
      row: Math.floor((mouse.y - gridY) / cellH)
    };
  }

  if (gameOver || victory) {
    updateParticles(dt);
    return;
  }

  var wave = waves[currentWaveIndex];
  if (wave) {
    waveTime += dt;
    while (spawnCursor < wave.spawns.length && wave.spawns[spawnCursor].t <= waveTime) {
      spawnEnemy(wave.spawns[spawnCursor].lane, wave.spawns[spawnCursor].type);
      spawnCursor++;
    }
    if (waveTime >= wave.duration && spawnCursor >= wave.spawns.length && enemies.length === 0) {
      currentWaveIndex++;
      waveTime = 0;
      spawnCursor = 0;
      resetWaveUsage();
      if (currentWaveIndex >= waves.length) {
        victory = true;
      }
    }
  }

  for (var r = 0; r < rows; r++) {
    var bs = bendStates[r];
    if (bs.active) {
      bs.timer -= dt;
      bs.flash = Math.max(0, bs.flash - dt * 1.5);
      if (bs.timer <= 0) {
        bs.active = false;
        bs.timer = 0;
      }
    }
  }

  updatePlants(dt);
  updateProjectiles(dt);
  updateEnemies(dt);
  updateParticles(dt);

  if (currentWaveIndex >= waves.length && enemies.length === 0) {
    victory = true;
  }
}

function updatePlants(dt) {
  for (var i = plants.length - 1; i >= 0; i--) {
    var p = plants[i];
    p.flash = Math.max(0, p.flash - dt * 3);
    p.pulse += dt;
    if (p.type === 'generator') {
      p.genTimer += dt;
      if (p.genTimer >= 3.2) {
        p.genTimer -= 3.2;
        energy += 25;
        var px = gridX + p.col * cellW + cellW * 0.5;
        var py = gridY + p.row * cellH + cellH * 0.5;
        for (var g = 0; g < 10; g++) {
          addParticle(px, py, '#ffe066', (Math.random() - 0.5) * 40, -20 - Math.random() * 40, 0.8, 2 + Math.random() * 2);
        }
      }
    }
    if (p.type === 'shooter') {
      var hasEnemyAhead = false;
      for (var e = 0; e < enemies.length; e++) {
        if (enemies[e].lane === p.row && enemies[e].x > gridX + p.col * cellW + 30) {
          hasEnemyAhead = true;
          break;
        }
      }
      p.shootTimer += dt;
      if (hasEnemyAhead && p.shootTimer >= 1.0) {
        p.shootTimer = 0;
        var sx = gridX + p.col * cellW + 68;
        var sy = laneBaseY(p.row);
        projectiles.push({ x: sx, y: sy, lane: p.row, damage: 34, speed: 230, fromCol: p.col, alive: true });
        for (var s = 0; s < 4; s++) {
          addParticle(sx, sy, '#8af7ff', Math.random() * 25, (Math.random() - 0.5) * 20, 0.25, 2);
        }
      }
    }
  }
}

function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var pr = projectiles[i];
    pr.x += pr.speed * dt;
    pr.y = laneBaseY(pr.lane);

    var blocked = false;
    for (var j = 0; j < plants.length; j++) {
      var plant = plants[j];
      if (plant.type === 'generator' && plant.row === pr.lane && plant.col > pr.fromCol) {
        var left = gridX + plant.col * cellW + 18;
        var right = left + 60;
        if (pr.x >= left && pr.x <= right) {
          blocked = true;
          plant.flash = 1;
          for (var b = 0; b < 8; b++) {
            addParticle(pr.x, laneBaseY(pr.lane), '#ffd84d', -20 - Math.random() * 40, (Math.random() - 0.5) * 30, 0.35, 2 + Math.random() * 2);
          }
          break;
        }
      }
    }
    if (blocked) {
      projectiles.splice(i, 1);
      continue;
    }

    var hit = false;
    for (var e = 0; e < enemies.length; e++) {
      var enemy = enemies[e];
      if (enemy.lane !== pr.lane) {
        continue;
      }
      var ey = laneCurveY(enemy.lane, enemy.x);
      var dx = pr.x - enemy.x;
      var dy = pr.y - ey;
      if (dx * dx + dy * dy <= (enemy.radius + 6) * (enemy.radius + 6)) {
        enemy.hp -= pr.damage;
        enemy.hitFlash = 0.25;
        for (var h = 0; h < 7; h++) {
          addParticle(enemy.x, ey, '#7efcff', -20 + Math.random() * 40, (Math.random() - 0.5) * 50, 0.3, 2 + Math.random() * 2);
        }
        if (enemy.hp <= 0) {
          energy += enemy.reward;
          for (var k = 0; k < 10; k++) {
            addParticle(enemy.x, ey, enemy.color, (Math.random() - 0.5) * 70, (Math.random() - 0.5) * 70, 0.6, 2 + Math.random() * 3);
          }
          enemies.splice(e, 1);
        }
        hit = true;
        break;
      }
    }
    if (hit || pr.x > canvas.width + 20) {
      projectiles.splice(i, 1);
    }
  }
}

function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var en = enemies[i];
    en.x -= en.speed * dt;
    en.hitFlash = Math.max(0, en.hitFlash - dt);
    if (en.x <= baseX) {
      gameOver = true;
      return;
    }
  }
}

function updateParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 20 * dt;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function drawRoundedRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  if (fill) {
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.stroke();
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBackground();
  drawForecast();
  drawGrid();
  drawLaneCurves();
  drawPlants();
  drawProjectiles();
  drawEnemies();
  drawParticles();
  drawUI();
  drawOverlay();
}

function drawBackground() {
  for (var i = 0; i < 40; i++) {
    var sx = (i * 97) % canvas.width;
    var sy = (i * 53) % canvas.height;
    ctx.fillStyle = 'rgba(120,220,255,0.05)';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.fillStyle = '#0b1320';
  ctx.fillRect(0, 0, canvas.width, 105);
  ctx.fillStyle = '#08111a';
  ctx.fillRect(0, 105, canvas.width, canvas.height - 105);
}

function drawForecast() {
  var current = laneForecast(currentWaveIndex);
  var next = laneForecast(currentWaveIndex + 1);
  var maxVal = 1;
  for (var i = 0; i < rows; i++) {
    if (current[i] > maxVal) {
      maxVal = current[i];
    }
    if (next[i] > maxVal) {
      maxVal = next[i];
    }
  }
  for (var r = 0; r < rows; r++) {
    var y = gridY + r * cellH;
    var curA = current[r] / maxVal;
    var nextA = next[r] / maxVal;
    ctx.fillStyle = 'rgba(255,80,120,' + (0.08 + curA * 0.18) + ')';
    ctx.fillRect(gridX, y + 8, cols * cellW, cellH - 16);
    ctx.fillStyle = 'rgba(80,180,255,' + (0.05 + nextA * 0.14) + ')';
    ctx.fillRect(gridX, y + 24, cols * cellW, cellH - 48);
  }
}

function drawGrid() {
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      var x = gridX + c * cellW;
      var y = gridY + r * cellH;
      var fill = 'rgba(20,40,60,0.55)';
      var stroke = 'rgba(110,220,255,0.18)';
      if (hoverCell && hoverCell.row === r && hoverCell.col === c) {
        fill = getPlantAt(r, c) ? 'rgba(120,40,60,0.45)' : 'rgba(60,140,180,0.35)';
        stroke = getPlantAt(r, c) ? '#ff6b88' : '#7efcff';
      }
      drawRoundedRect(x + 6, y + 6, cellW - 12, cellH - 12, 12, fill, stroke);
    }
  }
}

function drawLaneCurves() {
  for (var r = 0; r < rows; r++) {
    var state = bendStates[r];
    ctx.beginPath();
    for (var x = gridX; x <= gridX + cols * cellW; x += 6) {
      var y = laneCurveY(r, x);
      if (x === gridX) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.strokeStyle = state.active ? 'rgba(120,250,255,0.95)' : 'rgba(90,180,220,0.35)';
    ctx.lineWidth = state.active ? 4 : 2;
    ctx.stroke();

    if (state.active) {
      ctx.strokeStyle = 'rgba(120,250,255,' + (0.25 + state.flash * 0.4) + ')';
      ctx.lineWidth = 12;
      ctx.stroke();
    }

    var bx = 20;
    var by = gridY + r * cellH + 28;
    var usable = !state.usedThisWave && energy >= 60 && !gameOver && !victory;
    drawRoundedRect(bx, by, 80, 40, 10, usable ? 'rgba(50,120,160,0.45)' : 'rgba(50,60,80,0.35)', usable ? '#7efcff' : '#556a7a');
    ctx.fillStyle = usable ? '#cfffff' : '#8898a8';
    ctx.font = '12px Arial';
    ctx.fillText(state.usedThisWave ? 'Bent' : 'Bend 60', bx + 14, by + 24);
    ctx.font = '10px Arial';
    ctx.fillText('Wave use', bx + 17, by + 35);
  }
}

function drawPlants() {
  for (var i = 0; i < plants.length; i++) {
    var p = plants[i];
    var x = gridX + p.col * cellW + 18;
    var y = gridY + p.row * cellH + 18;
    if (p.type === 'shooter') {
      drawRoundedRect(x, y, 60, 60, 14, 'rgba(70,210,255,0.22)', p.flash > 0 ? '#ffffff' : '#78f0ff');
      ctx.fillStyle = '#78f0ff';
      ctx.beginPath();
      ctx.arc(x + 28, y + 30, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x + 28, y + 24, 24, 12);
      ctx.fillStyle = '#d8ffff';
      ctx.fillRect(x + 42, y + 27, 12, 6);
    } else {
      var glow = 0.3 + Math.sin(p.pulse * 4) * 0.1 + p.flash * 0.4;
      drawRoundedRect(x, y, 60, 60, 10, 'rgba(255,210,70,' + glow + ')', p.flash > 0 ? '#fff1a8' : '#ffd84d');
      ctx.strokeStyle = '#ffef9a';
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 12, y + 12, 36, 36);
      ctx.beginPath();
      ctx.moveTo(x + 30, y + 16);
      ctx.lineTo(x + 30, y + 44);
      ctx.moveTo(x + 16, y + 30);
      ctx.lineTo(x + 44, y + 30);
      ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(x + 6, y + 66, 48, 4);
    ctx.fillStyle = '#7eff8a';
    ctx.fillRect(x + 6, y + 66, 48 * Math.max(0, p.hp / (p.type === 'generator' ? 140 : 100)), 4);
  }
}

function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var pr = projectiles[i];
    ctx.fillStyle = '#8af7ff';
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(138,247,255,0.25)';
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, 10, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var y = laneCurveY(e.lane, e.x);
    ctx.fillStyle = e.hitFlash > 0 ? '#ffffff' : e.color;
    ctx.beginPath();
    ctx.arc(e.x, y, e.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1e1e1e';
    ctx.fillRect(e.x - e.radius * 0.7, y - 4, e.radius * 1.4, 8);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(e.x - e.radius, y - e.radius - 12, e.radius * 2, 5);
    ctx.fillStyle = '#7eff8a';
    ctx.fillRect(e.x - e.radius, y - e.radius - 12, e.radius * 2 * Math.max(0, e.hp / e.maxHp), 5);
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawUI() {
  drawRoundedRect(14, 16, 92, 70, 12, 'rgba(20,40,60,0.75)', '#2d6a88');
  ctx.fillStyle = '#ffe066';
  ctx.font = '14px Arial';
  ctx.fillText('Energy', 32, 38);
  ctx.font = '24px Arial';
  ctx.fillText(String(Math.floor(energy)), 28, 66);

  var shooterSel = selectedCard === 'shooter';
  var genSel = selectedCard === 'generator';
  drawRoundedRect(120, 20, 130, 60, 12, shooterSel ? 'rgba(70,210,255,0.25)' : 'rgba(20,40,60,0.75)', shooterSel ? '#78f0ff' : '#2d6a88');
  drawRoundedRect(260, 20, 130, 60, 12, genSel ? 'rgba(255,216,77,0.22)' : 'rgba(20,40,60,0.75)', genSel ? '#ffd84d' : '#2d6a88');
  ctx.fillStyle = '#dff';
  ctx.font = '15px Arial';
  ctx.fillText('Shooter 100', 145, 43);
  ctx.fillText('Generator 50', 278, 43);
  ctx.font = '11px Arial';
  ctx.fillStyle = '#9fd5e8';
  ctx.fillText('Fires straight', 150, 62);
  ctx.fillText('Makes energy, blocks peas', 268, 62);

  drawRoundedRect(410, 20, 190, 60, 12, 'rgba(20,40,60,0.75)', '#2d6a88');
  ctx.fillStyle = '#cfffff';
  ctx.font = '14px Arial';
  ctx.fillText('Wave ' + Math.min(currentWaveIndex + 1, waves.length) + ' / ' + waves.length, 428, 42);
  var progress = 0;
  if (currentWaveIndex < waves.length) {
    var w = waves[currentWaveIndex];
    progress = Math.min(1, waveTime / w.duration);
  } else {
    progress = 1;
  }
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(428, 53, 150, 10);
  ctx.fillStyle = '#78f0ff';
  ctx.fillRect(428, 53, 150 * progress, 10);

  drawRoundedRect(610, 20, 170, 60, 12, 'rgba(20,40,60,0.75)', '#2d6a88');
  ctx.fillStyle = '#dff';
  ctx.font = '12px Arial';
  ctx.fillText('Forecast: red now, blue next', 622, 40);
  ctx.fillText('Bend a lane once per wave', 622, 58);

  ctx.fillStyle = '#8fb6c8';
  ctx.font = '12px Arial';
  ctx.fillText('Base', 34, gridY + rows * cellH + 18);
  ctx.fillStyle = '#ff5a7a';
  ctx.fillRect(baseX - 12, gridY - 10, 6, rows * cellH + 20);
}

function drawOverlay() {
  if (!gameOver && !victory) {
    return;
  }
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawRoundedRect(230, 170, 340, 140, 16, 'rgba(10,20,35,0.92)', '#7efcff');
  ctx.fillStyle = victory ? '#8affb0' : '#ff7a9c';
  ctx.font = '34px Arial';
  ctx.fillText(victory ? 'Circuit Garden Safe' : 'Base Breached', 270, 220);
  ctx.fillStyle = '#dff';
  ctx.font = '16px Arial';
  ctx.fillText(victory ? 'You cleared all waves and kept the bent lanes alive.' : 'An enemy reached the left base.', 255, 250);
  drawRoundedRect(620, 20, 140, 60, 12, 'rgba(80,120,160,0.5)', '#7efcff');
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px Arial';
  ctx.fillText('Restart', 656, 56);
}

function gameLoop(ts) {
  if (!lastTime) {
    lastTime = ts;
  }
  var dt = Math.min(0.033, (ts - lastTime) / 1000);
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

resetWaveUsage();
requestAnimationFrame(gameLoop);
};
</script>
</body>
</html>
