<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Fireline Garden</title>
<style>
body { margin: 0; background: radial-gradient(circle at top, #101a2b 0%, #070b14 60%, #04060a 100%); color: #eaf7ea; font-family: Arial, sans-serif; overflow: hidden; }
canvas { width: 800px; height: 500px; display: block; margin: 0 auto; background: linear-gradient(180deg, #0e1626 0%, #101c2e 25%, #0b1320 100%); }
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 500;

var mouse = { x: 0, y: 0, clicked: false };
var lastTime = 0;

var board = {
  x: 70,
  y: 90,
  cols: 8,
  rows: 5,
  cellW: 74,
  cellH: 68,
  w: 592,
  h: 340
};

var cards = [
  { type: 'sun', cost: 50, x: 680, y: 120, w: 100, h: 58 },
  { type: 'pea', cost: 75, x: 680, y: 190, w: 100, h: 58 }
];

var state;

function makeWaves() {
  return [
    {
      duration: 8,
      spawns: [
        { t: 0.8, lane: 1, type: 'walker' },
        { t: 2.2, lane: 3, type: 'walker' },
        { t: 4.0, lane: 1, type: 'walker' }
      ]
    },
    {
      duration: 10,
      spawns: [
        { t: 0.6, lane: 0, type: 'walker' },
        { t: 1.8, lane: 4, type: 'walker' },
        { t: 3.2, lane: 0, type: 'bucket' },
        { t: 5.2, lane: 4, type: 'walker' },
        { t: 7.0, lane: 2, type: 'walker' }
      ]
    },
    {
      duration: 11,
      spawns: [
        { t: 0.4, lane: 2, type: 'bucket' },
        { t: 1.2, lane: 1, type: 'walker' },
        { t: 2.0, lane: 3, type: 'walker' },
        { t: 3.5, lane: 2, type: 'walker' },
        { t: 5.0, lane: 1, type: 'bucket' },
        { t: 6.8, lane: 3, type: 'bucket' },
        { t: 8.5, lane: 2, type: 'walker' }
      ]
    },
    {
      duration: 12,
      spawns: [
        { t: 0.4, lane: 0, type: 'bucket' },
        { t: 0.9, lane: 2, type: 'walker' },
        { t: 1.6, lane: 4, type: 'bucket' },
        { t: 3.0, lane: 1, type: 'walker' },
        { t: 4.0, lane: 3, type: 'walker' },
        { t: 5.0, lane: 0, type: 'walker' },
        { t: 6.0, lane: 4, type: 'walker' },
        { t: 7.2, lane: 2, type: 'bucket' },
        { t: 9.4, lane: 3, type: 'walker' }
      ]
    }
  ];
}

function resetGame() {
  state = {
    energy: 100,
    passiveTimer: 0,
    selected: null,
    plants: [],
    enemies: [],
    projectiles: [],
    particles: [],
    waveIndex: 0,
    waveTime: 0,
    gameOver: false,
    victory: false,
    waves: makeWaves()
  };
}

function laneCenter(row) {
  return board.y + row * board.cellH + board.cellH / 2;
}

function cellToPos(col, row) {
  return {
    x: board.x + col * board.cellW + board.cellW / 2,
    y: laneCenter(row)
  };
}

function getPlantAt(col, row) {
  for (var i = 0; i < state.plants.length; i++) {
    if (state.plants[i].col === col && state.plants[i].row === row) return state.plants[i];
  }
  return null;
}

function addPlant(type, col, row) {
  var pos = cellToPos(col, row);
  if (type === 'sun') {
    state.plants.push({
      type: 'sun', col: col, row: row, x: pos.x, y: pos.y,
      hp: 999, genTimer: 0, pulse: 0
    });
  } else {
    state.plants.push({
      type: 'pea', col: col, row: row, x: pos.x, y: pos.y,
      hp: 999, shootTimer: 0, pulse: 0
    });
  }
}

function enemyStats(type) {
  if (type === 'bucket') return { hp: 160, speed: 12, color: '#8aa0b8' };
  return { hp: 70, speed: 18, color: '#d46a6a' };
}

function spawnEnemy(lane, type) {
  var s = enemyStats(type);
  state.enemies.push({
    lane: lane,
    type: type,
    x: board.x + board.w + 30,
    y: laneCenter(lane),
    hp: s.hp,
    maxHp: s.hp,
    speed: s.speed,
    color: s.color,
    w: type === 'bucket' ? 34 : 28,
    h: type === 'bucket' ? 42 : 34
  });
}

function addSpark(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    state.particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 120,
      vy: (Math.random() - 0.5) * 120,
      life: 0.4 + Math.random() * 0.25,
      maxLife: 0.4 + Math.random() * 0.25,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

function getCurrentWave() {
  if (state.waveIndex >= state.waves.length) return null;
  return state.waves[state.waveIndex];
}

function getPreviewLanes() {
  var lanes = {};
  var current = getCurrentWave();
  if (current) {
    for (var i = 0; i < current.spawns.length; i++) lanes[current.spawns[i].lane] = 1;
  }
  if (state.waveIndex + 1 < state.waves.length) {
    var next = state.waves[state.waveIndex + 1];
    for (var j = 0; j < next.spawns.length; j++) lanes[next.spawns[j].lane] = 2;
  }
  return lanes;
}

function handleClick() {
  if (!mouse.clicked) return;

  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    if (mouse.x >= c.x && mouse.x <= c.x + c.w && mouse.y >= c.y && mouse.y <= c.y + c.h) {
      state.selected = c.type;
      mouse.clicked = false;
      return;
    }
  }

  if (mouse.x >= board.x && mouse.x < board.x + board.w && mouse.y >= board.y && mouse.y < board.y + board.h) {
    var col = Math.floor((mouse.x - board.x) / board.cellW);
    var row = Math.floor((mouse.y - board.y) / board.cellH);
    if (!getPlantAt(col, row) && state.selected) {
      var cost = state.selected === 'sun' ? 50 : 75;
      if (state.energy >= cost && !state.gameOver && !state.victory) {
        state.energy -= cost;
        addPlant(state.selected, col, row);
      }
    }
  }

  mouse.clicked = false;
}

function updatePlants(dt) {
  for (var i = 0; i < state.plants.length; i++) {
    var p = state.plants[i];
    p.pulse += dt;
    if (p.type === 'sun') {
      p.genTimer += dt;
      if (p.genTimer >= 3.2) {
        p.genTimer -= 3.2;
        state.energy += 25;
        addSpark(p.x, p.y - 12, '#ffd34d', 8);
      }
    } else {
      p.shootTimer += dt;
      var laneHasEnemy = false;
      for (var e = 0; e < state.enemies.length; e++) {
        if (state.enemies[e].lane === p.row && state.enemies[e].x > p.x) {
          laneHasEnemy = true;
          break;
        }
      }
      if (laneHasEnemy && p.shootTimer >= 1.1) {
        p.shootTimer = 0;
        state.projectiles.push({ x: p.x + 18, y: p.y, row: p.row, speed: 220, damage: 20, fromCol: p.col, r: 6 });
      }
    }
  }
}

function updateProjectiles(dt) {
  for (var i = state.projectiles.length - 1; i >= 0; i--) {
    var pr = state.projectiles[i];
    pr.x += pr.speed * dt;
    var removed = false;

    for (var p = 0; p < state.plants.length; p++) {
      var plant = state.plants[p];
      if (plant.row === pr.row && plant.col > pr.fromCol) {
        var left = plant.x - 18;
        var right = plant.x + 18;
        if (pr.x >= left && pr.x <= right) {
          addSpark(pr.x, pr.y, '#8cf0ff', 10);
          state.particles.push({ x: pr.x, y: pr.y, vx: 0, vy: -10, life: 0.35, maxLife: 0.35, color: '#ffffff', size: 10, text: 'POP' });
          state.projectiles.splice(i, 1);
          removed = true;
          break;
        }
      }
    }
    if (removed) continue;

    for (var e = state.enemies.length - 1; e >= 0; e--) {
      var en = state.enemies[e];
      if (en.lane === pr.row && Math.abs(en.x - pr.x) < en.w / 2 + pr.r) {
        en.hp -= pr.damage;
        addSpark(pr.x, pr.y, '#7dff7d', 6);
        state.projectiles.splice(i, 1);
        if (en.hp <= 0) {
          addSpark(en.x, en.y, '#ff8a8a', 12);
          state.enemies.splice(e, 1);
          state.energy += 10;
        }
        removed = true;
        break;
      }
    }
    if (removed) continue;

    if (pr.x > board.x + board.w + 120) state.projectiles.splice(i, 1);
  }
}

function updateEnemies(dt) {
  for (var i = state.enemies.length - 1; i >= 0; i--) {
    var en = state.enemies[i];
    en.x -= en.speed * dt;
    if (en.x <= board.x - 10) {
      state.gameOver = true;
    }
  }
}

function updateParticles(dt) {
  for (var i = state.particles.length - 1; i >= 0; i--) {
    var pt = state.particles[i];
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.life -= dt;
    if (!pt.text) pt.vy *= 0.96;
    if (pt.life <= 0) state.particles.splice(i, 1);
  }
}

function updateWaves(dt) {
  var wave = getCurrentWave();
  if (!wave) {
    if (state.enemies.length === 0) state.victory = true;
    return;
  }

  state.waveTime += dt;
  for (var i = 0; i < wave.spawns.length; i++) {
    var s = wave.spawns[i];
    if (!s.done && state.waveTime >= s.t) {
      s.done = true;
      spawnEnemy(s.lane, s.type);
    }
  }

  if (state.waveTime >= wave.duration) {
    state.waveIndex += 1;
    state.waveTime = 0;
  }
}

function update(dt) {
  if (dt > 0.05) dt = 0.05;

  if (state.gameOver || state.victory) {
    handleClick();
    mouse.clicked = false;
    return;
  }

  state.passiveTimer += dt;
  if (state.passiveTimer >= 1.2) {
    state.passiveTimer -= 1.2;
    state.energy += 5;
  }

  handleClick();
  updateWaves(dt);
  updatePlants(dt);
  updateProjectiles(dt);
  updateEnemies(dt);
  updateParticles(dt);
}

function drawBoard() {
  for (var r = 0; r < board.rows; r++) {
    ctx.fillStyle = r % 2 === 0 ? '#173049' : '#143047';
    ctx.fillRect(board.x, board.y + r * board.cellH, board.w, board.cellH - 2);
  }
  for (var c = 0; c <= board.cols; c++) {
    ctx.strokeStyle = '#2f5470';
    ctx.beginPath();
    ctx.moveTo(board.x + c * board.cellW, board.y);
    ctx.lineTo(board.x + c * board.cellW, board.y + board.h);
    ctx.stroke();
  }
  for (var rr = 0; rr <= board.rows; rr++) {
    ctx.beginPath();
    ctx.moveTo(board.x, board.y + rr * board.cellH);
    ctx.lineTo(board.x + board.w, board.y + rr * board.cellH);
    ctx.stroke();
  }

  ctx.fillStyle = '#29475c';
  ctx.fillRect(board.x - 18, board.y, 12, board.h);
  ctx.fillStyle = '#d9f3ff';
  ctx.font = '12px Arial';
  ctx.fillText('BASE', board.x - 28, board.y - 10);
}

function drawPlants() {
  for (var i = 0; i < state.plants.length; i++) {
    var p = state.plants[i];
    if (p.type === 'sun') {
      ctx.fillStyle = '#f7c948';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff1a8';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ffe98a';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 24 + Math.sin(p.pulse * 4) * 2, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#58d68d';
      ctx.beginPath();
      ctx.arc(p.x - 6, p.y, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8cf0b4';
      ctx.beginPath();
      ctx.arc(p.x + 10, p.y - 4, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1f8c53';
      ctx.fillRect(p.x - 3, p.y + 8, 6, 18);
    }
  }
}

function drawEnemies() {
  for (var i = 0; i < state.enemies.length; i++) {
    var e = state.enemies[i];
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x - e.w / 2, e.y - e.h / 2, e.w, e.h);
    ctx.fillStyle = '#1d2430';
    ctx.fillRect(e.x - e.w / 2, e.y - e.h / 2 - 8, e.w, 5);
    ctx.fillStyle = '#ff6666';
    ctx.fillRect(e.x - e.w / 2, e.y - e.h / 2 - 8, e.w * (e.hp / e.maxHp), 5);
    if (e.type === 'bucket') {
      ctx.strokeStyle = '#d7e3f0';
      ctx.strokeRect(e.x - 10, e.y - e.h / 2 - 10, 20, 10);
    }
  }
}

function drawProjectiles() {
  for (var i = 0; i < state.projectiles.length; i++) {
    var p = state.projectiles[i];
    ctx.fillStyle = '#7dff7d';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (var i = 0; i < state.particles.length; i++) {
    var pt = state.particles[i];
    var alpha = Math.max(0, pt.life / pt.maxLife);
    ctx.globalAlpha = alpha;
    if (pt.text) {
      ctx.fillStyle = pt.color;
      ctx.font = 'bold 12px Arial';
      ctx.fillText(pt.text, pt.x - 10, pt.y);
    } else {
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
    }
    ctx.globalAlpha = 1;
  }
}

function drawCards() {
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    var selected = state.selected === c.type;
    var affordable = state.energy >= c.cost;
    ctx.fillStyle = selected ? '#315f8a' : '#1d2c42';
    if (!affordable) ctx.fillStyle = '#2a2f39';
    ctx.fillRect(c.x, c.y, c.w, c.h);
    ctx.strokeStyle = selected ? '#9ce7ff' : '#4c6a86';
    ctx.strokeRect(c.x, c.y, c.w, c.h);
    if (c.type === 'sun') {
      ctx.fillStyle = '#f7c948';
      ctx.beginPath();
      ctx.arc(c.x + 18, c.y + 29, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#eaf7ea';
      ctx.font = '12px Arial';
      ctx.fillText('Bloom', c.x + 38, c.y + 24);
      ctx.fillText(String(c.cost), c.x + 38, c.y + 42);
    } else {
      ctx.fillStyle = '#58d68d';
      ctx.beginPath();
      ctx.arc(c.x + 18, c.y + 29, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#eaf7ea';
      ctx.font = '12px Arial';
      ctx.fillText('Shooter', c.x + 38, c.y + 24);
      ctx.fillText(String(c.cost), c.x + 38, c.y + 42);
    }
  }
}

function drawPreview() {
  var lanes = getPreviewLanes();
  for (var r = 0; r < board.rows; r++) {
    if (lanes[r]) {
      var pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.006 + r);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = lanes[r] === 1 ? '#ff7b7b' : '#ffd166';
      ctx.fillRect(board.x + board.w + 8, board.y + r * board.cellH + 8, 14, board.cellH - 16);
      ctx.globalAlpha = 1;
    }
  }
}

function drawHUD() {
  ctx.fillStyle = '#dff7ff';
  ctx.font = 'bold 22px Arial';
  ctx.fillText('Fireline Garden', 20, 32);
  ctx.font = '14px Arial';
  ctx.fillText('Energy: ' + Math.floor(state.energy), 20, 58);
  ctx.fillText('Rule: any plant in front of a shooter blocks its peas', 180, 58);
  ctx.fillText('Click card, then grid. Forecast strips at right. Press R to restart.', 20, 78);

  var total = state.waves.length;
  var currentNum = Math.min(state.waveIndex + 1, total);
  ctx.fillText('Wave: ' + currentNum + '/' + total, 680, 32);
  ctx.fillStyle = '#213247';
  ctx.fillRect(680, 42, 100, 14);
  var progress = 1;
  var wave = getCurrentWave();
  if (wave) progress = state.waveTime / wave.duration;
  ctx.fillStyle = '#63d2ff';
  ctx.fillRect(680, 42, 100 * Math.max(0, Math.min(1, progress)), 14);

  ctx.fillStyle = '#dff7ff';
  ctx.font = '12px Arial';
  ctx.fillText('Red = current wave lanes', 670, 285);
  ctx.fillText('Gold = next wave lanes', 670, 302);
}

function drawPlacementGhost() {
  if (!state.selected) return;
  if (mouse.x >= board.x && mouse.x < board.x + board.w && mouse.y >= board.y && mouse.y < board.y + board.h) {
    var col = Math.floor((mouse.x - board.x) / board.cellW);
    var row = Math.floor((mouse.y - board.y) / board.cellH);
    var pos = cellToPos(col, row);
    ctx.globalAlpha = getPlantAt(col, row) ? 0.2 : 0.45;
    if (state.selected === 'sun') {
      ctx.fillStyle = '#f7c948';
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 18, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#58d68d';
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 16, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawEnd() {
  if (!state.gameOver && !state.victory) return;
  ctx.fillStyle = 'rgba(4, 8, 16, 0.72)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = state.victory ? '#8cffb1' : '#ff8d8d';
  ctx.font = 'bold 34px Arial';
  ctx.fillText(state.victory ? 'Garden Holds' : 'Base Breached', 280, 220);
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px Arial';
  ctx.fillText('Press R to restart', 325, 255);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0f1b2d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawBoard();
  drawPreview();
  drawPlants();
  drawProjectiles();
  drawEnemies();
  drawParticles();
  drawCards();
  drawPlacementGhost();
  drawHUD();
  drawEnd();
}

window.addEventListener('keydown', function(e) {
  if (e.key === 'r' || e.key === 'R') resetGame();
});

canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener('mousedown', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
  mouse.clicked = true;
});

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  var dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  update(dt);
  draw();
  mouse.clicked = false;
  requestAnimationFrame(gameLoop);
}

resetGame();
requestAnimationFrame(gameLoop);
};
</script>
</body>
</html>
