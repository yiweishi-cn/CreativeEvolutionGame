<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Ritual Ink Cup</title>
<style>
body{margin:0;background:#d8ccb2;color:#1f2d3a;font-family:Arial,sans-serif;overflow:hidden}
canvas{width:800px;height:500px;display:block;margin:18px auto;background:#efe3c8;box-shadow:0 0 0 2px #6d5b43,0 18px 45px rgba(0,0,0,0.25)}
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

var mouse = { x: 0, y: 0, down: false };
var keys = {};
var state = {};
var lastTime = 0;

function resetGame(){
state = {
screen: 'start',
inkType: 'solid',
ink: 460,
maxInk: 460,
manualRotations: 3,
maxRotations: 3,
gravityIndex: 0,
gravityVectors: [
{ x: 0, y: 220, label: 'Down' },
{ x: 220, y: 0, label: 'Right' },
{ x: 0, y: -220, label: 'Up' },
{ x: -220, y: 0, label: 'Left' }
],
strokes: [],
droplets: [],
particles: [],
messages: [],
buttons: [],
currentStroke: null,
spawnTimer: 0,
spawned: 0,
maxDrops: 34,
spawnInterval: 0.18,
spill: 0,
spillLimit: 14,
ritualChargeCount: 0,
selectedGlyphHint: null,
validGuideUsed: false,
cupFillNormal: 0,
cupFillCharged: 0,
cupTarget: 18,
bonusChargedTarget: 2,
tutorialStep: 0,
tutorialClock: 0,
startClock: 0,
levelTime: 0,
source: { x: 90, y: 70, w: 28, h: 18 },
ritualRing: { x: 410, y: 185, r: 34 },
cup: { x: 650, y: 325, w: 78, h: 105 },
terrain: [
{ x1: 40, y1: 110, x2: 200, y2: 140 },
{ x1: 210, y1: 140, x2: 320, y2: 120 },
{ x1: 520, y1: 250, x2: 615, y2: 285 },
{ x1: 610, y1: 430, x2: 740, y2: 430 },
{ x1: 580, y1: 285, x2: 580, y2: 360 }
]
};

state.strokes.push({
type: 'absorb',
points: [{ x: 300, y: 210 }, { x: 350, y: 210 }],
dir: 1,
stored: [],
releaseTimer: 0,
flash: 0,
pulse: 0,
preplaced: true
});

state.strokes.push({
type: 'solid',
points: [{ x: 470, y: 300 }, { x: 530, y: 270 }],
preplaced: true
});
}

resetGame();

function startPlay(){
state.screen = 'play';
state.startClock = 0;
state.tutorialClock = 0;
addMessage('Draw ink paths to guide the water.', 2.5);
}

function fullRestart(){
resetGame();
state.screen = 'play';
addMessage('Fresh page. Try another route.', 2.2);
}

function addMessage(text, time){
state.messages.push({ text: text, time: time || 1.8, max: time || 1.8 });
}

function addParticle(x, y, color, life, vx, vy, size){
state.particles.push({ x: x, y: y, color: color, life: life, max: life, vx: vx || 0, vy: vy || 0, size: size || 3 });
}

function pointLineDistance(px, py, ax, ay, bx, by){
var abx = bx - ax;
var aby = by - ay;
var t = ((px - ax) * abx + (py - ay) * aby) / ((abx * abx + aby * aby) || 1);
if(t < 0){ t = 0; }
if(t > 1){ t = 1; }
var cx = ax + abx * t;
var cy = ay + aby * t;
var dx = px - cx;
var dy = py - cy;
return { dist: Math.sqrt(dx * dx + dy * dy), x: cx, y: cy, t: t };
}

function strokeLength(points){
var len = 0;
for(var i = 1; i < points.length; i++){
var dx = points[i].x - points[i - 1].x;
var dy = points[i].y - points[i - 1].y;
len += Math.sqrt(dx * dx + dy * dy);
}
return len;
}

function gravity(){
return state.gravityVectors[state.gravityIndex];
}

function cycleGravity(){
if(state.screen !== 'play'){ return; }
if(state.manualRotations <= 0){
addMessage('No gravity turns left.', 1.2);
return;
}
state.manualRotations -= 1;
state.gravityIndex = (state.gravityIndex + 1) % state.gravityVectors.length;
addMessage('Gravity turned ' + gravity().label + '.', 1.4);
for(var i = 0; i < 12; i++){
addParticle(760, 60, '#355f8c', 0.6, (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 60, 3);
}
}

function undoStroke(){
if(state.screen !== 'play'){ return; }
for(var i = state.strokes.length - 1; i >= 0; i--){
if(!state.strokes[i].preplaced){
var pts = state.strokes[i].points;
var refund = Math.min(80, strokeLength(pts));
state.ink = Math.min(state.maxInk, state.ink + refund);
state.strokes.splice(i, 1);
addMessage('Undid last stroke.', 1.2);
return;
}
}
addMessage('Nothing to undo.', 1.1);
}

function createDroplet(x, y){
state.droplets.push({
x: x + (Math.random() - 0.5) * 8,
y: y + (Math.random() - 0.5) * 4,
vx: (Math.random() - 0.5) * 18,
vy: 12 + Math.random() * 10,
r: 4,
charged: false,
absorbed: false,
released: false,
scored: false,
spilled: false,
trail: [],
age: 0,
stateTag: 'normal'
});
}

function segmentIter(points, fn){
for(var i = 1; i < points.length; i++){
fn(points[i - 1], points[i]);
}
}

function tryCaptureDroplet(d, stroke){
var captured = false;
segmentIter(stroke.points, function(a, b){
if(captured){ return; }
var info = pointLineDistance(d.x, d.y, a.x, a.y, b.x, b.y);
if(info.dist < 8){
d.absorbed = true;
d.stateTag = 'absorbed';
d.captureX = info.x;
d.captureY = info.y;
d.vx = 0;
d.vy = 0;
stroke.stored.push({ charged: d.charged, timer: 1 + Math.random() * 0.15, x: info.x, y: info.y });
stroke.pulse = 0.8;
state.validGuideUsed = true;
for(var p = 0; p < 5; p++){
addParticle(info.x, info.y, '#2c7a7b', 0.5, (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20, 2 + Math.random() * 2);
}
captured = true;
}
});
return captured;
}

function bounceDroplet(d, stroke){
var hit = false;
segmentIter(stroke.points, function(a, b){
if(hit){ return; }
var info = pointLineDistance(d.x, d.y, a.x, a.y, b.x, b.y);
if(info.dist < d.r + 3){
var dx = b.x - a.x;
var dy = b.y - a.y;
var len = Math.sqrt(dx * dx + dy * dy) || 1;
var nx = -dy / len;
var ny = dx / len;
var dot = d.vx * nx + d.vy * ny;
if(dot > 0){ nx *= -1; ny *= -1; dot = d.vx * nx + d.vy * ny; }
d.vx = d.vx - 1.7 * dot * nx;
d.vy = d.vy - 1.7 * dot * ny;
d.x += nx * 3;
d.y += ny * 3;
state.validGuideUsed = true;
hit = true;
}
});
return hit;
}

function releaseFromGlyph(stroke){
if(stroke.stored.length <= 0){ return; }
for(var i = stroke.stored.length - 1; i >= 0; i--){
stroke.stored[i].timer -= 1 / 60;
}
if(stroke.stored[0].timer <= 0){
var packet = stroke.stored.shift();
var dirMap = [
{ x: 0, y: -1 },
{ x: 1, y: 0 },
{ x: 0, y: 1 },
{ x: -1, y: 0 }
];
var dir = dirMap[stroke.dir];
state.droplets.push({
x: packet.x + dir.x * 10,
y: packet.y + dir.y * 10,
vx: dir.x * 120,
vy: dir.y * 120,
r: 4,
charged: packet.charged,
absorbed: false,
released: true,
scored: false,
spilled: false,
trail: [],
age: 0,
stateTag: packet.charged ? 'charged' : 'released'
});
stroke.flash = 0.35;
for(var p = 0; p < 8; p++){
addParticle(packet.x, packet.y, packet.charged ? '#c44d58' : '#4f9da6', 0.55, dir.x * 30 + (Math.random() - 0.5) * 40, dir.y * 30 + (Math.random() - 0.5) * 40, 2 + Math.random() * 2);
}
}
}

function updateTutorial(dt){
if(state.screen !== 'play'){ return; }
state.tutorialClock += dt;
if(state.tutorialClock < 2.2 && state.tutorialStep < 1){
state.tutorialStep = 1;
addMessage('1. Drag to draw solid ink walls.', 2.2);
}
if(state.tutorialClock > 2.3 && state.tutorialClock < 4.8 && state.tutorialStep < 2){
state.tutorialStep = 2;
addMessage('2. Click Absorb, then draw a glyph that stores and spits water.', 2.5);
}
if(state.tutorialClock > 4.9 && state.tutorialClock < 7.2 && state.tutorialStep < 3){
state.tutorialStep = 3;
addMessage('3. Click a glyph to rotate its arrow.', 2.2);
}
if(state.tutorialClock > 7.3 && state.tutorialClock < 10 && state.tutorialStep < 4){
state.tutorialStep = 4;
addMessage('4. Route droplets through the ritual ring, then into the cup.', 2.6);
}
}

function updateGame(dt){
state.buttons = [
{ id: 'solid', x: 18, y: 16, w: 88, h: 28 },
{ id: 'absorb', x: 112, y: 16, w: 96, h: 28 },
{ id: 'gravity', x: 214, y: 16, w: 92, h: 28 },
{ id: 'undo', x: 312, y: 16, w: 78, h: 28 },
{ id: 'restart', x: 396, y: 16, w: 86, h: 28 }
];

for(var m = state.messages.length - 1; m >= 0; m--){
state.messages[m].time -= dt;
if(state.messages[m].time <= 0){
state.messages.splice(m, 1);
}
}

for(var pp = state.particles.length - 1; pp >= 0; pp--){
var part = state.particles[pp];
part.life -= dt;
part.x += part.vx * dt;
part.y += part.vy * dt;
part.vx *= 0.98;
part.vy *= 0.98;
if(part.life <= 0){
state.particles.splice(pp, 1);
}
}

if(state.screen !== 'play'){ return; }

state.levelTime += dt;
updateTutorial(dt);

state.spawnTimer += dt;
if(state.spawned < state.maxDrops && state.spawnTimer >= state.spawnInterval){
state.spawnTimer = 0;
state.spawned += 1;
createDroplet(state.source.x + state.source.w / 2, state.source.y + state.source.h);
}

for(var s = 0; s < state.strokes.length; s++){
if(state.strokes[s].type === 'absorb'){
state.strokes[s].pulse = Math.max(0, state.strokes[s].pulse - dt);
state.strokes[s].flash = Math.max(0, state.strokes[s].flash - dt);
releaseFromGlyph(state.strokes[s]);
}
}

var g = gravity();
for(var i = state.droplets.length - 1; i >= 0; i--){
var d = state.droplets[i];
if(d.absorbed){
state.droplets.splice(i, 1);
continue;
}

d.age += dt;
d.vx += g.x * dt;
d.vy += g.y * dt;
d.x += d.vx * dt;
d.y += d.vy * dt;

d.trail.push({ x: d.x, y: d.y, life: 0.35 });
if(d.trail.length > 8){ d.trail.shift(); }
for(var tr = 0; tr < d.trail.length; tr++){
 d.trail[tr].life -= dt;
}
while(d.trail.length > 0 && d.trail[0].life <= 0){
 d.trail.shift();
}

var dxr = d.x - state.ritualRing.x;
var dyr = d.y - state.ritualRing.y;
if(!d.charged && Math.sqrt(dxr * dxr + dyr * dyr) < state.ritualRing.r){
 d.charged = true;
 d.stateTag = 'charged';
 state.ritualChargeCount += 1;
 addMessage('Ritual charge acquired.', 1.2);
 for(var rp = 0; rp < 8; rp++){
  addParticle(d.x, d.y, '#c44d58', 0.7, (Math.random() - 0.5) * 45, (Math.random() - 0.5) * 45, 2 + Math.random() * 2);
 }
}

for(var t = 0; t < state.terrain.length; t++){
 var wall = state.terrain[t];
 bounceDroplet(d, { points: [{ x: wall.x1, y: wall.y1 }, { x: wall.x2, y: wall.y2 }] });
}

var removed = false;
for(var st = 0; st < state.strokes.length; st++){
 var stroke = state.strokes[st];
 if(stroke.type === 'solid'){
  bounceDroplet(d, stroke);
 } else {
  if(tryCaptureDroplet(d, stroke)){
   removed = true;
   break;
  }
 }
}
if(removed){
 state.droplets.splice(i, 1);
 continue;
}

var cup = state.cup;
if(d.x > cup.x && d.x < cup.x + cup.w && d.y > cup.y + 18 && d.y < cup.y + cup.h){
 d.scored = true;
 d.stateTag = d.charged ? 'scoredCharged' : 'scored';
 if(d.charged){
  state.cupFillCharged += 1.5;
  addMessage('Charged drop delivered.', 0.9);
 } else {
  state.cupFillNormal += 1;
 }
 for(var cp = 0; cp < 5; cp++){
  addParticle(d.x, d.y, d.charged ? '#c44d58' : '#4f9da6', 0.5, (Math.random() - 0.5) * 25, -Math.random() * 30, 2 + Math.random() * 2);
 }
 state.droplets.splice(i, 1);
 continue;
}

if(d.x < -30 || d.x > 830 || d.y < -30 || d.y > 530){
 d.spilled = true;
 d.stateTag = 'spilled';
 state.spill += 1;
 for(var sp = 0; sp < 4; sp++){
  addParticle(Math.max(0, Math.min(800, d.x)), Math.max(0, Math.min(500, d.y)), '#6c7a89', 0.5, (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20, 2);
 }
 state.droplets.splice(i, 1);
 }
}

var totalFill = state.cupFillNormal + state.cupFillCharged;
if(totalFill >= state.cupTarget && state.validGuideUsed){
 state.screen = 'win';
 addMessage('Cup complete. The page remembers your ritual.', 3);
}

if(state.spill > state.spillLimit){
 state.screen = 'lose';
 addMessage('Too much spill. Rewrite the route.', 3);
}

if(state.spawned >= state.maxDrops && state.droplets.length === 0){
 if(totalFill < state.cupTarget){
  state.screen = 'lose';
  addMessage('The source ran dry before the cup filled.', 3);
 }
}
}

function drawStroke(points, color, width){
if(points.length < 2){ return; }
ctx.strokeStyle = color;
ctx.lineWidth = width;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';
ctx.beginPath();
ctx.moveTo(points[0].x, points[0].y);
for(var i = 1; i < points.length; i++){
ctx.lineTo(points[i].x, points[i].y);
}
ctx.stroke();
}

function drawGlyph(stroke){
drawStroke(stroke.points, '#2c7a7b', 7);
ctx.strokeStyle = 'rgba(44,122,123,0.22)';
ctx.lineWidth = 13 + stroke.pulse * 10;
ctx.beginPath();
ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
ctx.lineTo(stroke.points[stroke.points.length - 1].x, stroke.points[stroke.points.length - 1].y);
ctx.stroke();
var mid = stroke.points[Math.floor(stroke.points.length / 2)];
var dirMap = [
{ x: 0, y: -1, g: '↑' },
{ x: 1, y: 0, g: '→' },
{ x: 0, y: 1, g: '↓' },
{ x: -1, y: 0, g: '←' }
];
var dir = dirMap[stroke.dir];
ctx.fillStyle = '#17494b';
ctx.beginPath();
ctx.arc(mid.x, mid.y, 13, 0, Math.PI * 2);
ctx.fill();
ctx.fillStyle = '#d8f3f0';
ctx.font = '16px Arial';
ctx.textAlign = 'center';
ctx.fillText(dir.g, mid.x, mid.y + 5);
ctx.textAlign = 'left';
for(var i = 0; i < stroke.stored.length; i++){
var ang = (i / Math.max(1, stroke.stored.length)) * Math.PI * 2 + state.levelTime * 2;
var rr = 6 + (i % 3) * 4;
ctx.fillStyle = stroke.stored[i].charged ? '#c44d58' : '#7fd1d6';
ctx.beginPath();
ctx.arc(mid.x + Math.cos(ang) * rr, mid.y + Math.sin(ang) * rr, 2.7, 0, Math.PI * 2);
ctx.fill();
}
if(stroke.flash > 0){
ctx.strokeStyle = 'rgba(255,255,255,' + (stroke.flash * 1.8) + ')';
ctx.lineWidth = 18 * stroke.flash;
ctx.beginPath();
ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
ctx.lineTo(stroke.points[stroke.points.length - 1].x, stroke.points[stroke.points.length - 1].y);
ctx.stroke();
}
}

function drawWorld(){
ctx.fillStyle = '#efe3c8';
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = 'rgba(120,90,50,0.08)';
for(var n = 0; n < 60; n++){
ctx.fillRect((n * 137) % 800, (n * 59) % 500, 2, 2);
}

ctx.strokeStyle = '#6d5b43';
ctx.lineWidth = 6;
ctx.lineCap = 'round';
for(var i = 0; i < state.terrain.length; i++){
var wall = state.terrain[i];
ctx.beginPath();
ctx.moveTo(wall.x1, wall.y1);
ctx.lineTo(wall.x2, wall.y2);
ctx.stroke();
}

var ring = state.ritualRing;
ctx.strokeStyle = '#b64545';
ctx.lineWidth = 4;
ctx.beginPath();
ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
ctx.stroke();
ctx.strokeStyle = 'rgba(182,69,69,0.3)';
ctx.lineWidth = 10;
ctx.beginPath();
ctx.arc(ring.x, ring.y, ring.r + 8 + Math.sin(state.levelTime * 3) * 2, 0, Math.PI * 2);
ctx.stroke();
ctx.fillStyle = '#8a2c2c';
ctx.font = '12px Arial';
ctx.fillText('Ritual Ring', ring.x - 28, ring.y - 44);

var source = state.source;
ctx.fillStyle = '#355f8c';
ctx.fillRect(source.x, source.y, source.w, source.h);
ctx.fillStyle = '#ffffff';
ctx.fillRect(source.x + 8, source.y - 8, 12, 8);
ctx.fillStyle = '#2a4d6a';
ctx.fillRect(source.x + 10, source.y + source.h, 8, 12);
ctx.fillStyle = '#1f2d3a';
ctx.font = '12px Arial';
ctx.fillText('Source', source.x - 2, source.y - 10);

var cup = state.cup;
ctx.strokeStyle = '#2a8f8d';
ctx.lineWidth = 5;
ctx.beginPath();
ctx.moveTo(cup.x, cup.y);
ctx.lineTo(cup.x, cup.y + cup.h);
ctx.lineTo(cup.x + cup.w, cup.y + cup.h);
ctx.lineTo(cup.x + cup.w, cup.y);
ctx.stroke();
var fillTotal = Math.min(state.cupTarget, state.cupFillNormal + state.cupFillCharged);
var fillH = (fillTotal / state.cupTarget) * (cup.h - 8);
ctx.fillStyle = 'rgba(79,157,166,0.65)';
ctx.fillRect(cup.x + 4, cup.y + cup.h - 4 - fillH, cup.w - 8, fillH);
var chargedH = (Math.min(state.cupTarget, state.cupFillCharged) / state.cupTarget) * (cup.h - 8);
ctx.fillStyle = 'rgba(196,77,88,0.65)';
ctx.fillRect(cup.x + 4, cup.y + cup.h - 4 - chargedH, cup.w - 8, chargedH);
ctx.fillStyle = '#1f2d3a';
ctx.font = '12px Arial';
ctx.fillText('Cup', cup.x + 24, cup.y - 10);

for(var s = 0; s < state.strokes.length; s++){
if(state.strokes[s].type === 'solid'){
 drawStroke(state.strokes[s].points, '#243b5a', 6);
} else {
 drawGlyph(state.strokes[s]);
}
}

if(state.currentStroke){
 drawStroke(state.currentStroke.points, state.currentStroke.type === 'solid' ? 'rgba(36,59,90,0.55)' : 'rgba(44,122,123,0.55)', state.currentStroke.type === 'solid' ? 6 : 7);
}

for(var d = 0; d < state.droplets.length; d++){
var drop = state.droplets[d];
for(var tt = 0; tt < drop.trail.length; tt++){
 var tr = drop.trail[tt];
 ctx.fillStyle = drop.charged ? 'rgba(196,77,88,' + Math.max(0, tr.life * 1.8) + ')' : drop.released ? 'rgba(44,122,123,' + Math.max(0, tr.life * 1.8) + ')' : 'rgba(79,157,166,' + Math.max(0, tr.life * 1.6) + ')';
 ctx.beginPath();
 ctx.arc(tr.x, tr.y, 2, 0, Math.PI * 2);
 ctx.fill();
}
ctx.fillStyle = drop.charged ? '#c44d58' : drop.released ? '#2c7a7b' : '#4f9da6';
ctx.beginPath();
ctx.arc(drop.x, drop.y, drop.r, 0, Math.PI * 2);
ctx.fill();
ctx.strokeStyle = '#ffffff';
ctx.lineWidth = 1;
ctx.stroke();
}

for(var p = 0; p < state.particles.length; p++){
var part = state.particles[p];
ctx.globalAlpha = Math.max(0, part.life / part.max);
ctx.fillStyle = part.color;
ctx.beginPath();
ctx.arc(part.x, part.y, part.size, 0, Math.PI * 2);
ctx.fill();
ctx.globalAlpha = 1;
}
}

function drawUI(){
ctx.fillStyle = 'rgba(255,248,230,0.92)';
ctx.fillRect(10, 10, 500, 76);
ctx.strokeStyle = '#8a775c';
ctx.lineWidth = 2;
ctx.strokeRect(10, 10, 500, 76);

for(var i = 0; i < state.buttons.length; i++){
var b = state.buttons[i];
var active = (b.id === state.inkType) || (b.id === 'gravity' && false);
ctx.fillStyle = active ? '#d7c39d' : '#e8dcc0';
ctx.fillRect(b.x, b.y, b.w, b.h);
ctx.strokeStyle = '#6d5b43';
ctx.strokeRect(b.x, b.y, b.w, b.h);
ctx.fillStyle = '#1f2d3a';
ctx.font = '14px Arial';
var label = b.id === 'solid' ? 'Solid' : b.id === 'absorb' ? 'Absorb' : b.id === 'gravity' ? 'Rotate G' : b.id === 'undo' ? 'Undo Z' : 'Restart R';
ctx.fillText(label, b.x + 10, b.y + 19);
}

ctx.fillStyle = '#1f2d3a';
ctx.font = '14px Arial';
ctx.fillText('Ink ' + Math.floor(state.ink) + '/' + state.maxInk, 18, 64);
ctx.fillText('Gravity ' + gravity().label + ' (' + state.manualRotations + ' left)', 140, 64);
ctx.fillText('Spill ' + state.spill + '/' + state.spillLimit, 350, 64);

ctx.fillStyle = 'rgba(255,248,230,0.92)';
ctx.fillRect(530, 10, 260, 98);
ctx.strokeStyle = '#8a775c';
ctx.strokeRect(530, 10, 260, 98);
ctx.fillStyle = '#1f2d3a';
ctx.font = '14px Arial';
ctx.fillText('Fill target: ' + (state.cupFillNormal + state.cupFillCharged).toFixed(1) + '/' + state.cupTarget, 542, 32);
ctx.fillText('Normal: ' + state.cupFillNormal.toFixed(1), 542, 52);
ctx.fillText('Ritual: ' + state.cupFillCharged.toFixed(1), 542, 72);
ctx.fillText('Bonus ritual goal: ' + state.bonusChargedTarget, 542, 92);

ctx.fillStyle = '#243b5a';
ctx.fillRect(655, 42, 110, 10);
ctx.fillStyle = '#4f9da6';
ctx.fillRect(655, 42, Math.min(110, 110 * (state.cupFillNormal / state.cupTarget)), 10);
ctx.fillStyle = '#b64545';
ctx.fillRect(655, 58, Math.min(110, 110 * (state.cupFillCharged / state.cupTarget)), 10);

ctx.fillStyle = 'rgba(255,248,230,0.92)';
ctx.fillRect(10, 420, 310, 68);
ctx.strokeStyle = '#8a775c';
ctx.strokeRect(10, 420, 310, 68);
ctx.fillStyle = '#1f2d3a';
ctx.font = '13px Arial';
ctx.fillText('Novel mechanics checklist:', 20, 440);
ctx.fillText('• Material ink drawing', 20, 458);
ctx.fillText('• Absorb-delay redirect glyphs', 20, 474);
ctx.fillText('• Ritual charge history droplets', 170, 458);
ctx.fillText('• Limited gravity rotation', 170, 474);

if(state.messages.length > 0){
var msg = state.messages[state.messages.length - 1];
ctx.fillStyle = 'rgba(31,45,58,0.82)';
ctx.fillRect(190, 452, 420, 28);
ctx.fillStyle = '#f7f0dc';
ctx.font = '14px Arial';
ctx.fillText(msg.text, 202, 471);
}

ctx.strokeStyle = '#6d5b43';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(760, 60, 24, 0, Math.PI * 2);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(760, 60);
ctx.lineTo(760 + gravity().x * 0.08, 60 + gravity().y * 0.08);
ctx.stroke();
ctx.fillStyle = '#1f2d3a';
ctx.font = '11px Arial';
ctx.fillText('Gravity', 742, 94);
}

function drawOverlay(){
if(state.screen === 'start'){
ctx.fillStyle = 'rgba(20,18,14,0.34)';
ctx.fillRect(0, 0, 800, 500);
ctx.fillStyle = 'rgba(255,248,230,0.96)';
ctx.fillRect(135, 95, 530, 290);
ctx.strokeStyle = '#6d5b43';
ctx.lineWidth = 3;
ctx.strokeRect(135, 95, 530, 290);
ctx.fillStyle = '#1f2d3a';
ctx.font = '30px Arial';
ctx.fillText('Ritual Ink Cup', 285, 145);
ctx.font = '16px Arial';
ctx.fillText('Draw walls, script absorb glyphs, rotate gravity, and route water through the ritual ring.', 160, 190);
ctx.fillText('Win by filling the cup. Charged droplets count separately and glow with history.', 170, 220);
ctx.fillText('Mouse: draw and click buttons. Click glyphs to rotate arrows. Keys: G, Z, R.', 180, 250);
ctx.fillText('This build preserves all novel mechanics and adds visible droplet fate states.', 170, 280);
ctx.fillStyle = '#d7c39d';
ctx.fillRect(320, 315, 160, 42);
ctx.strokeStyle = '#6d5b43';
ctx.strokeRect(320, 315, 160, 42);
ctx.fillStyle = '#1f2d3a';
ctx.font = '22px Arial';
ctx.fillText('Start', 374, 343);
}
if(state.screen === 'win' || state.screen === 'lose'){
ctx.fillStyle = 'rgba(20,18,14,0.34)';
ctx.fillRect(0, 0, 800, 500);
ctx.fillStyle = 'rgba(255,248,230,0.96)';
ctx.fillRect(220, 150, 360, 180);
ctx.strokeStyle = '#6d5b43';
ctx.lineWidth = 3;
ctx.strokeRect(220, 150, 360, 180);
ctx.fillStyle = '#1f2d3a';
ctx.font = '28px Arial';
ctx.fillText(state.screen === 'win' ? 'Page Completed' : 'Ritual Failed', 305, 195);
ctx.font = '16px Arial';
ctx.fillText('Total fill: ' + (state.cupFillNormal + state.cupFillCharged).toFixed(1) + '/' + state.cupTarget, 300, 225);
ctx.fillText('Ritual fill: ' + state.cupFillCharged.toFixed(1), 300, 248);
ctx.fillText('Spill: ' + state.spill + '/' + state.spillLimit, 300, 271);
ctx.fillStyle = '#d7c39d';
ctx.fillRect(330, 288, 140, 28);
ctx.strokeStyle = '#6d5b43';
ctx.strokeRect(330, 288, 140, 28);
ctx.fillStyle = '#1f2d3a';
ctx.fillText('Restart', 376, 307);
}
}

function render(){
drawWorld();
drawUI();
drawOverlay();
}

function buttonAt(x, y){
if(state.screen === 'start'){
if(x >= 320 && x <= 480 && y >= 315 && y <= 357){
 return { id: 'start' };
}
}
if(state.screen === 'win' || state.screen === 'lose'){
if(x >= 330 && x <= 470 && y >= 288 && y <= 316){
 return { id: 'restartOverlay' };
}
}
for(var i = 0; i < state.buttons.length; i++){
var b = state.buttons[i];
if(x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h){
 return b;
}
}
return null;
}

function glyphAt(x, y){
for(var i = state.strokes.length - 1; i >= 0; i--){
var stroke = state.strokes[i];
if(stroke.type !== 'absorb'){ continue; }
for(var p = 1; p < stroke.points.length; p++){
 var info = pointLineDistance(x, y, stroke.points[p - 1].x, stroke.points[p - 1].y, stroke.points[p].x, stroke.points[p].y);
 if(info.dist < 12){ return stroke; }
}
}
return null;
}

canvas.addEventListener('mousemove', function(e){
var rect = canvas.getBoundingClientRect();
mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
if(mouse.down && state.screen === 'play' && state.currentStroke){
var last = state.currentStroke.points[state.currentStroke.points.length - 1];
var dx = mouse.x - last.x;
var dy = mouse.y - last.y;
var dist = Math.sqrt(dx * dx + dy * dy);
if(dist > 4 && state.ink > 0 && mouse.y > 52){
 state.currentStroke.points.push({ x: mouse.x, y: mouse.y });
 state.ink = Math.max(0, state.ink - dist * (state.currentStroke.type === 'solid' ? 0.55 : 0.75));
}
}
});

canvas.addEventListener('mousedown', function(e){
var rect = canvas.getBoundingClientRect();
mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
mouse.down = true;
var b = buttonAt(mouse.x, mouse.y);
if(b){
 if(b.id === 'start'){ startPlay(); }
 else if(b.id === 'restartOverlay'){ fullRestart(); }
 else if(b.id === 'solid'){ state.inkType = 'solid'; addMessage('Solid ink selected.', 1); }
 else if(b.id === 'absorb'){ state.inkType = 'absorb'; addMessage('Absorb ink selected.', 1); }
 else if(b.id === 'gravity'){ cycleGravity(); }
 else if(b.id === 'undo'){ undoStroke(); }
 return;
}
if(state.screen !== 'play'){ return; }
var glyph = glyphAt(mouse.x, mouse.y);
if(glyph){
 glyph.dir = (glyph.dir + 1) % 4;
 state.selectedGlyphHint = glyph;
 addMessage('Glyph redirected.', 1.1);
 return;
}
if(mouse.y <= 52 || state.ink <= 0){ return; }
state.currentStroke = { type: state.inkType, points: [{ x: mouse.x, y: mouse.y }], dir: 1, stored: [], releaseTimer: 0, flash: 0, pulse: 0, preplaced: false };
});

canvas.addEventListener('mouseup', function(){
mouse.down = false;
if(state.currentStroke){
 if(state.currentStroke.points.length > 1){
  if(state.currentStroke.type === 'absorb'){
   state.currentStroke.dir = 1;
  }
  state.strokes.push(state.currentStroke);
 } else {
  state.ink = Math.min(state.maxInk, state.ink + 4);
 }
 state.currentStroke = null;
}
});

document.addEventListener('keydown', function(e){
keys[e.key.toLowerCase()] = true;
if(e.key.toLowerCase() === 'g'){ cycleGravity(); }
if(e.key.toLowerCase() === 'z'){ undoStroke(); }
if(e.key.toLowerCase() === 'r'){ fullRestart(); }
});

document.addEventListener('keyup', function(e){
keys[e.key.toLowerCase()] = false;
});

function loop(t){
var dt = Math.min(0.033, (t - lastTime) / 1000 || 0.016);
lastTime = t;
updateGame(dt);
render();
requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
};
</script>
</body>
