<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Ink Ritual Cup</title>
<style>
body{margin:0;background:#f3efe4;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif;}
canvas{width:800px;height:500px;display:block;background:#fbf8ef;box-shadow:0 8px 30px rgba(0,0,0,0.12);border:2px solid #d8d0bd;}
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

var mouse = {x:0,y:0,down:false};
var buttons = {
  restart:{x:650,y:16,w:120,h:34},
  undo:{x:650,y:58,w:120,h:34},
  start:{x:650,y:100,w:120,h:34},
  next:{x:650,y:142,w:120,h:34}
};

var levels = [
  {
    name:'Level 1',
    note:'Solid ink only. Draw a ramp into the cup.',
    inkTypes:['solid'],
    source:{x:120,y:74},
    cup:{x:610,y:320,w:90,h:110},
    ritual:{x:260,y:190,r:24,target:0,required:false},
    hazards:[],
    walls:[
      {x1:0,y1:470,x2:800,y2:470},
      {x1:0,y1:0,x2:0,y2:500},
      {x1:800,y1:0,x2:800,y2:500},
      {x1:190,y1:140,x2:280,y2:140},
      {x1:470,y1:260,x2:560,y2:260}
    ],
    sourceDuration:300,
    cupTarget:28,
    maxInk:290
  },
  {
    name:'Level 2',
    note:'Repel ink bends droplets away from hot evaporation zones.',
    inkTypes:['solid','repel'],
    source:{x:120,y:72},
    cup:{x:620,y:320,w:90,h:110},
    ritual:{x:250,y:180,r:24,target:0,required:false},
    hazards:[
      {x:300,y:210,w:170,h:34},
      {x:410,y:250,w:150,h:30}
    ],
    walls:[
      {x1:0,y1:470,x2:800,y2:470},
      {x1:0,y1:0,x2:0,y2:500},
      {x1:800,y1:0,x2:800,y2:500},
      {x1:180,y1:130,x2:255,y2:130},
      {x1:520,y1:280,x2:610,y2:280}
    ],
    sourceDuration:340,
    cupTarget:30,
    maxInk:300
  },
  {
    name:'Level 3',
    note:'Use absorb ink to pulse water through the ritual before the cup.',
    inkTypes:['solid','repel','absorb'],
    source:{x:120,y:64},
    cup:{x:622,y:320,w:90,h:110},
    ritual:{x:360,y:160,r:28,target:12,required:true},
    hazards:[
      {x:300,y:230,w:185,h:34}
    ],
    walls:[
      {x1:0,y1:470,x2:800,y2:470},
      {x1:0,y1:0,x2:0,y2:500},
      {x1:800,y1:0,x2:800,y2:500},
      {x1:170,y1:120,x2:255,y2:120},
      {x1:430,y1:120,x2:510,y2:120},
      {x1:520,y1:275,x2:620,y2:275}
    ],
    sourceDuration:360,
    cupTarget:28,
    maxInk:320
  }
];

var game = {};

game.currentLevel = 0;

function getLevel(){
  return levels[game.currentLevel];
}

function resetGame(){
  var level = getLevel();
  game.strokes = [];
  game.currentStroke = null;
  game.maxInk = level.maxInk;
  game.inkRemaining = game.maxInk;
  game.selectedInkType = level.inkTypes[0];
  game.droplets = [];
  game.sourceTimer = 0;
  game.sourceActive = false;
  game.sourceDuration = level.sourceDuration;
  game.cupFill = 0;
  game.cupTarget = level.cupTarget;
  game.ritualFill = 0;
  game.ritualTarget = level.ritual.target;
  game.ritualActive = !level.ritual.required;
  game.winState = false;
  game.loseState = false;
  game.trueWin = false;
  game.cupMood = 'waiting';
  game.attempts = (game.attempts || 0) + 1;
  game.scoreStars = 0;
  game.uiMessage = level.note;
  game.lastCupHitTimer = 0;
  game.evaporated = 0;
  game.spilled = 0;
  game.totalSpawned = 0;
  game.buttonFlash = '';
  game.flashTimer = 0;
  game.levelStarted = false;
  game.gameStatus = 'ready';
  game.levelTimer = 0;
}

resetGame();

function pointInRect(px,py,r){
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function distance(ax,ay,bx,by){
  var dx = bx - ax;
  var dy = by - ay;
  return Math.sqrt(dx * dx + dy * dy);
}

function distancePointToSegment(px,py,x1,y1,x2,y2){
  var dx = x2 - x1;
  var dy = y2 - y1;
  var len2 = dx * dx + dy * dy;
  if(len2 === 0){
    return {dist:distance(px,py,x1,y1),nx:0,ny:-1,t:0,cx:x1,cy:y1};
  }
  var t = ((px - x1) * dx + (py - y1) * dy) / len2;
  if(t < 0){ t = 0; }
  if(t > 1){ t = 1; }
  var cx = x1 + dx * t;
  var cy = y1 + dy * t;
  var ddx = px - cx;
  var ddy = py - cy;
  var dist = Math.sqrt(ddx * ddx + ddy * ddy);
  var nx = 0;
  var ny = -1;
  if(dist > 0.0001){
    nx = ddx / dist;
    ny = ddy / dist;
  }
  return {dist:dist,nx:nx,ny:ny,t:t,cx:cx,cy:cy};
}

function allSegments(){
  var level = getLevel();
  var segments = [];
  for(var i=0;i<level.walls.length;i++){
    segments.push({x1:level.walls[i].x1,y1:level.walls[i].y1,x2:level.walls[i].x2,y2:level.walls[i].y2,type:'wall'});
  }
  for(var s=0;s<game.strokes.length;s++){
    var pts = game.strokes[s].points;
    for(var p=1;p<pts.length;p++){
      segments.push({x1:pts[p-1].x,y1:pts[p-1].y,x2:pts[p].x,y2:pts[p].y,drawn:true,inkType:game.strokes[s].inkType,strokeRef:game.strokes[s]});
    }
  }
  return segments;
}

function undoStroke(){
  if(game.strokes.length > 0 && !game.winState){
    var removed = game.strokes.pop();
    game.inkRemaining += removed.inkCost;
    if(game.inkRemaining > game.maxInk){
      game.inkRemaining = game.maxInk;
    }
    game.uiMessage = 'Undid last stroke';
    game.buttonFlash = 'undo';
    game.flashTimer = 10;
  }
}

function finalizeStroke(){
  if(!game.currentStroke){
    return;
  }
  if(game.currentStroke.points.length > 1 && game.currentStroke.inkCost > 2){
    game.strokes.push(game.currentStroke);
    game.levelStarted = true;
  } else {
    game.inkRemaining += game.currentStroke.inkCost;
    if(game.inkRemaining > game.maxInk){
      game.inkRemaining = game.maxInk;
    }
  }
  game.currentStroke = null;
}

function cycleInkType(){
  var types = getLevel().inkTypes;
  var idx = types.indexOf(game.selectedInkType);
  idx = (idx + 1) % types.length;
  game.selectedInkType = types[idx];
}

canvas.addEventListener('mousemove', function(e){
  var rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
  if(mouse.down && game.currentStroke && !game.winState && !game.loseState){
    var pts = game.currentStroke.points;
    var last = pts[pts.length - 1];
    var d = distance(last.x,last.y,mouse.x,mouse.y);
    if(d >= 6 && game.inkRemaining > 0){
      var spend = Math.min(d, game.inkRemaining);
      var ratio = spend / d;
      var nx = last.x + (mouse.x - last.x) * ratio;
      var ny = last.y + (mouse.y - last.y) * ratio;
      pts.push({x:nx,y:ny});
      game.currentStroke.inkCost += spend;
      game.inkRemaining -= spend;
      game.levelStarted = true;
      if(game.inkRemaining <= 0){
        finalizeStroke();
        mouse.down = false;
      }
    }
  }
});

canvas.addEventListener('mousedown', function(e){
  var rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);

  if(pointInRect(mouse.x,mouse.y,buttons.restart)){
    resetGame();
    game.buttonFlash = 'restart';
    game.flashTimer = 10;
    return;
  }
  if(pointInRect(mouse.x,mouse.y,buttons.undo)){
    undoStroke();
    return;
  }
  if(pointInRect(mouse.x,mouse.y,buttons.start)){
    if(game.gameStatus === 'ready'){
      game.sourceActive = true;
      game.gameStatus = 'running';
      game.uiMessage = 'Water released';
      game.buttonFlash = 'start';
      game.flashTimer = 10;
    }
    return;
  }
  if(pointInRect(mouse.x,mouse.y,buttons.next)){
    if(game.winState && game.currentLevel < levels.length - 1){
      game.currentLevel++;
      resetGame();
    }
    return;
  }

  if(mouse.y < 170){
    if(mouse.x > 20 && mouse.x < 110){
      game.selectedInkType = 'solid';
      return;
    }
    if(mouse.x > 120 && mouse.x < 210 && getLevel().inkTypes.indexOf('repel') !== -1){
      game.selectedInkType = 'repel';
      return;
    }
    if(mouse.x > 220 && mouse.x < 310 && getLevel().inkTypes.indexOf('absorb') !== -1){
      game.selectedInkType = 'absorb';
      return;
    }
  }

  if(game.winState || game.loseState){
    return;
  }
  mouse.down = true;
  game.currentStroke = {points:[{x:mouse.x,y:mouse.y}],inkCost:0,inkType:game.selectedInkType,charge:0};
});

canvas.addEventListener('mouseup', function(){
  mouse.down = false;
  finalizeStroke();
});

window.addEventListener('keydown', function(e){
  if(e.key === 'r' || e.key === 'R'){
    resetGame();
  }
  if(e.key === 'z' || e.key === 'Z'){
    undoStroke();
  }
  if(e.key === 'q' || e.key === 'Q'){
    cycleInkType();
  }
  if(e.key === ' '){
    if(game.gameStatus === 'ready'){
      game.sourceActive = true;
      game.gameStatus = 'running';
      game.uiMessage = 'Water released';
    }
  }
});

function spawnDroplet(){
  var level = getLevel();
  game.droplets.push({
    x:level.source.x + (Math.random() * 10 - 5),
    y:level.source.y + (Math.random() * 4 - 2),
    vx:Math.random() * 0.4,
    vy:0,
    r:4,
    alive:true,
    absorbed:false,
    absorbTimer:0,
    absorbStroke:null,
    ritualTouched:false
  });
  game.totalSpawned++;
}

function updateDroplets(){
  var level = getLevel();
  var segments = allSegments();
  for(var i=game.droplets.length-1;i>=0;i--){
    var d = game.droplets[i];

    if(d.absorbed){
      d.absorbTimer--;
      if(d.absorbStroke){
        var a = d.absorbStroke.anchor;
        d.x = a.x;
        d.y = a.y;
      }
      if(d.absorbTimer <= 0){
        d.absorbed = false;
        if(d.absorbStroke){
          d.vx = (d.absorbStroke.releaseDir.x || 0.8) * 2.2;
          d.vy = (d.absorbStroke.releaseDir.y || -0.8) * 2.2;
          d.absorbStroke.charge = Math.max(0, d.absorbStroke.charge - 1);
        }
      }
      continue;
    }

    d.vy += 0.18;
    d.x += d.vx;
    d.y += d.vy;

    for(var s=0;s<segments.length;s++){
      var seg = segments[s];
      var hit = distancePointToSegment(d.x,d.y,seg.x1,seg.y1,seg.x2,seg.y2);

      if(seg.inkType === 'repel'){
        if(hit.dist < 18){
          var force = (18 - hit.dist) / 18;
          d.vx += hit.nx * force * 0.42;
          d.vy += hit.ny * force * 0.42;
        }
        continue;
      }

      if(seg.inkType === 'absorb'){
        if(hit.dist < d.r + 3 && !d.ritualTouched){
          d.absorbed = true;
          d.absorbTimer = 35;
          d.absorbStroke = seg.strokeRef;
          seg.strokeRef.charge = Math.min(8, seg.strokeRef.charge + 1);
          seg.strokeRef.anchor = {x:hit.cx,y:hit.cy};
          var sx0 = seg.x2 - seg.x1;
          var sy0 = seg.y2 - seg.y1;
          var sl0 = Math.sqrt(sx0 * sx0 + sy0 * sy0) || 1;
          seg.strokeRef.releaseDir = {x:sx0 / sl0,y:sy0 / sl0};
          break;
        }
        continue;
      }

      if(hit.dist < d.r + 1.8){
        d.x = hit.cx + hit.nx * (d.r + 2.2);
        d.y = hit.cy + hit.ny * (d.r + 2.2);
        var sx = seg.x2 - seg.x1;
        var sy = seg.y2 - seg.y1;
        var sl = Math.sqrt(sx * sx + sy * sy) || 1;
        sx /= sl;
        sy /= sl;
        var tangentSpeed = d.vx * sx + d.vy * sy;
        tangentSpeed *= 0.92;
        if(seg.drawn){
          tangentSpeed += 0.04 * sx;
        }
        d.vx = sx * tangentSpeed;
        d.vy = sy * tangentSpeed;
        if(d.vy > 1.8){
          d.vy = 1.8;
        }
      }
    }

    for(var h=0;h<level.hazards.length;h++){
      var hz = level.hazards[h];
      if(d.x > hz.x && d.x < hz.x + hz.w && d.y > hz.y && d.y < hz.y + hz.h){
        game.evaporated++;
        game.droplets.splice(i,1);
        d = null;
        break;
      }
    }
    if(!d){
      continue;
    }

    if(level.ritual.required && distance(d.x,d.y,level.ritual.x,level.ritual.y) < level.ritual.r + d.r + 3){
      if(!d.ritualTouched){
        d.ritualTouched = true;
        game.ritualFill += 1;
        if(game.ritualFill >= game.ritualTarget){
          game.ritualActive = true;
          game.uiMessage = 'Ritual awakened: the cup can be truly happy';
        }
      }
      var ang = Math.atan2(d.y - level.ritual.y, d.x - level.ritual.x);
      d.vx += Math.cos(ang) * 0.2;
      d.vy += Math.sin(ang) * 0.2;
    }

    var cup = level.cup;
    var insideCup = d.x > cup.x + 8 && d.x < cup.x + cup.w - 8 && d.y > cup.y + 10 && d.y < cup.y + cup.h;
    if(insideCup && d.vy > -0.7){
      game.cupFill += 1;
      game.lastCupHitTimer = 20;
      game.droplets.splice(i,1);
      continue;
    }

    if(d.y > 500 || d.x < -20 || d.x > 820){
      game.spilled++;
      game.droplets.splice(i,1);
    }
  }
}

function updateCupMood(){
  if(game.winState){
    game.cupMood = game.trueWin ? 'ecstatic' : 'okay';
    return;
  }
  if(game.loseState){
    game.cupMood = 'sad';
    return;
  }
  if(game.lastCupHitTimer > 0){
    game.cupMood = game.ritualActive ? 'excited' : 'uneasy';
    return;
  }
  var ratio = game.cupFill / game.cupTarget;
  if(ratio > 0.9 && !game.ritualActive){
    game.cupMood = 'impatient';
  } else if(ratio > 0.72){
    game.cupMood = game.ritualActive ? 'hopeful' : 'uneasy';
  } else if(game.sourceActive || game.droplets.length > 0){
    game.cupMood = 'worried';
  } else {
    game.cupMood = 'waiting';
  }
}

function updateGame(){
  if(game.lastCupHitTimer > 0){
    game.lastCupHitTimer--;
  }
  if(game.buttonFlash){
    game.flashTimer--;
    if(game.flashTimer <= 0){
      game.buttonFlash = '';
      game.flashTimer = 0;
    }
  }

  if(game.gameStatus === 'running' && !game.winState && !game.loseState){
    game.levelTimer++;
    if(game.sourceActive){
      game.sourceTimer++;
      if(game.sourceTimer % 4 === 0){
        spawnDroplet();
      }
      if(game.sourceTimer >= game.sourceDuration){
        game.sourceActive = false;
      }
    }

    updateDroplets();

    if(game.cupFill >= game.cupTarget){
      game.winState = true;
      game.gameStatus = 'win';
      game.trueWin = game.ritualActive;
      game.scoreStars = 1;
      if(game.ritualActive){ game.scoreStars = 3; }
      else if(getLevel().ritual.required){ game.scoreStars = 2; }
      game.uiMessage = game.trueWin ? 'Perfect completion: ritual and cup both satisfied' : 'Cup filled, but the ritual was missed';
    }

    var impossible = !game.sourceActive && game.droplets.length === 0 && game.cupFill < game.cupTarget;
    if(impossible){
      game.loseState = true;
      game.gameStatus = 'fail';
      game.uiMessage = 'Not enough water reached the cup';
    }
  }

  updateCupMood();
}

function drawButton(btn,label,active,enabled){
  ctx.fillStyle = enabled ? (active ? '#ffd86b' : '#efe5c8') : '#ddd6c8';
  ctx.strokeStyle = '#8f7d4e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(btn.x,btn.y,btn.w,btn.h,8);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = enabled ? '#4b3f23' : '#8e8575';
  ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(label, btn.x + btn.w / 2, btn.y + 22);
  ctx.textAlign = 'left';
}

function drawBackground(){
  ctx.fillStyle = '#fbf8ef';
  ctx.fillRect(0,0,800,500);
  ctx.strokeStyle = 'rgba(0,0,0,0.04)';
  ctx.lineWidth = 1;
  for(var x=20;x<800;x+=40){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,500);
    ctx.stroke();
  }
  for(var y=20;y<500;y+=40){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(800,y);
    ctx.stroke();
  }
}

function drawSource(){
  var level = getLevel();
  ctx.fillStyle = '#7f8fa6';
  ctx.fillRect(level.source.x - 18, level.source.y - 12, 36, 18);
  ctx.fillStyle = '#57b8ff';
  ctx.beginPath();
  ctx.arc(level.source.x, level.source.y + 8, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#3f4d63';
  ctx.font = '14px Arial';
  ctx.fillText(game.gameStatus === 'ready' ? 'Source ready' : 'Water', level.source.x - 28, level.source.y - 18);
}

function drawHazards(){
  var level = getLevel();
  for(var h=0;h<level.hazards.length;h++){
    var hz = level.hazards[h];
    ctx.fillStyle = 'rgba(235,80,80,0.22)';
    ctx.fillRect(hz.x, hz.y, hz.w, hz.h);
    ctx.strokeStyle = '#d84a4a';
    ctx.lineWidth = 3;
    ctx.strokeRect(hz.x, hz.y, hz.w, hz.h);
    ctx.strokeStyle = 'rgba(216,74,74,0.55)';
    for(var i=0;i<Math.max(3,Math.floor(hz.w / 26));i++){
      var sx = hz.x + 8 + i * 26;
      ctx.beginPath();
      ctx.moveTo(sx, hz.y + 4);
      ctx.lineTo(sx + 18, hz.y + hz.h - 4);
      ctx.stroke();
    }
  }
  if(level.hazards.length > 0){
    ctx.fillStyle = '#a33';
    ctx.font = '14px Arial';
    ctx.fillText('Evaporation zone', level.hazards[0].x + 16, level.hazards[0].y - 8);
  }
}

function drawRitual(){
  var level = getLevel();
  if(!level.ritual.required){
    return;
  }
  var ratio = Math.min(1, game.ritualFill / game.ritualTarget);
  ctx.save();
  ctx.translate(level.ritual.x, level.ritual.y);
  for(var i=0;i<6;i++){
    var ang = i * Math.PI / 3 + game.levelTimer * 0.01;
    var bloom = 16 + ratio * 12;
    ctx.fillStyle = ratio >= (i + 1) / 6 ? '#d88cff' : '#ead8f1';
    ctx.beginPath();
    ctx.ellipse(Math.cos(ang) * bloom, Math.sin(ang) * bloom, 8, 14, ang, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = game.ritualActive ? '#8d3cff' : '#c9a3dc';
  ctx.beginPath();
  ctx.arc(0,0,level.ritual.r,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#6d2b9b';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(game.ritualFill + '/' + game.ritualTarget, 0, 5);
  ctx.restore();
  ctx.fillStyle = '#6d2b9b';
  ctx.font = '13px Arial';
  ctx.fillText('Ritual bloom', level.ritual.x - 34, level.ritual.y - 42);
}

function strokeStyleForType(type){
  if(type === 'solid'){
    return {main:'#202020',glow:'rgba(255,255,255,0.35)',width:7};
  }
  if(type === 'repel'){
    return {main:'#f08b2d',glow:'rgba(255,240,200,0.45)',width:8};
  }
  return {main:'#8e4dff',glow:'rgba(230,210,255,0.45)',width:8};
}

function drawWallsAndStrokes(){
  var level = getLevel();
  ctx.lineCap = 'round';
  for(var i=0;i<level.walls.length;i++){
    var w = level.walls[i];
    ctx.strokeStyle = '#6f6f77';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(w.x1,w.y1);
    ctx.lineTo(w.x2,w.y2);
    ctx.stroke();
  }

  for(var s=0;s<game.strokes.length;s++){
    var pts = game.strokes[s].points;
    if(pts.length < 2){ continue; }
    var style = strokeStyleForType(game.strokes[s].inkType);
    ctx.strokeStyle = style.main;
    ctx.lineWidth = style.width;
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(var p=1;p<pts.length;p++){
      ctx.lineTo(pts[p].x,pts[p].y);
    }
    ctx.stroke();

    if(game.strokes[s].inkType === 'repel'){
      ctx.strokeStyle = 'rgba(255,210,150,0.8)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6,6]);
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pts[0].y);
      for(var p1=1;p1<pts.length;p1++){
        ctx.lineTo(pts[p1].x,pts[p1].y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    } else if(game.strokes[s].inkType === 'absorb'){
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pts[0].y);
      for(var p2=1;p2<pts.length;p2++){
        ctx.lineTo(pts[p2].x,pts[p2].y);
      }
      ctx.stroke();
      if(game.strokes[s].anchor){
        ctx.fillStyle = 'rgba(142,77,255,' + (0.2 + game.strokes[s].charge * 0.08) + ')';
        ctx.beginPath();
        ctx.arc(game.strokes[s].anchor.x, game.strokes[s].anchor.y, 8 + game.strokes[s].charge * 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      ctx.strokeStyle = style.glow;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pts[0].y);
      for(var p3=1;p3<pts.length;p3++){
        ctx.lineTo(pts[p3].x,pts[p3].y);
      }
      ctx.stroke();
    }
  }

  if(game.currentStroke && game.currentStroke.points.length > 1){
    var cpts = game.currentStroke.points;
    var cstyle = strokeStyleForType(game.currentStroke.inkType);
    ctx.strokeStyle = cstyle.main;
    ctx.lineWidth = cstyle.width;
    ctx.beginPath();
    ctx.moveTo(cpts[0].x,cpts[0].y);
    for(var cp=1;cp<cpts.length;cp++){
      ctx.lineTo(cpts[cp].x,cpts[cp].y);
    }
    ctx.stroke();
  }
}

function drawDroplets(){
  for(var i=0;i<game.droplets.length;i++){
    var d = game.droplets[i];
    ctx.fillStyle = d.absorbed ? 'rgba(180,120,255,0.85)' : 'rgba(80,180,255,0.85)';
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(d.x-1.2,d.y-1.6,d.r*0.35,0,Math.PI*2);
    ctx.fill();
  }
}

function drawCup(){
  var level = getLevel();
  var cup = level.cup;
  var mood = game.cupMood;
  var shake = 0;
  var fillRatio = Math.min(1, game.cupFill / game.cupTarget);
  var bodyColor = '#ffffff';
  if(mood === 'excited'){ bodyColor = '#f4fff8'; shake = Math.sin(Date.now() * 0.03) * 2; }
  if(mood === 'worried'){ bodyColor = '#fff8f0'; }
  if(mood === 'hopeful'){ bodyColor = '#f7fff7'; }
  if(mood === 'ecstatic'){ bodyColor = '#f3fff0'; shake = Math.sin(Date.now() * 0.02) * 1.5; }
  if(mood === 'sad'){ bodyColor = '#f5f5f5'; }
  if(mood === 'impatient' || mood === 'uneasy' || mood === 'okay'){ bodyColor = '#fff7ef'; }
  if(mood === 'waiting'){ bodyColor = '#fcfcfc'; }

  ctx.save();
  ctx.translate(shake,0);
  ctx.fillStyle = bodyColor;
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(cup.x,cup.y);
  ctx.lineTo(cup.x + 10,cup.y + cup.h);
  ctx.lineTo(cup.x + cup.w - 10,cup.y + cup.h);
  ctx.lineTo(cup.x + cup.w,cup.y);
  ctx.stroke();

  var waterHeight = (cup.h - 16) * fillRatio;
  ctx.fillStyle = game.trueWin ? '#68d6ff' : '#5bc4ff';
  ctx.fillRect(cup.x + 10, cup.y + cup.h - 8 - waterHeight, cup.w - 20, waterHeight);

  var eyeY = cup.y + 36;
  var leftEyeX = cup.x + 30;
  var rightEyeX = cup.x + 58;
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(leftEyeX,eyeY,4,0,Math.PI*2);
  ctx.arc(rightEyeX,eyeY,4,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = '#222';
  ctx.lineWidth = 3;
  ctx.beginPath();
  if(mood === 'ecstatic'){
    ctx.arc(cup.x + 44, cup.y + 56, 16, 0.1, Math.PI - 0.1, false);
  } else if(mood === 'excited'){
    ctx.arc(cup.x + 44, cup.y + 57, 13, 0, Math.PI, false);
  } else if(mood === 'hopeful' || mood === 'okay'){
    ctx.arc(cup.x + 44, cup.y + 60, 12, 0.2, Math.PI - 0.2, false);
  } else if(mood === 'impatient'){
    ctx.moveTo(cup.x + 32, cup.y + 65);
    ctx.lineTo(cup.x + 56, cup.y + 65);
  } else if(mood === 'uneasy' || mood === 'worried'){
    ctx.arc(cup.x + 44, cup.y + 68, 10, Math.PI + 0.2, Math.PI * 2 - 0.2, false);
  } else {
    ctx.arc(cup.x + 44, cup.y + 72, 14, Math.PI + 0.15, Math.PI * 2 - 0.15, false);
  }
  ctx.stroke();

  if(!game.ritualActive && getLevel().ritual.required){
    ctx.strokeStyle = '#8e4dff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(leftEyeX - 8, eyeY - 11);
    ctx.lineTo(leftEyeX + 2, eyeY - 13);
    ctx.moveTo(rightEyeX - 2, eyeY - 13);
    ctx.lineTo(rightEyeX + 8, eyeY - 11);
    ctx.stroke();
  }

  ctx.restore();
}

function drawInkSelector(){
  var types = [
    {id:'solid',x:20,label:'Solid',color:'#202020'},
    {id:'repel',x:120,label:'Repel',color:'#f08b2d'},
    {id:'absorb',x:220,label:'Absorb',color:'#8e4dff'}
  ];
  for(var i=0;i<types.length;i++){
    var t = types[i];
    var enabled = getLevel().inkTypes.indexOf(t.id) !== -1;
    ctx.fillStyle = enabled ? (game.selectedInkType === t.id ? '#fff0c8' : '#eee4cc') : '#dfd8c8';
    ctx.strokeStyle = enabled ? '#8f7d4e' : '#b5ab97';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(t.x,140,88,28,8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = enabled ? t.color : '#9e9585';
    ctx.fillRect(t.x + 8,150,20,8);
    ctx.fillStyle = enabled ? '#4b3f23' : '#8e8575';
    ctx.font = 'bold 13px Arial';
    ctx.fillText(t.label, t.x + 36, 159);
  }
}

function drawUI(){
  var level = getLevel();
  ctx.fillStyle = '#4f4636';
  ctx.font = 'bold 24px Arial';
  ctx.fillText('Ink Ritual Cup', 20, 34);
  ctx.font = '14px Arial';
  ctx.fillText(level.name + ': ' + level.note, 20, 56);

  drawButton(buttons.restart,'Restart',game.buttonFlash === 'restart',true);
  drawButton(buttons.undo,'Undo',game.buttonFlash === 'undo',game.strokes.length > 0);
  drawButton(buttons.start,'Start',game.buttonFlash === 'start',game.gameStatus === 'ready');
  drawButton(buttons.next,'Next',false,game.winState && game.currentLevel < levels.length - 1);

  ctx.fillStyle = '#d9d1bb';
  ctx.fillRect(20,74,220,16);
  ctx.fillStyle = '#2d8cff';
  ctx.fillRect(20,74,220 * (game.inkRemaining / game.maxInk),16);
  ctx.strokeStyle = '#7d735d';
  ctx.strokeRect(20,74,220,16);
  ctx.fillStyle = '#4f4636';
  ctx.font = '14px Arial';
  ctx.fillText('Ink ' + Math.floor(game.inkRemaining) + ' / ' + game.maxInk, 20, 108);

  ctx.fillStyle = '#d9d1bb';
  ctx.fillRect(270,74,220,16);
  ctx.fillStyle = '#5bc4ff';
  ctx.fillRect(270,74,220 * Math.min(1, game.cupFill / game.cupTarget),16);
  ctx.strokeStyle = '#7d735d';
  ctx.strokeRect(270,74,220,16);
  ctx.fillStyle = '#4f4636';
  ctx.fillText('Cup fill ' + game.cupFill + ' / ' + game.cupTarget, 270, 108);

  ctx.fillStyle = '#d9d1bb';
  ctx.fillRect(270,118,220,12);
  ctx.fillStyle = '#b86dff';
  var ritualRatio = game.ritualTarget > 0 ? Math.min(1, game.ritualFill / game.ritualTarget) : 1;
  ctx.fillRect(270,118,220 * ritualRatio,12);
  ctx.strokeStyle = '#7d735d';
  ctx.strokeRect(270,118,220,12);
  ctx.fillStyle = '#4f4636';
  ctx.fillText('Ritual ' + game.ritualFill + ' / ' + game.ritualTarget + (level.ritual.required ? '' : ' optional'), 500, 128);

  drawInkSelector();

  ctx.fillStyle = '#4f4636';
  ctx.fillText('Status: ' + game.gameStatus, 20, 190);
  ctx.fillText('Mood: ' + game.cupMood, 120, 190);
  ctx.fillText('Evaporated: ' + game.evaporated, 240, 190);
  ctx.fillText('Attempts: ' + game.attempts, 380, 190);
  ctx.fillText('Stars: ' + game.scoreStars, 500, 190);
  ctx.fillText('Q cycle ink, Z undo, R restart', 20, 212);

  ctx.fillStyle = '#6a5c43';
  ctx.font = '15px Arial';
  ctx.fillText(game.uiMessage, 20, 234);

  if(game.gameStatus === 'ready'){
    ctx.fillStyle = 'rgba(255,248,230,0.92)';
    ctx.fillRect(220,250,360,88);
    ctx.strokeStyle = '#8f7d4e';
    ctx.lineWidth = 3;
    ctx.strokeRect(220,250,360,88);
    ctx.fillStyle = '#4b3f23';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Draw first, then press Start', 400, 284);
    ctx.font = '15px Arial';
    ctx.fillText('Black guides, orange repels, purple stores then releases.', 400, 312);
    ctx.textAlign = 'left';
  }

  if(game.winState || game.loseState){
    ctx.fillStyle = 'rgba(255,248,230,0.94)';
    ctx.fillRect(230,250,340,130);
    ctx.strokeStyle = '#8f7d4e';
    ctx.lineWidth = 3;
    ctx.strokeRect(230,250,340,130);
    ctx.fillStyle = '#4b3f23';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(game.winState ? 'Puzzle Cleared' : 'Try Another Route', 400, 286);
    ctx.font = '16px Arial';
    if(game.winState){
      ctx.fillText('Cup filled: ' + game.cupFill + '   Ritual: ' + (game.ritualActive ? 'active' : 'inactive'), 400, 316);
      ctx.fillText('Rating: ' + game.scoreStars + ' star' + (game.scoreStars === 1 ? '' : 's'), 400, 340);
      ctx.fillText(game.trueWin ? 'The cup is truly happy.' : 'The cup is full, but not spiritually convinced.', 400, 362);
    } else {
      ctx.fillText('Not enough water survived the route.', 400, 330);
      ctx.fillText('Try a shorter path, safer angle, or different ink behavior.', 400, 354);
    }
    ctx.textAlign = 'left';
  }
}

function drawGuideArrows(){
  var level = getLevel();
  ctx.strokeStyle = 'rgba(60,60,60,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(level.source.x + 25, level.source.y + 10);
  ctx.lineTo(level.source.x + 90, level.source.y + 35);
  ctx.lineTo(level.source.x + 170, level.source.y + 70);
  ctx.stroke();
}

function render(){
  drawBackground();
  drawUI();
  drawGuideArrows();
  drawHazards();
  drawRitual();
  drawSource();
  drawWallsAndStrokes();
  drawDroplets();
  drawCup();
}

function gameLoop(){
  updateGame();
  render();
  requestAnimationFrame(gameLoop);
}

gameLoop();
};
</script>
</body>
</html>
