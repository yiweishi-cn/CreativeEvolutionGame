<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Pulse Morph Run</title>
<style>
body { margin: 0; background: radial-gradient(circle at top, #101a35, #070b16 70%); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { width: 800px; height: 500px; display: block; box-shadow: 0 0 30px rgba(0, 255, 255, 0.08), 0 0 60px rgba(255, 0, 153, 0.06), inset 0 0 30px rgba(255, 255, 255, 0.03); border: 1px solid rgba(120, 220, 255, 0.18); }
</style>
</head>
<body>
<canvas id='gameCanvas'></canvas>
<script>
window.onload = function(){
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 500;

  var state, score, best, player, pipes, spawnTimer, speed, trail, perfects, badges, groundOffset, clouds, deathEchoTimer;
  var gravity = 0.42;
  var flap = -7.4;
  var pipeW = 92;
  var baseGapH = 150;
  var ground = 470;
  var frame = 0;
  var particles = [];
  var stars = [];
  var flashAlpha = 0;
  var shakeTime = 0;
  var shakeMag = 0;
  var comboPulse = 0;
  var pulseCombo = 0;
  var syncStreak = 0;
  var syncCharge = 0;
  var phaseReady = false;
  var phaseActive = false;
  var phaseTimer = 0;
  var phaseSavedThisActivation = false;
  var phaseFlash = 0;
  var deathFreezeTimer = 0;
  var deathPoint = null;
  var milestoneFlash = 0;
  var difficultyTier = 0;
  var nearMissEvents = [];
  var hudTipTimer = 240;
  var beatTimer = 0;
  var beatLength = 54;
  var beatIndex = 0;
  var gateIdCounter = 0;
  var ghostEcho = null;
  var routeLinks = [];
  var runComplete = false;

  function makeClouds(){
    clouds = [];
    for(var i = 0; i < 6; i++){
      clouds.push({
        x: i * 150 + Math.random() * 40,
        y: 50 + Math.random() * 180,
        w: 60 + Math.random() * 50,
        h: 24 + Math.random() * 16,
        s: 0.2 + Math.random() * 0.35
      });
    }
  }

  function makeStars(){
    stars = [];
    for(var i = 0; i < 90; i++){
      stars.push({
        x: Math.random() * 800,
        y: Math.random() * 470,
        r: Math.random() * 1.8 + 0.3,
        a: Math.random() * 0.6 + 0.2,
        s: Math.random() * 0.35 + 0.05
      });
    }
  }

  function reset(){
    state = 'menu';
    score = 0;
    best = best || 0;
    spawnTimer = 0;
    speed = 3.2;
    perfects = 0;
    badges = [];
    groundOffset = 0;
    deathEchoTimer = 0;
    deathFreezeTimer = 0;
    deathPoint = null;
    particles = [];
    flashAlpha = 0;
    shakeTime = 0;
    shakeMag = 0;
    comboPulse = 0;
    pulseCombo = 0;
    syncStreak = 0;
    syncCharge = 0;
    phaseReady = false;
    phaseActive = false;
    phaseTimer = 0;
    phaseSavedThisActivation = false;
    phaseFlash = 0;
    milestoneFlash = 0;
    difficultyTier = 0;
    nearMissEvents = [];
    hudTipTimer = 240;
    beatTimer = 0;
    beatIndex = 0;
    routeLinks = [];
    runComplete = false;
    player = { x: 170, y: 250, vy: 0, r: 15, tilt: 0, flapFlash: 0 };
    pipes = [];
    trail = [];
    makeClouds();
    makeStars();
  }

  function startGame(){
    score = 0;
    spawnTimer = 0;
    speed = 3.2;
    perfects = 0;
    badges = [];
    groundOffset = 0;
    deathEchoTimer = 0;
    deathFreezeTimer = 0;
    deathPoint = null;
    particles = [];
    flashAlpha = 0;
    shakeTime = 0;
    shakeMag = 0;
    comboPulse = 0;
    pulseCombo = 0;
    syncStreak = 0;
    syncCharge = 0;
    phaseReady = false;
    phaseActive = false;
    phaseTimer = 0;
    phaseSavedThisActivation = false;
    phaseFlash = 0;
    milestoneFlash = 0;
    difficultyTier = 0;
    nearMissEvents = [];
    hudTipTimer = 240;
    beatTimer = 0;
    beatIndex = 0;
    routeLinks = [];
    runComplete = false;
    player.x = 170;
    player.y = 250;
    player.vy = 0;
    player.tilt = 0;
    player.flapFlash = 0;
    pipes = [];
    trail = [];
    state = 'playing';
  }

  function addParticles(x, y, count, color, speedMin, speedMax, lifeMin, lifeMax){
    for(var i = 0; i < count; i++){
      var ang = Math.random() * Math.PI * 2;
      var sp = speedMin + Math.random() * (speedMax - speedMin);
      var life = lifeMin + Math.random() * (lifeMax - lifeMin);
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        life: life,
        maxLife: life,
        size: Math.random() * 3 + 1.5,
        color: color,
        glow: Math.random() * 10 + 8
      });
    }
  }

  function addBadge(text, x, y, color){
    badges.push({ text: text, x: x, y: y, life: 42, color: color });
  }

  function activatePhase(){
    if(!phaseReady) return;
    phaseReady = false;
    syncCharge = 0;
    phaseActive = true;
    phaseTimer = 18;
    phaseSavedThisActivation = false;
    phaseFlash = 18;
    addBadge('PHASE', player.x + 20, player.y - 24, '#c48cff');
    addParticles(player.x, player.y, 18, '#c48cff', 0.5, 2.8, 12, 26);
  }

  function flapUp(){
    if(state === 'menu'){
      startGame();
    } else if(state === 'game_over'){
      startGame();
    }
    if(state === 'playing'){
      if(phaseReady){
        activatePhase();
      }
      player.vy = flap;
      player.tilt = -0.65;
      player.flapFlash = 8;
      addParticles(player.x - 8, player.y + 4, 10, phaseActive ? '#d9a8ff' : '#7cf7ff', 0.5, 2.2, 12, 24);
    }
  }

  function endGame(){
    if(state !== 'playing') return;
    state = 'dead';
    if(score > best) best = score;
    trail = trail.slice(-60);
    deathFreezeTimer = 15;
    deathEchoTimer = 90;
    deathPoint = { x: player.x, y: player.y };
    flashAlpha = 0.32;
    shakeTime = 16;
    shakeMag = 8;
    ghostEcho = { path: trail.slice(-60), assistsLeft: 2 };
    addParticles(player.x, player.y, 30, '#ff4b8b', 0.8, 3.5, 20, 40);
    addParticles(player.x, player.y, 20, '#ffffff', 0.5, 2.4, 12, 28);
  }

  function makeGateProfile(kind, gapY, gapH, beat){
    var center = gapY + gapH * 0.5;
    var top = { y: gapY, h: gapH };
    var bottom = { y: gapY, h: gapH };
    var dualA = { y: center - 78, h: 54 };
    var dualB = { y: center + 24, h: 54 };
    var membrane = { y: center - 28, h: 56 };
    if(kind === 'single_shift'){
      if(beat % 2 === 0){
        return { lanes: [{ y: gapY + 12, h: gapH - 20 }], membrane: null, label: 'UP' };
      }
      return { lanes: [{ y: gapY - 8, h: gapH - 20 }], membrane: null, label: 'DOWN' };
    }
    if(kind === 'dual_split'){
      if(beat % 2 === 0){
        return { lanes: [{ y: dualA.y, h: dualA.h }, { y: dualB.y, h: dualB.h }], membrane: null, label: 'DUAL' };
      }
      return { lanes: [{ y: center - 34, h: 68 }], membrane: null, label: 'MERGE' };
    }
    if(kind === 'triad'){
      var mode = beat % 3;
      if(mode === 0){
        return { lanes: [{ y: top.y + 10, h: top.h - 26 }], membrane: null, label: 'HIGH' };
      }
      if(mode === 1){
        return { lanes: [{ y: bottom.y - 10, h: bottom.h - 26 }], membrane: null, label: 'LOW' };
      }
      return { lanes: [{ y: dualA.y, h: 46 }, { y: dualB.y, h: 46 }], membrane: null, label: 'SPLIT' };
    }
    if(kind === 'membrane'){
      return { lanes: [{ y: membrane.y, h: membrane.h }], membrane: { y: membrane.y, h: membrane.h }, label: 'PHASE' };
    }
    return { lanes: [{ y: gapY, h: gapH }], membrane: null, label: 'OPEN' };
  }

  function chooseGateKind(index){
    if(index < 3) return 'single_shift';
    if(index < 7) return Math.random() < 0.55 ? 'single_shift' : 'dual_split';
    if(index < 12) return Math.random() < 0.4 ? 'triad' : 'dual_split';
    var r = Math.random();
    if(r < 0.28) return 'membrane';
    if(r < 0.62) return 'triad';
    if(r < 0.82) return 'dual_split';
    return 'single_shift';
  }

  function addPipe(){
    var margin = 68;
    var gapH = baseGapH - Math.min(score * 1.2, 22);
    var maxGapTop = ground - margin - gapH;
    var gapY = margin + Math.random() * (maxGapTop - margin);
    var mode = difficultyTier % 3;
    var pulseMax = mode === 0 ? 32 : mode === 1 ? 26 : 36;
    var pulseWindow = mode === 2 ? 7 : 9;
    var kind = chooseGateKind(score);
    var gate = {
      x: 840,
      gapY: gapY,
      gapH: gapH,
      passed: false,
      telegraphed: false,
      centerBand: 16,
      perfectLife: 0,
      pulseTimer: pulseMax,
      pulseMax: pulseMax,
      pulseWindow: pulseWindow,
      pulseMode: mode,
      syncReady: false,
      syncHit: false,
      gateGlow: 0,
      id: gateIdCounter++,
      kind: kind,
      beatOffset: Math.floor(Math.random() * 3),
      mutation: null,
      ghostHint: false,
      ghostSpent: false,
      profile: null,
      routePreview: 0
    };
    if(ghostEcho && ghostEcho.assistsLeft > 0 && gate.id < 3){
      gate.ghostHint = true;
      ghostEcho.assistsLeft--;
    }
    gate.profile = getGateProfile(gate);
    pipes.push(gate);
  }

  function getGateProfile(p){
    var beat = (beatIndex + p.beatOffset) % 6;
    var profile = makeGateProfile(p.kind, p.gapY, p.gapH, beat);
    if(p.mutation === 'widen'){
      for(var i = 0; i < profile.lanes.length; i++){
        profile.lanes[i] = { y: profile.lanes[i].y - 8, h: profile.lanes[i].h + 16 };
      }
      profile.label += '+';
    }
    if(p.mutation === 'mirror'){
      var mirrored = [];
      for(var j = 0; j < profile.lanes.length; j++){
        var lane = profile.lanes[j];
        var laneCenter = lane.y + lane.h * 0.5;
        var mirroredCenter = p.gapY + p.gapH - (laneCenter - p.gapY);
        mirrored.push({ y: mirroredCenter - lane.h * 0.5, h: lane.h });
      }
      profile.lanes = mirrored;
      profile.label = 'MIRROR';
    }
    if(p.mutation === 'membrane'){
      var center = p.gapY + p.gapH * 0.5;
      profile.lanes = [{ y: center - 30, h: 60 }];
      profile.membrane = { y: center - 30, h: 60 };
      profile.label = 'PHASE';
    }
    if(p.ghostHint){
      var bestLane = profile.lanes[0];
      for(var k = 1; k < profile.lanes.length; k++){
        if(profile.lanes[k].h > bestLane.h) bestLane = profile.lanes[k];
      }
      profile.ghostSafeLane = { y: bestLane.y - 8, h: bestLane.h + 16 };
    }
    return profile;
  }

  function circleRectCollision(cx, cy, cr, rx, ry, rw, rh){
    var nearestX = Math.max(rx, Math.min(cx, rx + rw));
    var nearestY = Math.max(ry, Math.min(cy, ry + rh));
    var dx = cx - nearestX;
    var dy = cy - nearestY;
    return dx * dx + dy * dy <= cr * cr;
  }

  function hitGate(p, radius){
    var profile = p.profile;
    var solids = [];
    var lanes = profile.lanes.slice().sort(function(a, b){ return a.y - b.y; });
    var cursor = 0;
    for(var i = 0; i < lanes.length; i++){
      if(lanes[i].y > cursor){
        solids.push({ x: p.x, y: cursor, w: pipeW, h: lanes[i].y - cursor });
      }
      cursor = lanes[i].y + lanes[i].h;
    }
    if(cursor < ground){
      solids.push({ x: p.x, y: cursor, w: pipeW, h: ground - cursor });
    }
    for(var j = 0; j < solids.length; j++){
      if(solids[j].h > 0 && circleRectCollision(player.x, player.y, radius, solids[j].x, solids[j].y, solids[j].w, solids[j].h)){
        return { hit: true, membrane: false };
      }
    }
    if(profile.membrane){
      var mem = profile.membrane;
      if(circleRectCollision(player.x, player.y, radius, p.x + 18, mem.y, pipeW - 36, mem.h)){
        return { hit: true, membrane: true };
      }
    }
    return { hit: false, membrane: false };
  }

  function updateClouds(){
    for(var i = 0; i < clouds.length; i++){
      clouds[i].x -= clouds[i].s;
      if(clouds[i].x + clouds[i].w < 0){
        clouds[i].x = 820 + Math.random() * 60;
        clouds[i].y = 40 + Math.random() * 180;
      }
    }
  }

  function updateStars(){
    for(var i = 0; i < stars.length; i++){
      stars[i].x -= stars[i].s;
      if(stars[i].x < -3){
        stars[i].x = 803;
        stars[i].y = Math.random() * 470;
      }
    }
  }

  function updateBadges(){
    for(var i = badges.length - 1; i >= 0; i--){
      badges[i].life--;
      badges[i].y -= 0.5;
      if(badges[i].life <= 0) badges.splice(i, 1);
    }
  }

  function updateParticles(){
    for(var i = particles.length - 1; i >= 0; i--){
      var p = particles[i];
      p.life--;
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.99;
      p.vy *= 0.99;
      p.vy += 0.02;
      if(p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateNearMisses(){
    for(var i = nearMissEvents.length - 1; i >= 0; i--){
      nearMissEvents[i].life--;
      if(nearMissEvents[i].life <= 0) nearMissEvents.splice(i, 1);
    }
  }

  function registerSync(p){
    p.syncHit = true;
    pulseCombo++;
    syncStreak++;
    comboPulse = 24;
    p.gateGlow = 16;
    addBadge('SYNC x' + pulseCombo, p.x + pipeW * 0.5 - 10, p.gapY + p.gapH * 0.5 - 18, '#7cf7ff');
    addParticles(p.x + pipeW * 0.5, p.gapY + p.gapH * 0.5, 18, '#7cf7ff', 0.6, 2.8, 16, 28);
    if(syncStreak >= 3 && !phaseReady){
      syncStreak = 0;
      syncCharge = 1;
      phaseReady = true;
      phaseFlash = 24;
      addBadge('PHASE READY', 320, 112, '#c48cff');
      addParticles(player.x + 40, player.y, 22, '#c48cff', 0.8, 3.2, 16, 32);
    }
  }

  function breakSyncChain(){
    pulseCombo = 0;
    syncStreak = 0;
  }

  function mutateFutureFrom(p){
    var targets = [];
    for(var i = 0; i < pipes.length; i++){
      if(pipes[i].x > p.x && !pipes[i].passed){
        targets.push(pipes[i]);
      }
    }
    if(targets.length === 0) return;
    var roll = Math.floor(Math.random() * 3);
    var target = targets[0];
    if(roll === 0){
      target.mutation = 'widen';
      target.routePreview = 80;
      routeLinks.push({ fromX: p.x + pipeW * 0.5, fromY: p.gapY + p.gapH * 0.5, toId: target.id, color: '#7cf7ff', life: 80, text: 'WIDEN' });
      addBadge('NEXT WIDENS', target.x + pipeW * 0.5, target.gapY - 10, '#7cf7ff');
    } else if(roll === 1){
      target.mutation = 'mirror';
      target.routePreview = 80;
      routeLinks.push({ fromX: p.x + pipeW * 0.5, fromY: p.gapY + p.gapH * 0.5, toId: target.id, color: '#ffe56a', life: 80, text: 'MIRROR' });
      addBadge('NEXT MIRRORS', target.x + pipeW * 0.5, target.gapY - 10, '#ffe56a');
    } else {
      target.mutation = 'membrane';
      target.routePreview = 80;
      routeLinks.push({ fromX: p.x + pipeW * 0.5, fromY: p.gapY + p.gapH * 0.5, toId: target.id, color: '#c48cff', life: 80, text: 'PHASE GATE' });
      addBadge('NEXT PHASES', target.x + pipeW * 0.5, target.gapY - 10, '#c48cff');
    }
    target.profile = getGateProfile(target);
  }

  function updateRouteLinks(){
    for(var i = routeLinks.length - 1; i >= 0; i--){
      routeLinks[i].life--;
      if(routeLinks[i].life <= 0) routeLinks.splice(i, 1);
    }
  }

  function update(){
    frame++;
    updateClouds();
    updateStars();
    updateBadges();
    updateParticles();
    updateNearMisses();
    updateRouteLinks();

    if(flashAlpha > 0) flashAlpha *= 0.88;
    if(shakeTime > 0) shakeTime--;
    if(comboPulse > 0) comboPulse--;
    if(phaseFlash > 0) phaseFlash--;
    if(milestoneFlash > 0) milestoneFlash--;
    if(hudTipTimer > 0) hudTipTimer--;

    if(state === 'dead'){
      if(deathFreezeTimer > 0){
        deathFreezeTimer--;
      } else {
        state = 'game_over';
      }
    }

    beatTimer++;
    if(beatTimer >= beatLength){
      beatTimer = 0;
      beatIndex++;
      addParticles(400, 74, 6, '#7cf7ff', 0.2, 1.2, 8, 16);
    }

    if(state === 'playing'){
      groundOffset = (groundOffset + speed) % 32;
      speed = 3.2 + score * 0.08;
      difficultyTier = Math.floor(score / 10);
      spawnTimer++;
      if(spawnTimer > 94){
        addPipe();
        spawnTimer = 0;
      }

      player.vy += gravity;
      player.y += player.vy;
      player.tilt += (Math.min(1.15, player.vy * 0.08) - player.tilt) * 0.22;
      if(player.flapFlash > 0) player.flapFlash--;

      if(phaseActive){
        phaseTimer--;
        if(phaseTimer <= 0){
          phaseActive = false;
        }
      }

      trail.push({ x: player.x, y: player.y });
      if(trail.length > 60) trail.shift();

      if(frame % 3 === 0){
        particles.push({
          x: player.x - 14,
          y: player.y + 4,
          vx: -1.2 - Math.random() * 0.8,
          vy: (Math.random() - 0.5) * 0.8,
          life: 12 + Math.random() * 8,
          maxLife: 20,
          size: Math.random() * 2 + 1,
          color: phaseActive ? '#c48cff' : '#4ce7ff',
          glow: 8
        });
      }

      for(var i = pipes.length - 1; i >= 0; i--){
        var p = pipes[i];
        p.x -= speed;
        if(p.gateGlow > 0) p.gateGlow--;
        if(p.perfectLife > 0) p.perfectLife--;
        if(p.routePreview > 0) p.routePreview--;
        p.profile = getGateProfile(p);

        var pulseZone = 360;
        if(!p.telegraphed && p.x <= pulseZone){
          p.telegraphed = true;
        }

        if(p.telegraphed){
          p.pulseTimer--;
          if(p.pulseTimer <= 0){
            p.pulseTimer = p.pulseMax;
          }
          var centerDist = Math.abs(p.pulseTimer - p.pulseMax * 0.5);
          p.syncReady = centerDist <= p.pulseWindow;
        }

        if(!p.passed && p.x + pipeW < player.x){
          p.passed = true;
          score++;
          comboPulse = 18;
          addBadge('+1', 398, 74, '#7cf7ff');
          addParticles(400, 66, 12, '#7cf7ff', 0.4, 2.2, 12, 24);
          if(score % 10 === 0){
            milestoneFlash = 40;
            addBadge('TIER ' + (Math.floor(score / 10) + 1), 360, 92, '#ffe56a');
          }
          if(score >= 20 && !runComplete){
            runComplete = true;
            addBadge('ROUTE COMPLETE', 400, 140, '#ffe56a');
            milestoneFlash = 55;
          }
          var profile = p.profile;
          var bestLane = profile.lanes[0];
          for(var li = 1; li < profile.lanes.length; li++){
            if(profile.lanes[li].h > bestLane.h) bestLane = profile.lanes[li];
          }
          var gapCenter = bestLane.y + bestLane.h / 2;
          if(Math.abs(player.y - gapCenter) <= p.centerBand){
            p.perfectLife = 36;
            perfects++;
            addBadge('精准改写', p.x + 6, gapCenter, '#ff4b8b');
            addParticles(p.x + pipeW / 2, gapCenter, 16, '#ff4b8b', 0.5, 2.6, 16, 28);
            mutateFutureFrom(p);
          }
          if(p.syncReady){
            registerSync(p);
          } else {
            breakSyncChain();
          }
        }

        var nearFront = p.x < player.x + player.r + 18 && p.x + pipeW > player.x - player.r;
        if(nearFront){
          var lanes = p.profile.lanes;
          for(var ni = 0; ni < lanes.length; ni++){
            var distTop = Math.abs((player.y - player.r) - lanes[ni].y);
            var distBottom = Math.abs((player.y + player.r) - (lanes[ni].y + lanes[ni].h));
            if(distTop < 7 || distBottom < 7){
              if(frame % 6 === 0){
                nearMissEvents.push({ x: player.x, y: distTop < distBottom ? lanes[ni].y : lanes[ni].y + lanes[ni].h, life: 10 });
              }
            }
          }
        }

        var hitData = hitGate(p, player.r);
        if(hitData.hit){
          if(hitData.membrane && phaseActive && !phaseSavedThisActivation){
            phaseSavedThisActivation = true;
            phaseActive = false;
            phaseTimer = 0;
            addBadge('PHASE THROUGH', player.x + 24, player.y - 14, '#c48cff');
            addParticles(player.x + 10, player.y, 28, '#c48cff', 0.8, 3.4, 16, 30);
          } else if(p.ghostHint && !p.ghostSpent){
            p.ghostSpent = true;
            addBadge('ECHO GUIDE', player.x + 20, player.y - 16, '#9fffdc');
            addParticles(player.x, player.y, 18, '#9fffdc', 0.5, 2.2, 14, 24);
          } else if(phaseActive && !phaseSavedThisActivation){
            phaseSavedThisActivation = true;
            phaseActive = false;
            phaseTimer = 0;
            addBadge('PHASE SAVE', player.x + 18, player.y - 14, '#c48cff');
            addParticles(player.x, player.y, 24, '#c48cff', 0.6, 3.0, 16, 30);
            player.vy *= -0.2;
          } else {
            endGame();
          }
        }

        if(p.x + pipeW < -20) pipes.splice(i, 1);
      }

      if(player.y + player.r > ground) endGame();
      if(player.y - player.r < 0) endGame();
    } else {
      groundOffset = (groundOffset + 1.2) % 32;
      if(deathEchoTimer > 0) deathEchoTimer--;
      if(player.flapFlash > 0) player.flapFlash--;
    }
  }

  document.addEventListener('keydown', function(e){
    if(e.code === 'Space'){
      e.preventDefault();
      flapUp();
    }
    if(e.key === 'r' || e.key === 'R'){
      best = 0;
      reset();
    }
  });

  canvas.addEventListener('mousedown', function(){
    flapUp();
  });

  function drawBackground(){
    var sky = ctx.createLinearGradient(0, 0, 0, 500);
    sky.addColorStop(0, '#0a1022');
    sky.addColorStop(0.45, '#101c3d');
    sky.addColorStop(1, '#07101d');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, 800, 500);

    for(var i = 0; i < stars.length; i++){
      var s = stars[i];
      ctx.globalAlpha = s.a;
      ctx.fillStyle = '#d8f6ff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    for(var j = 0; j < clouds.length; j++){
      var c = clouds[j];
      ctx.fillStyle = 'rgba(120, 180, 255, 0.05)';
      ctx.fillRect(c.x, c.y, c.w, c.h);
    }

    var beatPulse = 1 - beatTimer / beatLength;
    ctx.save();
    ctx.globalAlpha = 0.12 + beatPulse * 0.15;
    ctx.strokeStyle = '#7cf7ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(400, 74, 18 + beatPulse * 38, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawGateSegment(x, y, w, h, glow, color){
    if(h <= 0) return;
    ctx.save();
    ctx.shadowBlur = 18 + glow;
    ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.strokeRect(x + 6, y + 4, w - 12, h - 8);
    ctx.strokeStyle = 'rgba(124,247,255,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 14, y + 10, w - 28, h - 20);
    ctx.restore();
  }

  function drawPulseGate(p){
    var profile = p.profile;
    var openness = Math.abs(p.pulseTimer - p.pulseMax * 0.5) / (p.pulseMax * 0.5);
    var ringRadius = 14 + openness * 56;
    var alpha = 1 - openness;
    var edgeGlow = p.syncReady ? 1 : 0.35;
    var lanes = profile.lanes.slice().sort(function(a, b){ return a.y - b.y; });
    var cursor = 0;
    var color = p.mutation === 'membrane' ? 'rgba(196,140,255,0.95)' : p.mutation === 'mirror' ? 'rgba(255,229,106,0.95)' : 'rgba(18,240,200,0.95)';

    for(var i = 0; i < lanes.length; i++){
      if(lanes[i].y > cursor){
        drawGateSegment(p.x, cursor, pipeW, lanes[i].y - cursor, p.gateGlow, color);
      }
      cursor = lanes[i].y + lanes[i].h;
    }
    if(cursor < ground){
      drawGateSegment(p.x, cursor, pipeW, ground - cursor, p.gateGlow, color);
    }

    for(var li = 0; li < lanes.length; li++){
      ctx.save();
      ctx.strokeStyle = p.ghostHint ? 'rgba(159,255,220,0.85)' : 'rgba(255,255,255,0.12)';
      ctx.lineWidth = p.ghostHint ? 3 : 2;
      ctx.beginPath();
      ctx.moveTo(p.x + 10, lanes[li].y);
      ctx.lineTo(p.x + pipeW - 10, lanes[li].y);
      ctx.moveTo(p.x + 10, lanes[li].y + lanes[li].h);
      ctx.lineTo(p.x + pipeW - 10, lanes[li].y + lanes[li].h);
      ctx.stroke();
      ctx.restore();
    }

    if(profile.membrane){
      ctx.save();
      ctx.globalAlpha = 0.55 + Math.sin(frame * 0.2) * 0.12;
      ctx.fillStyle = 'rgba(196,140,255,0.35)';
      ctx.fillRect(p.x + 18, profile.membrane.y, pipeW - 36, profile.membrane.h);
      ctx.strokeStyle = '#c48cff';
      ctx.lineWidth = 2;
      ctx.strokeRect(p.x + 18, profile.membrane.y, pipeW - 36, profile.membrane.h);
      ctx.restore();
    }

    if(profile.ghostSafeLane){
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#9fffdc';
      ctx.lineWidth = 4;
      ctx.strokeRect(p.x + 20, profile.ghostSafeLane.y, pipeW - 40, profile.ghostSafeLane.h);
      ctx.restore();
    }

    if(p.telegraphed){
      var centerLane = lanes[0];
      for(var ci = 1; ci < lanes.length; ci++){
        if(lanes[ci].h > centerLane.h) centerLane = lanes[ci];
      }
      var gapCenter = centerLane.y + centerLane.h * 0.5;
      ctx.save();
      ctx.globalAlpha = 0.18 + alpha * 0.55;
      ctx.strokeStyle = p.syncReady ? '#ffe56a' : '#7cf7ff';
      ctx.lineWidth = p.syncReady ? 4 : 2;
      ctx.shadowBlur = p.syncReady ? 22 : 12;
      ctx.shadowColor = p.syncReady ? '#ffe56a' : '#7cf7ff';
      ctx.beginPath();
      ctx.arc(p.x + pipeW * 0.5, gapCenter, ringRadius, 0, Math.PI * 2);
      ctx.stroke();
      if(p.pulseMode === 2){
        ctx.globalAlpha *= 0.7;
        ctx.beginPath();
        ctx.arc(p.x + pipeW * 0.5, gapCenter, ringRadius * 0.62, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.25 + edgeGlow * 0.45;
      ctx.strokeStyle = p.syncReady ? '#ffe56a' : '#ff4b8b';
      ctx.lineWidth = p.syncReady ? 5 : 3;
      ctx.beginPath();
      ctx.moveTo(p.x + 4, gapCenter);
      ctx.lineTo(p.x + pipeW - 4, gapCenter);
      ctx.stroke();
      ctx.restore();
    }

    if(p.perfectLife > 0){
      var bestLane = lanes[0];
      for(var bi = 1; bi < lanes.length; bi++){
        if(lanes[bi].h > bestLane.h) bestLane = lanes[bi];
      }
      ctx.save();
      ctx.globalAlpha = p.perfectLife / 36;
      ctx.fillStyle = '#ff4b8b';
      ctx.fillRect(p.x + 6, bestLane.y + bestLane.h * 0.5 - 4, pipeW - 12, 8);
      ctx.restore();
    }

    ctx.save();
    ctx.fillStyle = '#b9dfff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(profile.label, p.x + pipeW * 0.5, Math.max(20, p.gapY - 18));
    ctx.restore();
  }

  function drawRouteLinks(){
    for(var i = 0; i < routeLinks.length; i++){
      var link = routeLinks[i];
      var target = null;
      for(var j = 0; j < pipes.length; j++){
        if(pipes[j].id === link.toId){
          target = pipes[j];
          break;
        }
      }
      if(!target) continue;
      ctx.save();
      ctx.globalAlpha = link.life / 80;
      ctx.strokeStyle = link.color;
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(link.fromX, link.fromY);
      ctx.quadraticCurveTo((link.fromX + target.x) * 0.5, link.fromY - 40, target.x + pipeW * 0.5, target.gapY + target.gapH * 0.5);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = link.color;
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(link.text, target.x + pipeW * 0.5, target.gapY + target.gapH * 0.5 - 34);
      ctx.restore();
    }
  }

  function drawPipes(){
    drawRouteLinks();
    for(var i = 0; i < pipes.length; i++){
      drawPulseGate(pipes[i]);
    }
  }

  function drawTrail(){
    for(var i = 1; i < trail.length; i++){
      var a = i / trail.length;
      ctx.strokeStyle = phaseActive ? 'rgba(196,140,255,' + (a * 0.35) + ')' : 'rgba(76,231,255,' + (a * 0.18) + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
      ctx.lineTo(trail[i].x, trail[i].y);
      ctx.stroke();
    }
  }

  function drawPlayer(){
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.tilt || 0);

    if(phaseActive || phaseFlash > 0){
      ctx.shadowBlur = 24;
      ctx.shadowColor = '#c48cff';
    } else {
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#7cf7ff';
    }

    ctx.fillStyle = phaseActive ? '#d8b4ff' : '#ffe56a';
    ctx.beginPath();
    ctx.moveTo(-14, 0);
    ctx.lineTo(0, -12);
    ctx.lineTo(16, 0);
    ctx.lineTo(0, 12);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = player.flapFlash > 0 ? '#ffffff' : '#ff8bd1';
    ctx.beginPath();
    ctx.moveTo(-2, -4);
    ctx.lineTo(10, -16 - player.flapFlash * 0.5);
    ctx.lineTo(6, 0);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#0a1022';
    ctx.beginPath();
    ctx.arc(4, -2, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawParticles(){
    for(var i = 0; i < particles.length; i++){
      var p = particles[i];
      var a = p.life / p.maxLife;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = p.glow;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawNearMisses(){
    for(var i = 0; i < nearMissEvents.length; i++){
      var n = nearMissEvents[i];
      ctx.save();
      ctx.globalAlpha = n.life / 10;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(n.x, n.y, 10 + (10 - n.life) * 2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawGround(){
    var g = ctx.createLinearGradient(0, ground, 0, 500);
    g.addColorStop(0, '#0f2330');
    g.addColorStop(1, '#08131d');
    ctx.fillStyle = g;
    ctx.fillRect(0, ground, 800, 30);
    ctx.strokeStyle = 'rgba(124,247,255,0.35)';
    ctx.lineWidth = 2;
    for(var i = -32; i < 832; i += 32){
      ctx.beginPath();
      ctx.moveTo(i - groundOffset, ground + 2);
      ctx.lineTo(i + 12 - groundOffset, ground + 12);
      ctx.stroke();
    }
  }

  function drawBadges(){
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    for(var i = 0; i < badges.length; i++){
      var b = badges[i];
      ctx.save();
      ctx.globalAlpha = b.life / 42;
      ctx.fillStyle = b.color;
      ctx.shadowBlur = 12;
      ctx.shadowColor = b.color;
      ctx.fillText(b.text, b.x, b.y);
      ctx.restore();
    }
    ctx.textAlign = 'left';
  }

  function drawDeathEcho(){
    if((state === 'game_over' || state === 'dead') && trail.length > 2){
      ctx.save();
      for(var i = 1; i < trail.length; i++){
        var a = i / trail.length;
        ctx.strokeStyle = 'rgba(255,75,139,' + (a * 0.7) + ')';
        ctx.lineWidth = 2 + a * 2;
        ctx.beginPath();
        ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
        ctx.lineTo(trail[i].x, trail[i].y);
        ctx.stroke();
      }
      if(deathPoint){
        var pulse = 1 + (90 - deathEchoTimer) * 0.4;
        ctx.globalAlpha = 0.7;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(deathPoint.x, deathPoint.y, pulse, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = '#ff4b8b';
        ctx.beginPath();
        ctx.arc(deathPoint.x, deathPoint.y, pulse * 1.7, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    if(state !== 'playing' && ghostEcho && ghostEcho.path && ghostEcho.path.length > 2){
      ctx.save();
      for(var j = 1; j < ghostEcho.path.length; j++){
        var ga = j / ghostEcho.path.length;
        ctx.strokeStyle = 'rgba(159,255,220,' + (ga * 0.35) + ')';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ghostEcho.path[j - 1].x, ghostEcho.path[j - 1].y);
        ctx.lineTo(ghostEcho.path[j].x, ghostEcho.path[j].y);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawHudPanel(x, y, w, h){
    ctx.fillStyle = 'rgba(8,16,32,0.62)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(124,247,255,0.25)';
    ctx.strokeRect(x, y, w, h);
  }

  function drawHud(){
    drawHudPanel(14, 14, 250, 86);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('Score ' + score, 26, 42);
    ctx.font = '16px sans-serif';
    ctx.fillStyle = '#b9dfff';
    ctx.fillText('Best ' + best, 26, 66);
    ctx.fillText('Precision ' + perfects, 120, 66);
    ctx.fillText('Route ' + Math.min(score, 20) + '/20', 26, 88);

    drawHudPanel(540, 14, 246, 96);
    ctx.fillStyle = '#7cf7ff';
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText('SYNC COMBO ' + pulseCombo, 552, 36);
    ctx.fillStyle = '#ffe56a';
    ctx.fillText('TIER ' + (difficultyTier + 1), 552, 58);
    ctx.fillStyle = '#c48cff';
    ctx.fillText('PHASE ' + (phaseReady ? 'READY' : syncStreak + '/3'), 552, 80);
    ctx.fillStyle = '#9fffdc';
    ctx.fillText('BEAT ' + ((beatIndex % 6) + 1), 552, 102);

    ctx.strokeStyle = 'rgba(196,140,255,0.35)';
    ctx.strokeRect(680, 64, 88, 14);
    if(phaseReady){
      ctx.fillStyle = phaseFlash > 0 ? '#f3dcff' : '#c48cff';
      ctx.fillRect(682, 66, 84, 10);
    } else {
      ctx.fillStyle = '#c48cff';
      ctx.fillRect(682, 66, 28 * syncStreak, 10);
    }

    if(hudTipTimer > 0 && state === 'playing'){
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.font = '14px sans-serif';
      ctx.fillText('Golden center line = sync window. Pink center pass rewrites the next gate.', 180, 28);
      if(phaseReady){
        ctx.fillStyle = '#e7c8ff';
        ctx.fillText('Next flap spends Phase. Purple membrane gates can be crossed safely once.', 180, 48);
      }
    }

    if(state === 'menu'){
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 30px sans-serif';
      ctx.fillText('Pulse Morph Run', 400, 170);
      ctx.font = '18px sans-serif';
      ctx.fillStyle = '#b9dfff';
      ctx.fillText('Click or Space to flap through rhythm gates that change shape on the beat', 400, 212);
      ctx.fillText('Cross the golden sync line for charge, and the pink center band to rewrite the next gate', 400, 240);
      ctx.fillText('Your last death path returns as a ghost guide for the first few gates', 400, 268);
      ctx.fillStyle = '#ffe56a';
      ctx.fillText('Click / Space to Start', 400, 320);
      ctx.textAlign = 'left';
    }

    if(state === 'dead'){
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText('Fatal line captured', 400, 220);
      ctx.textAlign = 'left';
    }

    if(state === 'game_over'){
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 28px sans-serif';
      ctx.fillText('Game Over', 400, 200);
      ctx.font = '18px sans-serif';
      ctx.fillStyle = '#ffd4e7';
      ctx.fillText('Ghost echo will mark safer timing on your next launch', 400, 230);
      ctx.fillStyle = '#b9dfff';
      ctx.fillText('Score ' + score + '   Best ' + best + '   Precision ' + perfects, 400, 258);
      ctx.fillStyle = '#ffe56a';
      ctx.fillText('Click / Space to Restart', 400, 304);
      ctx.textAlign = 'left';
    }

    if(runComplete && state === 'playing'){
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffe56a';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText('Completed one route plan. Keep flying for best score.', 400, 128);
      ctx.textAlign = 'left';
    }
  }

  function render(){
    var sx = 0;
    var sy = 0;
    if(shakeTime > 0){
      sx = (Math.random() - 0.5) * shakeMag;
      sy = (Math.random() - 0.5) * shakeMag;
    }

    ctx.clearRect(0, 0, 800, 500);
    ctx.save();
    ctx.translate(sx, sy);
    drawBackground();
    drawTrail();
    drawPipes();
    drawNearMisses();
    drawPlayer();
    drawParticles();
    drawGround();
    drawBadges();
    drawDeathEcho();
    if(milestoneFlash > 0){
      ctx.save();
      ctx.globalAlpha = milestoneFlash / 40 * 0.15;
      ctx.fillStyle = '#ffe56a';
      ctx.fillRect(0, 0, 800, 500);
      ctx.restore();
    }
    ctx.restore();
    drawHud();
    if(flashAlpha > 0){
      ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
      ctx.fillRect(0, 0, 800, 500);
    }
  }

  function gameLoop(){
    update();
    render();
    requestAnimationFrame(gameLoop);
  }

  reset();
  gameLoop();
};
</script>
</body>
</html>
